syntax = "proto3";

package com.coralogix.dashboards.v1.widgets;

import "com/coralogix/dashboards/v1/audit_log.proto";
import "google/protobuf/descriptor.proto";
import "google/protobuf/wrappers.proto";

service AnnouncementsService {
  rpc SearchAnnouncements(SearchAnnouncementsRequest) returns (SearchAnnouncementsResponse) {
    option (audit_log_description).description = "get announcements";
  }

  rpc SearchDismissedAnnouncementsIds(SearchDismissedAnnouncementsIdsRequest) returns (SearchDismissedAnnouncementsIdsResponse) {
    option (audit_log_description).description = "get dismissed announcements ids";
  }

  rpc UpdateDismissedAnnouncementsIds(UpdateDismissedAnnouncementsIdsRequest) returns (UpdateDismissedAnnouncementsIdsResponse) {
    option (audit_log_description).description = "updatedismissed announcements ids";
  }
}

message SearchAnnouncementsRequest {}

message SearchAnnouncementsResponse {
  repeated Announcement announcements = 1;
}

message SearchDismissedAnnouncementsIdsRequest {}

message SearchDismissedAnnouncementsIdsResponse {
  repeated google.protobuf.StringValue dismissed_announcements_ids = 1;
}

message UpdateDismissedAnnouncementsIdsRequest {
  repeated google.protobuf.StringValue dismissed_announcements_ids = 1;
}

message UpdateDismissedAnnouncementsIdsResponse {}

message Announcement {
  google.protobuf.StringValue id = 1;
  Message message = 2;
  Link link = 3;
  google.protobuf.BoolValue is_beta = 4;

  message Message {
    google.protobuf.StringValue headline = 1;
    google.protobuf.StringValue description = 2;
  }

  message Link {
    google.protobuf.StringValue text = 1;
    google.protobuf.StringValue url = 2;
  }
}
