syntax = "proto3";

package com.coralogix.dashboards.v1.widgets;

import "com/coralogix/dashboards/v1/audit_log.proto";
import "com/coralogix/dashboards/v1/common/search_filter.proto";
import "com/coralogix/dashboards/v1/common/time_frame.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service TopErrorsService {
  rpc FetchTopErrors(FetchTopErrorsRequest) returns (FetchTopErrorsResponse) {
    option (audit_log_description).description = "fetch top errors";
  }
}

message FetchTopErrorsRequest {
  repeated common.SearchFilter filters = 1;
  common.TimeFrame time_frame = 2;
  google.protobuf.StringValue aggregate_by = 3;
}

message FetchTopErrorsResponse {
  google.protobuf.Int64Value total_error_count = 1;
  repeated GroupErrorCount errors_by_group = 2;

  message GroupErrorCount {
    google.protobuf.StringValue application = 1;
    google.protobuf.StringValue subsystem = 2;
    google.protobuf.Int64Value count = 3;
    repeated TemplateErrorCount errors_by_template = 4;
    google.protobuf.Int64Value no_template_count = 5;
  }

  message TemplateErrorCount {
    google.protobuf.StringValue template_id = 1;
    google.protobuf.Int64Value count = 2;
    google.protobuf.StringValue log_example = 3;
    google.protobuf.Timestamp template_created_at = 4;
  }
}
