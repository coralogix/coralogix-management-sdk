syntax = "proto3";

package com.coralogix.dashboards.v1.widgets;

import "com/coralogix/dashboards/v1/audit_log.proto";
import "com/coralogix/dashboards/v1/common/search_filter.proto";
import "com/coralogix/dashboards/v1/common/time_frame.proto";
import "google/protobuf/descriptor.proto";
import "google/protobuf/wrappers.proto";

service AlertsService {
  rpc SearchAlertsGroupedBySeverity(SearchAlertsGroupedBySeverityRequest) returns (SearchAlertsGroupedBySeverityResponse) {
    option (audit_log_description).description = "search alerts";
  }
}

message SearchAlertsGroupedBySeverityRequest {
  repeated common.SearchFilter filters = 1;
  common.TimeFrame time_frame = 2;
}

message SearchAlertsGroupedBySeverityResponse {
  repeated AlertGroup alerts = 1;
}

message AlertGroup {
  AlertGroupSeverity severity = 1;
  google.protobuf.Int32Value amount = 2;
}

enum AlertGroupSeverity {
  ALERT_GROUP_SEVERITY_UNSPECIFIED = 0;
  ALERT_GROUP_SEVERITY_INFO = 1;
  ALERT_GROUP_SEVERITY_WARNING = 2;
  ALERT_GROUP_SEVERITY_CRITICAL = 3;
  ALERT_GROUP_SEVERITY_ERROR = 4;
}
