syntax = "proto3";

package com.coralogix.dashboards.v1.application;

import "com/coralogix/dashboards/v1/audit_log.proto";
import "google/protobuf/descriptor.proto";
import "google/protobuf/wrappers.proto";

service UserSettingsService {
  rpc UpdateUserDataSourceVisibility(UpdateUserDataSourceVisibilityRequest) returns (UpdateUserDataSourceVisibilityResponse) {
    option (audit_log_description).description = "update dashboard user datasource visibility";
  }

  rpc SearchUserSettings(SearchUserSettingsRequest) returns (SearchUserSettingsResponse) {
    option (audit_log_description).description = "get dashboard user settings";
  }
}

message UpdateUserDataSourceVisibilityRequest {
  DataSourceVisibility data_source_visibility = 1;
}

message UpdateUserDataSourceVisibilityResponse {}

message SearchUserSettingsRequest {}

message SearchUserSettingsResponse {
  DataSourceVisibility data_source_visibility = 1;
}

message DataSourceVisibility {
  google.protobuf.BoolValue logs = 1;
  google.protobuf.BoolValue metrics = 2;
  google.protobuf.BoolValue traces = 3;
  google.protobuf.BoolValue security = 4;
}
