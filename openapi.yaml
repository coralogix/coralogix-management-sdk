    E2MLogsQuery:
      title: E2M
      required:
        - name
        - type
        - logsQuery
      type: object
      properties:
        createTime:
          type: string
          description: RFC3339 timestamp of when this E2M was created.
          example: '2022-06-30T12:30:00.000Z'
        dataSource:
          type: string
          description: >-
            Optional data source in namespace/dataset_name format. If not set,
            defaults to the standard logs/spans stream.
          example: my_namespace/my_dataset
        description:
          type: string
          description: Human-readable description of this E2M.
          example: avg and max the latency of catalog service
        id:
          maxLength: 36
          minLength: 36
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          type: string
          description: Unique identifier for this E2M. Required on update requests.
          example: d6a3658e-78d2-47d0-9b81-b2c551f01b09
        isInternal:
          type: boolean
          description: Indicates whether this E2M is for internal use only.
        logsQuery:
          $ref: '#/components/schemas/v2.LogsQuery'
        metricFields:
          maxItems: 10
          type: array
          items:
            $ref: '#/components/schemas/v2.MetricField'
          description: Metric fields to extract and aggregate from the events.
        metricLabels:
          type: array
          items:
            $ref: '#/components/schemas/MetricLabel'
          description: Metric labels to attach to the generated metrics.
        name:
          type: string
          description: Human-readable name for this E2M.
          example: Service_catalog_latency
        permutations:
          $ref: '#/components/schemas/E2MPermutations'
        type:
          $ref: '#/components/schemas/E2MType'
        updateTime:
          type: string
          description: RFC3339 timestamp of when this E2M was last updated.
          example: '2022-06-30T12:30:00.000Z'
      description: This data structure represents an Event to Metrics (E2M) object.
      externalDocs:
        description: Find out more about events2metrics
        url: >-
          https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/
    E2MPermutations:
