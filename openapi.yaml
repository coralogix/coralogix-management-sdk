components:
  schemas:
    ARMStack:
      title: ARM stack
      type: object
      properties:
        resourceGroupName:
          type: string
          description: The resource group name.
        subscriptionId:
          type: string
          description: The subscription id.
      description: This data structure represents an Azure Resource Manager stack.
      externalDocs:
        description: >-
          Find out more about the Azure Resource Manager (ARM) integration in
          our documentation
        url: >-
          https://coralogix.com/docs/integrations/azure/azure-resource-manager-integration-packages/
    AccessType:
      oneOf:
        - $ref: '#/components/schemas/AccessTypePermanentAccess'
        - $ref: '#/components/schemas/AccessTypeTemporaryAccess'
      discriminator:
        propertyName: access_type
        mapping:
          permanent: '#/components/schemas/PermanentAccess'
          temporary: '#/components/schemas/TemporaryAccess'
    AccessTypePermanentAccess:
      title: AccessType
      required:
        - accessType
        - permanentAccess
      type: object
      properties:
        accessType:
          type: string
          description: 'Type of access: ''permanent'' or ''temporary'''
        permanentAccess:
          $ref: '#/components/schemas/PermanentAccess'
      description: >-
        Defines the access duration for a user. Can be either permanent
        (indefinite) or temporary (expires at a specific time).
      externalDocs:
        url: ''
    AccessTypeTemporaryAccess:
      title: AccessType
      required:
        - accessType
        - temporaryAccess
      type: object
      properties:
        accessType:
          type: string
          description: 'Type of access: ''permanent'' or ''temporary'''
        temporaryAccess:
          $ref: '#/components/schemas/TemporaryAccess'
      description: >-
        Defines the access duration for a user. Can be either permanent
        (indefinite) or temporary (expires at a specific time).
      externalDocs:
        url: ''
    AcknowledgeCaseRequest:
      title: Acknowledge case request
      required:
        - id
      type: object
      properties:
        id:
          maxLength: 64
          minLength: 1
          pattern: >-
            ^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$
          type: string
          description: >-
            ID of the case to acknowledge. Accepts either the case UUID (the
            `id` field on a case) or the readable identifier (the `readable_id`
