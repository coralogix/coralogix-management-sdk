    PrometheusAlert:
      title: Prometheus alert
      required:
        - alertGroupId
        - alertName
        - fingerprint
        - priority
        - labels
        - annotations
        - status
        - generatorUrl
        - createdAt
        - updatedAt
      type: object
      properties:
        alertGroupId:
          maxLength: 256
          minLength: 1
          pattern: ^[\s\S]*$
          type: string
          description: Identifier of the Prometheus alerts group this alert belongs to.
          example: 5d41402abc4b2a76b9719d911017c592
        alertName:
          maxLength: 256
          minLength: 1
          pattern: ^[\s\S]*$
          type: string
          description: Name of the alert (typically the `alertname` label).
          example: HighRequestLatency
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Annotations attached to the alert.
        createdAt:
          maxLength: 30
          minLength: 20
          type: string
          description: Timestamp when the alert was first observed.
          format: date-time
          example: '2025-09-22T10:30:00.000Z'
        fingerprint:
          maxLength: 256
          minLength: 1
          pattern: ^[\s\S]*$
          type: string
          description: >-
            Prometheus alert fingerprint (stable identifier for this alert
            instance).
          example: a1b2c3d4e5f6a7b8
        generatorUrl:
          maxLength: 4096
          minLength: 1
          pattern: ^[\s\S]*$
          type: string
          description: URL of the system that generated the alert.
          example: https://prometheus.example.com/graph?g0.expr=...
        labels:
          type: object
          additionalProperties:
            type: string
          description: Labels attached to the alert.
        priority:
          $ref: '#/components/schemas/IndicatorPriority'
        query:
          $ref: '#/components/schemas/PrometheusAlertQuery'
        status:
          $ref: '#/components/schemas/PrometheusAlertStatus'
        updatedAt:
          maxLength: 30
          minLength: 20
          type: string
          description: Timestamp when the alert was last updated.
          format: date-time
          example: '2025-09-22T11:05:00.000Z'
      description: Data describing a single Prometheus alert within an alert group.
      externalDocs:
        url: ''
