          type: string
          description: >-
            ID of the case to update. Accepts either the case UUID (the `id`
            field on a case) or the readable identifier (the `readable_id`
            field, e.g. `CASE-123`).
          example: 3f166e9f-3c88-4af2-b52e-138f339dab3e
