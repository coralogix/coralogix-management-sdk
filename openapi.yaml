      "put": {
        "description": "Creates a new custom role.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "RoleManagementService_CreateRole",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "description": "Request for creating a custom role.",
                "oneOf": [
                  {
                    "required": [
                      "parentRoleId"
                    ],
                    "type": "object"
                  },
                  {
                    "required": [
                      "parentRoleName"
                    ],
                    "type": "object"
                  },
                  {
                    "not": {
                      "anyOf": [
                        {
                          "required": [
                            "parentRoleId"
                          ],
                          "type": "object"
                        },
                        {
                          "required": [
                            "parentRoleName"
                          ],
                          "type": "object"
                        }
                      ]
                    },
                    "type": "object"
                  }
                ],
                "properties": {
                  "description": {
                    "description": "Human-readable description.",
                    "minLength": 0,
                    "type": "string"
                  },
                  "name": {
                    "description": "Display name.",
                    "minLength": 0,
                    "type": "string"
                  },
                  "parentRoleId": {
                    "description": "The parent role id.",
                    "format": "int64",
                    "minimum": 0,
                    "type": "integer"
                  },
                  "parentRoleName": {
                    "description": "The parent role name.",
                    "minLength": 0,
                    "type": "string"
                  },
                  "permissions": {
                    "description": "List of permissions.",
                    "items": {
                      "description": "List of permissions.",
                      "minLength": 0,
                      "type": "string"
                    },
                    "minItems": 0,
                    "type": "array"
                  },
                  "teamId": {
                    "description": "Team identifier.",
                    "format": "int64",
                    "minimum": 0,
                    "type": "integer"
                  }
                },
                "type": "object"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CreateRoleResponse"
                }
              }
            },
            "description": ""
          },
          "400": {
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            },
            "description": "Bad Request"
          },
          "401": {
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            },
            "description": "Unauthorized request"
          },
          "409": {
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            },
            "description": "Role already exists"
