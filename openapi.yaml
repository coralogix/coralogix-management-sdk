      externalDocs:
        url: ''
      operationId: DataUsageService_GetDataUsage
      parameters:
        - description: Date interval to query data usage over.
          in: query
          name: date_range
          required: false
          schema:
            description: This data structure represents a date range.
            externalDocs:
              description: Find out more about data usage.
              url: >-
                https://coralogix.com/docs/user-guides/account-management/payment-and-billing/data-usage/
            properties:
              fromDate:
                description: The from date.
                example: '2021-01-01T00:00:00.000Z'
                format: date-time
                type: string
              toDate:
                description: The to date.
                example: '2021-01-01T00:00:00.000Z'
                format: date-time
                type: string
            title: Date Range
            type: object
        - description: >-
            Aggregation resolution. Minimum supported value is 1h. Must be
            between 1 hour and the date_range interval.
          in: query
          name: resolution
          required: false
          schema:
            description: >-
              Aggregation resolution. Minimum supported value is 1h. Must be
              between 1 hour and the date_range interval.
            type: string
        - description: >-
            List of fields to aggregate results by (for example pillar and
            priority).
          in: query
          name: aggregate
          required: false
          schema:
            description: >-
              List of fields to aggregate results by (for example pillar and
              priority).
            items:
              $ref: '#/components/schemas/AggregateBy'
            type: array
        - description: >-
            Dimensions to filter results by; only entries that contain all
            listed dimensions are returned.
          in: query
          name: dimension_filters
          required: false
          schema:
            description: >-
              Dimensions to filter results by; only entries that contain all
              listed dimensions are returned.
            items:
              oneOf:
                - $ref: '#/components/schemas/DimensionGenericDimension'
                - $ref: '#/components/schemas/DimensionPillar'
                - $ref: '#/components/schemas/DimensionPriority'
                - $ref: '#/components/schemas/DimensionSeverity'
                - $ref: '#/components/schemas/DimensionTier'
            type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDataUsageResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get Data Usage
      tags:
        - Data Usage Service
