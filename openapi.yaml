openapi: 3.0.0
info:
  title: ''
  version: 1.0.0
paths:
  /aaa/api-keys/v3:
    get:
      description: Retrieve all API keys for team members.
      externalDocs:
        url: ''
      operationId: ApiKeysAdminService_GetTeamMembersApiKeys
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTeamMembersApiKeysResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Members API Keys
      tags:
        - API Keys Admin Service
    post:
      description: Creates a new API key for the authenticated team.
      externalDocs:
        url: ''
      operationId: ApiKeysService_CreateApiKey
      requestBody:
        content:
          application/json:
            schema:
              description: This data structure is used to create an API key.
              properties:
                accessPolicy:
                  description: >-
                    JSON string representing the access policy for this API key.
                    Defines granular permissions for users and groups.
                  example: >-
                    {"version":"2025-01-01","default":{"permissions":{"data-ingest-api-keys:ReadAccessPolicy":"grant","data-ingest-api-keys:Manage":"deny","data-ingest-api-keys:UpdateAccessPolicy":"deny","data-ingest-api-keys:ReadConfig":"grant"}},"rules":[]}
                  type: string
                hashed:
                  description: Whether the value is stored as a one-way hash.
                  example: true
                  type: boolean
                keyPermissions:
                  $ref: '#/components/schemas/CreateApiKeyRequest.KeyPermissions'
                name:
                  description: Display name.
                  example: my_api_key
                  type: string
                owner:
                  $ref: '#/components/schemas/Owner'
              title: Create Api Key Request
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Create API Key
      tags:
        - API Keys Service
  /aaa/api-keys/v3/all/delete:
    post:
      description: Delete specified API keys.
      externalDocs:
        url: ''
      operationId: ApiKeysAdminService_DeleteApiKeys
      requestBody:
        content:
          application/json:
            schema:
              description: This data structure is used to delete specified API keys.
              properties:
                keyIds:
                  description: List of API key IDs to delete.
                  items:
                    description: List of API key IDs to delete.
                    example: key_abc123
                    type: string
                  type: array
              title: Delete API Keys Request
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteApiKeysResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Delete API Keys
      tags:
        - API Keys Admin Service
  /aaa/api-keys/v3/all/status:
    post:
      description: Activate or deactivate specified API keys.
      externalDocs:
        url: ''
      operationId: ApiKeysAdminService_UpdateApiKeysStatus
      requestBody:
        content:
          application/json:
            schema:
              description: >-
                This data structure is used to update the status of specified
                API keys.
              properties:
                updates:
                  description: The updates.
                  items:
                    $ref: '#/components/schemas/ApiKeyStatusUpdate'
                  type: array
              title: Update API Keys Status Request
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateApiKeysStatusResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Update API Keys Status
      tags:
        - API Keys Admin Service
  /aaa/api-keys/v3/list/all:
    get:
      description: Returns all API keys for the authenticated team.
      externalDocs:
        url: ''
      operationId: ApiKeysService_GetApiKeys
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetApiKeysResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get API Keys
      tags:
        - API Keys Service
  /aaa/api-keys/v3/{key_id}:
    get:
      description: Returns the details of the specified API key.
      externalDocs:
        url: ''
      operationId: ApiKeysService_GetApiKey
      parameters:
        - description: Key identifier.
          in: path
          name: key_id
          required: true
          schema:
            description: Key identifier.
            example: my_key_id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetApiKeyResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get API Key
      tags:
        - API Keys Service
    put:
      description: Updates the specified API key.
      externalDocs:
        url: ''
      operationId: ApiKeysService_UpdateApiKey
      parameters:
        - description: Key identifier.
          in: path
          name: key_id
          required: true
          schema:
            description: Key identifier.
            example: my_key_id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              description: This data structure is used to update an API key.
              properties:
                accessPolicy:
                  description: >-
                    JSON string representing the access policy for this API key.
                    Defines granular permissions for users and groups. To delete
                    an existing policy, pass an empty string.
                  example: >-
                    {"version":"2025-01-01","default":{"permissions":{"data-ingest-api-keys:ReadAccessPolicy":"grant","data-ingest-api-keys:Manage":"deny","data-ingest-api-keys:UpdateAccessPolicy":"deny","data-ingest-api-keys:ReadConfig":"grant"}},"rules":[]}
                  type: string
                isActive:
                  description: >-
                    Whether the API key is active. Set to false to deactivate
                    without deleting.
                  example: true
                  type: boolean
                newName:
                  description: New display name for the API key.
                  example: my_new_name
                  type: string
                permissions:
                  $ref: '#/components/schemas/UpdateApiKeyRequest.Permissions'
                presets:
                  $ref: '#/components/schemas/Presets'
              title: Update Api Key Request
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateApiKeyResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Update API Key
      tags:
        - API Keys Service
    delete:
      description: Deletes the API key with the given ID.
      externalDocs:
        url: ''
      operationId: ApiKeysService_DeleteApiKey
      parameters:
        - description: The unique identifier of the API key to delete.
          in: path
          name: key_id
          required: true
          schema:
            description: The unique identifier of the API key to delete.
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteApiKeyResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Delete API Key
      tags:
        - API Keys Service
  /aaa/custom-roles/v1:
    get:
      description: Returns all custom roles for the authenticated team.
      externalDocs:
        url: ''
      operationId: RoleManagementService_ListCustomRoles
      parameters:
        - description: Team identifier.
          in: query
          name: team_id
          required: false
          schema:
            description: Team identifier.
            format: int64
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCustomRolesResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: List Custom Roles
      tags:
        - Role Management Service
    put:
      description: Creates a new custom role.
      externalDocs:
        url: ''
      operationId: RoleManagementService_CreateRole
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CreateRoleRequestParentRoleId'
                - $ref: '#/components/schemas/CreateRoleRequestParentRoleName'
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRoleResponse'
          description: ''
        '201':
          content:
            application/json: {}
          description: Role created
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '409':
          content:
            application/json: {}
          description: Role already exists
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Create Role
      tags:
        - Role Management Service
  /aaa/custom-roles/v1/{role_id}:
    get:
      description: Returns the details of the specified custom role.
      externalDocs:
        url: ''
      operationId: RoleManagementService_GetCustomRole
      parameters:
        - description: The role id.
          in: path
          name: role_id
          required: true
          schema:
            description: The role id.
            format: int64
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCustomRoleResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Role not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get Custom Role
      tags:
        - Role Management Service
    post:
      description: Updates the specified custom role.
      externalDocs:
        url: ''
      operationId: RoleManagementService_UpdateRole
      parameters:
        - description: The role id.
          in: path
          name: role_id
          required: true
          schema:
            description: The role id.
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              description: Request for updating a custom role.
              properties:
                newDescription:
                  description: The new description.
                  type: string
                newName:
                  description: The new name.
                  type: string
                newPermissions:
                  $ref: '#/components/schemas/v2.Permissions'
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateRoleResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Role not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Update Role
      tags:
        - Role Management Service
    delete:
      description: Deletes the custom role with the specified ID.
      externalDocs:
        url: ''
      operationId: RoleManagementService_DeleteRole
      parameters:
        - description: The role id.
          in: path
          name: role_id
          required: true
          schema:
            description: The role id.
            format: int64
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRoleResponse'
          description: ''
        '204':
          content:
            application/json: {}
          description: Role deleted
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Role not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Delete Role
      tags:
        - Role Management Service
  /aaa/send-data-keys/v3:
    get:
      description: Returns all send-data API keys for the authenticated team.
      externalDocs:
        url: ''
      operationId: ApiKeysService_GetSendDataApiKeys
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSendDataApiKeysResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get "Send Data" API Keys
      tags:
        - API Keys Service
  /aaa/system-roles/v1:
    get:
      description: Returns all built-in system roles.
      externalDocs:
        url: ''
      operationId: RoleManagementService_ListSystemRoles
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSystemRolesResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: List System Roles
      tags:
        - Role Management Service
  /aaa/team-groups/v2:
    get:
      description: Returns all team groups.
      externalDocs:
        url: ''
      operationId: GroupsMgmtService_GetTeamGroups
      parameters:
        - description: >-
            Team to fetch team groups for. If not set, fetches groups associated
            with the logged in team.
          in: query
          name: team_id
          required: false
          schema:
            description: >-
              Team to fetch team groups for. If not set, fetches groups
              associated with the logged in team.
            format: int64
            type: integer
        - description: Page size.
          in: query
          name: page_size
          required: false
          schema:
            description: Page size.
            format: int64
            type: integer
        - description: The page token.
          in: query
          name: page_token
          required: false
          schema:
            description: The page token.
            example: ''
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTeamGroupsResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Groups
      tags:
        - Team Groups Management Service
    post:
      description: Creates a new team group.
      externalDocs:
        url: ''
      operationId: GroupsMgmtService_CreateTeamGroup
      requestBody:
        content:
          application/json:
            schema:
              description: >-
                Request to create a new team group with specified name,
                description, roles, users, and optional scope filters. Can be
                associated with a specific team or the authenticated team.
              properties:
                description:
                  description: Human-readable description of the team group.
                  type: string
                externalId:
                  description: >-
                    External identifier for the group, used when the group is
                    managed by an external identity provider.
                  type: string
                groupType:
                  $ref: '#/components/schemas/GroupType'
                name:
                  description: Unique display name for the new team group.
                  type: string
                roleId:
                  description: Identifier of the role to assign to this group.
                  format: int64
                  type: integer
                scope:
                  $ref: '#/components/schemas/v2.Scope'
                teamId:
                  description: >-
                    Team to associate the group with. If not set, uses the
                    authenticated team.
                  format: int64
                  type: integer
                userIds:
                  description: The user ids.
                  items:
                    description: The user ids.
                    type: string
                  type: array
              title: CreateTeamGroupRequest
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeamGroupResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '409':
          content:
            application/json: {}
          description: Team group already exists
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Create Team Group
      tags:
        - Team Groups Management Service
  /aaa/team-groups/v2/id/{group_id}:
    get:
      description: Returns the team group with the specified ID.
      externalDocs:
        url: ''
      operationId: GroupsMgmtService_GetTeamGroup
      parameters:
        - description: The unique identifier of the team group.
          in: path
          name: group_id
          required: true
          schema:
            description: The unique identifier of the team group.
            format: int64
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTeamGroupResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Team group not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Group
      tags:
        - Team Groups Management Service
  /aaa/team-groups/v2/name/{name}:
    get:
      description: Returns the team group with the specified name.
      externalDocs:
        url: ''
      operationId: GroupsMgmtService_GetTeamGroupByName
      parameters:
        - description: The name of the team group to retrieve.
          in: path
          name: name
          required: true
          schema:
            description: The name of the team group to retrieve.
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTeamGroupByNameResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Team group not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Group By Name
      tags:
        - Team Groups Management Service
  /aaa/team-groups/v2/{group_id}:
    put:
      description: Updates the specified team group.
      externalDocs:
        url: ''
      operationId: GroupsMgmtService_UpdateTeamGroup
      parameters:
        - description: Unique identifier of the team group to update.
          in: path
          name: group_id
          required: true
          schema:
            description: Unique identifier of the team group to update.
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              description: >-
                Request to modify an existing team group's details, including
                its name, description, roles, users, and scope settings.
              properties:
                description:
                  description: New human-readable description for the team group.
                  type: string
                externalId:
                  description: New external identifier for the group.
                  type: string
                groupType:
                  $ref: '#/components/schemas/GroupType'
                name:
                  description: New display name for the team group.
                  type: string
                roleUpdate:
                  $ref: '#/components/schemas/RoleUpdate'
                scopeUpdate:
                  $ref: '#/components/schemas/ScopeUpdate'
                userUpdates:
                  $ref: '#/components/schemas/UserUpdates'
              title: UpdateTeamGroupRequest
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTeamGroupResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Team group not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Update Team Group
      tags:
        - Team Groups Management Service
    delete:
      description: Deletes the team group with the specified ID.
      externalDocs:
        url: ''
      operationId: GroupsMgmtService_DeleteTeamGroup
      parameters:
        - description: The unique identifier of the team group to delete.
          in: path
          name: group_id
          required: true
          schema:
            description: The unique identifier of the team group to delete.
            format: int64
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteTeamGroupResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Team group not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Delete Team Group
      tags:
        - Team Groups Management Service
  /aaa/team-groups/v2/{group_id}/users/list:
    get:
      description: Returns all users in the specified team group.
      externalDocs:
        url: ''
      operationId: GroupsMgmtService_GetGroupUsers
      parameters:
        - description: The unique identifier of the team group whose users to list.
          in: path
          name: group_id
          required: true
          schema:
            description: The unique identifier of the team group whose users to list.
            format: int64
            type: integer
        - description: Pagination size. Defaults to 100 if empty.
          in: query
          name: page_size
          required: false
          schema:
            description: Pagination size. Defaults to 100 if empty.
            format: int64
            type: integer
        - description: Optional pagination continuation token.
          in: query
          name: page_token
          required: false
          schema:
            description: Optional pagination continuation token.
            example: ''
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGroupUsersResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '404':
          content:
            application/json: {}
          description: Team group not found
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Get Group Users
      tags:
        - Team Groups Management Service
  /aaa/team-saml/v1/active:
    post:
      description: Activates or deactivates SAML for the team.
      externalDocs:
        url: ''
      operationId: SamlConfigurationService_SetActive
      requestBody:
        content:
          application/json:
            schema:
              description: >-
                This data structure is used to activate or deactivate a SAML
                identity provider
              properties:
                isActive:
                  description: The is active.
                  type: boolean
                teamId:
                  description: Team identifier.
                  format: int64
                  type: integer
              title: Set Active Request
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/v2.SetActiveResponse'
          description: ''
        '400':
          content:
            application/json: {}
          description: Bad Request
        '401':
          content:
            application/json: {}
          description: Unauthorized request
        '500':
          content:
            application/json: {}
          description: Internal server error
      summary: Activate/Deactivate SAML
      tags:
        - SAML Configuration Service
  /aaa/team-saml/v1/configuration:
    get:
      description: Returns the current SAML configuration for the team.
      externalDocs:
        url: ''
