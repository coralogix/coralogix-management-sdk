syntax = "proto3";

package com.coralogix.organisations.v1;
import "com/coralogix/organisations/v1/types.proto";

service OrganisationService {
  rpc GetOrganisationById(GetOrganisationByIdRequest) returns (GetOrganisationByIdResponse){}
  rpc GetOrganisationsForTeams(GetOrganisationsForTeamsRequest) returns (GetOrganisationsForTeamsResponse){}
  rpc LinkTeamToOrganisation(LinkTeamToOrganisationRequest) returns (LinkTeamToOrganisationResponse){}
  rpc UnlinkTeamFromOrganisation(UnlinkTeamFromOrganisationRequest) returns (UnlinkTeamFromOrganisationResponse){}
  rpc ChangeOrganisationName(ChangeOrganisationNameRequest) returns (ChangeOrganisationNameResponse){}
  rpc GetOrganisationUsers(GetOrganisationUsersRequest) returns (GetOrganisationUsersResponse){}
  rpc GetOrganisationDomains(GetOrganisationDomainsRequest) returns (GetOrganisationDomainsResponse){}
  rpc VerifyEmailDomain(VerifyEmailDomainRequest) returns (VerifyEmailDomainResponse){}
  rpc RemoveEmailDomain(RemoveEmailDomainRequest) returns (RemoveEmailDomainResponse){}
  rpc AddEmailDomainToOrganisation(AddEmailDomainToOrganisationRequest) returns (AddEmailDomainToOrganisationResponse){}
}

message GetOrganisationByIdRequest {
  OrganisationId organisation_id = 1;
}

message GetOrganisationByIdResponse {
  string name = 1;
  OrganisationId organisation_id = 2;
  repeated Team associated_teams = 3;
  optional TeamId default_team_id = 4;
}

message GetOrganisationsForTeamsRequest {
  repeated TeamId team_ids = 1;
}

message GetOrganisationsForTeamsResponse {
  repeated TeamInfo teams_with_org =1;
}

message LinkTeamToOrganisationRequest {
  OrganisationId organisation_id = 1;
  TeamId team_id = 2;
}

message LinkTeamToOrganisationResponse {
  TeamId id = 1;
}

message UnlinkTeamFromOrganisationRequest {
  OrganisationId organisation_id = 1;
  TeamId team_id = 2;
}

message UnlinkTeamFromOrganisationResponse {
  TeamId id = 1;
}

message ChangeOrganisationNameRequest {
  OrganisationId organisation_id = 1;
  string new_name = 2;
}

message ChangeOrganisationNameResponse {
  string new_name = 1;
}

message GetOrganisationUsersRequest {
  OrganisationId organisation_id = 1;
}

message GetOrganisationUsersResponse {
  repeated User users = 1;
}

message GetOrganisationDomainsRequest {
  OrganisationId organisation_id = 1;
}

message GetOrganisationDomainsResponse {
  message Domain {
    string name = 1;
    bool validated = 2;
  }
  repeated string dep_domains = 1 [deprecated = true];
  repeated Domain domains = 2;
}

message VerifyEmailDomainRequest {
  string email = 1;
}

message VerifyEmailDomainResponse {
  DomainVerificationResult result = 1;
}

message RemoveEmailDomainRequest {
  OrganisationId organisation_id = 1;
  string domain = 2;
}

message RemoveEmailDomainResponse {}

message AddEmailDomainToOrganisationRequest {
  OrganisationId organisation_id = 1;
  string email = 2;
}

message AddEmailDomainToOrganisationResponse {
  string domain = 1;
}