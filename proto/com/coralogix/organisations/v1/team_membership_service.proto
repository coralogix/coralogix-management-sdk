syntax = "proto3";

package com.coralogix.organisations.v1;

import "com/coralogix/organisations/v1/types.proto";

service TeamMembershipService {
  rpc GetTeamMembersCount(GetTeamMembersCountRequest) returns (GetTeamMembersCountResponse){}
}

message GetTeamMembersCountRequest {
  repeated TeamId team_ids = 1;
  OrganisationId organisation_id = 2;
}

message GetTeamMembersCountResponse {
  repeated TeamCount teams_with_count = 1;
}