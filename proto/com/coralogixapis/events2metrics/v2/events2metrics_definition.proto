syntax = "proto3";

package com.coralogixapis.events2metrics.v2;

import "com/coralogixapis/logs2metrics/v2/logs_query.proto";
import "com/coralogixapis/spans2metrics/v2/spans_query.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "protoc-gen-openapiv3/options/annotations.proto";

// Enum defining e2m type
enum E2MType {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_enum) = {description: "E2 m type."};

  E2M_TYPE_UNSPECIFIED = 0;
  E2M_TYPE_LOGS2METRICS = 1;
  E2M_TYPE_SPANS2METRICS = 2;
}

// E2M represents the Event to metrics base model.
message E2M {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "E2M"
      description: "This data structure represents an Event to Metrics (E2M) object."
      required: [
        "name",
        "type"
      ]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  //E2M unique ID, required on update requests
  google.protobuf.StringValue id = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Unique identifier for this E2M. Required on update requests."
    format: "uuid"
    min_length: 36
    max_length: 36
    example: "\"d6a3658e-78d2-47d0-9b81-b2c551f01b09\""
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
  // Name of the E2M
  google.protobuf.StringValue name = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Human-readable name for this E2M."
    example: "\"Service_catalog_latency\""
    min_length: 1
    max_length: 255
    pattern: "^[\\s\\S]*$"
  }];
  // Description of the E2M
  google.protobuf.StringValue description = 3 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Human-readable description of this E2M."
    example: "\"avg and max the latency of catalog service\""
    min_length: 0
    max_length: 2000
    pattern: "^[\\s\\S]*$"
  }];
  // E2M create time
  google.protobuf.StringValue create_time = 4 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "RFC3339 timestamp of when this E2M was created."
    example: "\"2022-06-30T12:30:00Z\""
    format: "date-time"
  }];
  // E2M update time
  google.protobuf.StringValue update_time = 5 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "RFC3339 timestamp of when this E2M was last updated."
    example: "\"2022-06-30T12:30:00Z\""
    format: "date-time"
  }];
  // Represents the limit of the permutations and if the limit was exceeded
  E2MPermutations permutations = 6;
  // E2M metric labels
  repeated MetricLabel metric_labels = 7 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Metric labels to attach to the generated metrics."
    min_items: 0
    max_items: 10
  }];
  // E2M metric fields
  repeated MetricField metric_fields = 8 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Metric fields to extract and aggregate from the events."
    max_items: 10
  }];
  // E2M type logs2metrics/spans2metrics
  E2MType type = 9;
  // Spans or logs type query
  oneof query {
    // E2M spans query
    com.coralogixapis.spans2metrics.v2.SpansQuery spans_query = 10;
    //  E2M logs query
    com.coralogixapis.logs2metrics.v2.LogsQuery logs_query = 11;
  }
  // A flag that represents if the e2m is for internal usage
  google.protobuf.BoolValue is_internal = 12 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "Indicates whether this E2M is for internal use only."}];
  // Optional data source in "<namespace>/<dataset_name>" format (e.g. "my_namespace/my_dataset").
  // If not set, defaults to the standard logs/spans stream.
  google.protobuf.StringValue data_source = 13 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Optional data source in namespace/dataset_name format. If not set, defaults to the standard logs/spans stream."
    example: "\"my_namespace/my_dataset\""
    min_length: 1
    max_length: 300
    pattern: "^[\\s\\S]*$"
  }];
}

// E2M Create message
message E2MCreateParams {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "E2M Create Params"
      description: "This data structure is used to create a new event to metric definition"
      required: ["name"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };

  // Name of E2M to create
  google.protobuf.StringValue name = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Human-readable name for the new E2M."
    example: "\"Service catalog latency\""
    min_length: 1
    max_length: 255
    pattern: "^[\\s\\S]*$"
  }];
  // Description of E2M to create
  google.protobuf.StringValue description = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Human-readable description for the new E2M."
    example: "\"avg and max the latency of catalog service\""
    min_length: 0
    max_length: 2000
    pattern: "^[\\s\\S]*$"
  }];
  // The permutation limit of the E2M
  google.protobuf.Int32Value permutations_limit = 3 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Maximum number of unique metric permutations allowed for this E2M."
    example: "30000"
    minimum: 1
    maximum: 10000000
  }];
  // E2M metric labels
  repeated MetricLabel metric_labels = 4 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Metric labels to attach to the generated metrics."
    min_items: 0
    max_items: 10
  }];
  // E2M metric fields
  repeated MetricField metric_fields = 5 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Metric fields to create and aggregate from the events."
    min_items: 0
    max_items: 10
  }];
  // E2M type
  E2MType type = 6;
  // E2M spans or logs query type
  oneof query {
    // E2M span query
    com.coralogixapis.spans2metrics.v2.SpansQuery spans_query = 7;
    // E2M logs query
    com.coralogixapis.logs2metrics.v2.LogsQuery logs_query = 8;
  }
  // Optional data source in "<namespace>/<dataset_name>" format (e.g. "my_namespace/my_dataset").
  // If not set, defaults to the standard logs/spans stream.
  google.protobuf.StringValue data_source = 9 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Optional data source in namespace/dataset_name format. If not set, defaults to the standard logs/spans stream."
    example: "\"my_namespace/my_dataset\""
    min_length: 1
    max_length: 300
    pattern: "^[\\s\\S]*$"
  }];
}

// Represents e2m permutation limit
message E2MPermutations {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "E2M Permutations"
      description: "This data structure represents the limit of events2metrics permutations and if the limit was exceeded"
      required: [
        "limit",
        "has_exceeded_limit"
      ]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // E2M permutation limit
  int32 limit = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    example: "30000"
    description: "Limit."
    minimum: 1
    maximum: 10000000
  }];
  // Flag to indicate if limit was exceeded
  bool has_exceeded_limit = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "The has exceeded limit."}];
}

// E2M metric label
message MetricLabel {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Metric Label"
      description: "This data structure represents a metric label"
      required: [
        "target_label",
        "source_field"
      ]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // Metric label target alias name
  google.protobuf.StringValue target_label = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    pattern: "^[\\w/-]+$"
    example: "\"alias_label_name\""
    description: "The target label."
    min_length: 1
    max_length: 255
  }];
  // Metric label source field
  google.protobuf.StringValue source_field = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    example: "\"log_obj.string_value\""
    description: "The source field."
    min_length: 1
    max_length: 255
    pattern: "^[\\s\\S]*$"
  }];
}

//E2M metric field
message MetricField {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Metric Field"
      description: "This data structure represents a metric field"
      required: [
        "target_base_metric_name",
        "source_field",
        "aggregations"
      ]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // Target metric field alias name
  google.protobuf.StringValue target_base_metric_name = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    pattern: "^[\\w/-]+$"
    example: "\"alias_field_name\""
    description: "The target base metric name."
    min_length: 1
    max_length: 255
  }];
  // Source field
  google.protobuf.StringValue source_field = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    example: "\"log_obj.numeric_field\""
    description: "The source field."
    min_length: 1
    max_length: 255
    pattern: "^[\\s\\S]*$"
  }];
  // Represents Aggregation type list
  repeated Aggregation aggregations = 7 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The aggregations."
    min_items: 0
    max_items: 7
  }];
}

// E2M aggregation
message Aggregation {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Aggregation"
      description: "This data structure represents an aggregation"
      required: []
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // Enum - Aggregation type
  enum AggType {
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_enum) = {description: "Agg type."};

    AGG_TYPE_UNSPECIFIED = 0;
    AGG_TYPE_MIN = 1;
    AGG_TYPE_MAX = 2;
    AGG_TYPE_COUNT = 3;
    AGG_TYPE_AVG = 4;
    AGG_TYPE_SUM = 5;
    AGG_TYPE_HISTOGRAM = 6;
    AGG_TYPE_SAMPLES = 7;
  }
  // Is enabled
  bool enabled = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "Whether this resource is enabled."}];
  // Aggregation type
  AggType agg_type = 2;
  // Target metric field alias name
  string target_metric_name = 3 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    example: "\"alias_field_name_agg_func\""
    description: "Name of the target metric produced by this aggregation."
    min_length: 1
    max_length: 255
    pattern: "^[\\s\\S]*$"
  }];
  // Aggregate metadata, samples or histogram type
  oneof agg_metadata {
    // No metadata needed for simple aggregations (MIN, MAX, COUNT, AVG, SUM)
    google.protobuf.Empty none = 6 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "Marker indicating no additional metadata is needed for this aggregation type."}];
    // E2M sample type metadata
    E2MAggSamples samples = 4;
    // E2M aggregate histogram type metadata
    E2MAggHistogram histogram = 5 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
      description: "e2m aggregate histogram type metadata"
      min_items: 1
    }];
  }
}

// E2M aggregate sample type
message E2MAggSamples {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "E2M Aggregate Samples"
      description: "This data structure represents the e2m aggregate samples"
      required: []
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // Enum of aggregate type
  enum SampleType {
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_enum) = {description: "Sample type."};

    SAMPLE_TYPE_UNSPECIFIED = 0;
    SAMPLE_TYPE_MIN = 1;
    SAMPLE_TYPE_MAX = 2;
  }
  // Sample type min/max
  SampleType sample_type = 2;
}

// Represents the e2m aggregate histogram
message E2MAggHistogram {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "E2M Aggregate Histogram"
      description: "This data structure represents the e2m aggregate histogram"
      required: []
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // Buckets of the E2M
  repeated float buckets = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    example: "2"
    description: "The buckets."
    min_items: 0
    max_items: 64
  }];
}
