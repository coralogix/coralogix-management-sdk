syntax = "proto3";

package com.coralogixapis.events2metrics.v2;

import "com/coralogixapis/common/v1/audit_log.proto";
import "com/coralogixapis/events2metrics/v2/events2metrics_definition.proto";
import "com/coralogixapis/logs2metrics/v2/logs_query.proto";
import "com/coralogixapis/spans2metrics/v2/spans_query.proto";
import "google/api/annotations.proto";
import "google/protobuf/wrappers.proto";
import "protoc-gen-openapiv3/options/annotations.proto";

service Events2MetricService {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_tag) = {
    name: "Events2Metrics Service"
    description: "Manage your events2metrics."
  };

  rpc CreateE2M(CreateE2MRequest) returns (CreateE2MResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "Create new E2M";
    option (google.api.http) = {
      post: "/events2metrics/events2metrics/v2"
      body: "e2m"
    };
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "Create a new E2M"
      description: "Creates a new events-to-metrics rule."
    };
  }

  rpc ListE2M(ListE2MRequest) returns (ListE2MResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "List all E2M";
    option (google.api.http) = {get: "/events2metrics/events2metrics/v2"};
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "List E2Ms"
      description: "Returns all events-to-metrics rules for the team."
    };
  }

  rpc ReplaceE2M(ReplaceE2MRequest) returns (ReplaceE2MResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "Replace E2M";
    option (google.api.http) = {
      put: "/events2metrics/events2metrics/v2"
      body: "e2m"
    };
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "Replace an E2M"
      description: "Updates an existing events-to-metrics rule."
    };
  }

  rpc GetE2M(GetE2MRequest) returns (GetE2MResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "Get E2M";
    option (google.api.http) = {get: "/events2metrics/events2metrics/v2/{id}"};
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "Get an E2M"
      description: "Returns the details of the specified events-to-metrics rule."
    };
  }

  rpc DeleteE2M(DeleteE2MRequest) returns (DeleteE2MResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "Delete E2M";
    option (google.api.http) = {delete: "/events2metrics/events2metrics/v2/{id}"};
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "Delete an E2M"
      description: "Deletes the events-to-metrics rule with the specified ID."
    };
  }

  rpc AtomicBatchExecuteE2M(AtomicBatchExecuteE2MRequest) returns (AtomicBatchExecuteE2MResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "Atomic Batch Execute E2M";
    option (google.api.http) = {
      post: "/events2metrics/events2metrics/v2/all/execute"
      body: "*"
    };

    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "Atomic Batch Execute E2M"
      description: "Atomically executes a batch of events-to-metrics rules."
    };
  }

  rpc ListLabelsCardinality(ListLabelsCardinalityRequest) returns (ListLabelsCardinalityResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "List Labels Cardinality";
    option (google.api.http) = {get: "/events2metrics/labels/v2/cardinalities"};

    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "List E2M Labels Cardinality"
      description: "Returns cardinality information for events-to-metrics labels."
    };
  }

  rpc GetLimits(GetLimitsRequest) returns (GetLimitsResponse) {
    option (com.coralogixapis.common.v1.audit_log_description).description = "get limits";
    option (google.api.http) = {get: "/events2metrics/limits/v2"};

    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
      tags: ["Events2Metrics Service"]
      summary: "Get E2M Limits"
      description: "Returns the events-to-metrics quota limits for the team."
    };
  }
}

// represents e2m create request
message CreateE2MRequest {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Create E2M Request"
      description: "This is used to create a new event to metric definition"
      required: ["e2m"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  E2MCreateParams e2m = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "The e2m."}];
}

// represents e2m create response
message CreateE2MResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {json_schema: {description: "Create e2m response."}};

  E2M e2m = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "The e2m."}];
}

// represents e2m get list request
message ListE2MRequest {}

// represents response of
message ListE2MResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "List E2M Response"
      description: "This is the response obtained when listing all event to metric definitions"
      required: ["e2m"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // List of event to metrics definitions
  repeated E2M e2m = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The e2m."
    min_items: 0
    max_items: 10000
  }];
}

// represents e2m replace request
message ReplaceE2MRequest {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Replace E2M Request"
      description: "This data structure is used to replace an existing event to metric definition"
      required: ["e2m"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  E2M e2m = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "The e2m."}];
}

// represents e2m replace response
message ReplaceE2MResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Replace E2M Response"
      description: "This data structure is obtained when replacing an existing event to metric definition"
      required: ["e2m"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  E2M e2m = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "The e2m."}];
}

// represents get request for a single e2m by id
message GetE2MRequest {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Get E2M Response"
      description: "This data structure is used to retrieve an existing event to metric definition"
      required: ["id"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  google.protobuf.StringValue id = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    example: "\"d6a3658e-78d2-47d0-9b81-b2c551f01b09\""
    description: "Unique identifier."
    format: "uuid"
    min_length: 36
    max_length: 36
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}

// represents response for a single e2m by id
message GetE2MResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Get E2M Response"
      description: "This data structure is obtained when retrieving an existing event to metric definition"
      required: ["e2m"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  E2M e2m = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "The e2m."}];
}

// represents e2m delete request
message DeleteE2MRequest {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Delete E2M Request"
      description: "This data structure is used to delete an existing event to metric definition"
      required: ["id"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // id of e2m to be deleted
  google.protobuf.StringValue id = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    example: "\"d6a3658e-78d2-47d0-9b81-b2c551f01b09\""
    description: "Unique identifier."
    format: "uuid"
    min_length: 36
    max_length: 36
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}

// represents e2m delete response
message DeleteE2MResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
    json_schema: {
      title: "Delete E2M Request"
      description: "This data structure is obtained when deleting an existing event to metric definition"
      required: ["id"]
    }
    external_docs: {
      url: "https://coralogix.com/docs/user-guides/monitoring-and-insights/events2metrics/"
      description: "Find out more about events2metrics"
    }
  };
  // id of deleted e2m
  google.protobuf.StringValue id = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Unique identifier."
    format: "uuid"
    min_length: 36
    max_length: 36
    pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  }];
}

// represents one of e2m actions create/replace/delete
message E2MExecutionRequest {
  oneof request {
    CreateE2MRequest create = 1;
    ReplaceE2MRequest replace = 2;
    DeleteE2MRequest delete = 3;
  }
}

// an atomic list of e2m action that are executed in the same request
message AtomicBatchExecuteE2MRequest {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {json_schema: {description: "Request containing an atomic list of events-to-metrics actions to execute."}};
  repeated E2MExecutionRequest requests = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The requests."
    min_items: 1
    max_items: 100
  }];
}

// represents a response of e2m execution
message E2MExecutionResponse {
  oneof response {
    CreateE2MResponse created = 1;
    ReplaceE2MResponse replaced = 2;
    DeleteE2MResponse deleted = 3;
  }
}

// represents a response to atomic list of e2m actions
message AtomicBatchExecuteE2MResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {json_schema: {description: "Response returned after atomically executing a batch of events-to-metrics rules."}};
  repeated E2MExecutionResponse matching_responses = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The matching responses."
    min_items: 0
    max_items: 100
  }];
}

// represents a request of list label cardinality
message ListLabelsCardinalityRequest {
  oneof query {
    com.coralogixapis.spans2metrics.v2.SpansQuery spans_query = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "Spans-based query used to evaluate label cardinality."}];
    com.coralogixapis.logs2metrics.v2.LogsQuery logs_query = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {description: "Logs-based query used to evaluate label cardinality."}];
  }
  repeated MetricLabel metric_labels = 3 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The metric labels to evaluate cardinality for."
    min_items: 0
    max_items: 10
  }];
}

// represents labels permutation cardinality
message LabelsPermutationsCardinalityDay {
  string day = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The day, formatted as YYYY-MM-DD."
    min_length: 10
    max_length: 10
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
  }];
  int32 permutations = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "Number of label permutations for this day."
    minimum: 0
    maximum: 2147483647
  }];
}

// response  represented by list of labels permutation cardinality
message ListLabelsCardinalityResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {json_schema: {description: "Response containing label cardinality data for events-to-metrics rules."}};
  repeated LabelsPermutationsCardinalityDay permutations = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "List of permutations."
    min_items: 0
    max_items: 366
  }];
}

// get e2m limits request
message GetLimitsRequest {}

// get e2m limits response
message GetLimitsResponse {
  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {json_schema: {description: "Response containing the events-to-metrics quota limits."}};
  message LimitUsage {
    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {json_schema: {description: "Limit usage."}};

    // the limit number of e2m creation
    google.protobuf.Int32Value limit = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
      description: "Limit."
      minimum: 0
      maximum: 2147483647
    }];
    // how many e2m's were created
    google.protobuf.Int32Value used = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
      description: "Used."
      minimum: 0
      maximum: 2147483647
    }];
  }
  // company id
  google.protobuf.StringValue company_id = 1 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The company id."
    example: "\"123456\""
    min_length: 1
    max_length: 20
    pattern: "^[0-9]+$"
  }];
  // labels limit
  int32 labels_limit = 2 [(grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
    description: "The labels limit."
    minimum: 0
    maximum: 255
  }];
  // permutation limit/used
  LimitUsage permutations_limit = 3;
  // metrics limit/used
  LimitUsage metrics_limit = 4;
}
