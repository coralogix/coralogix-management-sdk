                              "description": "string",
                              "enabled": True,
                              "name": "string",
                              "order": 0,
                              "parameters": {"extractParameters": {"rule": "string"}},
                              "sourceField": "string"
                          }
                      ]
                  }
              ]
          }
          headers = {
              "Authorization": "Bearer <API_KEY>",
              "content-type": "application/json"
