    ".com.coralogix.permissions.v1.RemoveUsersFromTeamGroupRequest":
      description: "Request to remove specified users from a team group, revoking\
        \ their access to the group's roles and scope permissions."
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        groupId:
          $ref: "#/components/schemas/.com.coralogix.permissions.v1.TeamGroupId"
        userIds:
          items:
            $ref: "#/components/schemas/.com.coralogix.permissions.v1.UserId"
          type: array
      title: RemoveUsersFromTeamGroupRequest
      type: object
    ".com.coralogix.permissions.v1.RemoveUsersFromTeamGroupResponse":
      description: Response confirming the successful removal of users from the specified
        team group.
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      title: RemoveUsersFromTeamGroupResponse
      type: object
    ".com.coralogix.permissions.v1.RemoveUsersFromTeamGroupsRequest":
      description: "Bulk request to remove users from multiple team groups simultaneously,\
        \ efficiently managing group membership revocations at scale."
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        removeUsersFromGroup:
          items:
            $ref: "#/components/schemas/.com.coralogix.permissions.v1.RemoveUsersFromTeamGroupsRequest.RemoveUsersFromTeamGroup"
          type: array
        teamId:
          $ref: "#/components/schemas/.com.coralogix.permissions.v1.TeamId"
      title: RemoveUsersFromTeamGroupsRequest
      type: object
    ".com.coralogix.permissions.v1.RemoveUsersFromTeamGroupsRequest.RemoveUsersFromTeamGroup":
