          import requests

          url = "https://api.coralogix.com/mgmt/openapi/api/v1/rulegroup-mapping"

          payload = {
              "creator": "string",
              "description": "string",
              "enabled": True,
              "hidden": True,
              "name": "string",
              "order": 0,
              "ruleMatchers": [{"applicationName": {"value": "string"}}],
              "ruleSubgroups": [
                  {
                      "enabled": True,
                      "order": 0,
                      "rules": [
