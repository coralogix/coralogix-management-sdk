    "/cases/cases/v1/{case_id}/comments": {
      "post": {
        "tags": [
          "Case Events service"
        ],
        "summary": "Create a comment event",
        "description": "Create a new comment event for a case.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "CaseEventsService_CreateComment",
        "parameters": [
          {
            "in": "path",
            "name": "case_id",
            "description": "ID of the case to add the event to. Accepts either the case UUID (the `id` field on a case) or the readable identifier (the `readable_id` field, e.g. `CASE-123`).",
            "required": true,
            "schema": {
              "example": "3f166e9f-3c88-4af2-b52e-138f339dab3e",
              "description": "ID of the case to add the event to. Accepts either the case UUID (the `id` field on a case) or the readable identifier (the `readable_id` field, e.g. `CASE-123`).",
              "type": "string",
              "pattern": "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$",
              "minLength": 1,
              "maxLength": 64
            },
            "style": "simple"
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Create comment event request",
                "description": "Request for creating a comment on a case.",
                "type": "object",
                "properties": {
                  "attachments": {
                    "description": "Attachments to the comment",
                    "type": "array",
                    "items": {
                      "$ref": "#/components/schemas/CommentAttachment"
                    },
                    "minItems": 0
                  },
                  "text": {
                    "example": "This is updated text",
                    "description": "Comment text to update",
                    "type": "string",
                    "minLength": 0
                  }
                },
                "required": [
                  "text"
                ]
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CreateCommentResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "403": {
            "description": "Forbidden",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
