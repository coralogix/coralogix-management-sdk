openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /cases/cases/v1/{case_id}/comments:
    post:
      description: |-
        Create a new comment event for a case.

        Requires the following permissions:
        - `case:Comment`
      externalDocs:
        url: ""
      operationId: CaseEventsService_CreateComment
      parameters:
      - description: "ID of the case to add the event to. Accepts either the case\
          \ UUID (the `id` field on a case) or the readable identifier (the `readable_id`\
          \ field, e.g. `CASE-123`)."
        explode: false
        in: path
        name: case_id
        required: true
        schema:
          description: "ID of the case to add the event to. Accepts either the case\
            \ UUID (the `id` field on a case) or the readable identifier (the `readable_id`\
            \ field, e.g. `CASE-123`)."
          example: 3f166e9f-3c88-4af2-b52e-138f339dab3e
          maxLength: 64
          minLength: 1
          pattern: "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_comment_event_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCommentResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "403":
          content:
            application/json: {}
          description: Forbidden
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create a comment event
      tags:
      - Case Events service
      x-coralogixPermissions:
      - case:Comment
  /cases/cases/v1/{case_id}/events:
    get:
      description: |-
        Retrieve all events associated with a specific case.

        Requires the following permissions:
        - `case:Read`
      externalDocs:
        url: ""
      operationId: CaseEventsService_ListEvents
      parameters:
      - description: "ID of the case. Accepts either the case UUID (the `id` field\
          \ on a case) or the readable identifier (the `readable_id` field, e.g. `CASE-123`)."
        explode: false
        in: path
        name: case_id
        required: true
        schema:
          description: "ID of the case. Accepts either the case UUID (the `id` field\
            \ on a case) or the readable identifier (the `readable_id` field, e.g.\
            \ `CASE-123`)."
          example: 3f166e9f-3c88-4af2-b52e-138f339dab3e
          maxLength: 64
          minLength: 1
          pattern: "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.ListEventsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "403":
          content:
            application/json: {}
          description: Forbidden
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List events for a case
      tags:
      - Case Events service
      x-coralogixPermissions:
      - case:Read
  /cases/cases/v1/{case_id}/sync-external-thread-comments:
    post:
      description: |-
        Synchronize events from an external source (e.g. Slack) into the case.

        Requires the following permissions:
        - `case:Comment`
      externalDocs:
        url: ""
      operationId: CaseEventsService_SyncExternalCaseEvents
      parameters:
      - description: "ID of the case to sync external case events for. Accepts either\
          \ the case UUID (the `id` field on a case) or the readable identifier (the\
          \ `readable_id` field, e.g. `CASE-123`)."
        explode: false
        in: path
        name: case_id
        required: true
        schema:
          description: "ID of the case to sync external case events for. Accepts either\
            \ the case UUID (the `id` field on a case) or the readable identifier\
            \ (the `readable_id` field, e.g. `CASE-123`)."
          example: 3f166e9f-3c88-4af2-b52e-138f339dab3e
          maxLength: 64
          minLength: 1
          pattern: "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncExternalCaseEventsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "403":
          content:
            application/json: {}
          description: Forbidden
        "404":
          content:
            application/json: {}
          description: Case not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Sync external Case events
      tags:
      - Case Events service
      x-coralogixPermissions:
      - case:Comment
  /cases/events/v1/{event_id}:
    get:
      description: |-
        Retrieve a single event by its unique identifier.

        Requires the following permissions:
        - `case:Read`
      externalDocs:
        url: ""
      operationId: CaseEventsService_GetEvent
      parameters:
      - description: ID of the event to fetch
        explode: false
        in: path
        name: event_id
        required: true
        schema:
          description: ID of the event to fetch
          example: f56645c5-9cd4-4b9f-961f-4f852d8835a0
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v1.GetEventResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "403":
          content:
            application/json: {}
          description: Forbidden
        "404":
          content:
            application/json: {}
          description: Event not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get an event by ID
      tags:
      - Case Events service
      x-coralogixPermissions:
      - case:Read
  /cases/events/v1/{event_id}/comments:
    delete:
      description: |-
        Delete an existing comment event from a case.

        Requires the following permissions:
        - `case:Comment`
      externalDocs:
        url: ""
      operationId: CaseEventsService_DeleteComment
      parameters:
      - description: ID of the comment event to delete
        explode: false
        in: path
        name: event_id
        required: true
        schema:
          description: ID of the comment event to delete
          example: f56645c5-9cd4-4b9f-961f-4f852d8835a0
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCommentResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "403":
          content:
            application/json: {}
          description: Forbidden
        "404":
          content:
            application/json: {}
          description: Event not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete a comment event
      tags:
      - Case Events service
      x-coralogixPermissions:
      - case:Comment
    put:
      description: |-
        Modify the content of an existing comment event.

        Requires the following permissions:
        - `case:Comment`
      externalDocs:
        url: ""
      operationId: CaseEventsService_UpdateComment
      parameters:
      - description: ID of the comment event to update
        explode: false
        in: path
        name: event_id
        required: true
        schema:
          description: ID of the comment event to update
          example: f56645c5-9cd4-4b9f-961f-4f852d8835a0
          minLength: 0
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_comment_event_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCommentResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "403":
          content:
            application/json: {}
          description: Forbidden
        "404":
          content:
            application/json: {}
          description: Event not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Update a comment event
      tags:
      - Case Events service
      x-coralogixPermissions:
      - case:Comment
components:
  schemas:
    ApiKeyActor:
      description: Information about the API key that initiated the action.
      example:
        name: Incident Management Integration Key
        id: 2b1c3d4e-5f6a-7b8c-9d0e-1f2a3b4c5d6e
      externalDocs:
        url: ""
      properties:
        id:
          description: API key ID
          example: 2b1c3d4e-5f6a-7b8c-9d0e-1f2a3b4c5d6e
          minLength: 0
          type: string
        name:
          description: API key name
          example: Incident Management Integration Key
          minLength: 0
          type: string
      title: API key actor
      type: object
    AssignedCaseEvent:
      description: Assigned case event.
      example:
        assigneeUserId: 3af152ee-9eaf-4803-87f1-23c5fb2fbaa0
        previousAssigneeUserId: previousAssigneeUserId
      externalDocs:
        url: ""
      properties:
        assigneeUserId:
          description: New assignee user ID
          example: 3af152ee-9eaf-4803-87f1-23c5fb2fbaa0
          minLength: 0
          type: string
        previousAssigneeUserId:
          description: Previous assignee user ID (if any)
          minLength: 0
          type: string
      title: Assigned event
      type: object
    CaseEvent:
      description: Represents an immutable entry in a case's event timeline.
      example:
        actor:
          apiKey:
            name: Incident Management Integration Key
            id: 2b1c3d4e-5f6a-7b8c-9d0e-1f2a3b4c5d6e
        eventId: ef51d3d9-a301-496b-aa7d-9a6e519ba0d5
        eventData:
          assigned:
            assigneeUserId: 3af152ee-9eaf-4803-87f1-23c5fb2fbaa0
            previousAssigneeUserId: previousAssigneeUserId
        createTime: 2025-09-22T10:30:00Z
        eventTime: 2025-09-22T10:29:45Z
        updateTime: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        actor:
          $ref: "#/components/schemas/EventActor"
        createTime:
          description: Server-side insertion time
          example: 2025-09-22T10:30:00Z
          format: date-time
          minLength: 0
          type: string
        eventData:
          $ref: "#/components/schemas/CaseEventData"
        eventId:
          description: Unique identifier of the event
          example: ef51d3d9-a301-496b-aa7d-9a6e519ba0d5
          minLength: 0
          type: string
        eventTime:
          description: Logical occurrence time of the event
          example: 2025-09-22T10:29:45Z
          format: date-time
          minLength: 0
          type: string
        updateTime:
          description: "If edited, last modification time of the event"
          format: date-time
          minLength: 0
          type: string
      required:
      - actor
      - createTime
      - eventData
      - eventId
      - eventTime
      title: Case event
      type: object
    CaseEventData:
      oneOf:
      - $ref: "#/components/schemas/CaseEventDataAssigned"
      - $ref: "#/components/schemas/CaseEventDataChangeAssigneeFailed"
      - $ref: "#/components/schemas/CaseEventDataComment"
      - $ref: "#/components/schemas/CaseEventDataCreated"
      - $ref: "#/components/schemas/CaseEventDataKpiBreached"
      - $ref: "#/components/schemas/CaseEventDataNotificationFailed"
      - $ref: "#/components/schemas/CaseEventDataNotificationSent"
      - $ref: "#/components/schemas/CaseEventDataPriorityDetailsChanged"
      - $ref: "#/components/schemas/CaseEventDataResolutionReasonChangedEvent"
      - $ref: "#/components/schemas/CaseEventDataStatusChanged"
      - $ref: "#/components/schemas/CaseEventDataTitleChangedEvent"
      - $ref: "#/components/schemas/CaseEventDataUnassigned"
    CaseEventDataAssigned:
      description: One-of wrapper for concrete case event types.
      example:
        assigned:
          assigneeUserId: 3af152ee-9eaf-4803-87f1-23c5fb2fbaa0
          previousAssigneeUserId: previousAssigneeUserId
      externalDocs:
        url: ""
      properties:
        assigned:
          $ref: "#/components/schemas/AssignedCaseEvent"
      required:
      - assigned
      title: Case event data
      type: object
    CaseEventDataChangeAssigneeFailed:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        changeAssigneeFailed:
          $ref: "#/components/schemas/ChangeAssigneeFailedEvent"
      required:
      - changeAssigneeFailed
      title: Case event data
      type: object
    CaseEventDataComment:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        comment:
          $ref: "#/components/schemas/CommentCaseEvent"
      required:
      - comment
      title: Case event data
      type: object
    CaseEventDataCreated:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        created:
          $ref: "#/components/schemas/CreatedCaseEvent"
      required:
      - created
      title: Case event data
      type: object
    CaseEventDataKpiBreached:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        kpiBreached:
          $ref: "#/components/schemas/KPIBreachedCaseEvent"
      required:
      - kpiBreached
      title: Case event data
      type: object
    CaseEventDataNotificationFailed:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        notificationFailed:
          $ref: "#/components/schemas/NotificationFailedCaseEvent"
      required:
      - notificationFailed
      title: Case event data
      type: object
    CaseEventDataNotificationSent:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        notificationSent:
          $ref: "#/components/schemas/NotificationSentCaseEvent"
      required:
      - notificationSent
      title: Case event data
      type: object
    CaseEventDataPriorityDetailsChanged:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        priorityDetailsChanged:
          $ref: "#/components/schemas/PriorityDetailsChangedCaseEvent"
      required:
      - priorityDetailsChanged
      title: Case event data
      type: object
    CaseEventDataResolutionReasonChangedEvent:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        resolutionReasonChangedEvent:
          $ref: "#/components/schemas/ResolutionReasonChangedCaseEvent"
      required:
      - resolutionReasonChangedEvent
      title: Case event data
      type: object
    CaseEventDataStatusChanged:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        statusChanged:
          $ref: "#/components/schemas/StatusChangedCaseEvent"
      required:
      - statusChanged
      title: Case event data
      type: object
    CaseEventDataTitleChangedEvent:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        titleChangedEvent:
          $ref: "#/components/schemas/TitleChangedCaseEvent"
      required:
      - titleChangedEvent
      title: Case event data
      type: object
    CaseEventDataUnassigned:
      description: One-of wrapper for concrete case event types.
      externalDocs:
        url: ""
      properties:
        unassigned:
          $ref: "#/components/schemas/UnassignedCaseEvent"
      required:
      - unassigned
      title: Case event data
      type: object
    CasePriority:
      description: Case priority.
      enum:
      - CASE_PRIORITY_UNSPECIFIED
      - CASE_PRIORITY_P1
      - CASE_PRIORITY_P2
      - CASE_PRIORITY_P3
      - CASE_PRIORITY_P4
      - CASE_PRIORITY_P5
      type: string
    CaseStatus:
      description: Case status.
      enum:
      - CASE_STATUS_UNSPECIFIED
      - CASE_STATUS_PENDING_ACTIVATION
      - CASE_STATUS_ACTIVE
      - CASE_STATUS_ACKNOWLEDGED
      - CASE_STATUS_RESOLVED
      - CASE_STATUS_CLOSED
      type: string
    ChangeAssigneeFailedEvent:
      description: Event recorded when an attempt to reassign a case fails.
      externalDocs:
        url: ""
      properties:
        unknownAssigneeError:
          $ref: "#/components/schemas/UnknownAssigneeError"
      title: Change assignee failed event
      type: object
    CommentAttachment:
      oneOf:
      - $ref: "#/components/schemas/CommentAttachmentCustomWidget"
      - $ref: "#/components/schemas/CommentAttachmentFile"
      - $ref: "#/components/schemas/CommentAttachmentLog"
    CommentAttachmentCustomWidget:
      externalDocs:
        url: ""
      properties:
        customWidget:
          $ref: "#/components/schemas/CustomDashboardWidgetAttachment"
      required:
      - attachment
      - customWidget
      title: Comment attachment
      type: object
    CommentAttachmentFile:
      externalDocs:
        url: ""
      properties:
        file:
          $ref: "#/components/schemas/FileAttachment"
      required:
      - attachment
      - file
      title: Comment attachment
      type: object
    CommentAttachmentLog:
      externalDocs:
        url: ""
      properties:
        log:
          $ref: "#/components/schemas/LogAttachment"
      required:
      - attachment
      - log
      title: Comment attachment
      type: object
    CommentCaseEvent:
      description: Event recorded when a user posts a comment on a case.
      externalDocs:
        url: ""
      properties:
        attachments:
          description: Attachments to the comment
          items:
            $ref: "#/components/schemas/CommentAttachment"
          minItems: 0
          type: array
        slack:
          $ref: "#/components/schemas/SlackCommentMetadata"
        unsafeText:
          description: Comment text
          example: Looking into DB timeouts
          minLength: 0
          type: string
      title: Comment event
      type: object
    CreateCommentResponse:
      description: Response returned after successfully creating a comment.
      example:
        event:
          actor:
            apiKey:
              name: Incident Management Integration Key
              id: 2b1c3d4e-5f6a-7b8c-9d0e-1f2a3b4c5d6e
          eventId: ef51d3d9-a301-496b-aa7d-9a6e519ba0d5
          eventData:
            assigned:
              assigneeUserId: 3af152ee-9eaf-4803-87f1-23c5fb2fbaa0
              previousAssigneeUserId: previousAssigneeUserId
          createTime: 2025-09-22T10:30:00Z
          eventTime: 2025-09-22T10:29:45Z
          updateTime: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        event:
          $ref: "#/components/schemas/CaseEvent"
      required:
      - event
      title: Create comment event response
      type: object
    CreatedCaseEvent:
      description: Created case event.
      externalDocs:
        url: ""
      properties:
        priority:
          $ref: "#/components/schemas/CasePriority"
      title: Created event
      type: object
    CustomDashboardWidgetAttachment:
      description: Attachment containing custom dashboard widget data and screenshot
      externalDocs:
        url: ""
      properties:
        customDashboardId:
          description: Unique identifier of the custom dashboard
          example: dashboard_3f166e9f-3c88-4af2-b52e-138f339dab3e
          minLength: 0
          type: string
        queryLinkSuffix:
          description: URL suffix for accessing the widget (not including the Coralogix
            domain part)
          example: /dashboards/custom/123/widgets/456?time=123456789
          minLength: 0
          type: string
        widgetId:
          description: Unique identifier of the widget within the dashboard
          example: widget_a1b2c3d4-e5f6-7890-abcd-ef1234567890
          minLength: 0
          type: string
        widgetScreenshot:
          $ref: "#/components/schemas/FileAttachment"
      required:
      - customDashboardId
      - widgetId
      - widgetScreenshot
      title: Custom dashboard widget attachment
      type: object
    DeleteCommentResponse:
      additionalProperties: false
      description: Empty response; success indicated by HTTP status
      externalDocs:
        url: ""
      title: Delete comment response
      type: object
    EventActor:
      oneOf:
      - $ref: "#/components/schemas/EventActorApiKey"
      - $ref: "#/components/schemas/EventActorPagerDuty"
      - $ref: "#/components/schemas/EventActorPrometheusAlertManager"
      - $ref: "#/components/schemas/EventActorServiceNow"
      - $ref: "#/components/schemas/EventActorSlack"
      - $ref: "#/components/schemas/EventActorSystem"
      - $ref: "#/components/schemas/EventActorUser"
    EventActorApiKey:
      description: Actor that initiated the event.
      example:
        apiKey:
          name: Incident Management Integration Key
          id: 2b1c3d4e-5f6a-7b8c-9d0e-1f2a3b4c5d6e
      externalDocs:
        url: ""
      properties:
        apiKey:
          $ref: "#/components/schemas/ApiKeyActor"
      required:
      - apiKey
      title: Event actor
      type: object
    EventActorPagerDuty:
      description: Actor that initiated the event.
      externalDocs:
        url: ""
      properties:
        pagerDuty:
          $ref: "#/components/schemas/PagerDutyActor"
      required:
      - pagerDuty
      title: Event actor
      type: object
    EventActorPrometheusAlertManager:
      description: Actor that initiated the event.
      externalDocs:
        url: ""
      properties:
        prometheusAlertManager:
          $ref: "#/components/schemas/PrometheusAlertManagerActor"
      required:
      - prometheusAlertManager
      title: Event actor
      type: object
    EventActorServiceNow:
      description: Actor that initiated the event.
      externalDocs:
        url: ""
      properties:
        serviceNow:
          $ref: "#/components/schemas/ServiceNowActor"
      required:
      - serviceNow
      title: Event actor
      type: object
    EventActorSlack:
      description: Actor that initiated the event.
      externalDocs:
        url: ""
      properties:
        slack:
          $ref: "#/components/schemas/SlackActor"
      required:
      - slack
      title: Event actor
      type: object
    EventActorSystem:
      description: Actor that initiated the event.
      externalDocs:
        url: ""
      properties:
        system:
          additionalProperties: false
          description: Empty message indicating system-initiated action.
          externalDocs:
            url: ""
          title: System actor
          type: object
      required:
      - system
      title: Event actor
      type: object
    EventActorUser:
      description: Actor that initiated the event.
      externalDocs:
        url: ""
      properties:
        user:
          $ref: "#/components/schemas/UserActor"
      required:
      - user
      title: Event actor
      type: object
    FileAttachment:
      description: Attachment representing a file with metadata
      externalDocs:
        url: ""
      properties:
        fileId:
          description: Unique identifier of the file (same id as used in blobset flow)
          example: file_a1b2c3d4-e5f6-7890-abcd-ef1234567890
          minLength: 0
          type: string
        fileName:
          description: Original name of the attached file
          example: screenshot_2025-09-22.png
          minLength: 0
          type: string
        isDeleted:
          description: Flag indicating whether the file has been marked as deleted
          example: false
          type: boolean
      required:
      - fileId
      - fileName
      - isDeleted
      title: File attachment
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
