openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /events2metrics/events2metrics/v2:
    get:
      description: Returns all events-to-metrics rules for the team.
      externalDocs:
        url: ""
      operationId: Events2MetricService_ListE2M
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListE2MResponse"
          description: ""
      summary: List E2Ms
      tags:
      - Events2Metrics Service
    post:
      description: Creates a new events-to-metrics rule.
      externalDocs:
        url: ""
      operationId: Events2MetricService_CreateE2M
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Events2MetricService_CreateE2M_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateE2MResponse"
          description: ""
      summary: Create a new E2M
      tags:
      - Events2Metrics Service
    put:
      description: Updates an existing events-to-metrics rule.
      externalDocs:
        url: ""
      operationId: Events2MetricService_ReplaceE2M
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Events2MetricService_ReplaceE2M_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceE2MResponse"
          description: ""
      summary: Replace an E2M
      tags:
      - Events2Metrics Service
  /events2metrics/events2metrics/v2/all/execute:
    post:
      description: Atomically executes a batch of events-to-metrics rules.
      externalDocs:
        url: ""
      operationId: Events2MetricService_AtomicBatchExecuteE2M
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Events2MetricService_AtomicBatchExecuteE2M_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomicBatchExecuteE2MResponse"
          description: ""
      summary: Atomic Batch Execute E2M
      tags:
      - Events2Metrics Service
  /events2metrics/events2metrics/v2/{id}:
    delete:
      description: Deletes the events-to-metrics rule with the specified ID.
      externalDocs:
        url: ""
      operationId: Events2MetricService_DeleteE2M
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          example: d6a3658e-78d2-47d0-9b81-b2c551f01b09
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteE2MResponse"
          description: ""
      summary: Delete an E2M
      tags:
      - Events2Metrics Service
    get:
      description: Returns the details of the specified events-to-metrics rule.
      externalDocs:
        url: ""
      operationId: Events2MetricService_GetE2M
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          example: d6a3658e-78d2-47d0-9b81-b2c551f01b09
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetE2MResponse"
          description: ""
      summary: Get an E2M
      tags:
      - Events2Metrics Service
  /events2metrics/labels/v2/cardinalities:
    get:
      description: Returns cardinality information for events-to-metrics labels.
      externalDocs:
        url: ""
      operationId: Events2MetricService_ListLabelsCardinality
      parameters:
      - description: Spans-based query used to evaluate label cardinality.
        explode: true
        in: query
        name: spans_query
        required: false
        schema:
          $ref: "#/components/schemas/SpansQuery"
        style: form
      - description: Logs-based query used to evaluate label cardinality.
        explode: true
        in: query
        name: logs_query
        required: false
        schema:
          $ref: "#/components/schemas/SpansQuery_1"
        style: form
      - description: The metric labels to evaluate cardinality for.
        explode: true
        in: query
        name: metric_labels
        required: false
        schema:
          description: The metric labels to evaluate cardinality for.
          items:
            $ref: "#/components/schemas/Metric_Label"
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLabelsCardinalityResponse"
          description: ""
      summary: List E2M Labels Cardinality
      tags:
      - Events2Metrics Service
  /events2metrics/limits/v2:
    get:
      description: Returns the events-to-metrics quota limits for the team.
      externalDocs:
        url: ""
      operationId: Events2MetricService_GetLimits
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLimitsResponse"
          description: ""
      summary: Get E2M Limits
      tags:
      - Events2Metrics Service
