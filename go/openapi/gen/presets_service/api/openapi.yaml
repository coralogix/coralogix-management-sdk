openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /notifications/notification-center/v1/presets:
    get:
      description: Returns all notification presets.
      externalDocs:
        url: ""
      operationId: PresetsService_BatchGetPresets
      parameters:
      - description: The unique identifiers of the presets to retrieve.
        explode: true
        in: query
        name: preset_ids
        required: false
        schema:
          description: The unique identifiers of the presets to retrieve.
          items:
            description: The unique identifiers of the presets to retrieve.
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetPresetsResponse"
          description: ""
      summary: Batch Get Presets
      tags:
      - Presets service
  /notifications/notification-center/v1/presets/custom/{id}:
    delete:
      description: Deletes the custom notification preset with the specified ID.
      externalDocs:
        url: ""
      operationId: PresetsService_DeleteCustomPreset
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomPresetResponse"
          description: ""
      summary: Delete Custom Preset
      tags:
      - Presets service
  /notifications/notification-center/v1/presets/custom/{id}/default:
    post:
      description: Sets a custom preset as the default.
      externalDocs:
        url: ""
      operationId: PresetsService_SetCustomPresetAsDefault
      parameters:
      - description: The unique identifier of the custom preset to set as default.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the custom preset to set as default.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetCustomPresetAsDefaultResponse"
          description: ""
      summary: Set Custom Preset As Default
      tags:
      - Presets service
  /notifications/notification-center/v1/presets/summaries/system:
    get:
      description: Returns summaries for all system-defined notification presets.
      externalDocs:
        url: ""
      operationId: PresetsService_GetSystemDefaultPresetSummary
      parameters:
      - description: The connector type whose system default preset summary is requested.
        explode: true
        in: query
        name: connector_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.ConnectorType"
        style: form
      - description: The entity type whose system default preset summary is requested.
        explode: true
        in: query
        name: entity_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.EntityType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSystemDefaultPresetSummaryResponse"
          description: ""
      summary: Get System Default Preset Summary
      tags:
      - Presets service
  /notifications/notification-center/v1/presets/{id}:
    get:
      description: Returns the details of the specified notification preset.
      externalDocs:
        url: ""
      operationId: PresetsService_GetPreset
      parameters:
      - description: The unique identifier of the preset to retrieve.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the preset to retrieve.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPresetResponse"
          description: ""
      summary: Get Preset
      tags:
      - Presets service
  /notifications/notification-center/v1/presets/{id}/default/apply:
    post:
      description: Sets the specified preset as the default for an entity.
      externalDocs:
        url: ""
      operationId: PresetsService_SetPresetAsDefault
      parameters:
      - description: The unique identifier of the preset to set as default.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the preset to set as default.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetPresetAsDefaultResponse"
          description: ""
      summary: Set Preset As Default
      tags:
      - Presets service
  /notifications/notification-center/v1/presets:createCustom:
    post:
      description: Creates a new custom notification preset.
      externalDocs:
        url: ""
      operationId: PresetsService_CreateCustomPreset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_Custom_Preset_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomPresetResponse"
          description: ""
      summary: Create Custom Preset
      tags:
      - Presets service
  /notifications/notification-center/v1/presets:getDefaultSummary:
    get:
      description: Returns a summary of the default notification preset.
      externalDocs:
        url: ""
      operationId: PresetsService_GetDefaultPresetSummary
      parameters:
      - description: The connector type whose default preset summary is requested.
        explode: true
        in: query
        name: connector_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.ConnectorType"
        style: form
      - description: The entity type whose default preset summary is requested.
        explode: true
        in: query
        name: entity_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.EntityType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDefaultPresetSummaryResponse"
          description: ""
      summary: Get Default Preset Summary
      tags:
      - Presets service
  /notifications/notification-center/v1/presets:replaceCustom:
    put:
      description: Replaces an existing custom notification preset.
      externalDocs:
        url: ""
      operationId: PresetsService_ReplaceCustomPreset
      requestBody:
        content:
          application/json:
            schema:
