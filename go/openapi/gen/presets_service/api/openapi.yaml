      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceCustomPresetResponse"
          description: ""
      summary: Replace Custom Preset
      tags:
      - Presets service
  /notifications/notification-center/v1/presets:summariesList:
    get:
      description: Returns a list of notification preset summaries.
      externalDocs:
        url: ""
      operationId: PresetsService_ListPresetSummaries
      parameters:
      - description: Filter preset summaries by their connector type.
        explode: true
        in: query
        name: connector_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.ConnectorType"
        style: form
      - description: Filter preset summaries by their entity type.
        explode: true
        in: query
        name: entity_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.EntityType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPresetSummariesResponse"
          description: ""
      summary: List Preset Summaries
      tags:
      - Presets service
