          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get total count of incident events
      tags:
      - Incidents service
      x-coralogixPermissions:
      - incidents:read
  /incidents/events/v1/{event_id}:
    get:
      description: |-
        Retrieve detailed information about a single incident by related alert event id.

        Requires the following permissions:
        - `incidents:read`
      externalDocs:
        url: ""
      operationId: IncidentsService_GetIncidentByEventId
      parameters:
      - description: Event ID associated to the Incident to acknowledge
        explode: false
        in: path
        name: event_id
        required: true
        schema:
          description: Event ID associated to the Incident to acknowledge
          example: event_id_1
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIncidentByEventIdResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get incident by event ID
      tags:
      - Incidents service
      x-coralogixPermissions:
      - incidents:read
  /incidents/events/v1/{event_id}/acknowledge:
    post:
      description: |-
        Mark incident as acknowledged by event id.

        Requires the following permissions:
        - `incidents:acknowledge`
      externalDocs:
        url: ""
      operationId: IncidentsService_AcknowledgeIncidentByEventId
      parameters:
      - description: Event ID associated to the Incident to acknowledge
        explode: false
        in: path
        name: event_id
        required: true
        schema:
          description: Event ID associated to the Incident to acknowledge
          example: event_id_1
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeIncidentByEventIdResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Acknowledge incident by event id
      tags:
      - Incidents service
      x-coralogixPermissions:
      - incidents:acknowledge
  /incidents/events/v1/{event_id}/resolve:
    post:
      description: |-
        Mark incident as resolved by event id.

        Requires the following permissions:
        - `incidents:close`
      externalDocs:
        url: ""
      operationId: IncidentsService_ResolveIncidentByEventId
