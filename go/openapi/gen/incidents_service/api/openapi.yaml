        url: ""
      operationId: IncidentsService_UnassignIncidents
      parameters:
      - description: List of incident IDs to unassign
        explode: true
        in: query
        name: incident_ids
        required: false
        schema:
          description: List of incident IDs to unassign
          example:
          - incident_id_1
