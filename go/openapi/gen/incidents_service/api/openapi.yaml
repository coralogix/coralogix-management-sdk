      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/incidents.v1.GetFilterValuesResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
