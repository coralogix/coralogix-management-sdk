openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /incidents/aggregations/v1:
    get:
      description: |-
        Retrieve aggregated incident data with support for grouping and filtering.

        Requires the following permissions:
        - `incidents:read`
      externalDocs:
        url: ""
      operationId: IncidentsService_ListIncidentAggregations
      parameters:
      - description: Filter for incidents
        explode: true
        in: query
        name: filter
        required: false
        schema:
          $ref: "#/components/schemas/Incident_query_filter"
        style: form
      - description: Group by fields for aggregation
        explode: true
        in: query
        name: group_bys
        required: false
        schema:
          description: Group by fields for aggregation
          items:
            $ref: "#/components/schemas/IncidentsService_ListIncidentAggregations_group_bys_parameter_inner"
          minItems: 0
          type: array
        style: form
      - description: Pagination parameters
        explode: true
        in: query
        name: pagination
        required: false
        schema:
          $ref: "#/components/schemas/Pagination_request"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIncidentAggregationsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get incident aggregations
      tags:
      - Incidents service
      x-coralogixPermissions:
      - incidents:read
  /incidents/events/v1:
    get:
      description: |-
        List incident events with support for filtering, pagination, and ordering.

        Requires the following permissions:
        - `incidents:read`
      externalDocs:
        url: ""
      operationId: IncidentsService_ListIncidentEvents
      parameters:
      - description: Filter for incident events
        explode: true
        in: query
        name: filter
        required: false
        schema:
          $ref: "#/components/schemas/Incident_event_query_filter"
        style: form
      - description: Pagination parameters
        explode: true
        in: query
        name: pagination
        required: false
        schema:
          $ref: "#/components/schemas/Pagination_request"
        style: form
      - description: Order by fields for incident events
        explode: true
        in: query
        name: order_by
        required: false
        schema:
          $ref: "#/components/schemas/List_incident_events_order_by_request"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIncidentEventsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List incident events with filters
      tags:
      - Incidents service
      x-coralogixPermissions:
      - incidents:read
  /incidents/events/v1/all/count:
    get:
      description: |-
        Retrieve the total count of incident events matching a filter.

        Requires the following permissions:
        - `incidents:read`
      externalDocs:
        url: ""
      operationId: IncidentsService_ListIncidentEventsTotalCount
      parameters:
      - description: Filter for incident events
        explode: true
        in: query
        name: filter
        required: false
        schema:
          $ref: "#/components/schemas/Incident_event_query_filter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
