openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /actions/actions/v2:
    get:
      description: Returns all actions for the team.
      externalDocs:
        url: ""
      operationId: ActionsService_ListActions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List Actions
      tags:
      - Actions Service
    post:
      description: Creates a new action.
      externalDocs:
        url: ""
      operationId: ActionsService_CreateAction
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionsService_CreateAction_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateActionResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create Action
      tags:
      - Actions Service
    put:
      description: Replaces all actions with the provided set.
      externalDocs:
        url: ""
      operationId: ActionsService_ReplaceAction
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionsService_ReplaceAction_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceActionResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Replace Action
      tags:
      - Actions Service
  /actions/actions/v2/{id}:
    delete:
      description: Deletes the action with the specified ID.
      externalDocs:
        url: ""
      operationId: ActionsService_DeleteAction
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteActionResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete Action
      tags:
      - Actions Service
    get:
      description: Returns the details of a specific action.
      externalDocs:
        url: ""
      operationId: ActionsService_GetAction
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetActionResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Action
      tags:
      - Actions Service
  /actions/batch/v2:
    post:
      description: Creates multiple actions in a single request.
      externalDocs:
        url: ""
      operationId: ActionsService_AtomicBatchExecuteActions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionsService_AtomicBatchExecuteActions_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomicBatchExecuteActionsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Atomic Batch Execute Actions
      tags:
      - Actions Service
  /actions/order/v2:
    post:
      description: Updates the display order of actions.
      externalDocs:
        url: ""
      operationId: ActionsService_OrderActions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionsService_OrderActions_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderActionsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Order Actions
      tags:
      - Actions Service
components:
  schemas:
    ActionExecutionRequest:
      oneOf:
      - $ref: "#/components/schemas/ActionExecutionRequestCreate"
      - $ref: "#/components/schemas/ActionExecutionRequestDelete"
      - $ref: "#/components/schemas/ActionExecutionRequestReplace"
    ActionExecutionRequestCreate:
      description: This data structure represents a request to execute an Action operation.
      externalDocs:
        url: ""
      properties:
        create:
          $ref: "#/components/schemas/CreateActionRequest"
      required:
      - create
      type: object
    ActionExecutionRequestDelete:
      description: This data structure represents a request to execute an Action operation.
      externalDocs:
        url: ""
      properties:
        delete:
          $ref: "#/components/schemas/DeleteActionRequest"
      required:
      - delete
      type: object
    ActionExecutionRequestReplace:
      description: This data structure represents a request to execute an Action operation.
      externalDocs:
        url: ""
      properties:
        replace:
          $ref: "#/components/schemas/ReplaceActionRequest"
      required:
      - replace
      type: object
    ActionExecutionResponse:
      oneOf:
      - $ref: "#/components/schemas/ActionExecutionResponseCreate"
      - $ref: "#/components/schemas/ActionExecutionResponseDelete"
      - $ref: "#/components/schemas/ActionExecutionResponseReplace"
    ActionExecutionResponseCreate:
      description: This data structure represents a response to an Action execution
        request.
      example:
        create:
          action:
            urlFields:
            - name: name
              required: true
            - name: name
              required: true
            dpxlFilter: dpxlFilter
            createdBy: createdBy
            sourceType: SOURCE_TYPE_UNSPECIFIED
            subsystemNames:
            - subsystemNames
            - subsystemNames
            name: name
            description: description
            applicationNames:
            - applicationNames
            - applicationNames
            id: id
            isPrivate: true
            url: url
            isHidden: true
      externalDocs:
        url: ""
      properties:
        create:
          $ref: "#/components/schemas/CreateActionResponse"
      required:
      - create
      type: object
    ActionExecutionResponseDelete:
      description: This data structure represents a response to an Action execution
        request.
      externalDocs:
        url: ""
      properties:
        delete:
          additionalProperties: false
          description: This data structure represents the response to delete an Action.
          externalDocs:
            url: ""
          type: object
      required:
      - delete
      type: object
    ActionExecutionResponseReplace:
      description: This data structure represents a response to an Action execution
        request.
      externalDocs:
        url: ""
      properties:
        replace:
          $ref: "#/components/schemas/ReplaceActionResponse"
      required:
      - replace
      type: object
    AtomicBatchExecuteActionsResponse:
      description: This data structure represents the response to a batch Action execution
        request.
      example:
        matchingResponses:
        - create:
            action:
              urlFields:
              - name: name
                required: true
              - name: name
                required: true
              dpxlFilter: dpxlFilter
              createdBy: createdBy
              sourceType: SOURCE_TYPE_UNSPECIFIED
              subsystemNames:
              - subsystemNames
              - subsystemNames
              name: name
              description: description
              applicationNames:
              - applicationNames
              - applicationNames
              id: id
              isPrivate: true
              url: url
              isHidden: true
        - create:
            action:
              urlFields:
              - name: name
                required: true
              - name: name
                required: true
              dpxlFilter: dpxlFilter
              createdBy: createdBy
              sourceType: SOURCE_TYPE_UNSPECIFIED
              subsystemNames:
              - subsystemNames
              - subsystemNames
              name: name
              description: description
              applicationNames:
              - applicationNames
              - applicationNames
              id: id
              isPrivate: true
              url: url
              isHidden: true
      externalDocs:
        url: ""
      properties:
        matchingResponses:
          description: The matching responses.
          items:
            $ref: "#/components/schemas/ActionExecutionResponse"
          type: array
      type: object
    CreateActionRequest:
      description: This data structure represents the request to create an Action.
      externalDocs:
        url: ""
      properties:
        applicationNames:
          description: The application names.
          items:
            description: The application names.
            type: string
          type: array
        description:
          description: Human-readable description.
          type: string
        dpxlFilter:
          description: The dpxl filter.
          type: string
        isPrivate:
          description: The is private.
          type: boolean
        name:
          description: Display name.
          type: string
        sourceType:
          $ref: "#/components/schemas/v2.SourceType"
        subsystemNames:
          description: The subsystem names.
          items:
            description: The subsystem names.
            type: string
          type: array
        url:
          description: URL.
          type: string
        urlFields:
          description: The url fields.
          items:
            $ref: "#/components/schemas/UrlField"
          type: array
      type: object
    CreateActionResponse:
      description: This data structure represents the response to create an Action.
      example:
        action:
          urlFields:
          - name: name
            required: true
          - name: name
            required: true
          dpxlFilter: dpxlFilter
          createdBy: createdBy
          sourceType: SOURCE_TYPE_UNSPECIFIED
          subsystemNames:
          - subsystemNames
          - subsystemNames
          name: name
          description: description
          applicationNames:
          - applicationNames
          - applicationNames
          id: id
          isPrivate: true
          url: url
          isHidden: true
      externalDocs:
        url: ""
      properties:
        action:
          $ref: "#/components/schemas/v2.Action"
      type: object
    DeleteActionRequest:
      description: This data structure represents the request to delete an Action.
      externalDocs:
        url: ""
      properties:
        id:
          description: Unique identifier.
          type: string
      type: object
    DeleteActionResponse:
      additionalProperties: false
      description: This data structure represents the response to delete an Action.
      externalDocs:
        url: ""
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetActionResponse:
      description: This data structure represents the response to get an Action.
      example:
        action:
          urlFields:
          - name: name
            required: true
          - name: name
            required: true
          dpxlFilter: dpxlFilter
          createdBy: createdBy
          sourceType: SOURCE_TYPE_UNSPECIFIED
          subsystemNames:
          - subsystemNames
          - subsystemNames
          name: name
          description: description
          applicationNames:
          - applicationNames
          - applicationNames
          id: id
          isPrivate: true
          url: url
          isHidden: true
      externalDocs:
        url: ""
      properties:
        action:
          $ref: "#/components/schemas/v2.Action"
      type: object
    ListActionsResponse:
      description: This data structure represents the response containing a list of
        Actions.
      example:
        actions:
        - urlFields:
          - name: name
            required: true
          - name: name
            required: true
          dpxlFilter: dpxlFilter
          createdBy: createdBy
          sourceType: SOURCE_TYPE_UNSPECIFIED
          subsystemNames:
          - subsystemNames
          - subsystemNames
          name: name
          description: description
          applicationNames:
          - applicationNames
          - applicationNames
          id: id
          isPrivate: true
          url: url
          isHidden: true
        - urlFields:
          - name: name
            required: true
          - name: name
            required: true
          dpxlFilter: dpxlFilter
          createdBy: createdBy
          sourceType: SOURCE_TYPE_UNSPECIFIED
          subsystemNames:
          - subsystemNames
          - subsystemNames
          name: name
          description: description
          applicationNames:
          - applicationNames
          - applicationNames
          id: id
          isPrivate: true
          url: url
          isHidden: true
      externalDocs:
        url: ""
      properties:
        actions:
          description: List of actions.
          items:
            $ref: "#/components/schemas/v2.Action"
          type: array
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            type: string
          type: array
      type: object
    OrderActionsResponse:
      additionalProperties: false
      description: This data structure represents the response to order Actions.
      externalDocs:
        url: ""
      type: object
    ReplaceActionRequest:
      description: This data structure represents the request to replace an Action.
      externalDocs:
        url: ""
      properties:
        action:
          $ref: "#/components/schemas/v2.Action"
      type: object
    ReplaceActionResponse:
      description: This data structure represents the response to replace an Action.
      example:
        action:
          urlFields:
          - name: name
            required: true
          - name: name
            required: true
          dpxlFilter: dpxlFilter
          createdBy: createdBy
          sourceType: SOURCE_TYPE_UNSPECIFIED
          subsystemNames:
          - subsystemNames
          - subsystemNames
          name: name
          description: description
          applicationNames:
          - applicationNames
          - applicationNames
          id: id
          isPrivate: true
          url: url
          isHidden: true
      externalDocs:
        url: ""
      properties:
        action:
          $ref: "#/components/schemas/v2.Action"
      type: object
    UrlField:
      description: Declares a URL field that may be required for the Action to be
        invokable on a log.
      example:
        name: name
        required: true
      externalDocs:
        url: ""
      properties:
        name:
          description: Display name.
          type: string
        required:
          description: The required.
          type: boolean
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v2.Action:
      description: This data structure represents an Action.
      example:
        urlFields:
        - name: name
          required: true
        - name: name
          required: true
        dpxlFilter: dpxlFilter
        createdBy: createdBy
        sourceType: SOURCE_TYPE_UNSPECIFIED
        subsystemNames:
        - subsystemNames
        - subsystemNames
        name: name
        description: description
        applicationNames:
        - applicationNames
        - applicationNames
        id: id
        isPrivate: true
        url: url
        isHidden: true
      externalDocs:
        url: ""
      properties:
        applicationNames:
          description: The application names.
          items:
            description: The application names.
            type: string
          type: array
        createdBy:
          description: The created by.
          type: string
        description:
          description: Human-readable description.
          type: string
        dpxlFilter:
          description: The dpxl filter.
          type: string
        id:
          description: Unique identifier.
          type: string
        isHidden:
          description: The is hidden.
          type: boolean
        isPrivate:
          description: The is private.
          type: boolean
        name:
          description: Display name.
          type: string
        sourceType:
          $ref: "#/components/schemas/v2.SourceType"
        subsystemNames:
          description: The subsystem names.
          items:
            description: The subsystem names.
            type: string
          type: array
        url:
          description: URL.
          type: string
        urlFields:
          description: The url fields.
          items:
            $ref: "#/components/schemas/UrlField"
          type: array
      type: object
    v2.SourceType:
      description: Source type.
      enum:
      - SOURCE_TYPE_UNSPECIFIED
      - SOURCE_TYPE_LOG
      - SOURCE_TYPE_DATA_MAP
      type: string
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    ActionsService_ReplaceAction_request:
      description: This data structure represents the request to replace an Action.
      properties:
        action:
          $ref: "#/components/schemas/v2.Action"
      type: object
    ActionsService_CreateAction_request:
      description: This data structure represents the request to create an Action.
      properties:
        applicationNames:
          description: The application names.
          items:
            description: The application names.
            type: string
          type: array
        description:
          description: Human-readable description.
          type: string
        dpxlFilter:
          description: The dpxl filter.
          type: string
        isPrivate:
          description: The is private.
          type: boolean
        name:
          description: Display name.
          type: string
        sourceType:
          $ref: "#/components/schemas/v2.SourceType"
        subsystemNames:
          description: The subsystem names.
          items:
            description: The subsystem names.
            type: string
          type: array
        url:
          description: URL.
          type: string
        urlFields:
          description: The url fields.
          items:
            $ref: "#/components/schemas/UrlField"
          type: array
      type: object
    ActionsService_AtomicBatchExecuteActions_request:
      description: This data structure represents a request to execute a batch of
        Action operations atomically.
      properties:
        requests:
          description: The requests.
          items:
            $ref: "#/components/schemas/ActionExecutionRequest"
          type: array
      type: object
    ActionsService_OrderActions_request:
      description: This data structure represents the request to order Actions.
      properties:
        privateActionsOrder:
          additionalProperties:
            format: int64
            type: integer
          description: The private actions order.
          type: object
        sharedActionsOrder:
          additionalProperties:
            format: int64
            type: integer
          description: The shared actions order.
          type: object
      type: object
