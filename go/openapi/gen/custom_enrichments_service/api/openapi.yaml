openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /enrichment-rules/custom-enrichment-rules/v1:
    get:
      description: Returns all custom enrichment rules.
      externalDocs:
        url: ""
      operationId: CustomEnrichmentService_GetCustomEnrichments
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCustomEnrichmentsResponse"
          description: ""
      summary: Get Custom Enrichments
      tags:
      - Custom Enrichments Service
    post:
      description: Creates a new custom enrichment rule.
      externalDocs:
        url: ""
      operationId: CustomEnrichmentService_CreateCustomEnrichment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_Custom_Enrichment_Request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomEnrichmentResponse"
          description: ""
      summary: Create Custom Enrichments
      tags:
      - Custom Enrichments Service
    put:
      description: Updates a custom enrichment rule.
      externalDocs:
        url: ""
      operationId: CustomEnrichmentService_UpdateCustomEnrichment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_Custom_Enrichment_Request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCustomEnrichmentResponse"
          description: ""
      summary: Update Custom Enrichment
      tags:
      - Custom Enrichments Service
  /enrichment-rules/custom-enrichment-rules/v1/all/contents:
    post:
      description: Returns the contents of all custom enrichment data.
      externalDocs:
        url: ""
      operationId: CustomEnrichmentService_SearchCustomEnrichmentData
      parameters:
      - description: Search clauses used to filter custom enrichment data.
        explode: true
        in: query
        name: search_clauses
        required: false
        schema:
          description: Search clauses used to filter custom enrichment data.
          items:
            $ref: "#/components/schemas/CustomEnrichmentService_SearchCustomEnrichmentData_search_clauses_parameter_inner"
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCustomEnrichmentDataResponse"
          description: ""
      summary: Search Custom Enrichment Data
      tags:
      - Custom Enrichments Service
  /enrichment-rules/custom-enrichment-rules/v1/{id}:
    delete:
      description: Deletes the custom enrichment rule with the specified ID.
      externalDocs:
        url: ""
      operationId: CustomEnrichmentService_DeleteCustomEnrichment
      parameters:
      - description: The unique identifier of the custom enrichment rule to delete.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the custom enrichment rule to delete.
          example: 1
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomEnrichmentResponse"
          description: ""
      summary: Delete Custom Enrichments
      tags:
      - Custom Enrichments Service
    get:
      description: Returns the details of the specified custom enrichment rule.
      externalDocs:
        url: ""
      operationId: CustomEnrichmentService_GetCustomEnrichment
      parameters:
      - description: The unique identifier of the custom enrichment rule.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the custom enrichment rule.
          example: 1
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCustomEnrichmentResponse"
          description: ""
      summary: Get Custom Enrichment
      tags:
      - Custom Enrichments Service
components:
  schemas:
    CreateCustomEnrichmentResponse:
      description: This response data structure is obtained when a custom enrichment
        is created
      example:
        message: Custom enrichment created successfully
        customEnrichment:
          fileName: fileName
          isQueryOnly: true
          fileSize: 0
          name: name
          description: description
          id: 6
          version: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        customEnrichment:
          $ref: "#/components/schemas/CustomEnrichment"
        message:
          description: Human-readable message.
          example: Custom enrichment created successfully
          type: string
      title: Create Custom Enrichment Response
      type: object
    CustomEnrichment:
      description: Custom enrichment.
      example:
        fileName: fileName
        isQueryOnly: true
        fileSize: 0
        name: name
        description: description
        id: 6
        version: 1
      externalDocs:
        url: ""
      properties:
        description:
          description: Human-readable description.
          type: string
        fileName:
          description: The file name.
          type: string
        fileSize:
          description: The file size.
          format: int64
          type: integer
        id:
          description: Unique identifier.
          format: int64
          type: integer
        isQueryOnly:
          description: The is query only.
          type: boolean
        name:
          description: Display name.
          type: string
        version:
          description: Version number.
          format: int64
          type: integer
      type: object
    CustomEnrichmentData:
      oneOf:
      - $ref: "#/components/schemas/CustomEnrichmentDataBinary"
      - $ref: "#/components/schemas/CustomEnrichmentDataTextual"
    CustomEnrichmentDataBinary:
      description: Custom enrichment data including definition and raw content.
      example:
        binary: binary
        definition:
          fileName: fileName
          isQueryOnly: true
          fileSize: 0
          name: name
          description: description
          id: 6
          version: 1
      externalDocs:
        url: ""
      properties:
        binary:
          description: Binary content of the enrichment data file encoded as base64.
          format: byte
          type: string
        definition:
          $ref: "#/components/schemas/CustomEnrichment"
      required:
      - binary
      type: object
    CustomEnrichmentDataTextual:
      description: Custom enrichment data including definition and raw content.
      externalDocs:
        url: ""
      properties:
        definition:
          $ref: "#/components/schemas/CustomEnrichment"
        textual:
          description: Textual content of the enrichment data file as a UTF-8 string.
          type: string
      required:
      - textual
      type: object
    DeleteCustomEnrichmentResponse:
      description: Response returned after successfully deleting a custom enrichment
        rule.
      example:
        customEnrichmentId: 1
        message: Custom enrichment deleted successfully
      externalDocs:
        url: ""
      properties:
        customEnrichmentId:
          description: The custom enrichment id.
          example: 1
          format: int64
          type: integer
        message:
          description: Human-readable message.
          example: Custom enrichment deleted successfully
          type: string
      type: object
    File:
      oneOf:
      - $ref: "#/components/schemas/FileBinary"
      - $ref: "#/components/schemas/FileTextual"
    FileBinary:
      description: This data structure represents a file
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        binary:
          description: Binary content of the file encoded as base64.
          example: !!binary |-
            MHhGQUJCMzI=
          format: byte
          type: string
        extension:
          description: "File extension indicating the file format (e.g., csv, json)."
          example: csv
          type: string
        name:
          description: Name of the file.
          example: file_name
          type: string
        size:
          description: Size of the file in bytes.
          example: 100
          format: int64
          type: integer
      required:
      - binary
      title: File
      type: object
    FileTextual:
      description: This data structure represents a file
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        extension:
          description: "File extension indicating the file format (e.g., csv, json)."
          example: csv
          type: string
        name:
          description: Name of the file.
          example: file_name
          type: string
        size:
          description: Size of the file in bytes.
          example: 100
          format: int64
          type: integer
        textual:
          description: Textual content of the file as a UTF-8 string.
          example: "row1,row2 value1,value2"
          type: string
      required:
      - textual
      title: File
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetCustomEnrichmentResponse:
      description: This response data structure is obtained when a custom enrichment
        is retrieved
      example:
        customEnrichment:
          fileName: fileName
          isQueryOnly: true
          fileSize: 0
          name: name
          description: description
          id: 6
          version: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        customEnrichment:
          $ref: "#/components/schemas/CustomEnrichment"
      required:
      - customEnrichment
      title: Get Custom Enrichment Response
      type: object
    GetCustomEnrichmentsResponse:
      description: This response data structure is obtained when all custom enrichments
        are retrieved
      example:
        customEnrichments:
        - fileName: fileName
          isQueryOnly: true
          fileSize: 0
          name: name
          description: description
          id: 6
          version: 1
        - fileName: fileName
          isQueryOnly: true
          fileSize: 0
          name: name
          description: description
          id: 6
          version: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        customEnrichments:
          description: The custom enrichments.
          items:
            $ref: "#/components/schemas/CustomEnrichment"
          type: array
      title: Get Custom Enrichments Response
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            type: string
          type: array
      type: object
    SearchClauseId:
      description: This data structure represents a search clause
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        id:
          description: Search by the numeric ID of the custom enrichment.
          example: 1
          format: int64
          type: integer
      required:
      - id
      title: Search Clause
      type: object
    SearchClauseName:
      description: This data structure represents a search clause
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        name:
          description: Search by the name of the custom enrichment.
          example: custom_enrichment_name
          type: string
      required:
      - name
      title: Search Clause
      type: object
    SearchCustomEnrichmentDataResponse:
      description: Response containing custom enrichment data search results.
      example:
        customEnrichmentsData:
        - binary: binary
          definition:
            fileName: fileName
            isQueryOnly: true
            fileSize: 0
            name: name
            description: description
            id: 6
            version: 1
        - binary: binary
          definition:
            fileName: fileName
            isQueryOnly: true
            fileSize: 0
            name: name
            description: description
            id: 6
            version: 1
      externalDocs:
        url: ""
      properties:
        customEnrichmentsData:
          description: The custom enrichments data.
          items:
            $ref: "#/components/schemas/CustomEnrichmentData"
          type: array
      type: object
    UpdateCustomEnrichmentResponse:
      description: This response data structure is obtained when a custom enrichment
        is updated
      example:
        message: Custom enrichment updated successfully
        customEnrichment:
          fileName: fileName
          isQueryOnly: true
          fileSize: 0
          name: name
          description: description
          id: 6
          version: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        customEnrichment:
          $ref: "#/components/schemas/CustomEnrichment"
        message:
          description: Human-readable message.
          example: Custom enrichment updated successfully
          type: string
      title: Update Custom Enrichment Response
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    Update_Custom_Enrichment_Request:
      description: This request data structure is used to update a custom enrichment
      properties:
        customEnrichmentId:
          description: The custom enrichment id.
          example: 1
          format: int64
          type: integer
        description:
          description: New human-readable description of the custom enrichment.
          example: custom_enrichment_description
          type: string
        file:
          $ref: "#/components/schemas/File"
        name:
          description: New human-readable name for the custom enrichment.
          example: custom_enrichment_name
          type: string
      required:
      - customEnrichmentId
      - description
      - file
      - name
      title: Update Custom Enrichment Request
      type: object
    Create_Custom_Enrichment_Request:
      description: This request data structure is used to create a custom enrichment
      properties:
        description:
          description: Human-readable description of the custom enrichment.
          example: custom_enrichment_description
          type: string
        file:
          $ref: "#/components/schemas/File"
        name:
          description: Human-readable name for the custom enrichment.
          example: custom_enrichment_name
          type: string
      required:
      - description
      - file
      - name
      title: Create Custom Enrichment Request
      type: object
    CustomEnrichmentService_SearchCustomEnrichmentData_search_clauses_parameter_inner:
      oneOf:
      - $ref: "#/components/schemas/SearchClauseId"
      - $ref: "#/components/schemas/SearchClauseName"
