openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /v3/alert-event-stats:
    get:
      description: |-
        Returns statistical data for alert events.

        Requires the following permissions:
        - `alerts:ReadConfig`
      externalDocs:
        url: ""
      operationId: AlertEventService_GetAlertEventsStats
      parameters:
      - description: The ids.
        explode: true
        in: query
        name: ids
        required: false
        schema:
          description: The ids.
          items:
            description: The ids.
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      - description: The order bys.
        explode: true
        in: query
        name: order_bys
        required: false
        schema:
          description: The order bys.
          items:
            $ref: "#/components/schemas/AlertEventService_GetAlertEventsStats_order_bys_parameter_inner"
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAlertEventStatsResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get alert events statistics
      tags:
      - Alert events service
      x-coralogixPermissions:
      - alerts:ReadConfig
  /v3/alert-event/{id}:
    get:
      description: |-
        Returns the alert event with the specified ID.

        Requires the following permissions:
        - `alerts:ReadConfig`
      externalDocs:
        url: ""
      operationId: AlertEventService_GetAlertEvent
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          minLength: 0
          type: string
        style: simple
      - description: Ordering applied to the alert event occurrences in the response.
        explode: true
        in: query
        name: order_bys
        required: false
        schema:
          description: Ordering applied to the alert event occurrences in the response.
          items:
            $ref: "#/components/schemas/AlertEventService_GetAlertEventsStats_order_bys_parameter_inner"
          minItems: 0
          type: array
        style: form
      - description: Pagination parameters (page size and page token) for the returned
          occurrences.
        explode: true
        in: query
        name: pagination
        required: false
        schema:
          $ref: "#/components/schemas/AlertEventService_GetAlertEvent_pagination_parameter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAlertEventResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get alert event by ID
      tags:
      - Alert events service
      x-coralogixPermissions:
      - alerts:ReadConfig
components:
  schemas:
    ActivityAnalysis:
      description: "Configuration for alert activity analysis, containing rules and\
        \ status."
      example:
        rules:
        - rules
        - rules
        status: ACTIVITY_ANALYSIS_STATUS_ACTIVATE_OR_UNSPECIFIED
      externalDocs:
        url: ""
      properties:
        rules:
          description: List of rules.
          items:
            description: List of rules.
            minLength: 0
            type: string
          minItems: 0
          type: array
        status:
          $ref: "#/components/schemas/ActivityAnalysisStatus"
      title: Activity analysis data structure
      type: object
    ActivityAnalysisStats:
      description: Activity analysis stats.
      example:
        isMutedCount: 0
        rules:
        - rules
        - rules
      externalDocs:
        url: ""
      properties:
        isMutedCount:
          description: Number of muted items.
          format: int64
          minimum: 0
          type: integer
        rules:
          description: List of rules.
          items:
            description: List of rules.
            minLength: 0
            type: string
          minItems: 0
          type: array
      title: Event activity analysis statistics
      type: object
    ActivityAnalysisStatus:
      description: Activity analysis status.
      enum:
      - ACTIVITY_ANALYSIS_STATUS_ACTIVATE_OR_UNSPECIFIED
      - ACTIVITY_ANALYSIS_STATUS_MUTE
      type: string
    AlertEvent:
      description: Alert event.
      example:
        preGroupingEventId: preGroupingEventId
        incidentCorrelationKey: incidentCorrelationKey
        groupLabels:
          key: groupLabels
        payloadType: payloadType
        payload: "{}"
        alertId: alertId
        activityAnalysis:
          rules:
          - rules
          - rules
          status: ACTIVITY_ANALYSIS_STATUS_ACTIVATE_OR_UNSPECIFIED
        permutationLabels:
          key: permutationLabels
        permutationId: permutationId
        status: ALERT_STATUS_RESOLVED_OR_UNSPECIFIED
        timestamp: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        activityAnalysis:
          $ref: "#/components/schemas/ActivityAnalysis"
        alertId:
          description: Unique identifier of the alert.
          minLength: 0
          type: string
        groupLabels:
          additionalProperties:
            minLength: 0
            type: string
          description: Labels for the group.
          type: object
        incidentCorrelationKey:
          description: Key used to correlate incidents.
          minLength: 0
          type: string
        payload:
          description: Raw payload data.
          type: object
        payloadType:
          description: Type of the payload.
          minLength: 0
          type: string
        permutationId:
          description: Unique identifier of the permutation.
          minLength: 0
          type: string
        permutationLabels:
          additionalProperties:
            minLength: 0
            type: string
          description: Labels for the permutation.
          type: object
        preGroupingEventId:
          description: Identifier of the event before grouping.
          minLength: 0
          type: string
        status:
          $ref: "#/components/schemas/AlertStatus"
        timestamp:
          description: Timestamp of the event.
          format: date-time
          minLength: 0
          type: string
      title: Alert event
      type: object
    AlertEventMultiplePermutation:
      description: Alert event multiple permutation.
      example:
        alertEventMultiplePermutation:
        - preGroupingEventId: preGroupingEventId
          incidentCorrelationKey: incidentCorrelationKey
          groupLabels:
            key: groupLabels
          payloadType: payloadType
          payload: "{}"
          alertId: alertId
          activityAnalysis:
            rules:
            - rules
            - rules
            status: ACTIVITY_ANALYSIS_STATUS_ACTIVATE_OR_UNSPECIFIED
          permutationLabels:
            key: permutationLabels
          permutationId: permutationId
          status: ALERT_STATUS_RESOLVED_OR_UNSPECIFIED
          timestamp: 2000-01-23T04:56:07.000+00:00
        - preGroupingEventId: preGroupingEventId
          incidentCorrelationKey: incidentCorrelationKey
          groupLabels:
            key: groupLabels
          payloadType: payloadType
          payload: "{}"
          alertId: alertId
          activityAnalysis:
            rules:
            - rules
            - rules
            status: ACTIVITY_ANALYSIS_STATUS_ACTIVATE_OR_UNSPECIFIED
          permutationLabels:
            key: permutationLabels
          permutationId: permutationId
          status: ALERT_STATUS_RESOLVED_OR_UNSPECIFIED
          timestamp: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        alertEventMultiplePermutation:
          description: List of alert events for multiple permutations.
          items:
            $ref: "#/components/schemas/AlertEvent"
          minItems: 0
          type: array
      type: object
    AlertStatus:
      description: Alert status.
      enum:
      - ALERT_STATUS_RESOLVED_OR_UNSPECIFIED
      - ALERT_STATUS_TRIGGERED
      - ALERT_STATUS_NO_DATA
      type: string
    Error:
      description: Standard error response body returned for a failed request.
      example:
        code: 381
        message: message
      properties:
        code:
          description: "HTTP status code of the error (for example 400, 404, 500)."
          format: int32
          maximum: 599
          minimum: 100
          type: integer
        message:
          description: Human-readable description of the error.
          maxLength: 4096
          minLength: 0
          pattern: "^[\\s\\S]*$"
          type: string
      type: object
    EventStats:
      example:
        resolvedPermutationsSamples:
        - permutationLabels:
            key: permutationLabels
        - permutationLabels:
            key: permutationLabels
        activityAnalysisStats:
          isMutedCount: 0
          rules:
          - rules
          - rules
        triggeredCount: 0
        count: 0
        triggeredPermutationsSamples:
        - permutationLabels:
            key: permutationLabels
        - permutationLabels:
            key: permutationLabels
        resolvedCount: 0
      externalDocs:
        url: ""
      properties:
        activityAnalysisStats:
          $ref: "#/components/schemas/ActivityAnalysisStats"
        count:
          description: Number of items.
          format: int64
          minimum: 0
          type: integer
        resolvedCount:
          description: The resolved count.
          format: int64
          minimum: 0
          type: integer
        resolvedPermutationsSamples:
          description: The resolved permutations samples.
          items:
            $ref: "#/components/schemas/v3.Permutation"
          minItems: 0
          type: array
        triggeredCount:
          description: The triggered count.
          format: int64
          minimum: 0
          type: integer
        triggeredPermutationsSamples:
          description: The triggered permutations samples.
          items:
            $ref: "#/components/schemas/v3.Permutation"
          minItems: 0
          type: array
      title: Alert event statistics data structure
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetAlertEventResponse:
      oneOf:
      - $ref: "#/components/schemas/GetAlertEventResponseMultiplePermutation"
      - $ref: "#/components/schemas/GetAlertEventResponseSinglePermutation"
    GetAlertEventResponseMultiplePermutation:
      description: Response containing the details of an alert event.
      example:
        pagination:
          totalSize: 0
          nextPageToken: nextPageToken
        multiplePermutation:
          alertEventMultiplePermutation:
          - preGroupingEventId: preGroupingEventId
            incidentCorrelationKey: incidentCorrelationKey
            groupLabels:
              key: groupLabels
            payloadType: payloadType
            payload: "{}"
            alertId: alertId
            activityAnalysis:
              rules:
              - rules
              - rules
              status: ACTIVITY_ANALYSIS_STATUS_ACTIVATE_OR_UNSPECIFIED
            permutationLabels:
              key: permutationLabels
            permutationId: permutationId
            status: ALERT_STATUS_RESOLVED_OR_UNSPECIFIED
            timestamp: 2000-01-23T04:56:07.000+00:00
          - preGroupingEventId: preGroupingEventId
            incidentCorrelationKey: incidentCorrelationKey
            groupLabels:
              key: groupLabels
            payloadType: payloadType
            payload: "{}"
            alertId: alertId
            activityAnalysis:
              rules:
              - rules
              - rules
              status: ACTIVITY_ANALYSIS_STATUS_ACTIVATE_OR_UNSPECIFIED
            permutationLabels:
              key: permutationLabels
            permutationId: permutationId
            status: ALERT_STATUS_RESOLVED_OR_UNSPECIFIED
            timestamp: 2000-01-23T04:56:07.000+00:00
        id: id
      externalDocs:
        url: ""
      properties:
        id:
          description: Unique identifier of the alert event.
          minLength: 0
          type: string
        multiplePermutation:
          $ref: "#/components/schemas/AlertEventMultiplePermutation"
        pagination:
          $ref: "#/components/schemas/alerts.v3.PaginationResponse"
      required:
      - multiplePermutation
      title: Get alert event response
      type: object
    GetAlertEventResponseSinglePermutation:
      description: Response containing the details of an alert event.
      externalDocs:
        url: ""
      properties:
        id:
          description: Unique identifier of the alert event.
          minLength: 0
          type: string
        pagination:
          $ref: "#/components/schemas/alerts.v3.PaginationResponse"
        singlePermutation:
          $ref: "#/components/schemas/AlertEvent"
      required:
      - singlePermutation
      title: Get alert event response
      type: object
    GetAlertEventStatsResponse:
      description: Response containing statistical data for alert events.
      example:
        eventsStats:
          key:
            resolvedPermutationsSamples:
            - permutationLabels:
                key: permutationLabels
            - permutationLabels:
                key: permutationLabels
            activityAnalysisStats:
              isMutedCount: 0
              rules:
              - rules
              - rules
            triggeredCount: 0
            count: 0
            triggeredPermutationsSamples:
            - permutationLabels:
                key: permutationLabels
            - permutationLabels:
                key: permutationLabels
            resolvedCount: 0
      externalDocs:
        url: ""
      properties:
        eventsStats:
          additionalProperties:
            $ref: "#/components/schemas/EventStats"
          description: The events stats.
          type: object
      title: Get alert event statistics response
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    OrderByAlertEventDirection:
      description: Order by alert event direction.
      enum:
      - ORDER_BY_ALERT_EVENT_DIRECTION_UNSPECIFIED
      - ORDER_BY_ALERT_EVENT_DIRECTION_ASC
      - ORDER_BY_ALERT_EVENT_DIRECTION_DESC
      type: string
    OrderByAlertEventFields:
      description: Order by alert event fields.
      enum:
      - ORDER_BY_ALERT_EVENT_FIELDS_UNSPECIFIED
      - ORDER_BY_ALERT_EVENT_FIELDS_TIMESTAMP
      type: string
    alerts.v3.PaginationResponse:
      description: Pagination response.
      example:
        totalSize: 0
        nextPageToken: nextPageToken
      externalDocs:
        url: ""
      properties:
        nextPageToken:
          description: Token for fetching the next page of results.
          minLength: 0
          type: string
        totalSize:
          description: Total number of results.
          format: int64
          minimum: 0
          type: integer
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    v3.Permutation:
      example:
        permutationLabels:
          key: permutationLabels
      externalDocs:
        url: ""
      properties:
        permutationLabels:
          additionalProperties:
            minLength: 0
            type: string
          description: Labels for the permutation.
          type: object
      title: Permutation data structure
      type: object
    AlertEventService_GetAlertEventsStats_order_bys_parameter_inner:
      properties:
        direction:
          $ref: "#/components/schemas/OrderByAlertEventDirection"
        fieldName:
          $ref: "#/components/schemas/OrderByAlertEventFields"
      type: object
    AlertEventService_GetAlertEvent_pagination_parameter:
      properties:
        pageSize:
          description: Page size.
          format: int64
          minimum: 0
          type: integer
        pageToken:
          description: The page token.
          minLength: 0
          type: string
      type: object
