openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /ai/custom-evaluations/v3:
    get:
      description: Lists all custom evaluations defined in the catalog.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_GetCustomEvaluations
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - applicationIds:
                  - 175677d1-fc90-4a89-9e35-0590b188ebb2
                  config:
                    examples:
                    - conversation: "User: is our product better than CompetitorY?"
                      score: "1"
                    instructions: Flag the response if it mentions a competitor.
                    policyType: quality
                    safe: No competitor mentioned
                    shouldIncludeSystemPrompt: false
                    violates: Mentions a competitor
                  description: Flags competitor references in responses.
                  id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
                  name: No competitor mentions
              schema:
                $ref: "#/components/schemas/GetCustomEvaluationsResponse"
          description: ""
      summary: List custom evaluations
      tags:
      - AI Evaluations Service
    post:
      description: Creates a new custom evaluation in the catalog.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_CreateCustomEvaluation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiEvaluationsService_CreateCustomEvaluation_request"
      responses:
        "200":
          content:
            application/json:
              example:
                item:
                  applicationIds:
                  - 175677d1-fc90-4a89-9e35-0590b188ebb2
                  config:
                    examples:
                    - conversation: "User: is our product better than CompetitorY?"
                      score: "1"
                    instructions: Flag the response if it mentions a competitor.
                    policyType: quality
                    safe: No competitor mentioned
                    shouldIncludeSystemPrompt: false
                    violates: Mentions a competitor
                  description: Flags competitor references in responses.
                  id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
                  name: No competitor mentions
              schema:
                $ref: "#/components/schemas/CreateCustomEvaluationResponse"
          description: ""
        "201":
          content:
            application/json:
              example:
                item:
                  applicationIds:
                  - 175677d1-fc90-4a89-9e35-0590b188ebb2
                  config:
                    examples:
                    - conversation: "User: is our product better than CompetitorY?"
                      score: "1"
                    instructions: Flag the response if it mentions a competitor.
                    policyType: quality
                    safe: No competitor mentioned
                    shouldIncludeSystemPrompt: false
                    violates: Mentions a competitor
                  description: Flags competitor references in responses.
                  id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
                  name: No competitor mentions
              schema:
                $ref: "#/components/schemas/CreateCustomEvaluationResponse"
          description: Custom evaluation created
      summary: Create custom evaluation
      tags:
      - AI Evaluations Service
  /ai/custom-evaluations/v3/by-application/{application_id}:
    get:
      description: Lists custom evaluations linked to a specific AI application.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_ListCustomEvaluationsForApplication
      parameters:
      - description: Unique identifier of the AI application.
        explode: false
        in: path
        name: application_id
        required: true
        schema:
          description: Unique identifier of the AI application.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - applicationIds:
                  - 175677d1-fc90-4a89-9e35-0590b188ebb2
                  config:
                    examples:
                    - conversation: "User: is our product better than CompetitorY?"
                      score: "1"
                    instructions: Flag the response if it mentions a competitor.
                    policyType: quality
                    safe: No competitor mentioned
                    shouldIncludeSystemPrompt: false
                    violates: Mentions a competitor
                  description: Flags competitor references in responses.
                  id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
                  name: No competitor mentions
              schema:
                $ref: "#/components/schemas/ListCustomEvaluationsForApplicationResponse"
          description: ""
      summary: List custom evaluations for application
      tags:
      - AI Evaluations Service
  /ai/custom-evaluations/v3/{id}:
    delete:
      description: Deletes a custom evaluation from the catalog.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_DeleteCustomEvaluation
      parameters:
      - description: Unique identifier of the custom evaluation to delete.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the custom evaluation to delete.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
              schema:
                $ref: "#/components/schemas/DeleteCustomEvaluationResponse"
          description: ""
      summary: Delete custom evaluation
      tags:
      - AI Evaluations Service
    patch:
      description: Updates one or more fields of an existing custom evaluation.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_UpdateCustomEvaluation
      parameters:
      - description: Unique identifier of the custom evaluation to update.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the custom evaluation to update.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiEvaluationsService_UpdateCustomEvaluation_request"
      responses:
        "200":
          content:
            application/json:
              example:
                item:
                  applicationIds:
                  - 175677d1-fc90-4a89-9e35-0590b188ebb2
                  config:
                    examples:
                    - conversation: "User: is our product better than CompetitorY?"
                      score: "1"
                    instructions: Flag the response if it mentions a competitor.
                    policyType: quality
                    safe: No competitor mentioned
                    shouldIncludeSystemPrompt: false
                    violates: Mentions a competitor
                  description: Flags competitor references in responses.
                  id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
                  name: No competitor mentions
              schema:
                $ref: "#/components/schemas/UpdateCustomEvaluationResponse"
          description: ""
      summary: Update custom evaluation
      tags:
      - AI Evaluations Service
  /ai/custom-evaluations/v3/{id}/applications/{application_id}:
    delete:
      description: Removes the association between a custom evaluation and an AI application.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_UnlinkCustomEvaluationFromApp
      parameters:
      - description: Unique identifier of the custom evaluation.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the custom evaluation.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      - description: Unique identifier of the AI application to unlink from.
        explode: false
        in: path
        name: application_id
        required: true
        schema:
          description: Unique identifier of the AI application to unlink from.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                applicationId: 175677d1-fc90-4a89-9e35-0590b188ebb2
                id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
              schema:
                $ref: "#/components/schemas/UnlinkCustomEvaluationFromAppResponse"
          description: ""
      summary: Unlink custom evaluation from application
      tags:
      - AI Evaluations Service
    post:
      description: Associates a custom evaluation with an AI application.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_LinkCustomEvaluation
      parameters:
      - description: Unique identifier of the custom evaluation.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the custom evaluation.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      - description: Unique identifier of the AI application to link to.
        explode: false
        in: path
        name: application_id
        required: true
        schema:
          description: Unique identifier of the AI application to link to.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                applicationId: 175677d1-fc90-4a89-9e35-0590b188ebb2
                id: 3a9b8c7d-6e5f-4a3b-2c1d-0e9f8a7b6c5d
              schema:
                $ref: "#/components/schemas/LinkCustomEvaluationResponse"
          description: ""
      summary: Link custom evaluation to application
      tags:
      - AI Evaluations Service
  /ai/evaluation-counts/v3/per-type:
    get:
      description: Returns the count of AI applications grouped by evaluation type.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_CountAiAppsPerEvalType
      responses:
        "200":
          content:
            application/json:
              example:
                counts:
                  PII: 3
                  PROMPT_INJECTION: 1
                  TOXICITY: 0
              schema:
                $ref: "#/components/schemas/CountAiAppsPerEvalTypeResponse"
          description: ""
      summary: Count applications per evaluation type
      tags:
      - AI Evaluations Service
  /ai/evaluations/v3:
    get:
      description: "Lists AI evaluations, optionally filtered by application, subsystem,\
        \ or evaluation type."
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_ListAiEvaluations
      parameters:
      - description: Filter by application name.
        explode: true
        in: query
        name: application
        required: false
        schema:
          description: Filter by application name.
          maxLength: 256
          minLength: 1
          pattern: "^[\\s\\S]+$"
          type: string
        style: form
      - description: Filter by subsystem.
        explode: true
        in: query
        name: subsystem
        required: false
        schema:
          description: Filter by subsystem.
          maxLength: 256
          minLength: 1
          pattern: "^[\\s\\S]+$"
          type: string
        style: form
      - description: Filter by evaluation type.
        explode: true
        in: query
        name: evaluation_type
        required: false
        schema:
          $ref: "#/components/schemas/EvaluationType"
        style: form
      - description: Number of items per page. Default 200 if omitted.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          description: Number of items per page. Default 200 if omitted.
          format: int32
          maximum: 1000
          minimum: 1
          type: integer
        style: form
      - description: Zero-based page offset. Default 0 if omitted.
        explode: true
        in: query
        name: page_offset
        required: false
        schema:
          description: Zero-based page offset. Default 0 if omitted.
          format: int64
          maximum: 10000
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                aiEvaluations:
                - application: checkout
                  companyId: "12345"
                  config:
                    competition: {}
                  createdAt: 2026-06-02T15:30:00.000Z
                  createdBy: 7b1c0e2a-3d4f-5a6b-8c9d-0e1f2a3b4c5d
                  id: 9d4f7c1a-2b3e-4f5a-8c1d-6e2f9a0b1c2d
                  isEnabled: true
                  subsystem: api
                  target: RESPONSE
                  threshold: 0.7
                  updatedAt: 2026-06-02T15:35:00.000Z
              schema:
                $ref: "#/components/schemas/ListAiEvaluationsResponse"
          description: ""
      summary: List AI evaluations
      tags:
      - AI Evaluations Service
    post:
      description: Creates a new AI evaluation for an application.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_CreateAiEvaluation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiEvaluationsService_CreateAiEvaluation_request"
      responses:
        "200":
          content:
            application/json:
              example:
                aiEvaluation:
                  application: checkout
                  companyId: "12345"
                  config:
                    competition: {}
                  createdAt: 2026-06-02T15:30:00.000Z
                  createdBy: 7b1c0e2a-3d4f-5a6b-8c9d-0e1f2a3b4c5d
                  id: 9d4f7c1a-2b3e-4f5a-8c1d-6e2f9a0b1c2d
                  isEnabled: true
                  subsystem: api
                  target: RESPONSE
                  threshold: 0.7
                  updatedAt: 2026-06-02T15:35:00.000Z
              schema:
                $ref: "#/components/schemas/CreateAiEvaluationResponse"
          description: ""
        "201":
          content:
            application/json:
              example:
                aiEvaluation:
                  application: checkout
                  companyId: "12345"
                  config:
                    competition: {}
                  createdAt: 2026-06-02T15:30:00.000Z
                  createdBy: 7b1c0e2a-3d4f-5a6b-8c9d-0e1f2a3b4c5d
                  id: 9d4f7c1a-2b3e-4f5a-8c1d-6e2f9a0b1c2d
                  isEnabled: true
                  subsystem: api
                  target: RESPONSE
                  threshold: 0.7
                  updatedAt: 2026-06-02T15:35:00.000Z
              schema:
                $ref: "#/components/schemas/CreateAiEvaluationResponse"
          description: AI evaluation created
      summary: Create AI evaluation
      tags:
      - AI Evaluations Service
  /ai/evaluations/v3/{id}:
    delete:
      description: Deletes an AI evaluation by its unique identifier.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_DeleteAiEvaluation
      parameters:
      - description: Unique identifier of the AI evaluation to delete.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the AI evaluation to delete.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                id: 9d4f7c1a-2b3e-4f5a-8c1d-6e2f9a0b1c2d
              schema:
                $ref: "#/components/schemas/DeleteAiEvaluationResponse"
          description: ""
      summary: Delete AI evaluation
      tags:
      - AI Evaluations Service
    get:
      description: Gets an AI evaluation by its unique identifier.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_GetAiEvaluation
      parameters:
      - description: Unique identifier of the AI evaluation.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the AI evaluation.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                aiEvaluation:
                  application: checkout
                  companyId: "12345"
                  config:
                    competition: {}
                  createdAt: 2026-06-02T15:30:00.000Z
                  createdBy: 7b1c0e2a-3d4f-5a6b-8c9d-0e1f2a3b4c5d
                  id: 9d4f7c1a-2b3e-4f5a-8c1d-6e2f9a0b1c2d
                  isEnabled: true
                  subsystem: api
                  target: RESPONSE
                  threshold: 0.7
                  updatedAt: 2026-06-02T15:35:00.000Z
              schema:
                $ref: "#/components/schemas/GetAiEvaluationResponse"
          description: ""
      summary: Get AI evaluation
      tags:
      - AI Evaluations Service
    patch:
      description: Updates one or more fields of an existing AI evaluation.
      externalDocs:
        url: ""
      operationId: AiEvaluationsService_UpdateAiEvaluation
      parameters:
      - description: Unique identifier of the AI evaluation to update.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the AI evaluation to update.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiEvaluationsService_UpdateAiEvaluation_request"
      responses:
        "200":
          content:
            application/json:
              example:
                aiEvaluation:
                  application: checkout
                  companyId: "12345"
                  config:
                    competition: {}
                  createdAt: 2026-06-02T15:30:00.000Z
                  createdBy: 7b1c0e2a-3d4f-5a6b-8c9d-0e1f2a3b4c5d
                  id: 9d4f7c1a-2b3e-4f5a-8c1d-6e2f9a0b1c2d
                  isEnabled: true
                  subsystem: api
                  target: RESPONSE
                  threshold: 0.7
                  updatedAt: 2026-06-02T15:35:00.000Z
              schema:
                $ref: "#/components/schemas/UpdateAiEvaluationResponse"
          description: ""
      summary: Update AI evaluation
      tags:
      - AI Evaluations Service
components:
  schemas:
    AiEvaluation:
      description: A configured AI evaluation that runs against an AI application's
        spans.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        companyId: companyId
        application: application
        createdBy: createdBy
        isEnabled: true
        subsystem: subsystem
        threshold: 0.08008281904610115
        id: id
        config:
          allowedTopics:
            topics:
            - topics
            - topics
            - topics
            - topics
            - topics
        target: PROMPT
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        application:
          description: Name of the AI application this evaluation belongs to.
          maxLength: 256
          minLength: 1
          pattern: "^[\\s\\S]+$"
          type: string
        companyId:
          description: Company that owns this evaluation.
          maxLength: 256
          minLength: 1
          pattern: "^[\\s\\S]+$"
          type: string
        config:
          $ref: "#/components/schemas/EvaluationConfig"
        createdAt:
          description: RFC3339 timestamp when the evaluation was created.
          format: date-time
          maxLength: 35
          minLength: 20
          type: string
        createdBy:
          description: UUID of the user who created this evaluation. Set automatically
            by the server from the authenticated identity; not provided by the client.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        id:
          description: Unique identifier of the AI evaluation.
          maxLength: 36
          minLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        isEnabled:
          description: Whether the evaluation is currently active.
          type: boolean
        subsystem:
          description: Subsystem within the application.
          maxLength: 256
          minLength: 1
          pattern: "^[\\s\\S]+$"
          type: string
        target:
          $ref: "#/components/schemas/EvaluationTarget"
        threshold:
          description: Score threshold. Must be between 0.0 and 1.0 inclusive.
          format: double
          maximum: 1
          minimum: 0
          type: number
        updatedAt:
          description: RFC3339 timestamp when the evaluation was last updated.
          format: date-time
          maxLength: 35
          minLength: 20
          type: string
      type: object
    AllowedTopicsConfig:
      description: Configuration for the AllowedTopics evaluation.
      example:
        topics:
        - topics
        - topics
        - topics
        - topics
        - topics
      externalDocs:
        url: ""
      properties:
        topics:
          description: Topics considered allowed.
          items:
            description: Topics considered allowed.
            maxLength: 256
            minLength: 1
            pattern: "^[\\s\\S]+$"
            type: string
          maxItems: 1024
          minItems: 1
          type: array
      type: object
    CompetitionConfig:
      description: Configuration for the Competition evaluation.
      externalDocs:
        url: ""
      properties:
        competitors:
          description: Competitor names to watch for.
          items:
            description: Competitor names to watch for.
            maxLength: 256
            minLength: 1
            pattern: "^[\\s\\S]+$"
            type: string
          maxItems: 1024
          minItems: 1
          type: array
      type: object
    CountAiAppsPerEvalTypeResponse:
      description: Response containing counts of AI applications per evaluation type.
      example:
        counts:
          key: 0
      externalDocs:
        url: ""
      properties:
        counts:
          additionalProperties:
            format: int64
            minimum: 0
            type: integer
          description: Map of evaluation-type name to count of AI applications using
            it.
          type: object
      type: object
    CreateAiEvaluationResponse:
      description: Response returned after creating an AI evaluation.
      example:
        aiEvaluation:
          createdAt: 2000-01-23T04:56:07.000+00:00
          companyId: companyId
          application: application
          createdBy: createdBy
          isEnabled: true
          subsystem: subsystem
          threshold: 0.08008281904610115
          id: id
          config:
            allowedTopics:
              topics:
              - topics
              - topics
              - topics
              - topics
              - topics
          target: PROMPT
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        aiEvaluation:
          $ref: "#/components/schemas/AiEvaluation"
      type: object
    CreateCustomEvaluationResponse:
      description: Response returned after creating a custom evaluation.
      example:
        item:
          name: name
          description: description
          id: id
          config:
            instructions: instructions
            violates: violates
            examples:
            - score: score
              conversation: conversation
            - score: score
              conversation: conversation
            - score: score
              conversation: conversation
            - score: score
              conversation: conversation
            - score: score
              conversation: conversation
            shouldIncludeSystemPrompt: true
            policyType: policyType
            safe: safe
          applicationIds:
          - applicationIds
          - applicationIds
          - applicationIds
          - applicationIds
          - applicationIds
      externalDocs:
        url: ""
      properties:
        item:
          $ref: "#/components/schemas/CustomEvaluation"
      type: object
    CustomEvaluation:
      description: A custom evaluation defined in the catalog.
      example:
        name: name
        description: description
        id: id
        config:
          instructions: instructions
          violates: violates
          examples:
          - score: score
            conversation: conversation
          - score: score
            conversation: conversation
          - score: score
            conversation: conversation
          - score: score
            conversation: conversation
