openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /recording-rules/recording-rules/v1:
    get:
      description: Returns all recording rule groups for the team.
      externalDocs:
        url: ""
      operationId: RuleGroupSets_List
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleGroupSetListing"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: List Recording Rules
      tags:
      - Recording Rules Service
    post:
      description: Creates a new recording rule group.
      externalDocs:
        url: ""
      operationId: RuleGroupSets_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_Rule_Group_Set"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRuleGroupSetResult"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Create Recording Rules
      tags:
      - Recording Rules Service
  /recording-rules/recording-rules/v1/{id}:
    delete:
      description: Deletes the recording rule group with the specified ID.
      externalDocs:
        url: ""
      operationId: RuleGroupSets_Delete
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Delete Recording Rules
      tags:
      - Recording Rules Service
    get:
      description: Returns the details of the specified recording rule group.
      externalDocs:
        url: ""
      operationId: RuleGroupSets_Fetch
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutRuleGroupSet"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get Recording Rules
      tags:
      - Recording Rules Service
    put:
      description: Updates the specified recording rule group.
      externalDocs:
        url: ""
      operationId: RuleGroupSets_Update
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          minLength: 0
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_Rule_Group_Set"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Update Recording Rules
      tags:
      - Recording Rules Service
components:
  schemas:
    CreateRuleGroupSetResult:
      description: Result of creating a rule group set.
      example:
        id: id
      externalDocs:
        description: Find out more about recording rules
        url: https://coralogix.com/docs/user-guides/data-transformation/metric-rules/recording-rules/
      properties:
        id:
          description: Unique identifier.
          minLength: 0
          type: string
      title: Create Rule Group Set Result
      type: object
    Error:
      description: Standard error response body returned for a failed request.
      example:
        code: 397
        message: message
      properties:
        code:
          description: "HTTP status code of the error (for example 400, 404, 500)."
          format: int32
          maximum: 599
          minimum: 100
          type: integer
        message:
          description: Human-readable description of the error.
          maxLength: 4096
          minLength: 0
          pattern: "^[\\s\\S]*$"
          type: string
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    InRule:
      description: A rule within a group that defines a recording rule expression.
      externalDocs:
        description: Find out more about recording rules
        url: https://coralogix.com/docs/user-guides/data-transformation/metric-rules/recording-rules/
      properties:
        evaluationDelayMs:
          description: The delay in milliseconds before evaluating the recording rule
            expression. Allows late-arriving data to be ingested before evaluation.
          example: 60000
          format: int64
          minimum: 0
          type: integer
        expr:
          description: The expr.
          minLength: 0
          type: string
        labels:
          additionalProperties:
            minLength: 0
            type: string
          description: List of labels.
          type: object
        record:
          description: Record.
          minLength: 0
          type: string
      title: In Rule
      type: object
    InRuleGroup:
      description: A group of recording rules.
      externalDocs:
        description: Find out more about recording rules
        url: https://coralogix.com/docs/user-guides/data-transformation/metric-rules/recording-rules/
      properties:
        id:
          description: Unique identifier.
          minLength: 0
          type: string
        interval:
          description: Interval.
          format: int64
          minimum: 0
          type: integer
        limit:
          description: Limit.
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]+$"
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
        rules:
          description: List of rules.
          items:
            $ref: "#/components/schemas/InRule"
          minItems: 0
          type: array
        version:
          description: Version number.
          format: int64
          minimum: 0
          type: integer
      title: In Rule Group
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    OutRule:
      example:
        lastEvalDurationMs: lastEvalDurationMs
        record: record
        evaluationDelayMs: 0
        expr: expr
        labels:
          key: labels
      properties:
        evaluationDelayMs:
          description: The evaluation delay ms.
          format: int64
          minimum: 0
          type: integer
        expr:
          description: The expr.
          minLength: 0
          type: string
        labels:
          additionalProperties:
            minLength: 0
            type: string
          description: List of labels.
          type: object
        lastEvalDurationMs:
          description: The last eval duration ms.
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]+$"
          type: string
        record:
          description: Record.
          minLength: 0
          type: string
      type: object
    OutRuleGroup:
      example:
        limit: limit
        name: name
        interval: 0
        rules:
        - lastEvalDurationMs: lastEvalDurationMs
          record: record
          evaluationDelayMs: 0
          expr: expr
          labels:
            key: labels
        - lastEvalDurationMs: lastEvalDurationMs
          record: record
          evaluationDelayMs: 0
          expr: expr
          labels:
            key: labels
        id: id
        lastEvalAt: lastEvalAt
        version: 0
      properties:
        id:
          description: Unique identifier.
          minLength: 0
          type: string
        interval:
          description: Interval.
          format: int64
          minimum: 0
          type: integer
        lastEvalAt:
          description: The last eval at.
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]+$"
          type: string
        limit:
          description: Limit.
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]+$"
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
        rules:
          description: List of rules.
          items:
            $ref: "#/components/schemas/OutRule"
          minItems: 0
          type: array
        version:
          description: Version number.
          format: int64
          minimum: 0
          type: integer
      type: object
    OutRuleGroupSet:
      description: An output set of rule groups.
      example:
        name: name
        groups:
        - limit: limit
          name: name
          interval: 0
          rules:
          - lastEvalDurationMs: lastEvalDurationMs
            record: record
            evaluationDelayMs: 0
            expr: expr
            labels:
              key: labels
          - lastEvalDurationMs: lastEvalDurationMs
            record: record
            evaluationDelayMs: 0
            expr: expr
            labels:
              key: labels
          id: id
          lastEvalAt: lastEvalAt
          version: 0
        - limit: limit
          name: name
          interval: 0
          rules:
          - lastEvalDurationMs: lastEvalDurationMs
            record: record
            evaluationDelayMs: 0
            expr: expr
            labels:
              key: labels
          - lastEvalDurationMs: lastEvalDurationMs
            record: record
            evaluationDelayMs: 0
            expr: expr
            labels:
              key: labels
          id: id
          lastEvalAt: lastEvalAt
          version: 0
        id: id
      externalDocs:
        description: Find out more about recording rules
        url: https://coralogix.com/docs/user-guides/data-transformation/metric-rules/recording-rules/
      properties:
        groups:
          description: List of groups.
          items:
            $ref: "#/components/schemas/OutRuleGroup"
          minItems: 0
          type: array
        id:
          description: Unique identifier.
          minLength: 0
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
      title: Out Rule Group Set
      type: object
    RuleGroupSetListing:
      description: A listing of rule group sets.
      example:
        sets:
        - name: name
          groups:
          - limit: limit
            name: name
            interval: 0
            rules:
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            id: id
            lastEvalAt: lastEvalAt
            version: 0
          - limit: limit
            name: name
            interval: 0
            rules:
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            id: id
            lastEvalAt: lastEvalAt
            version: 0
          id: id
        - name: name
          groups:
          - limit: limit
            name: name
            interval: 0
            rules:
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            id: id
            lastEvalAt: lastEvalAt
            version: 0
          - limit: limit
            name: name
            interval: 0
            rules:
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            - lastEvalDurationMs: lastEvalDurationMs
              record: record
              evaluationDelayMs: 0
              expr: expr
              labels:
                key: labels
            id: id
            lastEvalAt: lastEvalAt
            version: 0
          id: id
      externalDocs:
        description: Find out more about recording rules
        url: https://coralogix.com/docs/user-guides/data-transformation/metric-rules/recording-rules/
      properties:
        sets:
          description: The sets.
          items:
            $ref: "#/components/schemas/OutRuleGroupSet"
          minItems: 0
          type: array
      title: Rule Group Set Listing
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    Create_Rule_Group_Set:
      description: A set of rule groups to create.
      properties:
        groups:
          description: List of groups.
          items:
            $ref: "#/components/schemas/InRuleGroup"
          minItems: 0
          type: array
        name:
          description: Display name.
          minLength: 0
          type: string
      title: Create Rule Group Set
      type: object
    Update_Rule_Group_Set:
      description: A set of rule groups to update.
      properties:
        groups:
          description: List of groups.
          items:
            $ref: "#/components/schemas/InRuleGroup"
          minItems: 0
          type: array
        name:
          description: Display name.
          minLength: 0
          type: string
      title: Update Rule Group Set
      type: object
