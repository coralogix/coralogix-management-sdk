    "/dataplans/data-usage/v2/logs/count": {
      "get": {
        "tags": [
          "Data Usage Service"
        ],
        "summary": "Get Logs Count",
        "description": "Returns the log ingestion count for the team.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "DataUsageService_GetLogsCount",
        "parameters": [
          {
            "in": "query",
            "name": "date_range",
            "description": "Date interval to query log ingestion counts over.",
            "schema": {
              "externalDocs": {
                "description": "Find out more about data usage.",
                "url": "https://coralogix.com/docs/user-guides/account-management/payment-and-billing/data-usage/"
              },
              "title": "Date Range",
              "description": "This data structure represents a date range.",
              "type": "object",
              "properties": {
                "fromDate": {
                  "example": "2021-01-01T00:00:00Z",
                  "description": "The from date.",
                  "type": "string",
                  "format": "date-time",
                  "minLength": 0
                },
                "toDate": {
                  "example": "2021-01-01T00:00:00Z",
                  "description": "The to date.",
                  "type": "string",
                  "format": "date-time",
                  "minLength": 0
                }
              }
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "resolution",
            "description": "Aggregation resolution with second precision. Must be between 1 second and the date_range interval.",
            "schema": {
              "description": "Aggregation resolution with second precision. Must be between 1 second and the date_range interval.",
              "type": "string",
              "minLength": 0
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "filters",
            "description": "Optional scope filter that restricts results to the listed applications and subsystems (full match).",
            "schema": {
              "externalDocs": {
                "description": "Find out more about data usage.",
                "url": "https://coralogix.com/docs/user-guides/account-management/payment-and-billing/data-usage/"
              },
              "title": "Scopes Filter",
              "description": "This data structure represents a filter for scopes.",
              "type": "object",
              "properties": {
                "application": {
                  "description": "List of application names to filter on (OR logic, full match).",
                  "type": "array",
                  "items": {
                    "example": "application1",
                    "description": "List of application names to filter on (OR logic, full match).",
                    "type": "string",
                    "minLength": 0
                  },
                  "minItems": 0
                },
                "subsystem": {
                  "description": "List of subsystem names to filter on (OR logic, full match).",
                  "type": "array",
                  "items": {
                    "example": "subsystem1",
                    "description": "List of subsystem names to filter on (OR logic, full match).",
                    "type": "string",
                    "minLength": 0
                  },
                  "minItems": 0
                }
              }
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "subsystem_aggregation",
            "description": "When true, aggregate the returned counts by subsystem name.",
            "schema": {
              "description": "When true, aggregate the returned counts by subsystem name.",
              "type": "boolean"
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "application_aggregation",
            "description": "When true, aggregate the returned counts by application name.",
            "schema": {
              "description": "When true, aggregate the returned counts by application name.",
              "type": "boolean"
            },
            "style": "form"
          }
        ],
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/GetLogsCountResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
