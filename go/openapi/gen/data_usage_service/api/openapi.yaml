openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /dataplans/data-usage/v2:
    get:
      description: Returns data usage summary for the team.
      externalDocs:
        url: ""
      operationId: DataUsageService_GetDataUsage
      parameters:
      - description: Date interval to query data usage over.
        explode: true
        in: query
        name: date_range
        required: false
        schema:
          $ref: "#/components/schemas/Date_Range"
        style: form
      - description: Aggregation resolution. Minimum supported value is 1h. Must be
          between 1 hour and the date_range interval.
        explode: true
        in: query
        name: resolution
        required: false
        schema:
          description: Aggregation resolution. Minimum supported value is 1h. Must
            be between 1 hour and the date_range interval.
          minLength: 0
          type: string
        style: form
      - description: List of fields to aggregate results by (for example pillar and
          priority).
        explode: true
        in: query
        name: aggregate
        required: false
        schema:
          description: List of fields to aggregate results by (for example pillar
            and priority).
          items:
            $ref: "#/components/schemas/AggregateBy"
          minItems: 0
          type: array
        style: form
      - description: Dimensions to filter results by; only entries that contain all
          listed dimensions are returned.
        explode: true
        in: query
        name: dimension_filters
        required: false
        schema:
          description: Dimensions to filter results by; only entries that contain
            all listed dimensions are returned.
          items:
            $ref: "#/components/schemas/DataUsageService_GetDataUsage_dimension_filters_parameter_inner"
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataUsageResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Data Usage
      tags:
      - Data Usage Service
  /dataplans/data-usage/v2/daily/evaluation-tokens:
    post:
      description: Returns daily evaluation token usage data for the specified period.
      externalDocs:
        url: ""
      operationId: DataUsageService_GetDailyUsageEvaluationTokens
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataUsageService_GetDailyUsageEvaluationTokens_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDailyUsageEvaluationTokensResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Daily Usage Evaluation Tokens
      tags:
      - Data Usage Service
  /dataplans/data-usage/v2/daily/processed-gbs:
    post:
      description: Returns daily processed gigabytes usage data for the specified
        period.
      externalDocs:
        url: ""
      operationId: DataUsageService_GetDailyUsageProcessedGbs
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataUsageService_GetDailyUsageProcessedGbs_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDailyUsageProcessedGbsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Daily Usage Processed GBs
      tags:
      - Data Usage Service
  /dataplans/data-usage/v2/daily/units:
    post:
      description: Returns daily units usage data for the specified period.
      externalDocs:
        url: ""
      operationId: DataUsageService_GetDailyUsageUnits
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataUsageService_GetDailyUsageUnits_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDailyUsageUnitsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Daily Usage Units
      tags:
      - Data Usage Service
  /dataplans/data-usage/v2/export-status:
    get:
      description: Returns the current export status for data usage.
      externalDocs:
        url: ""
      operationId: DataUsageService_GetDataUsageMetricsExportStatus
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataUsageMetricsExportStatusResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Data Usage Metrics Export Status
      tags:
      - Data Usage Service
    post:
      description: Triggers a data usage export.
      externalDocs:
        url: ""
      operationId: DataUsageService_UpdateDataUsageMetricsExportStatus
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_Data_Usage_Metrics_Export_Status_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataUsageMetricsExportStatusResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Update Data Usage Metrics Export Status
      tags:
      - Data Usage Service
  /dataplans/data-usage/v2/logs/count:
    get:
      description: Returns the log ingestion count for the team.
      externalDocs:
        url: ""
      operationId: DataUsageService_GetLogsCount
      parameters:
      - description: Date interval to query log ingestion counts over.
        explode: true
        in: query
        name: date_range
        required: false
        schema:
          $ref: "#/components/schemas/Date_Range"
        style: form
      - description: Aggregation resolution with second precision. Must be between
          1 second and the date_range interval.
        explode: true
        in: query
        name: resolution
        required: false
        schema:
          description: Aggregation resolution with second precision. Must be between
            1 second and the date_range interval.
          minLength: 0
          type: string
        style: form
      - description: Optional scope filter that restricts results to the listed applications
          and subsystems (full match).
        explode: true
        in: query
        name: filters
        required: false
        schema:
          $ref: "#/components/schemas/Scopes_Filter"
        style: form
      - description: "When true, aggregate the returned counts by subsystem name."
        explode: true
        in: query
        name: subsystem_aggregation
        required: false
        schema:
          description: "When true, aggregate the returned counts by subsystem name."
          type: boolean
        style: form
      - description: "When true, aggregate the returned counts by application name."
        explode: true
        in: query
        name: application_aggregation
        required: false
        schema:
          description: "When true, aggregate the returned counts by application name."
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLogsCountResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Logs Count
      tags:
      - Data Usage Service
  /dataplans/data-usage/v2/spans/count:
    get:
      description: Returns the span ingestion count for the team.
      externalDocs:
        url: ""
      operationId: DataUsageService_GetSpansCount
      parameters:
      - description: Date interval to query span ingestion counts over.
        explode: true
        in: query
        name: date_range
        required: false
        schema:
          $ref: "#/components/schemas/Date_Range"
        style: form
      - description: Aggregation resolution with second precision. Must be between
          1 second and the date_range interval.
        explode: true
        in: query
        name: resolution
        required: false
        schema:
          description: Aggregation resolution with second precision. Must be between
            1 second and the date_range interval.
          minLength: 0
          type: string
        style: form
      - description: Optional scope filter that restricts results to the listed applications
          and subsystems (full match).
        explode: true
        in: query
        name: filters
        required: false
        schema:
          $ref: "#/components/schemas/Scopes_Filter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSpansCountResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Spans Count
      tags:
      - Data Usage Service
components:
  schemas:
    AggregateBy:
      enum:
      - AGGREGATE_BY_UNSPECIFIED
      - AGGREGATE_BY_APPLICATION
      - AGGREGATE_BY_SUBSYSTEM
      - AGGREGATE_BY_PILLAR
      - AGGREGATE_BY_PRIORITY
      - AGGREGATE_BY_POLICY_NAME
      - AGGREGATE_BY_SEVERITY
      type: string
    DataUsageEntry:
      description: This data structure represents a data usage entry.
      example:
        sizeGb: 0.8008282
        units: 6.0274563
        dimensions:
        - genericDimension:
            value: value
            key: key
        - genericDimension:
            value: value
            key: key
        timestamp: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Find out more about data usage.
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/data-usage/
      properties:
        dimensions:
          description: The dimensions.
          items:
            $ref: "#/components/schemas/Dimension"
          minItems: 0
          type: array
        sizeGb:
          description: The size gb.
          format: float
          type: number
        timestamp:
          description: Timestamp.
          format: date-time
          minLength: 0
          type: string
        units:
          description: The units.
          format: float
          type: number
      title: Data Usage Entry
      type: object
    DetailedDailyEvaluationTokens:
      example:
        evaluations:
        - evaluationTokens:
            value: 0.8008282
          evaluatorName: evaluatorName
        - evaluationTokens:
            value: 0.8008282
          evaluatorName: evaluatorName
        statsDate: 2000-01-23T04:56:07.000+00:00
        totalTokens:
          value: 0.8008282
      properties:
        evaluations:
          description: The evaluations.
          items:
            $ref: "#/components/schemas/Evaluation"
          minItems: 0
          type: array
        statsDate:
          description: The stats date.
          format: date-time
          minLength: 0
          type: string
        totalTokens:
          $ref: "#/components/schemas/Token"
      type: object
    DetailedDailyProcessedGbs:
      example:
        blockedMetricsGbs:
          value: 0.8008282
        highMetricsGbs:
          value: 0.8008282
        totalGbs:
          value: 0.8008282
        statsDate: 2000-01-23T04:56:07.000+00:00
        highLogsGbs:
          value: 0.8008282
        highTracingGbs:
          value: 0.8008282
        lowSessionRecordingGbs:
          value: 0.8008282
        lowLogsGbs:
          value: 0.8008282
        cpuProfilesGbs:
          value: 0.8008282
        mediumLogsGbs:
          value: 0.8008282
        blockedGbs:
          value: 0.8008282
        lowTracingGbs:
          value: 0.8008282
        mediumTracingGbs:
          value: 0.8008282
      properties:
        blockedGbs:
          $ref: "#/components/schemas/v2.GB"
        blockedMetricsGbs:
          $ref: "#/components/schemas/v2.GB"
        cpuProfilesGbs:
          $ref: "#/components/schemas/v2.GB"
        highLogsGbs:
          $ref: "#/components/schemas/v2.GB"
        highMetricsGbs:
          $ref: "#/components/schemas/v2.GB"
        highTracingGbs:
          $ref: "#/components/schemas/v2.GB"
        lowLogsGbs:
          $ref: "#/components/schemas/v2.GB"
        lowSessionRecordingGbs:
          $ref: "#/components/schemas/v2.GB"
        lowTracingGbs:
          $ref: "#/components/schemas/v2.GB"
        mediumLogsGbs:
          $ref: "#/components/schemas/v2.GB"
        mediumTracingGbs:
          $ref: "#/components/schemas/v2.GB"
        statsDate:
          description: The stats date.
          format: date-time
          minLength: 0
          type: string
        totalGbs:
          $ref: "#/components/schemas/v2.GB"
      type: object
    DetailedDailyUnits:
      example:
        statsDate: 2000-01-23T04:56:07.000+00:00
        blockedUnits:
          value: 0.8008282
        highMetricsUnits:
          value: 0.8008282
        totalUnits:
          value: 0.8008282
        evaluationUnits:
          value: 0.8008282
        highLogsUnits:
          value: 0.8008282
        lowTracingUnits:
          value: 0.8008282
        mediumLogsUnits:
          value: 0.8008282
        blockedMetricsUnits:
          value: 0.8008282
        cpuProfilesUnits:
          value: 0.8008282
        highTracingUnits:
          value: 0.8008282
        lowLogsUnits:
          value: 0.8008282
        mediumTracingUnits:
          value: 0.8008282
        lowSessionRecordingUnits:
          value: 0.8008282
      properties:
        blockedMetricsUnits:
          $ref: "#/components/schemas/v2.Unit"
        blockedUnits:
          $ref: "#/components/schemas/v2.Unit"
        cpuProfilesUnits:
          $ref: "#/components/schemas/v2.Unit"
        evaluationUnits:
          $ref: "#/components/schemas/v2.Unit"
        highLogsUnits:
          $ref: "#/components/schemas/v2.Unit"
        highMetricsUnits:
          $ref: "#/components/schemas/v2.Unit"
        highTracingUnits:
          $ref: "#/components/schemas/v2.Unit"
        lowLogsUnits:
          $ref: "#/components/schemas/v2.Unit"
        lowSessionRecordingUnits:
          $ref: "#/components/schemas/v2.Unit"
        lowTracingUnits:
          $ref: "#/components/schemas/v2.Unit"
        mediumLogsUnits:
          $ref: "#/components/schemas/v2.Unit"
        mediumTracingUnits:
          $ref: "#/components/schemas/v2.Unit"
        statsDate:
          description: The stats date.
          format: date-time
          minLength: 0
          type: string
        totalUnits:
          $ref: "#/components/schemas/v2.Unit"
      type: object
    Dimension:
      oneOf:
      - $ref: "#/components/schemas/DimensionGenericDimension"
      - $ref: "#/components/schemas/DimensionPillar"
      - $ref: "#/components/schemas/DimensionPriority"
      - $ref: "#/components/schemas/DimensionSeverity"
      - $ref: "#/components/schemas/DimensionTier"
    DimensionGenericDimension:
      example:
        genericDimension:
          value: value
          key: key
      properties:
        genericDimension:
          $ref: "#/components/schemas/GenericDimension"
      required:
      - genericDimension
      type: object
    DimensionPillar:
      properties:
        pillar:
          $ref: "#/components/schemas/v2.Pillar"
      required:
      - pillar
      type: object
    DimensionPriority:
      properties:
        priority:
          $ref: "#/components/schemas/v2.Priority"
      required:
      - priority
      type: object
    DimensionSeverity:
      properties:
        severity:
          $ref: "#/components/schemas/datausage.v2.Severity"
      required:
      - severity
      type: object
    DimensionTier:
      properties:
        tier:
          $ref: "#/components/schemas/v2.TcoTier"
      required:
      - tier
      type: object
    Evaluation:
      example:
        evaluationTokens:
          value: 0.8008282
        evaluatorName: evaluatorName
      properties:
        evaluationTokens:
          $ref: "#/components/schemas/Token"
        evaluatorName:
          description: The evaluator name.
          minLength: 0
          type: string
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GenericDimension:
      description: This data structure represents a generic dimension.
      example:
        value: value
        key: key
      externalDocs:
        description: Find out more about data usage.
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/data-usage/
      properties:
        key:
          description: The key.
          example: key
          minLength: 0
          type: string
        value:
          description: The value.
          example: value
          minLength: 0
          type: string
      title: Generic Dimension
      type: object
    GetDailyUsageEvaluationTokensRequestDateRange:
      description: Request for daily evaluation token usage data for the specified
        period.
      externalDocs:
        url: ""
      properties:
        dateRange:
          $ref: "#/components/schemas/v2.DateRange"
      required:
      - dateRange
      type: object
    GetDailyUsageEvaluationTokensRequestRange:
      description: Request for daily evaluation token usage data for the specified
