    GetDailyUsageEvaluationTokensResponse:
      description: Response containing daily evaluation token usage data.
      example:
        tokens:
        - evaluations:
          - evaluationTokens:
              value: 0.8008282
            evaluatorName: evaluatorName
          - evaluationTokens:
              value: 0.8008282
            evaluatorName: evaluatorName
          statsDate: 2000-01-23T04:56:07.000+00:00
          totalTokens:
            value: 0.8008282
        - evaluations:
          - evaluationTokens:
              value: 0.8008282
            evaluatorName: evaluatorName
          - evaluationTokens:
              value: 0.8008282
            evaluatorName: evaluatorName
          statsDate: 2000-01-23T04:56:07.000+00:00
          totalTokens:
            value: 0.8008282
      externalDocs:
        url: ""
      properties:
        tokens:
          description: List of tokens.
          items:
            $ref: "#/components/schemas/DetailedDailyEvaluationTokens"
