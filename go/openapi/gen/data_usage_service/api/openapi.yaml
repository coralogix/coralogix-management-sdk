  "paths": {
    "/dataplans/data-usage/v2": {
      "get": {
        "tags": [
          "Data Usage Service"
        ],
        "summary": "Get Data Usage",
        "description": "Returns data usage summary for the team.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "DataUsageService_GetDataUsage",
        "parameters": [
          {
            "in": "query",
            "name": "date_range",
            "description": "Date interval to query data usage over.",
            "schema": {
              "externalDocs": {
                "description": "Find out more about data usage.",
                "url": "https://coralogix.com/docs/user-guides/account-management/payment-and-billing/data-usage/"
              },
              "title": "Date Range",
              "description": "This data structure represents a date range.",
              "type": "object",
              "properties": {
                "fromDate": {
                  "example": "2021-01-01T00:00:00Z",
                  "description": "The from date.",
                  "type": "string",
                  "format": "date-time",
                  "minLength": 0
                },
                "toDate": {
                  "example": "2021-01-01T00:00:00Z",
                  "description": "The to date.",
                  "type": "string",
                  "format": "date-time",
                  "minLength": 0
                }
              }
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "resolution",
            "description": "Aggregation resolution. Minimum supported value is 1h. Must be between 1 hour and the date_range interval.",
            "schema": {
              "description": "Aggregation resolution. Minimum supported value is 1h. Must be between 1 hour and the date_range interval.",
              "type": "string",
              "minLength": 0
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "aggregate",
            "description": "List of fields to aggregate results by (for example pillar and priority).",
            "schema": {
              "description": "List of fields to aggregate results by (for example pillar and priority).",
              "type": "array",
              "items": {
                "$ref": "#/components/schemas/AggregateBy"
              },
              "minItems": 0
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "dimension_filters",
            "description": "Dimensions to filter results by; only entries that contain all listed dimensions are returned.",
            "schema": {
              "description": "Dimensions to filter results by; only entries that contain all listed dimensions are returned.",
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "genericDimension": {
                    "externalDocs": {
                      "description": "Find out more about data usage.",
                      "url": "https://coralogix.com/docs/user-guides/account-management/payment-and-billing/data-usage/"
                    },
                    "title": "Generic Dimension",
                    "description": "This data structure represents a generic dimension.",
                    "type": "object",
                    "properties": {
                      "key": {
                        "example": "key",
                        "description": "The key.",
                        "type": "string",
                        "minLength": 0
                      },
                      "value": {
                        "example": "value",
                        "description": "The value.",
                        "type": "string",
                        "minLength": 0
                      }
                    }
                  },
                  "pillar": {
                    "$ref": "#/components/schemas/Pillar"
                  },
                  "priority": {
                    "$ref": "#/components/schemas/v2.Priority"
                  },
                  "severity": {
                    "$ref": "#/components/schemas/datausage.v2.Severity"
                  },
                  "tier": {
                    "$ref": "#/components/schemas/v2.TcoTier"
                  }
                },
                "oneOf": [
                  {
                    "type": "object",
                    "required": [
                      "pillar"
                    ]
                  },
                  {
                    "type": "object",
                    "required": [
                      "genericDimension"
                    ]
                  },
                  {
                    "type": "object",
                    "required": [
                      "tier"
                    ]
                  },
                  {
                    "type": "object",
                    "required": [
                      "severity"
                    ]
                  },
                  {
                    "type": "object",
                    "required": [
                      "priority"
                    ]
                  },
                  {
                    "type": "object",
                    "not": {
                      "anyOf": [
                        {
                          "type": "object",
                          "required": [
                            "pillar"
                          ]
                        },
                        {
                          "type": "object",
                          "required": [
                            "genericDimension"
                          ]
                        },
                        {
                          "type": "object",
                          "required": [
                            "tier"
                          ]
                        },
                        {
                          "type": "object",
                          "required": [
                            "severity"
                          ]
                        },
                        {
                          "type": "object",
                          "required": [
                            "priority"
                          ]
                        }
                      ]
                    }
                  }
                ]
              },
              "minItems": 0
            },
            "style": "form"
          }
        ],
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/GetDataUsageResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      }
    },
