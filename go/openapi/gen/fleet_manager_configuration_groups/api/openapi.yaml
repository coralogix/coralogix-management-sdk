      "put": {
        "tags": [
          "Fleet Manager Configuration Groups"
        ],
        "summary": "Update configuration group",
        "description": "Updates provided fleet-manager configuration group fields and optionally updates the latest family.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "PublicConfigurationGroupService_ReplacePublicConfigurationGroup",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "description": "Request to update a fleet-manager configuration group.",
                "type": "object",
                "properties": {
                  "group": {
                    "externalDocs": {
                      "url": ""
                    },
                    "description": "Fields used to update a fleet-manager configuration group. Omitted optional fields keep their existing values.",
                    "type": "object",
                    "properties": {
                      "description": {
                        "description": "Human-readable description.",
                        "type": "string",
                        "pattern": "^[\\s\\S]*$",
                        "minLength": 0,
                        "maxLength": 4096
                      },
                      "family": {
                        "externalDocs": {
                          "url": ""
                        },
                        "description": "Fields used to update the latest configuration family. Omitted optional fields keep their existing values.",
                        "type": "object",
                        "properties": {
                          "active": {
                            "description": "Whether this family is active.",
                            "type": "boolean"
                          },
                          "collectorVersion": {
                            "description": "Collector semantic version this configuration family targets, without a leading v prefix. The service.version selector must match this value or is added automatically.",
                            "type": "string",
                            "pattern": "^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)(?:-((?:0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(?:\\.(?:0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(?:\\+([0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*))?$",
                            "minLength": 5,
                            "maxLength": 256
                          },
                          "description": {
                            "description": "Human-readable description.",
                            "type": "string",
                            "pattern": "^[\\s\\S]*$",
                            "minLength": 0,
                            "maxLength": 4096
                          },
                          "metadata": {
                            "description": "Metadata stored with this configuration family.",
                            "type": "object",
                            "additionalProperties": {
                              "type": "string",
                              "pattern": "^[\\s\\S]*$",
                              "minLength": 0,
                              "maxLength": 4096
                            }
                          },
                          "remoteConfigurations": {
                            "description": "Remote configurations to use when creating or replacing family content.",
                            "type": "array",
                            "items": {},
                            "minItems": 0,
                            "maxItems": 128
                          }
                        }
                      },
                      "name": {
                        "description": "Display name.",
                        "type": "string",
                        "pattern": "^[\\s\\S]*$",
                        "minLength": 0,
                        "maxLength": 256
                      },
                      "priorityOrder": {
                        "description": "Selection precedence. Higher values win on ties and 0 is the default.",
                        "type": "integer",
                        "format": "int32",
                        "minimum": -2147483648,
                        "maximum": 2147483647
                      },
                      "tags": {
                        "description": "Tags attached to the configuration group.",
                        "type": "array",
                        "items": {
                          "description": "Tags attached to the configuration group.",
                          "type": "string",
                          "pattern": "^[\\s\\S]*$",
                          "minLength": 0,
                          "maxLength": 256
                        },
                        "minItems": 0,
                        "maxItems": 64
                      }
                    }
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ReplacePublicConfigurationGroupResponse"
                },
                "example": {
                  "group": {
                    "description": "Updated collector configuration group.",
                    "families": [],
                    "id": "01975ed4-9c1a-7b3f-8d4e-426614174000",
