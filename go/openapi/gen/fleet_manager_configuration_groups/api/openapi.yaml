            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      },
      "parameters": [
        {
          "in": "path",
          "name": "id",
          "description": "Configuration group UUID v7.",
          "required": true,
          "schema": {
            "description": "Configuration group UUID v7.",
