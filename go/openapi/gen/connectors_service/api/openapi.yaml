openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /notifications/notification-center/v1/connectors:
    get:
      description: Returns notification connectors with optional pagination.
      externalDocs:
        url: ""
      operationId: ConnectorsService_ListConnectors
      parameters:
      - description: Filter connectors by their type.
        explode: true
        in: query
        name: connector_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.ConnectorType"
        style: form
      - description: Filter connectors by the entity type they support.
        explode: true
        in: query
        name: supported_by_entity_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.EntityType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorsResponse"
          description: ""
      summary: List Connectors
      tags:
      - Connectors service
    post:
      description: Creates a new notification connector.
      externalDocs:
        url: ""
      operationId: ConnectorsService_CreateConnector
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_Connector_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectorResponse"
          description: ""
      summary: Create a Connector
      tags:
      - Connectors service
    put:
      description: Updates an existing notification connector.
      externalDocs:
        url: ""
      operationId: ConnectorsService_ReplaceConnector
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_Connector_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceConnectorResponse"
          description: ""
      summary: Replace a Connector
      tags:
      - Connectors service
  /notifications/notification-center/v1/connectors/all/list:
    get:
      description: Returns all notification connectors for the team.
      externalDocs:
        url: ""
      operationId: ConnectorsService_BatchGetConnectors
      parameters:
      - description: The unique identifiers of the connectors to retrieve.
        explode: true
        in: query
        name: connector_ids
        required: false
        schema:
          description: The unique identifiers of the connectors to retrieve.
          example:
          - connector-id-1
          - connector-id-2
          items:
            description: The unique identifiers of the connectors to retrieve.
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetConnectorsResponse"
          description: ""
      summary: Batch Get Connectors
      tags:
      - Connectors service
  /notifications/notification-center/v1/connectors/all/summaries:
    get:
      description: Returns summary information for all notification connectors.
      externalDocs:
        url: ""
      operationId: ConnectorsService_BatchGetConnectorSummaries
      parameters:
      - description: The unique identifiers of the connectors whose summaries to retrieve.
        explode: true
        in: query
        name: connector_ids
        required: false
        schema:
          description: The unique identifiers of the connectors whose summaries to
            retrieve.
          items:
            description: The unique identifiers of the connectors whose summaries
              to retrieve.
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetConnectorSummariesResponse"
          description: ""
      summary: Batch Get Connectors Summaries
      tags:
      - Connectors service
  /notifications/notification-center/v1/connectors/list/summaries:
    get:
      description: Returns a paginated list of notification connector summaries.
      externalDocs:
        url: ""
      operationId: ConnectorsService_ListConnectorSummaries
      parameters:
      - description: Filter connector summaries by their type.
        explode: true
        in: query
        name: connector_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.ConnectorType"
        style: form
      - description: Filter connector summaries by the entity type they support.
        explode: true
        in: query
        name: supported_by_entity_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.EntityType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorSummariesResponse"
          description: ""
      summary: List Connector Summaries
      tags:
      - Connectors service
  /notifications/notification-center/v1/connectors/types/summaries:
    get:
      description: Returns summary information for all available connector types.
      externalDocs:
        url: ""
      operationId: ConnectorsService_GetConnectorTypeSummaries
      parameters:
      - description: Filter connector types by the entity type they support.
        explode: true
        in: query
        name: supported_by_entity_type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.EntityType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectorTypeSummariesResponse"
          description: ""
      summary: Get Connector Type Summaries
      tags:
      - Connectors service
  /notifications/notification-center/v1/connectors/{id}:
    delete:
      description: Deletes the notification connector with the specified ID.
      externalDocs:
        url: ""
      operationId: ConnectorsService_DeleteConnector
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectorResponse"
          description: ""
      summary: Delete a Connector
      tags:
      - Connectors service
    get:
      description: Returns the details of the specified notification connector.
      externalDocs:
        url: ""
      operationId: ConnectorsService_GetConnector
      parameters:
      - description: The unique identifier of the connector.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the connector.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectorResponse"
          description: ""
      summary: Get a Connector
      tags:
      - Connectors service
components:
  schemas:
    BatchGetConnectorSummariesResponse:
      description: Response containing the requested connector summaries and any IDs
        not found
      example:
        notFoundIds:
        - connector-id-3
        connectorSummaries:
          key:
            configOverrides:
            - entityType: ENTITY_TYPE_UNSPECIFIED
              fields:
              - template: template
                fieldName: fieldName
              - template: template
                fieldName: fieldName
            - entityType: ENTITY_TYPE_UNSPECIFIED
              fields:
              - template: template
                fieldName: fieldName
              - template: template
                fieldName: fieldName
            resolvedConnectorConfig:
              fields:
              - fieldName: fieldName
                value: value
              - fieldName: fieldName
                value: value
            createTime: 2000-01-23T04:56:07.000+00:00
            teamId: 0
            connectorConfig:
              fields:
              - fieldName: fieldName
                value: value
              - fieldName: fieldName
                value: value
            name: name
            description: description
            updateTime: 2000-01-23T04:56:07.000+00:00
            id: id
            type: CONNECTOR_TYPE_UNSPECIFIED
      externalDocs:
        description: Find out more about notification center
        url: https://coralogix.com/docs/user-guides/notification-center/introduction/welcome/
      properties:
        connectorSummaries:
          additionalProperties:
            $ref: "#/components/schemas/ConnectorSummary"
          description: The connector summaries.
          type: object
        notFoundIds:
          description: The not found ids.
          example:
          - connector-id-3
          items:
            description: The not found ids.
            minLength: 0
            type: string
          minItems: 0
          type: array
      title: Batch Get Connector Summaries Response
      type: object
