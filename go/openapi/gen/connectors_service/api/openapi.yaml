          description: The connectors.
          type: object
        notFoundIds:
          description: The not found ids.
          example:
          - connector-id-3
          items:
            description: The not found ids.
            minLength: 0
            type: string
          minItems: 0
          type: array
      title: Batch Get Connectors Response
      type: object
