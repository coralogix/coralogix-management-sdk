      tags:
      - Slos Service
  /slo/slos/v1/all/list:
    get:
      description: Returns all SLOs for the team.
      externalDocs:
        url: ""
      operationId: SlosService_BatchGetSlos
      parameters:
      - description: The ids.
        explode: true
        in: query
        name: ids
        required: false
        schema:
          description: The ids.
          items:
            description: The ids.
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetSlosResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
