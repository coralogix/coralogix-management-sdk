          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Slo
      tags:
      - Slos Service
  /slo/validated/v1:
    put:
      description: Validates and updates an SLO.
      externalDocs:
        url: ""
      operationId: SlosService_ValidateReplaceSloAlerts
      requestBody:
        content:
          application/json:
            schema:
