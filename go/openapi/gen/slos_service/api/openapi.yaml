  /slo/slos/v1/{id}:
    delete:
      description: Deletes the SLO with the specified ID.
      externalDocs:
        url: ""
      operationId: SlosService_DeleteSlo
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSloResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete Slo
      tags:
      - Slos Service
    get:
      description: Returns the details of the specified SLO.
      externalDocs:
        url: ""
      operationId: SlosService_GetSlo
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
