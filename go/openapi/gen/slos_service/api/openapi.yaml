        \ values are read per permutation (label-driven). Both may be set; when both\
        \ lists are empty, that dimension is unset."
      example:
        staticValues:
        - checkout-api
        resolvedValues:
        - checkout-api
        - production
        - staging
        - payments-ns
        labelKeys:
        - deployment_environment
        - k8s_namespace
      externalDocs:
        url: ""
      properties:
        labelKeys:
          description: Metric label names to use as sources (label-driven). Actual
            values come from series at query time. Empty if not using label-driven
            for this dimension.
          example:
          - deployment_environment
          - k8s_namespace
          items:
            description: Metric label names to use as sources (label-driven). Actual
              values come from series at query time. Empty if not using label-driven
              for this dimension.
            minLength: 0
            type: string
          minItems: 0
          type: array
        resolvedValues:
          description: "Flat, deduplicated union of static_values and the values resolved\
            \ from label_keys across observed permutations (empties excluded). Empty\
            \ when neither source yields any value. Provides a single searchable list\
            \ of values for this ownership tag, regardless of source."
          example:
          - checkout-api
          - production
          - staging
          - payments-ns
          items:
            description: "Flat, deduplicated union of static_values and the values\
              \ resolved from label_keys across observed permutations (empties excluded).\
              \ Empty when neither source yields any value. Provides a single searchable\
              \ list of values for this ownership tag, regardless of source."
            minLength: 0
            type: string
          minItems: 0
          type: array
        staticValues:
          description: Group-wide static values (broad). Empty if not using broad
            for this dimension.
          example:
          - checkout-api
          items:
            description: Group-wide static values (broad). Empty if not using broad
              for this dimension.
