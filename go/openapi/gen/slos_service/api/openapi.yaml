          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Slo Zero State
      tags:
      - Slos Service
components:
  schemas:
    ApmErrorSli:
      additionalProperties: false
      description: Configuration for error-based APM SLI
      externalDocs:
        url: ""
      title: ApmErrorSli
      type: object
    ApmFilter:
      description: Key-value filter for APM metrics. Supports single value (legacy)
        or multiple values (OR semantics)
      example:
        values:
        - "500"
        - "500"
        value: production
        key: environment
      externalDocs:
        url: ""
      properties:
        key:
          description: Label/tag name to filter on
          example: environment
          minLength: 0
          type: string
        value:
          deprecated: true
          description: "Deprecated: use values instead. Single value to match (kept\
            \ for backward compatibility)"
          example: production
          minLength: 0
          type: string
        values:
          description: "Preferred: multiple values to match (OR semantics, e.g. status\
            \ IN [500, 503])"
          items:
            description: "Preferred: multiple values to match (OR semantics, e.g.\
              \ status IN [500, 503])"
            example: "500"
            minLength: 0
            type: string
          minItems: 0
          type: array
      title: ApmFilter
      type: object
    ApmLatencyAverage:
      additionalProperties: false
      description: Average/mean-based latency measurement
      externalDocs:
        url: ""
      title: ApmLatencyAverage
      type: object
    ApmLatencyQuantile:
      description: Quantile/percentile-based latency measurement
      externalDocs:
        url: ""
      properties:
        percentile:
          description: "Percentile for latency SLOs (0.95 = P95, 0.99 = P99)"
          example: 0.95
          format: float
          type: number
      title: ApmLatencyQuantile
      type: object
    ApmLatencySli:
      oneOf:
      - $ref: "#/components/schemas/ApmLatencySliAverage"
      - $ref: "#/components/schemas/ApmLatencySliQuantile"
    ApmLatencySliAverage:
      description: Configuration for latency-based APM SLI
      externalDocs:
        url: ""
      properties:
        average:
          additionalProperties: false
          description: Average/mean-based latency measurement
          externalDocs:
            url: ""
          title: ApmLatencyAverage
          type: object
        threshold:
          description: "Threshold in milliseconds. Good when latency <= threshold,\
            \ bad when latency > threshold."
          example: 500
          format: float
          type: number
        timeWindow:
          $ref: "#/components/schemas/WindowSloWindow"
      required:
      - average
      title: ApmLatencySli
      type: object
    ApmLatencySliQuantile:
      description: Configuration for latency-based APM SLI
      externalDocs:
        url: ""
      properties:
        quantile:
          $ref: "#/components/schemas/ApmLatencyQuantile"
        threshold:
          description: "Threshold in milliseconds. Good when latency <= threshold,\
            \ bad when latency > threshold."
          example: 500
          format: float
          type: number
        timeWindow:
          $ref: "#/components/schemas/WindowSloWindow"
      required:
      - quantile
      title: ApmLatencySli
      type: object
    ApmSli:
      oneOf:
      - $ref: "#/components/schemas/ApmSliErrorConfig"
      - $ref: "#/components/schemas/ApmSliLatencyConfig"
    ApmSliErrorConfig:
      description: Definition of an APM-based SLI with automatic query generation
      example:
        groupingKeys:
        - environment
        - region
        filters:
        - values:
          - "500"
          - "500"
          value: production
          key: environment
        - values:
          - "500"
          - "500"
          value: production
          key: environment
        services:
        - my-service
        - payment-service
        errorConfig: "{}"
      externalDocs:
        url: ""
      properties:
        errorConfig:
          additionalProperties: false
          description: Configuration for error-based APM SLI
          externalDocs:
            url: ""
          title: ApmErrorSli
          type: object
        filters:
          description: Additional label-based filters to apply to the metrics
          items:
            $ref: "#/components/schemas/ApmFilter"
          minItems: 0
          type: array
        groupingKeys:
          description: Labels to group SLO results by
          example:
          - environment
          - region
          items:
            description: Labels to group SLO results by
            minLength: 0
            type: string
          minItems: 0
          type: array
        services:
          description: List of service names to monitor
          example:
          - my-service
          - payment-service
          items:
            description: List of service names to monitor
            minLength: 0
            type: string
          minItems: 0
          type: array
      required:
      - errorConfig
      title: ApmSli
      type: object
    ApmSliLatencyConfig:
      description: Definition of an APM-based SLI with automatic query generation
      externalDocs:
        url: ""
      properties:
        filters:
          description: Additional label-based filters to apply to the metrics
          items:
            $ref: "#/components/schemas/ApmFilter"
          minItems: 0
          type: array
        groupingKeys:
          description: Labels to group SLO results by
          example:
          - environment
          - region
          items:
            description: Labels to group SLO results by
            minLength: 0
            type: string
          minItems: 0
          type: array
        latencyConfig:
          $ref: "#/components/schemas/ApmLatencySli"
        services:
          description: List of service names to monitor
          example:
          - my-service
          - payment-service
          items:
            description: List of service names to monitor
            minLength: 0
            type: string
          minItems: 0
          type: array
      required:
      - latencyConfig
      title: ApmSli
      type: object
