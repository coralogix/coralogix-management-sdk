openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /slo/slos/v1:
    get:
      description: Returns SLOs matching the given criteria.
      externalDocs:
        url: ""
      operationId: SlosService_ListSlos
      parameters:
      - description: The filters.
        explode: true
        in: query
        name: filters
        required: false
        schema:
          description: The filters.
          items:
            $ref: "#/components/schemas/SloFilter"
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSlosResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List Slos
      tags:
      - Slos Service
    post:
      description: Creates a new SLO.
      externalDocs:
        url: ""
      operationId: SlosService_CreateSlo
      parameters:
      - description: Whether to silence data validations.
        explode: true
        in: query
        name: silence_data_validations
        required: false
        schema:
          deprecated: true
          description: Whether to silence data validations.
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlosService_ReplaceSlo_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSloResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create Slo
      tags:
      - Slos Service
    put:
      description: Updates an existing SLO.
      externalDocs:
        url: ""
      operationId: SlosService_ReplaceSlo
      parameters:
      - description: Whether to silence data validations.
        explode: true
        in: query
        name: silence_data_validations
        required: false
        schema:
          deprecated: true
          description: Whether to silence data validations.
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlosService_ReplaceSlo_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceSloResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Replace Slo
      tags:
      - Slos Service
  /slo/slos/v1/all/execute:
    post:
      description: Triggers execution for all SLOs.
      externalDocs:
        url: ""
      operationId: SlosService_BatchExecuteSlo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchExecuteSloRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchExecuteSloResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
