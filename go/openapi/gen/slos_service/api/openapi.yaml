components:
  schemas:
    ApmErrorSli:
      description: Configuration for error-based APM SLI
      externalDocs:
        url: ""
      title: ApmErrorSli
      type: object
    ApmFilter:
      description: Key-value filter for APM metrics. Supports single value (legacy)
        or multiple values (OR semantics)
      externalDocs:
        url: ""
      properties:
        key:
          description: Label/tag name to filter on
          example: environment
          type: string
        value:
          deprecated: true
          description: "Deprecated: use values instead. Single value to match (kept\
            \ for backward compatibility)"
          example: production
          type: string
        values:
          items:
            description: "Preferred: multiple values to match (OR semantics, e.g.\
              \ status IN [500, 503])"
            example: "500"
            type: string
          type: array
      title: ApmFilter
      type: object
    ApmLatencyAverage:
      description: Average/mean-based latency measurement
      externalDocs:
        url: ""
      title: ApmLatencyAverage
      type: object
    ApmLatencyQuantile:
      description: Quantile/percentile-based latency measurement
      externalDocs:
        url: ""
      properties:
        percentile:
          description: "Percentile for latency SLOs (0.95 = P95, 0.99 = P99)"
          example: 0.95
          format: float
          type: number
      title: ApmLatencyQuantile
      type: object
    ApmLatencySli:
      oneOf:
      - $ref: "#/components/schemas/ApmLatencySliQuantile"
      - $ref: "#/components/schemas/ApmLatencySliAverage"
    ApmLatencySliAverage:
      description: Configuration for latency-based APM SLI
      externalDocs:
        url: ""
      properties:
        average:
          description: Average/mean-based latency measurement
          externalDocs:
            url: ""
          title: ApmLatencyAverage
          type: object
        threshold:
          description: "Threshold in milliseconds. Good when latency <= threshold,\
            \ bad when latency > threshold."
          example: 500
          format: float
          type: number
        timeWindow:
          $ref: "#/components/schemas/WindowSloWindow"
      required:
      - average
      title: ApmLatencySli
      type: object
    ApmLatencySliQuantile:
      description: Configuration for latency-based APM SLI
      externalDocs:
        url: ""
      properties:
        quantile:
          $ref: "#/components/schemas/ApmLatencyQuantile"
        threshold:
          description: "Threshold in milliseconds. Good when latency <= threshold,\
            \ bad when latency > threshold."
          example: 500
          format: float
          type: number
        timeWindow:
          $ref: "#/components/schemas/WindowSloWindow"
      required:
      - quantile
      title: ApmLatencySli
      type: object
    ApmSli:
      oneOf:
      - $ref: "#/components/schemas/ApmSliErrorConfig"
      - $ref: "#/components/schemas/ApmSliLatencyConfig"
    ApmSliErrorConfig:
      description: Definition of an APM-based SLI with automatic query generation
      externalDocs:
        url: ""
      properties:
        errorConfig:
          description: Configuration for error-based APM SLI
          externalDocs:
            url: ""
          title: ApmErrorSli
          type: object
        filters:
          items:
            $ref: "#/components/schemas/ApmFilter"
          type: array
        groupingKeys:
          example:
          - environment
          - region
          items:
            description: Labels to group SLO results by
            type: string
          type: array
        services:
          example:
          - my-service
          - payment-service
          items:
            description: List of service names to monitor
            type: string
          type: array
      required:
      - errorConfig
      title: ApmSli
      type: object
    ApmSliLatencyConfig:
      description: Definition of an APM-based SLI with automatic query generation
      externalDocs:
        url: ""
      properties:
        filters:
          items:
            $ref: "#/components/schemas/ApmFilter"
          type: array
        groupingKeys:
          example:
          - environment
          - region
          items:
            description: Labels to group SLO results by
            type: string
          type: array
        latencyConfig:
          $ref: "#/components/schemas/ApmLatencySli"
        services:
          example:
          - my-service
          - payment-service
          items:
            description: List of service names to monitor
            type: string
          type: array
      required:
      - latencyConfig
      title: ApmSli
      type: object
    BatchExecuteSloResponse:
      description: Response containing the results of batch executed SLO operations.
      example:
        matchingResponses:
        - createSloResponse:
            slo:
              creator: test@domain.com
              description: A brief description of my SLO
              sloTimeFrame: SLO_TIME_FRAME_UNSPECIFIED
              updateTime: 2000-01-23T04:56:07.000+00:00
              sloType: SLO_TYPE_REQUEST
              type: request
              grouping:
                labels:
                - labels
                - labels
              labels:
                key: labels
              revision:
                updateTime: 2000-01-23T04:56:07.000+00:00
                revision: 1
              windowBasedMetricSli:
                missingDataStrategy: MISSING_DATA_STRATEGY_UNCOUNTED
                comparisonOperator: COMPARISON_OPERATOR_UNSPECIFIED
                query:
                  query: "sum(rate(http_requests_total{status=\"200\"}[5m]))"
                threshold: 0.95
                window: WINDOW_SLO_WINDOW_UNSPECIFIED
              createTime: 2000-01-23T04:56:07.000+00:00
              name: Example Slo Name
              id: b11919d5-ef85-4bb1-8655-02640dbe94d9
              productType: SLO_PRODUCT_TYPE_UNSPECIFIED
              targetThresholdPercentage: 99.999
        - createSloResponse:
            slo:
              creator: test@domain.com
              description: A brief description of my SLO
              sloTimeFrame: SLO_TIME_FRAME_UNSPECIFIED
              updateTime: 2000-01-23T04:56:07.000+00:00
              sloType: SLO_TYPE_REQUEST
              type: request
              grouping:
                labels:
                - labels
                - labels
              labels:
                key: labels
              revision:
                updateTime: 2000-01-23T04:56:07.000+00:00
                revision: 1
              windowBasedMetricSli:
                missingDataStrategy: MISSING_DATA_STRATEGY_UNCOUNTED
                comparisonOperator: COMPARISON_OPERATOR_UNSPECIFIED
                query:
                  query: "sum(rate(http_requests_total{status=\"200\"}[5m]))"
