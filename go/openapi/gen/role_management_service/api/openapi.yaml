      "put": {
        "tags": [
          "Role Management Service"
        ],
        "summary": "Create Role",
        "description": "Creates a new custom role.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "RoleManagementService_CreateRole",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "description": "Request for creating a custom role.",
                "type": "object",
                "properties": {
                  "description": {
                    "description": "Human-readable description.",
                    "type": "string",
                    "minLength": 0
                  },
                  "name": {
                    "description": "Display name.",
                    "type": "string",
                    "minLength": 0
                  },
                  "parentRoleId": {
                    "description": "The parent role id.",
                    "type": "integer",
                    "format": "int64",
                    "minimum": 0
                  },
                  "parentRoleName": {
                    "description": "The parent role name.",
                    "type": "string",
                    "minLength": 0
                  },
                  "permissions": {
                    "description": "List of permissions.",
                    "type": "array",
                    "items": {
                      "description": "List of permissions.",
                      "type": "string",
                      "minLength": 0
                    },
                    "minItems": 0
                  },
                  "teamId": {
                    "description": "Team identifier.",
                    "type": "integer",
                    "format": "int64",
                    "minimum": 0
                  }
                },
                "allOf": [
                  {
                    "oneOf": [
                      {
                        "type": "object",
                        "required": [
                          "parentRoleId"
                        ]
                      },
                      {
                        "type": "object",
                        "required": [
                          "parentRoleName"
                        ]
                      },
                      {
                        "type": "object",
                        "not": {
                          "anyOf": [
                            {
                              "type": "object",
                              "required": [
                                "parentRoleId"
                              ]
                            },
                            {
                              "type": "object",
                              "required": [
                                "parentRoleName"
                              ]
                            }
                          ]
                        }
                      }
                    ]
                  }
                ]
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CreateRoleResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "409": {
            "description": "Role already exists",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      }
