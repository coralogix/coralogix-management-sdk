openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /integrations/integrations/v1:
    get:
      description: |-
        Returns all available integration definitions.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_GetIntegrations
      parameters:
      - description: Whether to include testing revisions in the response.
        explode: true
        in: query
        name: include_testing_revision
        required: false
        schema:
          description: Whether to include testing revisions in the response.
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIntegrationsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get all integrations
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/integrations/v1/definitions/{id}:
    get:
      description: |-
        Returns the definition for the specified integration type.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_GetIntegrationDefinition
      parameters:
      - description: The unique identifier of the integration definition.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the integration definition.
          example: aws-sqs
          type: string
        style: simple
      - description: Whether to include testing revisions in the response.
        explode: true
        in: query
        name: include_testing_revision
        required: false
        schema:
          description: Whether to include testing revisions in the response.
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIntegrationDefinitionResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get integration definition
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/integrations/v1/deployed/{integration_id}:
    get:
      description: |-
        Returns the deployed instance of the specified integration.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_GetDeployedIntegration
      parameters:
      - description: The integration id.
        explode: false
        in: path
        name: integration_id
        required: true
        schema:
          description: The integration id.
          example: aws-sqs
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDeployedIntegrationResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get deployed integration
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/integrations/v1/instances/{integration_id}:
    delete:
      description: |-
        Removes the specified deployed integration instance.

        Requires the following permissions:
        - `integrations:Deploy`
      externalDocs:
        url: ""
      operationId: IntegrationService_DeleteIntegration
      parameters:
      - description: The unique identifier of the integration instance to delete.
        explode: false
        in: path
        name: integration_id
        required: true
        schema:
          description: The unique identifier of the integration instance to delete.
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIntegrationResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete integration
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:Deploy
  /integrations/integrations/v1/rum/app-versions:
    get:
      description: |-
        Returns RUM application version data.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_GetRumApplicationVersionData
      parameters:
      - description: The name of the RUM application to fetch version data for.
        explode: true
        in: query
        name: application_name
        required: false
        schema:
          description: The name of the RUM application to fetch version data for.
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRumApplicationVersionDataResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get RUM integration versions data
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/integrations/v1/rum/sync:
    post:
      description: |-
        Syncs RUM data for the team.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_SyncRumData
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Sync_RUM_data_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRumDataResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Trigger sync of RUM integration data
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/integrations/v1/{id}:
    get:
      description: |-
        Returns the details of the specified integration.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_GetIntegrationDetails
      parameters:
      - description: The unique identifier of the integration.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the integration.
          type: string
        style: simple
      - description: Whether to include testing revisions in the response.
        explode: true
        in: query
        name: include_testing_revision
        required: false
        schema:
          description: Whether to include testing revisions in the response.
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIntegrationDetailsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get integration details
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/managed/v1:
    get:
      description: |-
        Returns a list of managed integration keys.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_ListManagedIntegrationKeys
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedIntegrationKeysResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List managed integration keys
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/managed/v1/{integration_id}:
    get:
      description: |-
        Returns the status of the specified managed integration.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_GetManagedIntegrationStatus
      parameters:
      - description: The unique identifier of the managed integration.
        explode: false
        in: path
        name: integration_id
        required: true
        schema:
          description: The unique identifier of the managed integration.
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagedIntegrationStatusResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get managed integration status
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/metadata/v1:
    post:
      description: |-
        Creates or updates an integration deployment.

        Requires the following permissions:
        - `integrations:Deploy`
      externalDocs:
        url: ""
      operationId: IntegrationService_SaveIntegration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Save_integration_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveIntegrationResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Save integration registration metadata
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:Deploy
    put:
      description: |-
        Updates an existing integration deployment.

        Requires the following permissions:
        - `integrations:Deploy`
      externalDocs:
        url: ""
      operationId: IntegrationService_UpdateIntegration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_integration_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIntegrationResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Update integration
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:Deploy
  /integrations/metadata/v1/test:
    post:
      description: |-
        Tests the integration configuration.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_TestIntegration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Test_integration_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestIntegrationResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Test integration
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
  /integrations/template/v1:
    get:
      description: |-
        Returns the template for an integration.

        Requires the following permissions:
        - `integrations:ReadConfig`
      externalDocs:
        url: ""
      operationId: IntegrationService_GetTemplate
      parameters:
      - description: The unique identifier of the integration to fetch a template
          for.
        explode: true
        in: query
        name: integration_id
        required: false
        schema:
          description: The unique identifier of the integration to fetch a template
            for.
          type: string
        style: form
      - description: "Common ARM integration parameters (logs URL, API key, cgx domain)\
          \ supplied when rendering the template."
        explode: true
        in: query
        name: common_arm_params
        required: false
        schema:
          $ref: "#/components/schemas/Common_ARM_integration_parameters"
        style: form
      - description: Empty extra parameters; use when the template does not require
          additional inputs.
        explode: true
        in: query
        name: empty
        required: false
        schema:
          additionalProperties: false
          type: object
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTemplateResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get integration template
      tags:
      - Integration service
      x-coralogixPermissions:
      - integrations:ReadConfig
components:
  schemas:
    ARMStack:
      description: This data structure represents an Azure Resource Manager stack.
      example:
        resourceGroupName: resourceGroupName
        subscriptionId: subscriptionId
      externalDocs:
        description: Find out more about the Azure Resource Manager (ARM) integration
          in our documentation
        url: https://coralogix.com/docs/integrations/azure/azure-resource-manager-integration-packages/
      properties:
        resourceGroupName:
          description: The resource group name.
          type: string
        subscriptionId:
          description: The subscription id.
          type: string
      title: ARM stack
      type: object
    ApiKeyData:
      description: Api key data.
      example:
        id: id
        value: value
      externalDocs:
        url: ""
      properties:
        id:
          description: Unique identifier.
          type: string
        value:
          description: The value.
          type: string
      title: API key data
      type: object
    AzureArm:
      additionalProperties: false
      description: This data structure represents an Azure ARM integration.
      externalDocs:
        url: ""
      title: Azure ARM
      type: object
    AzureArmTemplate:
      description: This data structure represents an azure ARM template.
      example:
        templateUrl: templateUrl
      externalDocs:
        url: ""
      properties:
        templateUrl:
          description: The template url.
          type: string
      title: Azure ARM template
      type: object
    ChangelogEntry:
      example:
        descriptionMd: descriptionMd
        version: version
      externalDocs:
        url: ""
      properties:
        descriptionMd:
          description: The description md.
          type: string
        version:
          description: Version.
          type: string
      title: Changelog entry
      type: object
    CloudFormationStack:
      description: This data structure represents a CloudFormation stack.
      externalDocs:
        description: Find out more about the AWS CloudFormation integration in our
          documentation
        url: https://coralogix.com/docs/integrations/aws/aws-cloudformation-logs/
      properties:
        arn:
          description: The arn.
          type: string
        region:
          description: Region.
          type: string
      title: CloudFormation stack
      type: object
    CloudFormationTemplate:
      description: Cloud formation template.
      externalDocs:
        url: ""
      properties:
        commands:
          description: The commands.
          items:
            $ref: "#/components/schemas/CommandInformation"
          type: array
        parameters:
          additionalProperties:
            type: string
          description: The parameters.
          type: object
        postInstallationSteps:
          additionalProperties:
            type: string
          description: The post installation steps.
          type: object
        templateUrl:
          description: The template url.
          type: string
      title: CloudFormation template
      type: object
    Cloudformation:
      additionalProperties: false
      description: This data structure represents a CloudFormation integration.
      externalDocs:
        url: ""
      title: CloudFormation
      type: object
    CommandInformation:
      externalDocs:
        url: ""
      properties:
        command:
          description: The command.
          type: string
        description:
          description: Human-readable description.
          type: string
        language:
          $ref: "#/components/schemas/Language"
        links:
          description: List of links.
          items:
            $ref: "#/components/schemas/Link"
          type: array
        name:
          description: Display name.
          type: string
        tooltipText:
          description: The tooltip text.
          type: string
      title: Command information
      type: object
    ConfigurationBlock:
      externalDocs:
        url: ""
      properties:
        description:
          description: Human-readable description.
          type: string
        name:
          description: Display name.
          type: string
        value:
          description: The value.
          type: string
      title: Configuration block
      type: object
    ConnectionStatus:
      description: Connection status.
      enum:
      - PENDING
      - ACTIVE
      - FAILING
      - STATUS_UNKNOWN
      type: string
    ContextualData:
      additionalProperties: false
      description: This data structure represents a contextual data integration.
      externalDocs:
        url: ""
      title: Contextual data
      type: object
    DefaultIntegrationDetails:
      description: Default integration details.
      example:
        registered:
        - lastUpdated: 2000-01-23T04:56:07.000+00:00
          definitionVersion: definitionVersion
          revisionLifecycle: REVISION_LIFECYCLE_UNSPECIFIED
          integrationStatus:
            connectionStatus: PENDING
            messages:
            - messages
            - messages
            details:
              key: details
          id: id
          arm:
            resourceGroupName: resourceGroupName
            subscriptionId: subscriptionId
          parameters:
          - apiKey:
              id: id
              value: value
            key: key
          - apiKey:
              id: id
              value: value
            key: key
          isTesting: true
        - lastUpdated: 2000-01-23T04:56:07.000+00:00
          definitionVersion: definitionVersion
          revisionLifecycle: REVISION_LIFECYCLE_UNSPECIFIED
          integrationStatus:
            connectionStatus: PENDING
            messages:
            - messages
            - messages
            details:
              key: details
          id: id
          arm:
            resourceGroupName: resourceGroupName
            subscriptionId: subscriptionId
          parameters:
          - apiKey:
              id: id
              value: value
            key: key
          - apiKey:
              id: id
              value: value
            key: key
          isTesting: true
      externalDocs:
        url: ""
      properties:
        registered:
          description: The registered.
          items:
            $ref: "#/components/schemas/RegisteredInstance"
          type: array
      title: Default integration details
      type: object
    DeleteIntegrationResponse:
      additionalProperties: false
      description: Response returned after successfully removing an integration instance.
      externalDocs:
        url: ""
      type: object
    DeployedIntegrationInformation:
      description: Deployed integration information.
      example:
        definitionVersion: definitionVersion
        definitionKey: definitionKey
        integrationStatus:
          connectionStatus: PENDING
          messages:
          - messages
          - messages
          details:
            key: details
        id: id
        parameters:
        - apiKey:
            id: id
            value: value
          key: key
        - apiKey:
            id: id
            value: value
          key: key
      externalDocs:
        url: ""
      properties:
        definitionKey:
          description: The definition key.
          type: string
        definitionVersion:
          description: The definition version.
          type: string
        id:
          description: Unique identifier.
          type: string
        integrationStatus:
          $ref: "#/components/schemas/IntegrationStatus"
        parameters:
          description: The parameters.
          items:
            $ref: "#/components/schemas/Parameter"
          type: array
      title: Deployed integration information
      type: object
    Deprecation:
      description: Deprecation.
      example:
        reason: reason
        replacementExtensions:
        - replacementExtensions
        - replacementExtensions
      externalDocs:
        url: ""
      properties:
        reason:
          description: Reason.
          type: string
        replacementExtensions:
          description: The replacement extensions.
          items:
            description: The replacement extensions.
            type: string
          type: array
      title: Deprecation
      type: object
    ExtensionBinary:
      example:
        data: data
        type: KIBANA_INDEX_PATTERN
      externalDocs:
        url: ""
      properties:
        data:
          description: Data payload.
          type: string
        type:
          $ref: "#/components/schemas/ExtensionBinary.BinaryType"
      title: Extension binary
      type: object
    ExtensionBinary.BinaryType:
      description: Type of binary content stored in the extension.
      enum:
      - KIBANA_INDEX_PATTERN
      type: string
    ExtensionItem:
      example:
        permissionResource: UNKNOWN
        stableId: stableId
        targetDomain: ACTION
        data: "{}"
        extendedInternalId: extendedInternalId
        name: name
        description: description
        id: id
        binaries:
        - fileName: fileName
          data: data
          type: PREVIEW_IMAGE
        - fileName: fileName
          data: data
          type: PREVIEW_IMAGE
        isMandatory: true
        uniqueId: uniqueId
      externalDocs:
        url: ""
      properties:
        binaries:
          description: The binaries.
          items:
            $ref: "#/components/schemas/ExtensionItemBinary"
          type: array
        data:
          description: Data payload.
          type: object
        description:
          description: Human-readable description.
          type: string
        extendedInternalId:
          description: The extended internal id.
          type: string
        id:
          description: Unique identifier.
          type: string
        isMandatory:
          description: The is mandatory.
          type: boolean
        name:
          description: Display name.
          type: string
        permissionResource:
          $ref: "#/components/schemas/PermissionResource"
        stableId:
          description: The stable id.
          type: string
        targetDomain:
          $ref: "#/components/schemas/TargetDomain"
        uniqueId:
          description: The unique id.
          type: string
      title: Extension item
      type: object
    ExtensionItemBinary:
      example:
        fileName: fileName
        data: data
        type: PREVIEW_IMAGE
      externalDocs:
        url: ""
      properties:
        data:
          description: Data payload.
          type: string
        fileName:
          description: The file name.
          type: string
        type:
          $ref: "#/components/schemas/ExtensionItemBinary.BinaryType"
      title: Extension item binary
      type: object
    ExtensionItemBinary.BinaryType:
      description: Binary type.
      enum:
