          id: id
          binaries:
          - fileName: fileName
            data: data
            type: PREVIEW_IMAGE
          - fileName: fileName
            data: data
            type: PREVIEW_IMAGE
          isMandatory: true
          uniqueId: uniqueId
        version: version
        integrationDetails:
        - link: link
          name: name
        - link: link
          name: name
