            data: data
            type: PREVIEW_IMAGE
          - fileName: fileName
            data: data
            type: PREVIEW_IMAGE
          isMandatory: true
          uniqueId: uniqueId
        - permissionResource: UNKNOWN
          stableId: stableId
          targetDomain: ACTION
          data: "{}"
          extendedInternalId: extendedInternalId
          name: name
          description: description
          id: id
          binaries:
          - fileName: fileName
            data: data
            type: PREVIEW_IMAGE
          - fileName: fileName
            data: data
            type: PREVIEW_IMAGE
          isMandatory: true
          uniqueId: uniqueId
        description: description
        excerpt: excerpt
        binaries:
        - data: data
          type: KIBANA_INDEX_PATTERN
        - data: data
          type: KIBANA_INDEX_PATTERN
        items:
        - permissionResource: UNKNOWN
          stableId: stableId
          targetDomain: ACTION
          data: "{}"
          extendedInternalId: extendedInternalId
          name: name
          description: description
          id: id
          binaries:
          - fileName: fileName
            data: data
            type: PREVIEW_IMAGE
          - fileName: fileName
            data: data
            type: PREVIEW_IMAGE
          isMandatory: true
          uniqueId: uniqueId
        - permissionResource: UNKNOWN
          stableId: stableId
          targetDomain: ACTION
          data: "{}"
          extendedInternalId: extendedInternalId
