openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
tags:
- description: View and manage your alerts using alert definitions - data structures
    that contain the configuration required to create an alert.
  externalDocs:
    description: Learn more about alerts in our documentation
    url: https://coralogix.com/docs/user-guides/alerting/introduction-to-alerts/
  name: Alert definitions service
paths:
  /v3/alert-defs:
    get:
      externalDocs:
        url: ""
      operationId: AlertDefsService_ListAlertDefs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List_alert_definitions_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get a list of all accessible alert definitions
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:ReadConfig
    post:
      externalDocs:
        url: ""
      operationId: AlertDefsService_CreateAlertDef
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertDefsService_CreateAlertDef_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Create_alert_definition_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create an alert
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:UpdateConfig
    put:
      externalDocs:
        url: ""
      operationId: AlertDefsService_ReplaceAlertDef
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_alert_definition_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Replace_alert_definition_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Replace an alert definition
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:UpdateConfig
  /v3/alert-defs/alert-version-id/{alert_version_id}:
    get:
      externalDocs:
        url: ""
      operationId: AlertDefsService_GetAlertDefByVersionId
      parameters:
      - explode: false
        in: path
        name: alert_version_id
        required: true
        schema:
          description: Alert version ID
          example: 123e4567-e89b-12d3-a456-426614174000
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_alert_definition_by_version_ID_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get alert definition by alert version ID
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:ReadConfig
  /v3/alert-defs/filter-option-counts:
    get:
      description: Returns counts for different filter options based on the provided
        filters
      externalDocs:
        url: ""
      operationId: AlertDefsService_FilterOptionCounts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Filter_option_counts_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get counts for filter options
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:ReadConfig
  /v3/alert-defs/{id}:
    delete:
      externalDocs:
        url: ""
      operationId: AlertDefsService_DeleteAlertDef
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          example: 123e4567-e89b-12d3-a456-426614174000
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                description: A response to the deletion of an alert definition
                externalDocs:
                  url: ""
                title: Delete alert definition response
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: DeleteAlertDef
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:UpdateConfig
    get:
      externalDocs:
        url: ""
      operationId: AlertDefsService_GetAlertDef
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          description: Alert definition ID
          example: 123e4567-e89b-12d3-a456-426614174000
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_alert_definition_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get alert definition by ID
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:ReadConfig
  /v3/alert-defs/{id}:setActive:
    post:
      externalDocs:
        url: ""
      operationId: AlertDefsService_SetActive
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          description: The alert definition ID
          example: 123e4567-e89b-12d3-a456-426614174000
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Response after enabling or disabling an alert definition
                externalDocs:
                  url: ""
                title: Set active response
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Disable or enable an alert
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:UpdateConfig
  /v3/alerts/download:
    get:
      description: Download a list of all accessible alert definitions in base64-encoded
        byte format.
      externalDocs:
        url: ""
      operationId: AlertDefsService_DownloadAlerts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Download_alerts_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Download alerts
      tags:
      - Alert definitions service
      x-coralogixPermissions:
      - alerts:ReadConfig
components:
  schemas:
    Time_of_day:
      description: Represents a specific time in a 24-hour format
      example:
        hours: 14
        minutes: 30
      externalDocs:
        url: ""
      properties:
        hours:
          example: 14
          format: int32
          type: integer
        minutes:
          example: 30
          format: int32
          type: integer
      required:
      - hours
      - minutes
      title: Time of day
      type: object
    SLO_Threshold_Type:
      description: SLO threshold type definition
      externalDocs:
        url: ""
      properties:
        errorBudget:
          $ref: "#/components/schemas/Error_Budget_Threshold"
        sloDefinition:
          $ref: "#/components/schemas/SLO_Definition"
      required:
      - sloDefinition
      - threshold
      title: SLO Threshold Type
      type: object
    Flow_stage_group_alert_definitions:
      description: Alert definitions for a flow stage group
      externalDocs:
        url: ""
      properties:
        id:
          description: The alert definition ID
          example: 123e4567-e89b-12d3-a456-426614174000
          type: string
        not:
          description: Whether to negate the alert definition or not.
          example: true
          type: boolean
      required:
      - id
      title: Flow stage group alert definitions
      type: object
    Connector_config_field:
      example:
        template: template_example
        fieldName: description
      externalDocs:
        url: ""
      properties:
        fieldName:
          description: The name of the configuration field
          example: description
          type: string
        template:
          description: The template for the configuration field
          example: template_example
          type: string
      required:
      - fieldName
      - template
      title: Connector config field
      type: object
    Trace_based_immediate_alert_type:
      description: Configuration for immediate alerts triggered on trace entries
      externalDocs:
        description: Learn more about trace-based alerts in our documentation.
        url: https://coralogix.com/docs/user-guides/alerting/create-an-alert/traces/tracing-alerts/
      properties:
        notificationPayloadFilter:
          items:
            description: Notification payload field filter
            example: "[\"obj.field\"]"
            pattern: "^[a-zA-Z0-9_.]+$"
            type: string
          type: array
        tracingFilter:
          $ref: "#/components/schemas/Tracing_filter"
      required:
      - tracingFilter
      title: Trace-based immediate alert type
      type: object
    Tracing_filter_type:
      description: Filter type for trace entries
      externalDocs:
        url: ""
      properties:
        operation:
          enum:
          - TRACING_FILTER_OPERATION_TYPE_IS_OR_UNSPECIFIED
          - TRACING_FILTER_OPERATION_TYPE_INCLUDES
          - TRACING_FILTER_OPERATION_TYPE_ENDS_WITH
          - TRACING_FILTER_OPERATION_TYPE_STARTS_WITH
          - TRACING_FILTER_OPERATION_TYPE_IS_NOT
          type: string
        values:
          items:
            description: The values of the label to filter by
            example: "[\"value1\",\"value2\"]"
            type: string
          type: array
      required:
      - operation
      - values
      title: Tracing filter type
      type: object
    Logs_Threshold_Rule:
      description: LogsThresholdRule is a message that defines a rule for log-based
        threshold alerts.
      externalDocs:
        url: ""
      properties:
        condition:
          $ref: "#/components/schemas/Logs_Threshold_Condition"
        override:
          $ref: "#/components/schemas/Alert_definition_priority_update"
      required:
      - condition
      - override
      title: Logs Threshold Rule
      type: object
    Alert_definition_alertDefProperties:
      oneOf:
      - $ref: "#/components/schemas/Alert_definition_properties"
      - $ref: "#/components/schemas/Alert_definition_properties_1"
      - $ref: "#/components/schemas/Alert_definition_properties_2"
      - $ref: "#/components/schemas/Alert_definition_properties_3"
      - $ref: "#/components/schemas/Alert_definition_properties_4"
      - $ref: "#/components/schemas/Alert_definition_properties_5"
      - $ref: "#/components/schemas/Alert_definition_properties_6"
      - $ref: "#/components/schemas/Alert_definition_properties_7"
      - $ref: "#/components/schemas/Alert_definition_properties_8"
      - $ref: "#/components/schemas/Alert_definition_properties_9"
      - $ref: "#/components/schemas/Alert_definition_properties_10"
      - $ref: "#/components/schemas/Alert_definition_properties_11"
      - $ref: "#/components/schemas/Alert_definition_properties_12"
    Message_config_field:
      description: Configuration field for a notification message
      example:
        template: template_example
        fieldName: description
      externalDocs:
        url: ""
      properties:
        fieldName:
          description: The name of the configuration field
          example: description
          type: string
        template:
          description: The template for the configuration field
          example: template_example
          type: string
      required:
      - fieldName
      - template
      title: Message config field
      type: object
    Tracing_label_filters:
      description: "Filters for application name, subsystem name, service name, operation\
        \ name and span fields"
      externalDocs:
        url: ""
      properties:
        applicationName:
          items:
            $ref: "#/components/schemas/Tracing_filter_type"
          type: array
        operationName:
          items:
            $ref: "#/components/schemas/Tracing_filter_type"
          type: array
        serviceName:
          items:
            $ref: "#/components/schemas/Tracing_filter_type"
          type: array
        spanFields:
          items:
            $ref: "#/components/schemas/Tracing_span_fields_filter_type"
          type: array
        subsystemName:
          items:
            $ref: "#/components/schemas/Tracing_filter_type"
          type: array
      title: Tracing label filters
      type: object
    Log_based_new_value_alert_type:
      description: Configuration for alerts triggered by new values appearing in logs
      externalDocs:
        url: ""
      properties:
        logsFilter:
          $ref: "#/components/schemas/Log_filter"
        notificationPayloadFilter:
          items:
            description: The filter to specify which fields to include in the notification
              payload.
            example: "[\"obj.field\"]"
            pattern: "^[a-zA-Z0-9_.]+$"
            type: string
          type: array
        rules:
          items:
            $ref: "#/components/schemas/Log_based_new_value_rule"
          type: array
      required:
      - rules
      title: Log-based new value alert type
      type: object
    Alert_definition_properties_2:
      description: User-configurable properties of an alert definition
      externalDocs:
        url: ""
      properties:
        activeOn:
          $ref: "#/components/schemas/Alert_activity_schedule"
        deleted:
          description: Whether the alert has been marked as deleted
          example: false
          type: boolean
        description:
          description: A detailed description of what the alert monitors and when
            it triggers
          example: Alert description
          type: string
        enabled:
          description: Whether the alert is currently active and monitoring
          example: true
          type: boolean
        entityLabels:
          items:
            $ref: "#/components/schemas/Alert_definition_properties_entityLabels_inner"
          type: array
        groupByKeys:
          items:
            description: Keys used to group and aggregate alert data
            example: "[\"key1\",\"key2\"]"
            type: string
          type: array
        incidentsSettings:
          $ref: "#/components/schemas/Alert_definition_incident_settings"
        logsThreshold:
          $ref: "#/components/schemas/Log_based_threshold_alert_type"
        name:
          description: The name of the alert definition
          example: My Alert
          type: string
        notificationGroup:
          $ref: "#/components/schemas/Alert_definition_notification_group"
        notificationGroupExcess:
          items:
            $ref: "#/components/schemas/Alert_definition_notification_group"
          type: array
        phantomMode:
          description: Whether the alert is in phantom mode (creating incidents or
            not)
          example: false
          type: boolean
        priority:
          enum:
          - ALERT_DEF_PRIORITY_P5_OR_UNSPECIFIED
          - ALERT_DEF_PRIORITY_P4
          - ALERT_DEF_PRIORITY_P3
          - ALERT_DEF_PRIORITY_P2
          - ALERT_DEF_PRIORITY_P1
          type: string
        type:
          enum:
          - ALERT_DEF_TYPE_LOGS_IMMEDIATE_OR_UNSPECIFIED
          - ALERT_DEF_TYPE_LOGS_THRESHOLD
          - ALERT_DEF_TYPE_LOGS_ANOMALY
          - ALERT_DEF_TYPE_LOGS_RATIO_THRESHOLD
          - ALERT_DEF_TYPE_LOGS_NEW_VALUE
          - ALERT_DEF_TYPE_LOGS_UNIQUE_COUNT
          - ALERT_DEF_TYPE_LOGS_TIME_RELATIVE_THRESHOLD
          - ALERT_DEF_TYPE_METRIC_THRESHOLD
          - ALERT_DEF_TYPE_METRIC_ANOMALY
          - ALERT_DEF_TYPE_TRACING_IMMEDIATE
          - ALERT_DEF_TYPE_TRACING_THRESHOLD
          - ALERT_DEF_TYPE_FLOW
          - ALERT_DEF_TYPE_SLO_THRESHOLD
          type: string
      required:
      - name
      - priority
      - type
      - typeDefinition
      title: Alert definition properties
      type: object
    Alert_definition_properties_1:
      description: User-configurable properties of an alert definition
      externalDocs:
        url: ""
      properties:
        activeOn:
          $ref: "#/components/schemas/Alert_activity_schedule"
        deleted:
          description: Whether the alert has been marked as deleted
          example: false
          type: boolean
        description:
          description: A detailed description of what the alert monitors and when
            it triggers
          example: Alert description
          type: string
        enabled:
          description: Whether the alert is currently active and monitoring
          example: true
          type: boolean
        entityLabels:
          items:
            $ref: "#/components/schemas/Alert_definition_properties_entityLabels_inner"
          type: array
        groupByKeys:
          items:
            description: Keys used to group and aggregate alert data
            example: "[\"key1\",\"key2\"]"
            type: string
          type: array
        incidentsSettings:
          $ref: "#/components/schemas/Alert_definition_incident_settings"
        name:
          description: The name of the alert definition
          example: My Alert
          type: string
        notificationGroup:
          $ref: "#/components/schemas/Alert_definition_notification_group"
        notificationGroupExcess:
          items:
            $ref: "#/components/schemas/Alert_definition_notification_group"
          type: array
        phantomMode:
          description: Whether the alert is in phantom mode (creating incidents or
            not)
          example: false
          type: boolean
        priority:
          enum:
          - ALERT_DEF_PRIORITY_P5_OR_UNSPECIFIED
          - ALERT_DEF_PRIORITY_P4
          - ALERT_DEF_PRIORITY_P3
          - ALERT_DEF_PRIORITY_P2
          - ALERT_DEF_PRIORITY_P1
          type: string
        tracingImmediate:
          $ref: "#/components/schemas/Trace_based_immediate_alert_type"
        type:
          enum:
          - ALERT_DEF_TYPE_LOGS_IMMEDIATE_OR_UNSPECIFIED
          - ALERT_DEF_TYPE_LOGS_THRESHOLD
          - ALERT_DEF_TYPE_LOGS_ANOMALY
          - ALERT_DEF_TYPE_LOGS_RATIO_THRESHOLD
          - ALERT_DEF_TYPE_LOGS_NEW_VALUE
          - ALERT_DEF_TYPE_LOGS_UNIQUE_COUNT
          - ALERT_DEF_TYPE_LOGS_TIME_RELATIVE_THRESHOLD
          - ALERT_DEF_TYPE_METRIC_THRESHOLD
          - ALERT_DEF_TYPE_METRIC_ANOMALY
          - ALERT_DEF_TYPE_TRACING_IMMEDIATE
          - ALERT_DEF_TYPE_TRACING_THRESHOLD
          - ALERT_DEF_TYPE_FLOW
          - ALERT_DEF_TYPE_SLO_THRESHOLD
          type: string
      required:
      - name
      - priority
      - type
      - typeDefinition
      title: Alert definition properties
      type: object
    Log_based_new_value_alert_time_window:
      description: Time window configuration for log-based new value alerts
      externalDocs:
        url: ""
      properties:
        logsNewValueTimeWindowSpecificValue:
          enum:
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_HOURS_12_OR_UNSPECIFIED
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_HOURS_24
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_HOURS_48
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_HOURS_72
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_WEEK_1
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_MONTH_1
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_MONTHS_2
          - LOGS_NEW_VALUE_TIME_WINDOW_VALUE_MONTHS_3
          type: string
      required:
      - type
      title: Log-based new value alert time window
      type: object
    AlertDefsService_CreateAlertDef_request:
      oneOf:
      - $ref: "#/components/schemas/Alert_definition_properties_13"
      - $ref: "#/components/schemas/Alert_definition_properties_14"
      - $ref: "#/components/schemas/Alert_definition_properties_15"
      - $ref: "#/components/schemas/Alert_definition_properties_16"
      - $ref: "#/components/schemas/Alert_definition_properties_17"
      - $ref: "#/components/schemas/Alert_definition_properties_18"
      - $ref: "#/components/schemas/Alert_definition_properties_19"
      - $ref: "#/components/schemas/Alert_definition_properties_20"
      - $ref: "#/components/schemas/Alert_definition_properties_21"
      - $ref: "#/components/schemas/Alert_definition_properties_22"
      - $ref: "#/components/schemas/Alert_definition_properties_23"
      - $ref: "#/components/schemas/Alert_definition_properties_24"
      - $ref: "#/components/schemas/Alert_definition_properties_25"
      type: object
    Metric_Missing_Values_Configuration:
      description: Configuration for handling missing values in metric threshold alerts.
      externalDocs:
        url: ""
      properties:
        replaceWithZero:
          description: "If set to true, missing values will be replaced with zero"
          example: true
          type: boolean
      required:
      - missingValues
      title: Metric Missing Values Configuration
      type: object
    Notification_router:
      description: Configuration for routing notifications
      example:
        notifyOn: NOTIFY_ON_TRIGGERED_ONLY_UNSPECIFIED
        id: 123e4567-e89b-12d3-a456-426614174000
      externalDocs:
        url: ""
      properties:
        id:
          description: The ID of the notification router
          example: 123e4567-e89b-12d3-a456-426614174000
          type: string
        notifyOn:
          enum:
          - NOTIFY_ON_TRIGGERED_ONLY_UNSPECIFIED
          - NOTIFY_ON_TRIGGERED_AND_RESOLVED
          type: string
      required:
      - id
      title: Notification router
      type: object
    Metric_based_anomaly_condition:
      externalDocs:
        url: ""
      properties:
        conditionType:
          enum:
          - METRIC_ANOMALY_CONDITION_TYPE_MORE_THAN_USUAL_OR_UNSPECIFIED
          - METRIC_ANOMALY_CONDITION_TYPE_LESS_THAN_USUAL
          type: string
        forOverPct:
          description: The percentage of the metric that must exceed the threshold
            to trigger the alert
          example: 20
          format: int64
          type: integer
        minNonNullValuesPct:
          description: The percentage of non-null values required to trigger the alert
          example: 10
          format: int64
          type: integer
        ofTheLast:
          $ref: "#/components/schemas/Metric_Threshold_Condition_ofTheLast"
        threshold:
          description: The threshold value for the alert condition
          example: 10
          format: double
          type: number
      required:
      - conditionType
      - minNonNullValuesPct
      - ofTheLast
      - threshold
      title: Metric-based anomaly condition
      type: object
    Simple_log_filter:
      description: Basic filter configuration using a Lucene query and label filters
      example:
        labelFilters:
          subsystemName:
          - operation: LOG_FILTER_OPERATION_TYPE_IS_OR_UNSPECIFIED
            value: my-app
          - operation: LOG_FILTER_OPERATION_TYPE_IS_OR_UNSPECIFIED
            value: my-app
          applicationName:
          - operation: LOG_FILTER_OPERATION_TYPE_IS_OR_UNSPECIFIED
            value: my-app
          - operation: LOG_FILTER_OPERATION_TYPE_IS_OR_UNSPECIFIED
            value: my-app
          severities:
          - LOG_SEVERITY_VERBOSE_UNSPECIFIED
          - LOG_SEVERITY_VERBOSE_UNSPECIFIED
        luceneQuery: luceneQuery
      externalDocs:
        url: ""
      properties:
        labelFilters:
          $ref: "#/components/schemas/Label_filters"
        luceneQuery:
          type: string
      title: Simple log filter
      type: object
    Logs_unique_count_condition:
      description: Defines conditions for unique count alerts
      externalDocs:
        url: ""
      properties:
        maxUniqueCount:
          description: The maximum unique count
          example: "100"
          format: int64
          type: string
        timeWindow:
          $ref: "#/components/schemas/Log_based_unique_value_alert_time_window"
      required:
      - maxUniqueCount
      - timeWindow
      title: Logs unique count condition
      type: object
    Entity_label_count:
      description: Count for a specific entity label value
      example:
        count: 28
        labelValue: production
        labelKey: environment
      externalDocs:
        url: ""
      properties:
        count:
          description: The count for this entity label value
          example: 28
          format: int64
          type: integer
        labelKey:
          description: The entity label key
          example: environment
          type: string
        labelValue:
          description: The entity label value
          example: production
          type: string
      title: Entity label count
