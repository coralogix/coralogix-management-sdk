        url: ""
      properties:
        threshold:
          format: double
          type: number
      required:
      - threshold
      title: SLO Threshold Condition
      type: object
    Metric_Threshold_Condition:
      description: Defines conditions for metric threshold alerts
      externalDocs:
        url: ""
      properties:
        conditionType:
          enum:
          - METRIC_THRESHOLD_CONDITION_TYPE_MORE_THAN_OR_UNSPECIFIED
          - METRIC_THRESHOLD_CONDITION_TYPE_LESS_THAN
          - METRIC_THRESHOLD_CONDITION_TYPE_MORE_THAN_OR_EQUALS
          - METRIC_THRESHOLD_CONDITION_TYPE_LESS_THAN_OR_EQUALS
          type: string
        forOverPct:
          description: The percentage of values that must exceed the threshold to
            trigger the alert
          example: 80
          format: int64
          pattern: "^(100|[1-9]?\\d)$"
          type: integer
        ofTheLast:
          $ref: "#/components/schemas/Metric_Threshold_Condition_ofTheLast"
        threshold:
          description: The threshold value for the alert condition
          example: 100
          format: double
          pattern: ^\d+(\.\d+)?$
          type: number
      required:
      - conditionType
      - forOverPct
      - ofTheLast
      - threshold
      title: Metric Threshold Condition
      type: object
