openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /aaa/team-groups/v2:
    get:
      description: Returns all team groups.
      externalDocs:
        url: ""
      operationId: GroupsMgmtService_GetTeamGroups
      parameters:
      - description: "Team to fetch team groups for. If not set, fetches groups associated\
          \ with the logged in team."
        explode: true
        in: query
        name: team_id
        required: false
        schema:
          description: "Team to fetch team groups for. If not set, fetches groups\
            \ associated with the logged in team."
          format: int64
          type: integer
        style: form
      - description: Page size.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          description: Page size.
          format: int64
          type: integer
        style: form
      - description: The page token.
        explode: true
        in: query
        name: page_token
        required: false
        schema:
          description: The page token.
          example: ""
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTeamGroupsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Groups
      tags:
      - Team Groups Management Service
    post:
      description: Creates a new team group.
      externalDocs:
        url: ""
      operationId: GroupsMgmtService_CreateTeamGroup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamGroupRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTeamGroupResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "409":
          content:
            application/json: {}
          description: Team group already exists
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create Team Group
      tags:
      - Team Groups Management Service
  /aaa/team-groups/v2/id/{group_id}:
    get:
      description: Returns the team group with the specified ID.
      externalDocs:
        url: ""
      operationId: GroupsMgmtService_GetTeamGroup
      parameters:
      - description: The unique identifier of the team group.
        explode: false
        in: path
        name: group_id
        required: true
        schema:
          description: The unique identifier of the team group.
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTeamGroupResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "404":
          content:
            application/json: {}
          description: Team group not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Group
      tags:
      - Team Groups Management Service
  /aaa/team-groups/v2/name/{name}:
    get:
      description: Returns the team group with the specified name.
      externalDocs:
        url: ""
      operationId: GroupsMgmtService_GetTeamGroupByName
      parameters:
      - description: The name of the team group to retrieve.
        explode: false
        in: path
        name: name
        required: true
        schema:
          description: The name of the team group to retrieve.
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTeamGroupByNameResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "404":
          content:
            application/json: {}
          description: Team group not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Group By Name
      tags:
      - Team Groups Management Service
  /aaa/team-groups/v2/{group_id}:
    delete:
      description: Deletes the team group with the specified ID.
      externalDocs:
        url: ""
      operationId: GroupsMgmtService_DeleteTeamGroup
      parameters:
      - description: The unique identifier of the team group to delete.
        explode: false
        in: path
        name: group_id
        required: true
        schema:
          description: The unique identifier of the team group to delete.
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTeamGroupResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "404":
          content:
            application/json: {}
          description: Team group not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete Team Group
      tags:
      - Team Groups Management Service
    put:
      description: Updates the specified team group.
      externalDocs:
        url: ""
      operationId: GroupsMgmtService_UpdateTeamGroup
      parameters:
      - description: Unique identifier of the team group to update.
        explode: false
        in: path
        name: group_id
        required: true
        schema:
          description: Unique identifier of the team group to update.
          format: int64
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamGroupRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTeamGroupResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "404":
          content:
            application/json: {}
          description: Team group not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Update Team Group
      tags:
      - Team Groups Management Service
  /aaa/team-groups/v2/{group_id}/users/list:
    get:
      description: Returns all users in the specified team group.
      externalDocs:
        url: ""
      operationId: GroupsMgmtService_GetGroupUsers
      parameters:
      - description: The unique identifier of the team group whose users to list.
        explode: false
        in: path
        name: group_id
        required: true
        schema:
          description: The unique identifier of the team group whose users to list.
          format: int64
          type: integer
        style: simple
      - description: Pagination size. Defaults to 100 if empty.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          description: Pagination size. Defaults to 100 if empty.
          format: int64
          type: integer
        style: form
      - description: Optional pagination continuation token.
        explode: true
        in: query
        name: page_token
        required: false
        schema:
          description: Optional pagination continuation token.
          example: ""
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupUsersResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "404":
          content:
            application/json: {}
          description: Team group not found
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Group Users
      tags:
      - Team Groups Management Service
components:
  schemas:
    ClearRole:
      description: Clear role.
      example:
        clear: true
      externalDocs:
        url: ""
      properties:
        clear:
          description: The clear.
          type: boolean
      type: object
    ClearScope:
      description: Clear scope.
      example:
        clear: true
      externalDocs:
        url: ""
      properties:
        clear:
          description: The clear.
          type: boolean
      type: object
    CreateTeamGroupResponse:
      description: Response containing the newly created team group.
      example:
        group:
          createdAt: 2000-01-23T04:56:07.000+00:00
          groupType: GROUP_TYPE_UNSPECIFIED
          role:
            roleId: 6
            name: name
            description: description
          groupId: 0
          scope:
            scopeId: scopeId
          teamId: 1
          name: name
          description: description
          externalId: externalId
          groupOrigin: GROUP_ORIGIN_UNSPECIFIED
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        group:
          $ref: "#/components/schemas/TeamGroup"
      title: CreateTeamGroupResponse
      type: object
    DeleteTeamGroupResponse:
      description: Response confirming the successful deletion of a team group and
        its associated configurations.
      example:
        groupId: 0
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        groupId:
          description: The group id.
          format: int64
          type: integer
      title: DeleteTeamGroupResponse
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetGroupUsersResponse:
      description: Response containing the list of all users currently assigned to
        the requested team group.
      example:
        nextPageToken: nextPageToken
        totalCount: 0
        users:
        - firstName: firstName
          lastName: lastName
          userAccountId: 6
          userId: userId
          status: USER_STATUS_UNSPECIFIED
          username: username
        - firstName: firstName
          lastName: lastName
          userAccountId: 6
          userId: userId
          status: USER_STATUS_UNSPECIFIED
          username: username
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        nextPageToken:
          description: Token for fetching the next page of results.
          type: string
        totalCount:
          description: The total count.
          format: int64
          type: integer
        users:
          description: List of users.
          items:
            $ref: "#/components/schemas/rbac.v2.User"
          type: array
      title: GetGroupUsersResponse
      type: object
    GetTeamGroupByNameResponse:
      description: "Response containing the complete details of a team group that\
        \ matches the requested name, including its members, roles, and scope settings."
      example:
        group:
          createdAt: 2000-01-23T04:56:07.000+00:00
          groupType: GROUP_TYPE_UNSPECIFIED
          role:
            roleId: 6
            name: name
            description: description
          groupId: 0
          scope:
            scopeId: scopeId
          teamId: 1
          name: name
          description: description
          externalId: externalId
          groupOrigin: GROUP_ORIGIN_UNSPECIFIED
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        group:
          $ref: "#/components/schemas/TeamGroup"
      title: GetTeamGroupByNameResponse
      type: object
    GetTeamGroupResponse:
      description: "Response containing the complete details of a requested team group,\
        \ including its members, assigned roles, and scope configuration."
      example:
        group:
          createdAt: 2000-01-23T04:56:07.000+00:00
          groupType: GROUP_TYPE_UNSPECIFIED
          role:
            roleId: 6
            name: name
            description: description
          groupId: 0
          scope:
            scopeId: scopeId
          teamId: 1
          name: name
          description: description
          externalId: externalId
          groupOrigin: GROUP_ORIGIN_UNSPECIFIED
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        group:
          $ref: "#/components/schemas/TeamGroup"
      title: GetTeamGroupResponse
      type: object
    GetTeamGroupsResponse:
      description: Response containing a paginated list of team groups.
      example:
        nextPageToken: nextPageToken
        groups:
        - createdAt: 2000-01-23T04:56:07.000+00:00
          groupType: GROUP_TYPE_UNSPECIFIED
          role:
            roleId: 6
            name: name
            description: description
          groupId: 0
          scope:
            scopeId: scopeId
          teamId: 1
          name: name
          description: description
          externalId: externalId
          groupOrigin: GROUP_ORIGIN_UNSPECIFIED
          updatedAt: 2000-01-23T04:56:07.000+00:00
        - createdAt: 2000-01-23T04:56:07.000+00:00
          groupType: GROUP_TYPE_UNSPECIFIED
          role:
            roleId: 6
            name: name
            description: description
          groupId: 0
          scope:
            scopeId: scopeId
          teamId: 1
          name: name
          description: description
          externalId: externalId
          groupOrigin: GROUP_ORIGIN_UNSPECIFIED
          updatedAt: 2000-01-23T04:56:07.000+00:00
        totalCount: 5
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        groups:
          description: List of groups.
          items:
            $ref: "#/components/schemas/TeamGroup"
          type: array
        nextPageToken:
          description: Token for fetching the next page of results.
          type: string
        totalCount:
          description: The total count.
          format: int64
          type: integer
      title: GetTeamGroupsResponse
      type: object
    GroupOrigin:
      description: Group origin.
      enum:
      - GROUP_ORIGIN_UNSPECIFIED
      - GROUP_ORIGIN_BUILT_IN
      - GROUP_ORIGIN_USER_DEFINED
      type: string
    GroupType:
      description: Group type.
      enum:
      - GROUP_TYPE_UNSPECIFIED
      - GROUP_TYPE_OPEN
      - GROUP_TYPE_CLOSED
      - GROUP_TYPE_RESTRICTED
      type: string
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            type: string
          type: array
      type: object
    Role:
      description: A role that can be assigned to a group. Each role has a collection
        of permissions associated with it.
      example:
        roleId: 6
        name: name
        description: description
      externalDocs:
        url: ""
      properties:
        description:
          description: Role description
          type: string
        name:
          description: Unique role name
          type: string
        roleId:
          description: Unique role identifier
          format: int64
          type: integer
      title: Role
      type: object
    RoleUpdate:
      description: Update the role assigned to the group. Either set a new role or
        clear the existing one.
      example:
        action:
          actionType: actionType
          clear:
            clear: true
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        action:
          $ref: "#/components/schemas/RoleUpdateAction"
      title: RoleUpdate
      type: object
    RoleUpdateAction:
      discriminator:
        mapping:
          clear: "#/components/schemas/RoleUpdateActionClear"
          set_role_id: "#/components/schemas/RoleUpdateActionSetRoleId"
        propertyName: action_type
      oneOf:
      - $ref: "#/components/schemas/RoleUpdateActionClear"
      - $ref: "#/components/schemas/RoleUpdateActionSetRoleId"
    RoleUpdateActionClear:
      description: Clear role.
      example:
        actionType: actionType
        clear:
          clear: true
      externalDocs:
        url: ""
      properties:
        actionType:
          description: Discriminator indicating the role update action type (set_role_id
            or clear).
          type: string
        clear:
          $ref: "#/components/schemas/ClearRole"
      required:
      - actionType
      - clear
      type: object
    RoleUpdateActionSetRoleId:
      description: Clear role.
      externalDocs:
        url: ""
      properties:
        actionType:
          description: Discriminator indicating the role update action type (set_role_id
            or clear).
          type: string
        setRoleId:
          $ref: "#/components/schemas/SetRoleId"
      required:
      - actionType
      - setRoleId
      type: object
    ScopeUpdate:
      description: Update the scope assigned to the group. Either reference an existing
        scope by ID or clear the scope.
      example:
        action:
          actionType: actionType
          clear:
            clear: true
      externalDocs:
        description: Find out more about scopes
        url: https://coralogix.com/docs/user-guides/account-management/user-management/scopes/
      properties:
        action:
          $ref: "#/components/schemas/ScopeUpdateAction"
      title: ScopeUpdate
      type: object
    ScopeUpdateAction:
      discriminator:
        mapping:
          clear: "#/components/schemas/ScopeUpdateActionClear"
          set_scope_id: "#/components/schemas/ScopeUpdateActionSetScopeId"
        propertyName: action_type
      oneOf:
      - $ref: "#/components/schemas/ScopeUpdateActionClear"
      - $ref: "#/components/schemas/ScopeUpdateActionSetScopeId"
    ScopeUpdateActionClear:
      description: Set scope id.
      example:
        actionType: actionType
        clear:
          clear: true
      externalDocs:
        url: ""
      properties:
        actionType:
          description: Discriminator indicating the scope update action type (set_scope_id
            or clear).
          type: string
        clear:
          $ref: "#/components/schemas/ClearScope"
      required:
      - actionType
      - clear
      type: object
    ScopeUpdateActionSetScopeId:
      description: Set scope id.
      externalDocs:
        url: ""
      properties:
        actionType:
          description: Discriminator indicating the scope update action type (set_scope_id
            or clear).
          type: string
        setScopeId:
          $ref: "#/components/schemas/SetScopeId"
      required:
      - actionType
      - setScopeId
      type: object
    SetRoleId:
      description: Set role id.
      externalDocs:
        url: ""
      properties:
        value:
          description: The value.
          format: int64
          type: integer
      type: object
    SetScopeId:
      description: Set scope id.
      externalDocs:
        url: ""
      properties:
        value:
          description: The value.
          type: string
      type: object
    TeamGroup:
      description: A Team Group entity.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        groupType: GROUP_TYPE_UNSPECIFIED
        role:
          roleId: 6
          name: name
          description: description
        groupId: 0
        scope:
          scopeId: scopeId
        teamId: 1
        name: name
        description: description
        externalId: externalId
        groupOrigin: GROUP_ORIGIN_UNSPECIFIED
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        createdAt:
          description: Creation timestamp.
          format: date-time
          type: string
        description:
          description: Group description
          type: string
        externalId:
          description: Group external identifier. Applies if team is externally defined.
          type: string
        groupId:
          description: Unique team group identifier
          format: int64
          type: integer
        groupOrigin:
          $ref: "#/components/schemas/GroupOrigin"
        groupType:
          $ref: "#/components/schemas/GroupType"
        name:
          description: Unique name
          type: string
        role:
          $ref: "#/components/schemas/Role"
        scope:
          $ref: "#/components/schemas/v2.Scope"
        teamId:
          description: Team this group belongs to
          format: int64
          type: integer
        updatedAt:
          description: Last-updated timestamp.
          format: date-time
          type: string
      title: TeamGroup
      type: object
    UpdateTeamGroupResponse:
      description: Response containing the updated team group.
      example:
        group:
          createdAt: 2000-01-23T04:56:07.000+00:00
          groupType: GROUP_TYPE_UNSPECIFIED
          role:
            roleId: 6
            name: name
            description: description
          groupId: 0
          scope:
            scopeId: scopeId
          teamId: 1
          name: name
          description: description
          externalId: externalId
          groupOrigin: GROUP_ORIGIN_UNSPECIFIED
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        group:
          $ref: "#/components/schemas/TeamGroup"
      title: UpdateTeamGroupResponse
      type: object
    UserIdList:
      description: User id list.
      example:
        userIds:
        - userIds
        - userIds
      externalDocs:
        url: ""
      properties:
        userIds:
          description: The user ids.
          items:
            description: The user ids.
            type: string
          type: array
      type: object
    UserStatus:
      description: User status.
      enum:
      - USER_STATUS_UNSPECIFIED
      - USER_STATUS_ACTIVE
      - USER_STATUS_INACTIVE
      type: string
    UserUpdates:
      description: "Patch object for updating group user membership. Choose one operation:\
        \ add, remove, or replace all users."
      example:
        operation:
          add:
            userIds:
            - userIds
            - userIds
          operationType: operationType
      externalDocs:
        description: Find out more about groups
        url: https://coralogix.com/docs/user-guides/account-management/user-management/assign-user-roles-and-scopes-via-groups/
      properties:
        operation:
          $ref: "#/components/schemas/UserUpdatesOperation"
      title: UserUpdates
      type: object
    UserUpdatesOperation:
      discriminator:
        mapping:
          add: "#/components/schemas/UserUpdatesOperationAdd"
          remove: "#/components/schemas/UserUpdatesOperationRemove"
          set: "#/components/schemas/UserUpdatesOperationSet"
        propertyName: operation_type
      oneOf:
      - $ref: "#/components/schemas/UserUpdatesOperationAdd"
      - $ref: "#/components/schemas/UserUpdatesOperationRemove"
      - $ref: "#/components/schemas/UserUpdatesOperationSet"
    UserUpdatesOperationAdd:
      description: User id list.
      example:
        add:
          userIds:
          - userIds
          - userIds
        operationType: operationType
      externalDocs:
        url: ""
      properties:
        add:
          $ref: "#/components/schemas/UserIdList"
        operationType:
          description: "Discriminator indicating the user update operation type (add,\
            \ remove, or set)."
          type: string
      required:
      - add
      - operationType
      type: object
    UserUpdatesOperationRemove:
      description: User id list.
      externalDocs:
        url: ""
      properties:
        operationType:
          description: "Discriminator indicating the user update operation type (add,\
            \ remove, or set)."
          type: string
        remove:
          $ref: "#/components/schemas/UserIdList"
      required:
      - operationType
      - remove
      type: object
    UserUpdatesOperationSet:
      description: User id list.
      externalDocs:
        url: ""
      properties:
        operationType:
          description: "Discriminator indicating the user update operation type (add,\
            \ remove, or set)."
          type: string
        set:
          $ref: "#/components/schemas/UserIdList"
