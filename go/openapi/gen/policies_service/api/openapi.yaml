                  },
                  "enabled": {
                    "example": true,
                    "description": "Indicates whether the policy should be actively evaluated and applied.",
                    "type": "boolean"
                  },
                  "id": {
                    "example": "policy_id",
                    "description": "Unique identifier of the policy to update.",
                    "type": "string",
                    "minLength": 0
                  },
                  "logRules": {
                    "$ref": "#/components/schemas/LogRules"
                  },
                  "name": {
                    "example": "My Policy",
