                  },
                  "spanRules": {
                    "$ref": "#/components/schemas/SpanRules"
                  },
                  "subsystemRule": {
                    "$ref": "#/components/schemas/quota.v1.Rule"
                  },
                  "targets": {
                    "description": "List of data targets/destinations to which this policy routes data.",
                    "type": "array",
                    "items": {
                      "$ref": "#/components/schemas/v1.Target"
                    },
                    "minItems": 0
                  }
                },
                "required": [
                  "id"
                ],
                "oneOf": [
                  {
                    "type": "object",
                    "required": [
                      "logRules"
