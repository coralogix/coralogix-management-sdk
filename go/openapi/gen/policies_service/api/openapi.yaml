    "/dataplans/policies/v1/all/forecast-usage": {
      "post": {
        "tags": [
          "Policies Service"
        ],
        "summary": "Forecast Policy Usage",
        "description": "Forecasts the usage in bytes that a draft TCO policy would match over the requested time window, given its application/subsystem rules and log or span filters. Use this before saving a new or modified policy to see the impact on your quota.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "PoliciesService_ForecastPolicyUsage",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Forecast Policy Usage Request",
                "description": "Request to forecast the usage in bytes of a draft TCO policy, based on the bytes matched by its filter rules over a given time window.",
                "type": "object",
                "properties": {
                  "applicationRule": {
                    "$ref": "#/components/schemas/quota.v1.Rule"
                  },
                  "day": {
                    "$ref": "#/components/schemas/Day"
                  },
                  "logRules": {
                    "$ref": "#/components/schemas/LogRules"
                  },
                  "rumRules": {
                    "$ref": "#/components/schemas/LogRules"
                  },
                  "spanRules": {
                    "$ref": "#/components/schemas/SpanRules"
                  },
                  "subsystemRule": {
                    "$ref": "#/components/schemas/quota.v1.Rule"
                  },
                  "timeBucketMs": {
                    "example": "3600000",
                    "description": "Optional bucket size, in milliseconds, used to split the forecast into time buckets. When set, the response includes a per-bucket breakdown in usage_buckets; when omitted, only the total estimated bytes are returned.",
                    "type": "string",
                    "pattern": "^-?[0-9]+$",
                    "minLength": 1,
                    "maxLength": 20
                  },
                  "week": {
                    "$ref": "#/components/schemas/Week"
                  }
                },
                "allOf": [
                  {
                    "oneOf": [
                      {
                        "type": "object",
                        "required": [
                          "logRules"
                        ]
                      },
                      {
                        "type": "object",
                        "required": [
                          "spanRules"
                        ]
                      },
                      {
                        "type": "object",
                        "required": [
                          "rumRules"
                        ]
                      },
                      {
                        "type": "object",
                        "not": {
                          "anyOf": [
                            {
                              "type": "object",
                              "required": [
                                "logRules"
                              ]
                            },
                            {
                              "type": "object",
                              "required": [
                                "spanRules"
                              ]
                            },
                            {
                              "type": "object",
                              "required": [
                                "rumRules"
                              ]
                            }
                          ]
                        }
                      }
                    ]
                  },
                  {
                    "oneOf": [
                      {
                        "type": "object",
                        "required": [
                          "day"
                        ]
                      },
                      {
                        "type": "object",
                        "required": [
                          "week"
                        ]
                      },
                      {
                        "type": "object",
                        "not": {
                          "anyOf": [
                            {
                              "type": "object",
                              "required": [
                                "day"
                              ]
                            },
                            {
                              "type": "object",
                              "required": [
                                "week"
                              ]
                            }
                          ]
                        }
                      }
                    ]
                  }
                ]
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ForecastPolicyUsageResponse"
                },
                "example": {
                  "estimatedBytes": "13251739648"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      }
    },
