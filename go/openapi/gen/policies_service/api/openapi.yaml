                    "type": "string",
                    "minLength": 0
                  },
                  "priority": {
                    "$ref": "#/components/schemas/quota.v1.Priority"
                  },
                  "priorityOverride": {
                    "$ref": "#/components/schemas/PriorityOverride"
                  },
                  "rumRules": {
