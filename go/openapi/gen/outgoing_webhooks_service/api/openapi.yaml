openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /integrations/webhook-types/v1:
    get:
      description: |-
        Returns all available outgoing webhook types.

        Requires the following permissions:
        - `outbound-webhooks:ReadConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_ListOutgoingWebhookTypes
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOutgoingWebhookTypesResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get outgoing webhook types
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadConfig
  /integrations/webhook-types/v1/{type}:
    get:
      description: |-
        Returns the details for the specified outgoing webhook type.

        Requires the following permissions:
        - `outbound-webhooks:ReadConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_GetOutgoingWebhookTypeDetails
      parameters:
      - description: The outgoing webhook type to fetch details for.
        explode: false
        in: path
        name: type
        required: true
        schema:
          $ref: "#/components/schemas/WebhookType"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOutgoingWebhookTypeDetailsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get outgoing webhook type details
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadConfig
  /integrations/webhooks-test/v1:
    post:
      description: |-
        Tests an outgoing webhook configuration.

        Requires the following permissions:
        - `outbound-webhooks:ReadConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_TestOutgoingWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Test_outgoing_webhook_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestOutgoingWebhookResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Test an outgoing webhook
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadConfig
  /integrations/webhooks/v1:
    get:
      description: |-
        Returns all outgoing webhooks for the team.

        Requires the following permissions:
        - `outbound-webhooks:ReadConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_ListAllOutgoingWebhooks
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAllOutgoingWebhooksResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List all outgoing webhooks
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadConfig
    post:
      description: |-
        Creates a new outgoing webhook.

        Requires the following permissions:
        - `outbound-webhooks:UpdateConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_CreateOutgoingWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_outgoing_webhook_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutgoingWebhookResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create an outgoing webhook
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:UpdateConfig
    put:
      description: |-
        Updates an existing outgoing webhook.

        Requires the following permissions:
        - `outbound-webhooks:UpdateConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_UpdateOutgoingWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_outgoing_webhook_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOutgoingWebhookResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Update an outgoing webhook
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:UpdateConfig
  /integrations/webhooks/v1/list/by-types:
    get:
      description: |-
        Returns outgoing webhooks grouped by type.

        Requires the following permissions:
        - `outbound-webhooks:ReadConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_ListOutgoingWebhooks
      parameters:
      - description: The outgoing webhook type to filter the listing by.
        explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: "#/components/schemas/WebhookType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOutgoingWebhooksResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List outgoing webhooks
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadConfig
  /integrations/webhooks/v1/list/summaries:
    get:
      description: |-
        Returns summary information for all outgoing webhooks.

        Requires the following permissions:
        - `outbound-webhooks:ReadSummary`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_ListOutboundWebhooksSummary
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOutboundWebhooksSummaryResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List outbound webhooks summary
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadSummary
  /integrations/webhooks/v1/{id}:
    delete:
      description: |-
        Deletes the outgoing webhook with the specified ID.

        Requires the following permissions:
        - `outbound-webhooks:UpdateConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_DeleteOutgoingWebhook
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          example: example_id
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOutgoingWebhookResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete an outgoing webhook
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:UpdateConfig
    get:
      description: |-
        Returns the details of the specified outgoing webhook.

        Requires the following permissions:
        - `outbound-webhooks:ReadConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_GetOutgoingWebhook
      parameters:
      - description: The unique identifier of the outgoing webhook.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: The unique identifier of the outgoing webhook.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOutgoingWebhookResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get outgoing webhook
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadConfig
  /integrations/webhooks/v1/{id}/test:
    get:
      description: |-
        Tests the specified outgoing webhook.

        Requires the following permissions:
        - `outbound-webhooks:ReadConfig`
      externalDocs:
        url: ""
      operationId: OutgoingWebhooksService_TestExistingOutgoingWebhook
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          example: example_id
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestOutgoingWebhookResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Test an existing outgoing webhook
      tags:
      - Outgoing webhooks service
      x-coralogixPermissions:
      - outbound-webhooks:ReadConfig
components:
  schemas:
    Attachment:
      externalDocs:
        url: ""
      properties:
        isActive:
          description: Whether this resource is active.
          type: boolean
        type:
          $ref: "#/components/schemas/AttachmentType"
      title: Slack attachment configuration
      type: object
    AttachmentType:
      description: Attachment type.
      enum:
      - EMPTY
      - METRIC_SNAPSHOT
      - LOGS
      type: string
    AwsEventBridgeConfig:
      description: Aws event bridge config.
      example:
        detailType: detail_type
        roleName: role_name
        eventBusArn: arn:aws:events:us-east-1:123456789012:event-bus/default
        detail: detail
        source: source
      externalDocs:
        url: ""
      properties:
        detail:
          description: Detail.
          minLength: 0
          type: string
        detailType:
          description: The detail type.
          example: detail_type
          minLength: 0
          type: string
        eventBusArn:
          description: The event bus arn.
          example: arn:aws:events:us-east-1:123456789012:event-bus/default
          minLength: 0
          type: string
        roleName:
          description: The role name.
          example: role_name
          minLength: 0
          type: string
        source:
          description: Source.
          example: source
          minLength: 0
          type: string
      title: AWS EventBridge configuration
      type: object
    CreateOutgoingWebhookResponse:
      description: Response returned after successfully creating an outgoing webhook.
      example:
        id: example_id
      externalDocs:
        url: ""
      properties:
        id:
          description: Unique identifier.
          example: example_id
          minLength: 0
          type: string
      title: Create outgoing webhook response
      type: object
    DeleteOutgoingWebhookResponse:
      additionalProperties: false
      description: Response returned after successfully deleting an outgoing webhook.
      externalDocs:
        url: ""
      title: Delete outgoing webhook response
      type: object
    DemistoConfig:
      description: Demisto config.
      externalDocs:
        url: ""
      properties:
        payload:
          description: Raw payload data.
          minLength: 0
          type: string
        uuid:
          description: The uuid.
          example: d838cd7b-087b-40c6-bc33-80997020f5d0
          minLength: 0
          type: string
      title: Demisto configuration
      type: object
    Digest:
      externalDocs:
        url: ""
      properties:
        isActive:
          description: Whether this resource is active.
          type: boolean
        type:
          $ref: "#/components/schemas/DigestType"
      title: Slack digest configuration
      type: object
    DigestType:
      description: Digest type.
      enum:
      - UNKNOWN
      - ERROR_AND_CRITICAL_LOGS
      - FLOW_ANOMALIES
      - SPIKE_ANOMALIES
      - DATA_USAGE
      type: string
    EmailGroupConfig:
      description: Email group config.
      externalDocs:
        url: ""
      properties:
        emailAddresses:
          description: The email addresses.
          example:
          - example@coralogix.com
          items:
            description: The email addresses.
            minLength: 0
            type: string
          minItems: 0
          type: array
      title: Email group configuration
      type: object
    EndpointType:
      description: Endpoint type.
      enum:
      - ENDPOINT_TYPE_DEFAULT_OR_PUBLIC
      - ENDPOINT_TYPE_PRIVATE
      type: string
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GenericWebhookConfig:
      description: Generic webhook config.
      externalDocs:
        url: ""
      properties:
        headers:
          additionalProperties:
            minLength: 0
            type: string
          description: The headers.
          type: object
        method:
          $ref: "#/components/schemas/MethodType"
        payload:
          description: Raw payload data.
          minLength: 0
          type: string
        uuid:
          description: The uuid.
          example: d838cd7b-087b-40c6-bc33-80997020f5d0
          minLength: 0
          type: string
      title: Generic webhook configuration
      type: object
    GetOutgoingWebhookResponse:
      description: Response containing the details of an outgoing webhook.
      example:
        webhook:
          createdAt: 2000-01-23T04:56:07.000+00:00
          name: my_webhook
          externalId: 123456
          id: webhook_id
          type: UNKNOWN
          awsEventBridge:
            detailType: detail_type
            roleName: role_name
            eventBusArn: arn:aws:events:us-east-1:123456789012:event-bus/default
            detail: detail
            source: source
          url: slack.webhook.com
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        webhook:
          $ref: "#/components/schemas/OutgoingWebhook"
      title: Get outgoing webhook response
      type: object
    GetOutgoingWebhookTypeDetailsResponse:
      description: Response containing the details of an outgoing webhook type.
      example:
        details:
          label: example_label
          type: UNKNOWN
      externalDocs:
        url: ""
      properties:
        details:
          $ref: "#/components/schemas/OutgoingWebhookDetails"
      title: Get outgoing webhook type details response
      type: object
    IbmEventNotificationsConfig:
      description: Ibm event notifications config.
      externalDocs:
        url: ""
      properties:
        endpointType:
          $ref: "#/components/schemas/EndpointType"
        eventNotificationsInstanceId:
          description: The event notifications instance id.
          minLength: 0
          type: string
        regionId:
          description: The region id.
          minLength: 0
          type: string
        sourceId:
          description: The source id.
          minLength: 0
          type: string
        sourceName:
          description: The source name.
          minLength: 0
          type: string
      title: IBM event notification configuration
      type: object
    JiraConfig:
      description: Jira config.
      externalDocs:
        url: ""
      properties:
        apiToken:
          description: The api token.
          example: jira_api_token
          minLength: 0
          type: string
        email:
          description: Email address.
          example: jira_email
          minLength: 0
          type: string
        projectKey:
          description: The project key.
          example: jira_project_key
          minLength: 0
          type: string
      title: Jira configuration
      type: object
    ListAllOutgoingWebhooksResponse:
      description: Response containing a list of all outgoing webhooks.
      example:
        deployed:
        - createdAt: 2000-01-23T04:56:07.000+00:00
          name: my_webhook
          externalId: 123456
          id: webhook_id
          type: UNKNOWN
          url: slack.webhook.com
          updatedAt: 2000-01-23T04:56:07.000+00:00
        - createdAt: 2000-01-23T04:56:07.000+00:00
          name: my_webhook
          externalId: 123456
          id: webhook_id
          type: UNKNOWN
          url: slack.webhook.com
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        deployed:
          description: The deployed.
          items:
            $ref: "#/components/schemas/OutgoingWebhookExtendedSummary"
          minItems: 0
          type: array
      title: List all outgoing webhooks response
      type: object
    ListOutboundWebhooksSummaryResponse:
      description: Response containing summary information for outgoing webhooks.
      example:
        outboundWebhookSummaries:
        - createdAt: 2000-01-23T04:56:07.000+00:00
          name: name
          externalId: 0
          id: id
          type: UNKNOWN
          updatedAt: 2000-01-23T04:56:07.000+00:00
        - createdAt: 2000-01-23T04:56:07.000+00:00
          name: name
          externalId: 0
          id: id
          type: UNKNOWN
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        outboundWebhookSummaries:
          description: The outbound webhook summaries.
          items:
            $ref: "#/components/schemas/OutboundWebhookSummary"
          minItems: 0
          type: array
      title: List outbound webhooks summary response
      type: object
    ListOutgoingWebhookTypesResponse:
      description: Response containing a list of available outgoing webhook types.
      example:
        webhooks:
        - count: 3
          label: example_label
          type: UNKNOWN
        - count: 3
          label: example_label
          type: UNKNOWN
      externalDocs:
        url: ""
      properties:
        webhooks:
          description: List of webhooks.
          items:
            $ref: "#/components/schemas/OutgoingWebhookType"
          minItems: 0
          type: array
      title: List outgoing webhook types response
      type: object
    ListOutgoingWebhooksResponse:
      description: Response containing a list of outgoing webhooks.
      example:
        deployed:
        - createdAt: 2000-01-23T04:56:07.000+00:00
          name: my_webhook
          externalId: 123456
          id: webhook_id
          url: slack.webhook.com
          updatedAt: 2000-01-23T04:56:07.000+00:00
        - createdAt: 2000-01-23T04:56:07.000+00:00
          name: my_webhook
          externalId: 123456
          id: webhook_id
          url: slack.webhook.com
          updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        deployed:
          description: The deployed.
          items:
            $ref: "#/components/schemas/OutgoingWebhookSummary"
          minItems: 0
          type: array
      title: List outgoing webhooks response
      type: object
    MSTeamsWorkflowConfig:
      additionalProperties: false
      description: Ms teams workflow config.
      externalDocs:
        url: ""
      title: Microsoft Teams workflow configuration
      type: object
    MethodType:
      description: Method type.
      enum:
      - UNKNOWN
      - GET
      - POST
      - PUT
      type: string
    MicrosoftTeamsConfig:
      additionalProperties: false
      description: Microsoft teams config.
      externalDocs:
        url: ""
      title: Microsoft Teams configuration
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    OpsgenieConfig:
      additionalProperties: false
      description: Opsgenie config.
      externalDocs:
        url: ""
      title: Opsgenie configuration
      type: object
    OutboundWebhookSummary:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        name: name
        externalId: 0
        id: id
        type: UNKNOWN
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        createdAt:
          description: Creation timestamp.
          format: date-time
          minLength: 0
          type: string
        externalId:
          description: The external id.
          format: int64
          minimum: 0
          type: integer
        id:
          description: Unique identifier.
          minLength: 0
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
        type:
          $ref: "#/components/schemas/WebhookType"
        updatedAt:
          description: Last-updated timestamp.
          format: date-time
          minLength: 0
          type: string
      title: Outbound webhook summary
      type: object
    OutgoingWebhook:
      oneOf:
      - $ref: "#/components/schemas/OutgoingWebhookAwsEventBridge"
      - $ref: "#/components/schemas/OutgoingWebhookDemisto"
      - $ref: "#/components/schemas/OutgoingWebhookEmailGroup"
      - $ref: "#/components/schemas/OutgoingWebhookGenericWebhook"
      - $ref: "#/components/schemas/OutgoingWebhookIbmEventNotifications"
      - $ref: "#/components/schemas/OutgoingWebhookJira"
      - $ref: "#/components/schemas/OutgoingWebhookMicrosoftTeams"
      - $ref: "#/components/schemas/OutgoingWebhookMsTeamsWorkflow"
      - $ref: "#/components/schemas/OutgoingWebhookOpsgenie"
      - $ref: "#/components/schemas/OutgoingWebhookPagerDuty"
      - $ref: "#/components/schemas/OutgoingWebhookSendLog"
      - $ref: "#/components/schemas/OutgoingWebhookSlack"
    OutgoingWebhookAwsEventBridge:
      description: Outgoing webhook.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        name: my_webhook
        externalId: 123456
        id: webhook_id
        type: UNKNOWN
        awsEventBridge:
          detailType: detail_type
          roleName: role_name
          eventBusArn: arn:aws:events:us-east-1:123456789012:event-bus/default
          detail: detail
          source: source
        url: slack.webhook.com
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        url: ""
      properties:
        awsEventBridge:
          $ref: "#/components/schemas/AwsEventBridgeConfig"
