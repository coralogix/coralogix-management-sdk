        "properties": {
          "result": {
            "$ref": "#/components/schemas/TestResult"
          }
        }
      },
      "TestResult": {
        "externalDocs": {
          "url": ""
        },
        "description": "Result of a notification test, either a success or failure.",
        "type": "object",
        "properties": {
          "failure": {
            "$ref": "#/components/schemas/TestResult.Failure"
          },
          "success": {
            "$ref": "#/components/schemas/TestResult.Success"
          }
        },
        "allOf": [
          {
            "oneOf": [
              {
                "type": "object",
                "required": [
                  "success"
                ]
              },
              {
                "type": "object",
                "required": [
                  "failure"
                ]
              },
              {
                "type": "object",
                "not": {
                  "anyOf": [
                    {
                      "type": "object",
                      "required": [
                        "success"
                      ]
                    },
                    {
                      "type": "object",
                      "required": [
                        "failure"
                      ]
                    }
                  ]
                }
              }
            ]
          }
        ]
      },
      "TestResult.Failure": {
        "externalDocs": {
          "url": ""
        },
        "description": "Failure.",
        "type": "object",
        "properties": {
          "message": {
            "description": "Human-readable message.",
            "type": "string",
            "pattern": "^[\\s\\S]*$",
            "minLength": 1,
            "maxLength": 10000
          },
          "statusCode": {
            "description": "The status code.",
            "type": "integer",
            "format": "int64",
            "minimum": 100,
            "maximum": 599
          }
        }
      },
      "TestResult.Success": {
        "externalDocs": {
          "url": ""
        },
        "description": "Indicates the notification test succeeded.",
        "type": "object",
        "properties": {
          "metadata": {
            "description": "Metadata.",
            "type": "object",
            "additionalProperties": {
              "type": "string",
              "minLength": 0
            }
          }
        }
      },
