      "MessageConfig": {
        "externalDocs": {
          "url": ""
        },
        "description": "Message config.",
        "type": "object",
        "properties": {
          "fields": {
            "description": "List of fields.",
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/notification_center.MessageConfigField"
            },
            "minItems": 0,
            "maxItems": 100
          }
        }
      },
      "MultipleValues": {
        "type": "object",
        "properties": {
