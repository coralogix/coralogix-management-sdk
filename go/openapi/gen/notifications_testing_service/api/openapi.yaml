          },
          "success": {
            "$ref": "#/components/schemas/TestRoutingConditionValidResponse.Success"
          }
        },
        "allOf": [
          {
            "oneOf": [
              {
                "type": "object",
                "required": [
                  "success"
                ]
              },
              {
                "type": "object",
                "required": [
                  "failure"
                ]
              },
              {
                "type": "object",
                "not": {
                  "anyOf": [
                    {
                      "type": "object",
                      "required": [
                        "success"
                      ]
                    },
                    {
                      "type": "object",
                      "required": [
                        "failure"
                      ]
                    }
                  ]
                }
              }
            ]
          }
        ]
      },
