openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /enrichment-rules/enrichment-rules/v1:
    delete:
      description: Deletes all enrichment rules for the team.
      externalDocs:
        url: ""
      operationId: EnrichmentService_RemoveEnrichments
      parameters:
      - description: The unique identifiers of the enrichment rules to delete.
        explode: true
        in: query
        name: enrichment_ids
        required: false
        schema:
          description: The unique identifiers of the enrichment rules to delete.
          example:
          - 1
          - 2
          - 3
          items:
            description: The unique identifiers of the enrichment rules to delete.
            format: int64
            minimum: 0
            type: integer
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveEnrichmentsResponse"
          description: ""
      summary: Delete Enrichments
      tags:
      - Enrichments Service
    get:
      description: Returns all enrichment rules for the team.
      externalDocs:
        url: ""
      operationId: EnrichmentService_GetEnrichments
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnrichmentsResponse"
          description: ""
      summary: Get Enrichments
      tags:
      - Enrichments Service
    post:
      description: Creates new enrichment rules.
      externalDocs:
        url: ""
      operationId: EnrichmentService_AddEnrichments
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Enrichments_Creation_Request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddEnrichmentsResponse"
          description: ""
      summary: Add Enrichments
      tags:
      - Enrichments Service
    put:
      description: Updates enrichment rules.
      externalDocs:
        url: ""
      operationId: EnrichmentService_AtomicOverwriteEnrichments
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrichmentService_AtomicOverwriteEnrichments_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomicOverwriteEnrichmentsResponse"
          description: ""
      summary: Atomic Overwrite for CustomEnrichments only
      tags:
      - Enrichments Service
  /enrichment-rules/enrichment-rules/v1/all:
    put:
      description: "Atomic Overwrite for ALL types of enrichments. The request is\
        \ the desired state which will override ALL enrichments. WARNING: This operation\
        \ will delete all existing enrichments and replace them with the provided\
        \ ones."
      externalDocs:
        url: ""
      operationId: EnrichmentService_AtomicOverwriteAllEnrichments
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrichmentService_AtomicOverwriteAllEnrichments_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomicOverwriteAllEnrichmentsResponse"
          description: ""
      summary: Atomic Overwrite for ALL types of enrichments
      tags:
      - Enrichments Service
  /enrichment-rules/enrichment-rules/v1/limit:
    get:
      description: Returns the maximum number of enrichment rules allowed.
      externalDocs:
        url: ""
      operationId: EnrichmentService_GetEnrichmentLimit
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnrichmentLimitResponse"
          description: ""
      summary: Get Enrichment Limit
      tags:
      - Enrichments Service
  /enrichment-rules/enrichment-rules/v1/settings:
    get:
      description: Returns the current enrichment settings for the team.
      externalDocs:
        url: ""
      operationId: EnrichmentService_GetCompanyEnrichmentSettings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCompanyEnrichmentSettingsResponse"
          description: ""
      summary: Get Company Enrichment Settings
      tags:
      - Enrichments Service
components:
  schemas:
    AddEnrichmentsResponse:
      description: Response data structure for enrichments creation
      example:
        enrichments:
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichments:
          description: List of enrichments.
          items:
            $ref: "#/components/schemas/Enrichment"
          minItems: 0
          type: array
      required:
      - enrichments
      title: Encrichments Creation Response
      type: object
    AtomicOverwriteAllEnrichmentsResponse:
      description: Response returned after atomically replacing all enrichment rules.
      example:
        enrichments:
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
      externalDocs:
        url: ""
      properties:
        enrichments:
          description: List of enrichments.
          items:
            $ref: "#/components/schemas/Enrichment"
          minItems: 0
          type: array
      type: object
    AtomicOverwriteEnrichmentsResponse:
      description: Response returned after atomically updating enrichment rules.
      example:
        enrichments:
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
      externalDocs:
        url: ""
      properties:
        enrichments:
          description: List of enrichments.
          items:
            $ref: "#/components/schemas/Enrichment"
          minItems: 0
          type: array
      type: object
    AwsType:
      description: Aws type.
      example:
        resourceType: ec2
      externalDocs:
        url: ""
      properties:
        resourceType:
          description: The resource type.
          example: ec2
          minLength: 0
          type: string
      type: object
    CompanyEnrichmentSettings:
      description: Company enrichment settings.
      example:
        rowLimit: 0
        sizeLimitBytes: sizeLimitBytes
        enrichmentsInUse: 0
        queryOnlyRowLimit: 0
        enrichmentAmountLimit: 0
        queryOnlySizeLimitBytes: queryOnlySizeLimitBytes
      externalDocs:
        url: ""
      properties:
        enrichmentAmountLimit:
          description: The enrichment amount limit.
          format: int64
          minimum: 0
          type: integer
        enrichmentsInUse:
          description: The enrichments in use.
          format: int64
          minimum: 0
          type: integer
        queryOnlyRowLimit:
          description: The query only row limit.
          format: int64
          minimum: 0
          type: integer
        queryOnlySizeLimitBytes:
          description: The query only size limit bytes.
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]+$"
          type: string
        rowLimit:
          description: The row limit.
          format: int64
          minimum: 0
          type: integer
        sizeLimitBytes:
          description: The size limit bytes.
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]+$"
          type: string
      type: object
    CustomEnrichmentType:
      description: Custom enrichment type.
      externalDocs:
        url: ""
      properties:
        id:
          description: Unique identifier.
          example: 1
          format: int64
          minimum: 0
          type: integer
      type: object
    DatasetTarget:
      description: This data structure represents a target for enrichments. It defines
        a dataset in which the enrichment will be applied to.
      example:
        dataset: dataset1
      externalDocs:
        url: ""
      properties:
        dataset:
          description: The dataset name in which the enrichment will be applied.
          example: dataset1
          maxLength: 100
          minLength: 1
          pattern: "^[a-zA-Z0-9_][a-zA-Z0-9_./-]*$"
          type: string
      title: Dataset Target
      type: object
    Enrichment:
      description: This data structure represents an enrichment
      example:
        enrichmentType:
          aws:
            resourceType: ec2
        selectedColumns:
        - city
        - population
        fieldName: "1"
        enrichedFieldName: "1"
        id: 1
        targets:
        - dataset: dataset1
        - dataset: dataset1
        - dataset: dataset1
        - dataset: dataset1
        - dataset: dataset1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichedFieldName:
          description: The enriched field name.
          example: "1"
          minLength: 0
          type: string
        enrichmentType:
          $ref: "#/components/schemas/EnrichmentType"
        fieldName:
          description: The field name.
          example: "1"
          minLength: 0
          type: string
        id:
          description: Unique identifier.
          example: 1
          format: int64
          minimum: 0
          type: integer
        selectedColumns:
          description: The selected columns.
          example:
          - city
          - population
          items:
            description: The selected columns.
            minLength: 0
            type: string
          minItems: 0
          type: array
        targets:
          description: The targets for the enrichment
          items:
            $ref: "#/components/schemas/DatasetTarget"
          maxItems: 10
          minItems: 1
          type: array
      required:
      - enrichmentType
      - fieldName
      - id
      title: Enrichment
      type: object
    EnrichmentFieldDefinition:
      properties:
        enrichedFieldName:
          description: The enriched field name.
          minLength: 0
          type: string
        fieldName:
          description: The field name.
          minLength: 0
          type: string
        selectedColumns:
          description: The selected columns.
          items:
            description: The selected columns.
            minLength: 0
            type: string
          minItems: 0
          type: array
        targets:
          description: The targets for the enrichment
          items:
            $ref: "#/components/schemas/DatasetTarget"
          maxItems: 10
          minItems: 1
          type: array
      type: object
    EnrichmentRequestModel:
      description: The enrichment request model
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichedFieldName:
          description: The enriched field name.
          minLength: 0
          type: string
        enrichmentType:
          $ref: "#/components/schemas/EnrichmentType"
        fieldName:
          description: The field name.
          example: sourceIPs
          minLength: 0
          type: string
        selectedColumns:
          description: The selected columns.
          items:
            description: The selected columns.
            minLength: 0
            type: string
          minItems: 0
          type: array
        targets:
          description: The targets for the enrichment
          items:
            $ref: "#/components/schemas/DatasetTarget"
          maxItems: 10
          minItems: 1
          type: array
      required:
      - enrichmentType
      - fieldName
      title: Enrichment Prototype
      type: object
    EnrichmentType:
      oneOf:
      - $ref: "#/components/schemas/EnrichmentTypeAws"
      - $ref: "#/components/schemas/EnrichmentTypeCustomEnrichment"
      - $ref: "#/components/schemas/EnrichmentTypeGeoIp"
      - $ref: "#/components/schemas/EnrichmentTypeSuspiciousIp"
    EnrichmentTypeAws:
      description: Enrichment type.
      example:
        aws:
          resourceType: ec2
      externalDocs:
        url: ""
      properties:
        aws:
          $ref: "#/components/schemas/AwsType"
      required:
      - aws
      type: object
    EnrichmentTypeCustomEnrichment:
      description: Enrichment type.
      externalDocs:
        url: ""
      properties:
        customEnrichment:
          $ref: "#/components/schemas/CustomEnrichmentType"
      required:
      - customEnrichment
      type: object
    EnrichmentTypeGeoIp:
      description: Enrichment type.
      externalDocs:
        url: ""
      properties:
        geoIp:
          $ref: "#/components/schemas/GeoIpType"
      required:
      - geoIp
      type: object
    EnrichmentTypeSuspiciousIp:
      description: Enrichment type.
      externalDocs:
        url: ""
      properties:
        suspiciousIp:
          additionalProperties: false
          description: Suspicious ip type.
          externalDocs:
            url: ""
          type: object
      required:
      - suspiciousIp
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GeoIpType:
      description: Geo ip type.
      externalDocs:
        url: ""
      properties:
        withAsn:
          description: The with asn.
          type: boolean
      type: object
    GetCompanyEnrichmentSettingsResponse:
      description: Response containing the company-level enrichment settings.
      example:
        enrichmentSettings:
          rowLimit: 0
          sizeLimitBytes: sizeLimitBytes
          enrichmentsInUse: 0
          queryOnlyRowLimit: 0
          enrichmentAmountLimit: 0
          queryOnlySizeLimitBytes: queryOnlySizeLimitBytes
      externalDocs:
        url: ""
      properties:
        enrichmentSettings:
          $ref: "#/components/schemas/CompanyEnrichmentSettings"
      type: object
    GetEnrichmentLimitResponse:
      description: This response data structure represents the enrichments limit
      example:
        limit: 10
        used: 5
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        limit:
          description: Limit.
          example: 10
          format: int64
          minimum: 0
          type: integer
        used:
          description: The used.
          example: 5
          format: int64
          minimum: 0
          type: integer
      required:
      - limit
      - used
      title: Enrichment Limit
      type: object
    GetEnrichmentsResponse:
      description: This response data structure represents a collection of enrichments
      example:
        enrichments:
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichments:
          description: List of enrichments.
          items:
            $ref: "#/components/schemas/Enrichment"
          minItems: 0
          type: array
      required:
      - enrichments
      title: Enrichment Collection
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    RemoveEnrichmentsResponse:
      description: Response data structure for enrichments deletion
      example:
        remainingEnrichments:
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
        - enrichmentType:
            aws:
              resourceType: ec2
          selectedColumns:
          - city
          - population
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
          targets:
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
          - dataset: dataset1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        remainingEnrichments:
          description: The remaining enrichments.
          items:
            $ref: "#/components/schemas/Enrichment"
          minItems: 0
          type: array
      title: Encrichments Delettion Response
      type: object
    SuspiciousIpType:
      additionalProperties: false
      description: Suspicious ip type.
      externalDocs:
        url: ""
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    EnrichmentService_AtomicOverwriteEnrichments_request:
      description: Request to atomically update enrichment rules.
      properties:
        enrichmentFields:
          description: "Deprecated: enrichment field definitions."
          items:
            $ref: "#/components/schemas/EnrichmentFieldDefinition"
          minItems: 0
          type: array
        enrichmentType:
          $ref: "#/components/schemas/EnrichmentType"
        requestEnrichments:
          description: List of enrichment rules to atomically replace existing rules.
          items:
            $ref: "#/components/schemas/EnrichmentRequestModel"
          minItems: 0
          type: array
      type: object
    Enrichments_Creation_Request:
      description: This response data structure represents a collection of enrichments
      properties:
        requestEnrichments:
          description: The request enrichments.
          items:
            $ref: "#/components/schemas/EnrichmentRequestModel"
          minItems: 0
          type: array
      required:
      - requestEnrichments
      title: Enrichments Creation Request
      type: object
    EnrichmentService_AtomicOverwriteAllEnrichments_request:
      description: Request to atomically replace all enrichment rules.
      properties:
        requestEnrichments:
          description: Complete list of enrichment rules to replace all existing rules.
          items:
            $ref: "#/components/schemas/EnrichmentRequestModel"
          minItems: 0
          type: array
      type: object
