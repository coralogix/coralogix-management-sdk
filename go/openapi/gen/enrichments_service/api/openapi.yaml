openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
tags:
- description: Manage your enrichments.
  externalDocs:
    url: ""
  name: Enrichments Service
paths:
  /enrichments:
    delete:
      externalDocs:
        url: ""
      operationId: EnrichmentService_RemoveEnrichments
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Encrichments_Delettion_Response"
          description: ""
      summary: Delete Enrichments
      tags:
      - Enrichments Service
    get:
      externalDocs:
        url: ""
      operationId: EnrichmentService_GetEnrichments
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrichment_Collection"
          description: ""
      summary: Get Enrichments
      tags:
      - Enrichments Service
    post:
      externalDocs:
        url: ""
      operationId: EnrichmentService_AddEnrichments
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Enrichments_Creation_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Encrichments_Creation_Response"
          description: ""
      summary: Add Enrichments
      tags:
      - Enrichments Service
  /enrichments/limit:
    get:
      externalDocs:
        url: ""
      operationId: EnrichmentService_GetEnrichmentLimit
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrichment_Limit"
          description: ""
      summary: Get Enrichment Limit
      tags:
      - Enrichments Service
  /enrichments/settings:
    get:
      externalDocs:
        url: ""
      operationId: EnrichmentService_GetCompanyEnrichmentSettings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichmentService_GetCompanyEnrichmentSettings_200_response"
          description: ""
      summary: Get Company Enrichment Settings
      tags:
      - Enrichments Service
  /enrichments:atomicOverwrite:
    patch:
      externalDocs:
        url: ""
      operationId: EnrichmentService_AtomicOverwriteEnrichments
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrichmentService_AtomicOverwriteEnrichments_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichmentService_AtomicOverwriteEnrichments_200_response"
          description: ""
      summary: Atomic Overwrite Enrichments
      tags:
      - Enrichments Service
components:
  schemas:
    Enrichment:
      description: This data structure represents an enrichment
      example:
        enrichmentType:
          geoIp:
            withAsn: true
        selectedColumns:
        - "[\"city\",\"population\"]"
        - "[\"city\",\"population\"]"
        fieldName: "1"
        enrichedFieldName: "1"
        id: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichedFieldName:
          example: "1"
          type: string
        enrichmentType:
          $ref: "#/components/schemas/Enrichment_enrichmentType"
        fieldName:
          example: "1"
          type: string
        id:
          example: 1
          format: int64
          type: integer
        selectedColumns:
          items:
            example: "[\"city\",\"population\"]"
            type: string
          type: array
      required:
      - enrichmentType
      - fieldName
      - id
      title: Enrichment
      type: object
    EnrichmentService_GetCompanyEnrichmentSettings_200_response_enrichmentSettings:
      example:
        rowLimit: 5
        sizeLimitBytes: sizeLimitBytes
        enrichmentsInUse: 6
        queryOnlyRowLimit: 1
        enrichmentAmountLimit: 0
        queryOnlySizeLimitBytes: queryOnlySizeLimitBytes
      properties:
        enrichmentAmountLimit:
          format: int64
          type: integer
        enrichmentsInUse:
          format: int64
          type: integer
        queryOnlyRowLimit:
          format: int64
          type: integer
        queryOnlySizeLimitBytes:
          format: int64
          type: string
        rowLimit:
          format: int64
          type: integer
        sizeLimitBytes:
          format: int64
          type: string
      type: object
    EnrichmentService_AtomicOverwriteEnrichments_request_enrichmentFields_inner:
      properties:
        enrichedFieldName:
          type: string
        fieldName:
          type: string
        selectedColumns:
          items:
            type: string
          type: array
      type: object
    EnrichmentService_AtomicOverwriteEnrichments_200_response:
      example:
        enrichments:
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
      properties:
        enrichments:
          items:
            $ref: "#/components/schemas/Enrichment"
          type: array
      type: object
    Encrichments_Creation_Response:
      description: Response data structure for enrichments creation
      example:
        enrichments:
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichments:
          items:
            $ref: "#/components/schemas/Enrichment"
          type: array
      required:
      - enrichments
      title: Encrichments Creation Response
      type: object
    Enrichment_enrichmentType_oneOf:
      example:
        geoIp:
          withAsn: true
      properties:
        geoIp:
          $ref: "#/components/schemas/Enrichment_enrichmentType_oneOf_geoIp"
      type: object
    Enrichment_Collection:
      description: This response data structure represents a collection of enrichments
      example:
        enrichments:
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichments:
          items:
            $ref: "#/components/schemas/Enrichment"
          type: array
      required:
      - enrichments
      title: Enrichment Collection
      type: object
    Enrichment_enrichmentType_oneOf_geoIp:
      example:
        withAsn: true
      properties:
        withAsn:
          type: boolean
      type: object
    Enrichment_Limit:
      description: This response data structure represents the enrichments limit
      example:
        limit: 10
        used: 5
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        limit:
          example: 10
          format: int64
          type: integer
        used:
          example: 5
          format: int64
          type: integer
      required:
      - limit
      - used
      title: Enrichment Limit
      type: object
    Enrichments_Creation_Request:
      description: This response data structure represents a collection of enrichments
      properties:
        requestEnrichments:
          items:
            $ref: "#/components/schemas/Enrichment_Prototype"
          type: array
      required:
      - requestEnrichments
      title: Enrichments Creation Request
      type: object
    Enrichment_enrichmentType_oneOf_2:
      properties:
        aws:
          $ref: "#/components/schemas/Enrichment_enrichmentType_oneOf_2_aws"
      type: object
    Enrichment_enrichmentType_oneOf_3_customEnrichment:
      properties:
        id:
          example: 1
          format: int64
          type: integer
      type: object
    Enrichment_enrichmentType:
      oneOf:
      - $ref: "#/components/schemas/Enrichment_enrichmentType_oneOf"
      - $ref: "#/components/schemas/Enrichment_enrichmentType_oneOf_1"
      - $ref: "#/components/schemas/Enrichment_enrichmentType_oneOf_2"
      - $ref: "#/components/schemas/Enrichment_enrichmentType_oneOf_3"
    Enrichment_enrichmentType_oneOf_3:
      properties:
        customEnrichment:
          $ref: "#/components/schemas/Enrichment_enrichmentType_oneOf_3_customEnrichment"
      type: object
    Enrichment_Prototype:
      description: The enrichment request model
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        enrichedFieldName:
          type: string
        enrichmentType:
          $ref: "#/components/schemas/Enrichment_enrichmentType"
        fieldName:
          example: sourceIPs
          type: string
        selectedColumns:
          items:
            type: string
          type: array
      required:
      - enrichmentType
      - fieldName
      title: Enrichment Prototype
      type: object
    EnrichmentService_GetCompanyEnrichmentSettings_200_response:
      example:
        enrichmentSettings:
          rowLimit: 5
          sizeLimitBytes: sizeLimitBytes
          enrichmentsInUse: 6
          queryOnlyRowLimit: 1
          enrichmentAmountLimit: 0
          queryOnlySizeLimitBytes: queryOnlySizeLimitBytes
      properties:
        enrichmentSettings:
          $ref: "#/components/schemas/EnrichmentService_GetCompanyEnrichmentSettings_200_response_enrichmentSettings"
      type: object
    Enrichment_enrichmentType_oneOf_1:
      properties:
        suspiciousIp:
          type: object
      type: object
    EnrichmentService_AtomicOverwriteEnrichments_request:
      properties:
        enrichmentFields:
          items:
            $ref: "#/components/schemas/EnrichmentService_AtomicOverwriteEnrichments_request_enrichmentFields_inner"
          type: array
        enrichmentType:
          $ref: "#/components/schemas/Enrichment_enrichmentType"
        requestEnrichments:
          items:
            $ref: "#/components/schemas/Enrichment_Prototype"
          type: array
      type: object
    Enrichment_enrichmentType_oneOf_2_aws:
      properties:
        resourceType:
          example: ec2
          type: string
      type: object
    Encrichments_Delettion_Response:
      description: Response data structure for enrichments deletion
      example:
        remainingEnrichments:
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
        - enrichmentType:
            geoIp:
              withAsn: true
          selectedColumns:
          - "[\"city\",\"population\"]"
          - "[\"city\",\"population\"]"
          fieldName: "1"
          enrichedFieldName: "1"
          id: 1
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        remainingEnrichments:
          items:
            $ref: "#/components/schemas/Enrichment"
          type: array
      required:
      - remainingEnrichments
      title: Encrichments Delettion Response
      type: object
