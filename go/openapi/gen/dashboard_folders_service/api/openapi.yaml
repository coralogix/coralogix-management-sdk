components:
  schemas:
    Create_dashboard_folder_request_data_structure:
      properties:
        folder:
          $ref: "#/components/schemas/List_dashboard_folders_response_data_structure_folder_inner"
        requestId:
          type: string
      title: Create dashboard folder request data structure
      type: object
    Create_dashboard_folder_response_data_structure:
      example:
        folderId: folderId
      externalDocs:
        description: Find out more Dashboards in our documentation.
        url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
      properties:
        folderId:
          type: string
      title: Create dashboard folder response data structure
      type: object
    Get_dashboard_folder_response_data_structure:
      example:
        folder:
          name: name
          id: id
          parentId: parentId
      externalDocs:
        description: Find out more Dashboards in our documentation.
        url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
      properties:
        folder:
          $ref: "#/components/schemas/List_dashboard_folders_response_data_structure_folder_inner"
      title: Get dashboard folder response data structure
      type: object
    Replace_dashboard_folder_request_data_structure:
      properties:
        folder:
          $ref: "#/components/schemas/List_dashboard_folders_response_data_structure_folder_inner"
        requestId:
          type: string
      title: Replace dashboard folder request data structure
      type: object
    List_dashboard_folders_response_data_structure_folder_inner:
      example:
        name: name
        id: id
        parentId: parentId
      properties:
        id:
          type: string
        name:
          type: string
        parentId:
          type: string
      type: object
    List_dashboard_folders_response_data_structure:
      example:
        folder:
        - name: name
          id: id
          parentId: parentId
        - name: name
          id: id
          parentId: parentId
      externalDocs:
        description: Find out more Dashboards in our documentation.
        url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
      properties:
        folder:
          items:
            $ref: "#/components/schemas/List_dashboard_folders_response_data_structure_folder_inner"
          type: array
      title: List dashboard folders response data structure
      type: object
