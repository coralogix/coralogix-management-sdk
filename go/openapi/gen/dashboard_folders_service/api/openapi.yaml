openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
tags:
- description: Manage your dashboard folders.
  externalDocs:
    url: ""
  name: Dashboard folders service
paths:
  /dashboards/dashboards/v1/folders:
    get:
      description: List all dashboard folders accessible.
      externalDocs:
        url: ""
      operationId: DashboardFoldersService_ListDashboardFolders
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List_dashboard_folders_response_data_structure"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List dashboard folders
      tags:
      - Dashboard folders service
      x-coralogixPermissions:
      - team-dashboards:Read
    post:
      externalDocs:
        url: ""
      operationId: DashboardFoldersService_CreateDashboardFolder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_dashboard_folder_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Create_dashboard_folder_response_data_structure"
