  /dashboards/dashboards/v1/folders/{folder_id}:
    delete:
      externalDocs:
        url: ""
      operationId: DashboardFoldersService_DeleteDashboardFolder
      parameters:
      - explode: false
        in: path
        name: folder_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
