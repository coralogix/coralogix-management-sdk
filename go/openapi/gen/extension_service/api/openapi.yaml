openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
tags:
- description: A service that enables querying for extension information.
  externalDocs:
    description: Learn more about extensions in our documentation.
    url: https://coralogix.com/docs/integrations/extensions/
  name: Extension service
paths:
  /v1/extensions/all:
    post:
      externalDocs:
        url: ""
      operationId: ExtensionService_GetAllExtensions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Get_all_extensions_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_all_extensions_response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get all extensions
      tags:
      - Extension service
      x-coralogixPermissions:
      - extensions:ReadConfig
  /v1/extensions/{id}:
    get:
      externalDocs:
        url: ""
      operationId: ExtensionService_GetExtension
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Extension_metadata"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get extension by ID
      tags:
      - Extension service
      x-coralogixPermissions:
      - extensions:ReadConfig
