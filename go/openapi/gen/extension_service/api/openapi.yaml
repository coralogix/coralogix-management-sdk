  "paths": {
    "/integrations/extensions/v1": {
      "post": {
        "tags": [
          "Extension service"
        ],
        "summary": "Get all extensions",
        "description": "Creates a new extension.\n\nRequires the following permissions:\n- `extensions:ReadConfig`",
        "externalDocs": {
          "url": ""
        },
        "operationId": "ExtensionService_GetAllExtensions",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Get all extensions request",
                "description": "Request to list all extensions",
                "type": "object",
                "properties": {
                  "filter": {
                    "$ref": "#/components/schemas/GetAllExtensionsRequest.Filter"
                  },
                  "includeHiddenExtensions": {
                    "description": "Whether to include hidden extensions that are not publicly listed in the catalog.",
                    "type": "boolean"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/GetAllExtensionsResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        },
        "x-coralogixPermissions": [
          "extensions:ReadConfig"
        ]
      }
    },
    "/integrations/extensions/v1/catalog/{id}": {
      "get": {
        "tags": [
          "Extension service"
        ],
        "summary": "Get extension by ID",
        "description": "Returns the details of the specified extension.\n\nRequires the following permissions:\n- `extensions:ReadConfig`",
        "externalDocs": {
          "url": ""
        },
        "operationId": "ExtensionService_GetExtension",
        "parameters": [
          {
            "in": "path",
            "name": "id",
            "description": "Unique identifier.",
            "required": true,
            "schema": {
              "description": "Unique identifier.",
              "type": "string",
              "minLength": 0
            },
            "style": "simple"
          },
          {
            "in": "query",
            "name": "include_dashboard_binaries",
            "description": "Whether to include dashboard binaries in the response.",
            "schema": {
              "description": "Whether to include dashboard binaries in the response.",
              "type": "boolean"
            },
            "style": "form"
          },
          {
            "in": "query",
            "name": "include_testing_revision",
            "description": "Whether to include testing revisions in the response.",
            "schema": {
              "description": "Whether to include testing revisions in the response.",
              "type": "boolean"
            },
            "style": "form"
          }
        ],
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/v1.Extension"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        },
        "x-coralogixPermissions": [
          "extensions:ReadConfig"
        ]
      }
    }
  },
