openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /metrics/data-setup/v1:
    get:
      description: Returns the current metrics storage configuration.
      externalDocs:
        url: ""
      operationId: MetricsConfiguratorPublicService_GetTenantConfig
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTenantConfigResponseV2"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Metrics Storage Configuration
      tags:
      - Metrics Data Archive Service
    post:
      description: Creates the metrics storage configuration.
      externalDocs:
        url: ""
      operationId: MetricsConfiguratorPublicService_ConfigureTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricsConfiguratorPublicService_ConfigureTenant_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Configure Tenant
      tags:
      - Metrics Data Archive Service
    put:
      description: Updates the metrics storage configuration.
      externalDocs:
        url: ""
      operationId: MetricsConfiguratorPublicService_Update
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricsConfiguratorPublicService_Update_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Update Metrics Storage Configuration
      tags:
      - Metrics Data Archive Service
  /metrics/data-setup/v1/disable:
    post:
      description: Disables the metrics storage configuration.
      externalDocs:
        url: ""
      operationId: MetricsConfiguratorPublicService_DisableArchive
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Disable Metrics Archive
      tags:
      - Metrics Data Archive Service
  /metrics/data-setup/v1/enable:
    post:
      description: Enables the metrics storage configuration.
      externalDocs:
        url: ""
      operationId: MetricsConfiguratorPublicService_EnableArchive
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Enable Metrics Archive
      tags:
      - Metrics Data Archive Service
  /metrics/data-setup/v1/validate:
    post:
      description: Validates the provided metrics storage configuration.
      externalDocs:
        url: ""
      operationId: MetricsConfiguratorPublicService_ValidateBucket
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricsConfiguratorPublicService_ValidateBucket_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Validate Metrics Storage Bucket
      tags:
      - Metrics Data Archive Service
components:
  schemas:
    ConfigureTenantRequestGcs:
      description: This data structure is used to configure a tenant.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        gcs:
          $ref: "#/components/schemas/GcsConfig"
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicyRequest"
      required:
      - gcs
      title: Configure Tenant Request
      type: object
    ConfigureTenantRequestIbm:
      description: This data structure is used to configure a tenant.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        ibm:
          $ref: "#/components/schemas/IbmConfigV2"
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicyRequest"
      required:
      - ibm
      title: Configure Tenant Request
      type: object
    ConfigureTenantRequestS3:
      description: This data structure is used to configure a tenant.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicyRequest"
        s3:
          $ref: "#/components/schemas/S3Config"
      required:
      - s3
      title: Configure Tenant Request
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GcsConfig:
      description: This data structure represents the GCS configuration for a tenant.
      example:
        bucket: bucket
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        bucket:
          description: Bucket name.
          type: string
      title: GCS Configuration
      type: object
    GetTenantConfigResponseV2:
      description: Response containing the current metrics tenant configuration.
      example:
        tenantConfig:
          gcs:
            bucket: bucket
          prefix: prefix
          tenantId: 0
          disabled: true
          retentionPolicy:
            fiveMinutesResolution: 2
            oneHourResolution: 3
            rawResolution: 1
      externalDocs:
        url: ""
      properties:
        tenantConfig:
          $ref: "#/components/schemas/TenantConfigV2"
      type: object
    IbmConfigV2:
      description: This data structure is used to configure an IBM bucket.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        crn:
          description: The crn.
          example: "crn:v1:bluemix:public:cloud-object-storage:global:a/1234567890abcdef1234567890abcdef:12345678-1234-1234-1234-1234567890ab::"
          type: string
        endpoint:
          description: Endpoint.
          example: s3.us-south.cloud-object-storage.appdomain.cloud
          type: string
        serviceCrn:
          description: The service crn.
          example: "crn:v1:bluemix:public:cloud-object-storage:global:a/1234567890abcdef1234567890abcdef:12345678-1234-1234-1234-1234567890ab::"
          type: string
      title: IBM Bucket Configuration
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            type: string
          type: array
      type: object
    RetentionPolicyRequest:
      description: This data structure is used to set the retention policy for a tenant.
      example:
        fiveMinutesResolution: 2
        oneHourResolution: 3
        rawResolution: 1
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        fiveMinutesResolution:
          description: The five minutes resolution.
          example: 2
          format: int64
          type: integer
        oneHourResolution:
          description: The one hour resolution.
          example: 3
          format: int64
          type: integer
        rawResolution:
          description: The raw resolution.
          example: 1
          format: int64
          type: integer
      title: Retenion Policy Request
      type: object
    S3Config:
      description: This data structure represents the S3 configuration for a tenant.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        bucket:
          description: Bucket name.
          type: string
        region:
          description: Region.
          type: string
      title: S3 Configuration
      type: object
    TenantConfigV2:
      oneOf:
      - $ref: "#/components/schemas/TenantConfigV2Gcs"
      - $ref: "#/components/schemas/TenantConfigV2Ibm"
      - $ref: "#/components/schemas/TenantConfigV2S3"
    TenantConfigV2Gcs:
      description: Tenant config v2.
      example:
        gcs:
          bucket: bucket
        prefix: prefix
        tenantId: 0
        disabled: true
        retentionPolicy:
          fiveMinutesResolution: 2
          oneHourResolution: 3
          rawResolution: 1
      externalDocs:
        url: ""
      properties:
        disabled:
          description: Whether metrics archiving is disabled for this tenant.
          type: boolean
        gcs:
          $ref: "#/components/schemas/GcsConfig"
        prefix:
          description: Storage path prefix applied to all archived objects.
          type: string
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicyRequest"
        tenantId:
          description: Tenant identifier.
          format: int64
          type: integer
      required:
      - gcs
      type: object
    TenantConfigV2Ibm:
      description: Tenant config v2.
      externalDocs:
        url: ""
      properties:
        disabled:
          description: Whether metrics archiving is disabled for this tenant.
          type: boolean
        ibm:
          $ref: "#/components/schemas/IbmConfigV2"
        prefix:
          description: Storage path prefix applied to all archived objects.
          type: string
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicyRequest"
        tenantId:
          description: Tenant identifier.
          format: int64
          type: integer
      required:
      - ibm
      type: object
    TenantConfigV2S3:
      description: Tenant config v2.
      externalDocs:
        url: ""
      properties:
        disabled:
          description: Whether metrics archiving is disabled for this tenant.
          type: boolean
        prefix:
          description: Storage path prefix applied to all archived objects.
          type: string
        retentionPolicy:
          $ref: "#/components/schemas/RetentionPolicyRequest"
        s3:
          $ref: "#/components/schemas/S3Config"
        tenantId:
          description: Tenant identifier.
          format: int64
          type: integer
      required:
      - s3
      type: object
    UpdateRequestGcs:
      description: This data structure is used to update the configuration of a tenant.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        gcs:
          $ref: "#/components/schemas/GcsConfig"
        retentionDays:
          description: Archive retention period in days.
          format: int64
          type: integer
      required:
      - gcs
      title: Update Tenant Request
      type: object
    UpdateRequestIbm:
      description: This data structure is used to update the configuration of a tenant.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        ibm:
          $ref: "#/components/schemas/IbmConfigV2"
        retentionDays:
          description: Archive retention period in days.
          format: int64
          type: integer
      required:
      - ibm
      title: Update Tenant Request
      type: object
    UpdateRequestS3:
      description: This data structure is used to update the configuration of a tenant.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        retentionDays:
          description: Archive retention period in days.
          format: int64
          type: integer
        s3:
          $ref: "#/components/schemas/S3Config"
      required:
      - s3
      title: Update Tenant Request
      type: object
    ValidateBucketRequestGcs:
      description: This data structure is used to validate a bucket.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        gcs:
          $ref: "#/components/schemas/GcsConfig"
      required:
      - gcs
      title: Bucket Validation Request
      type: object
    ValidateBucketRequestIbm:
      description: This data structure is used to validate a bucket.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        ibm:
          $ref: "#/components/schemas/IbmConfigV2"
      required:
      - ibm
      title: Bucket Validation Request
      type: object
    ValidateBucketRequestS3:
      description: This data structure is used to validate a bucket.
      externalDocs:
        description: Find out more about metrics cost optimization
        url: https://coralogix.com/docs/user-guides/account-management/payment-and-billing/metrics-optimization/
      properties:
        s3:
          $ref: "#/components/schemas/S3Config"
      required:
      - s3
      title: Bucket Validation Request
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    MetricsConfiguratorPublicService_Update_request:
      oneOf:
      - $ref: "#/components/schemas/UpdateRequestGcs"
      - $ref: "#/components/schemas/UpdateRequestIbm"
      - $ref: "#/components/schemas/UpdateRequestS3"
      type: object
    MetricsConfiguratorPublicService_ConfigureTenant_request:
      oneOf:
      - $ref: "#/components/schemas/ConfigureTenantRequestGcs"
      - $ref: "#/components/schemas/ConfigureTenantRequestIbm"
      - $ref: "#/components/schemas/ConfigureTenantRequestS3"
      type: object
    MetricsConfiguratorPublicService_ValidateBucket_request:
      oneOf:
      - $ref: "#/components/schemas/ValidateBucketRequestGcs"
      - $ref: "#/components/schemas/ValidateBucketRequestIbm"
      - $ref: "#/components/schemas/ValidateBucketRequestS3"
      type: object
