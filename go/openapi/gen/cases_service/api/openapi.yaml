openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /cases/acknowledged/v1:
    post:
      description: |-
        Mark multiple cases as acknowledged in a single operation.

        Requires the following permissions:
        - `case:Acknowledge`
      externalDocs:
        url: ""
      operationId: CasesService_BulkAcknowledge
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Bulk_acknowledge_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAcknowledgeResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Acknowledge multiple cases
      tags:
      - Cases service
      x-coralogixPermissions:
      - case:Acknowledge
  /cases/acknowledged/v1/{id}:
    delete:
      description: |-
        Remove the acknowledgment from a case.

        Requires the following permissions:
        - `case:Acknowledge`
      externalDocs:
        url: ""
      operationId: CasesService_UnacknowledgeCase
      parameters:
      - description: "ID of the case to unacknowledge. Accepts either the case UUID\
          \ (the `id` field on a case) or the readable identifier (the `readable_id`\
          \ field, e.g. `CASE-123`)."
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: "ID of the case to unacknowledge. Accepts either the case UUID\
            \ (the `id` field on a case) or the readable identifier (the `readable_id`\
            \ field, e.g. `CASE-123`)."
          example: 3f166e9f-3c88-4af2-b52e-138f339dab3e
          maxLength: 64
          minLength: 1
          pattern: "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnacknowledgeCaseResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Unacknowledge a case
      tags:
      - Cases service
      x-coralogixPermissions:
      - case:Acknowledge
    put:
      description: |-
        Mark the case as acknowledged by a user.

        Requires the following permissions:
        - `case:Acknowledge`
      externalDocs:
        url: ""
      operationId: CasesService_AcknowledgeCase
      parameters:
      - description: "ID of the case to acknowledge. Accepts either the case UUID\
          \ (the `id` field on a case) or the readable identifier (the `readable_id`\
          \ field, e.g. `CASE-123`)."
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: "ID of the case to acknowledge. Accepts either the case UUID\
            \ (the `id` field on a case) or the readable identifier (the `readable_id`\
            \ field, e.g. `CASE-123`)."
          example: 3f166e9f-3c88-4af2-b52e-138f339dab3e
          maxLength: 64
          minLength: 1
          pattern: "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeCaseResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Acknowledge a case
      tags:
      - Cases service
      x-coralogixPermissions:
      - case:Acknowledge
  /cases/assigned/v1:
    delete:
      description: |-
        Remove the current assignee from multiple cases in a single operation.

        Requires the following permissions:
        - `case:Assign`
      externalDocs:
        url: ""
      operationId: CasesService_BulkUnassign
      parameters:
      - description: "IDs of the cases to unassign. Each entry accepts either the\
          \ case UUID (the `id` field on a case) or the readable identifier (the `readable_id`\
          \ field, e.g. `CASE-123`)."
        explode: true
        in: query
        name: ids
        required: false
        schema:
          description: "IDs of the cases to unassign. Each entry accepts either the\
            \ case UUID (the `id` field on a case) or the readable identifier (the\
            \ `readable_id` field, e.g. `CASE-123`)."
          example:
          - 3f166e9f-3c88-4af2-b52e-138f339dab3e
          - CASE-123
          items:
            description: "IDs of the cases to unassign. Each entry accepts either\
              \ the case UUID (the `id` field on a case) or the readable identifier\
              \ (the `readable_id` field, e.g. `CASE-123`)."
            maxLength: 64
            minLength: 1
            pattern: "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$"
            type: string
          maxItems: 1000
          minItems: 1
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUnassignResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Remove assignment from multiple cases
      tags:
      - Cases service
      x-coralogixPermissions:
      - case:Assign
    put:
