                "description": "Request to acknowledge multiple cases",
                "type": "object",
                "properties": {
                  "actor": {
                    "$ref": "#/components/schemas/cases.v1.UserDetails"
                  },
                  "ids": {
                    "example": [
                      "3f166e9f-3c88-4af2-b52e-138f339dab3e",
                      "CASE-123"
                    ],
                    "description": "IDs of the cases to acknowledge. Each entry accepts either the case UUID (the `id` field on a case) or the readable identifier (the `readable_id` field, e.g. `CASE-123`).",
                    "type": "array",
                    "items": {
                      "description": "IDs of the cases to acknowledge. Each entry accepts either the case UUID (the `id` field on a case) or the readable identifier (the `readable_id` field, e.g. `CASE-123`).",
