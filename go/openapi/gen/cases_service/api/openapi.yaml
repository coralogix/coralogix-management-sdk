          "Cases service"
        ],
        "summary": "Resolve a case",
        "description": "Mark a case as resolved.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "CasesService_ResolveCase",
        "parameters": [
          {
            "in": "path",
            "name": "id",
            "description": "ID of the case to resolve. Accepts either the case UUID (the `id` field on a case) or the readable identifier (the `readable_id` field, e.g. `CASE-123`).",
            "required": true,
            "schema": {
              "example": "3f166e9f-3c88-4af2-b52e-138f339dab3e",
              "description": "ID of the case to resolve. Accepts either the case UUID (the `id` field on a case) or the readable identifier (the `readable_id` field, e.g. `CASE-123`).",
              "type": "string",
              "pattern": "^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|[A-Z]+-[0-9]+)$",
              "minLength": 1,
              "maxLength": 64
            },
            "style": "simple"
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Resolve case request",
                "description": "Request to mark a case as resolved.",
                "type": "object",
                "properties": {
                  "reason": {
                    "example": "This case is not applicable.",
                    "description": "Reason to resolve",
                    "type": "string",
                    "pattern": "^[\\s\\S]*$",
                    "minLength": 1,
                    "maxLength": 500
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ResolveCaseResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        },
        "x-coralogixPermissions": [
          "case:Close"
        ]
      }
    }
