openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /dataengine/retention-tags/v1:
    get:
      description: Returns all available retention tags.
      externalDocs:
        url: ""
      operationId: RetentionsService_GetRetentions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRetentionsResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get Retentions
      tags:
      - Retentions Service
    post:
      description: Creates a new retention tag.
      externalDocs:
        url: ""
      operationId: RetentionsService_UpdateRetentions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_Retentions_Request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRetentionsResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Update Retentions
      tags:
      - Retentions Service
  /dataengine/retention-tags/v1/activate:
    post:
      description: Activates the specified retention tags.
      externalDocs:
        url: ""
      operationId: RetentionsService_ActivateRetentions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateRetentionsResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Activate Retentions
      tags:
      - Retentions Service
  /dataengine/retention-tags/v1/enabled:
    get:
      description: Returns the enabled retention tags for the team.
      externalDocs:
        url: ""
      operationId: RetentionsService_GetRetentionsEnabled
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRetentionsEnabledResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get Retentions Enabled
      tags:
      - Retentions Service
components:
  schemas:
    ActivateRetentionsResponse:
      description: This data structure is obtained after setting the active status
        of retentions
      example:
        activateRetentions: true
      externalDocs:
        description: Find out more about archives
        url: https://coralogix.com/docs/user-guides/data-flow/s3-archive/connect-s3-archive/
      properties:
        activateRetentions:
          description: List of retentions to activate.
          example: true
          type: boolean
      required:
      - retentions
      title: Activate Retentions Response
      type: object
    Error:
      description: Standard error response body returned for a failed request.
      example:
        code: 400
        message: message
      properties:
        code:
          description: "HTTP status code of the error (for example 400, 404, 500)."
          format: int32
          maximum: 599
          minimum: 100
          type: integer
        message:
          description: Human-readable description of the error.
          maxLength: 4096
          minLength: 0
          pattern: "^[\\s\\S]*$"
          type: string
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetRetentionsEnabledResponse:
      description: This data structure is obtained when retrieving the active status
        of retentions
      example:
        enableTags: true
      externalDocs:
        description: Find out more about archives
        url: https://coralogix.com/docs/user-guides/data-flow/s3-archive/connect-s3-archive/
      properties:
        enableTags:
          description: The enable tags.
          type: boolean
      required:
      - retentions
      title: Get Retentions Enabled Response
      type: object
    GetRetentionsResponse:
      description: Response containing the current data retention settings.
      example:
        retentions:
        - editable: true
          name: name
          id: id
          order: 0
        - editable: true
          name: name
          id: id
          order: 0
      externalDocs:
        url: ""
      properties:
        retentions:
          description: The retentions.
          items:
            $ref: "#/components/schemas/archive.v1.Retention"
          minItems: 0
          type: array
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    RetentionUpdateElement:
      properties:
        id:
          description: Unique identifier.
          minLength: 0
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
      type: object
    UpdateRetentionsResponse:
      description: This data structure is obtained after updating retentions
      example:
        retentions:
        - editable: true
          name: name
          id: id
          order: 0
        - editable: true
          name: name
          id: id
          order: 0
      externalDocs:
        description: Find out more about archives
        url: https://coralogix.com/docs/user-guides/data-flow/s3-archive/connect-s3-archive/
      properties:
        retentions:
          description: The retentions.
          items:
            $ref: "#/components/schemas/archive.v1.Retention"
          minItems: 0
          type: array
      required:
      - retentions
      title: Update Retentions Response
      type: object
    archive.v1.Retention:
      description: This data structure represents a retention
      example:
        editable: true
        name: name
        id: id
        order: 0
      externalDocs:
        description: Find out more about archives
        url: https://coralogix.com/docs/user-guides/data-flow/s3-archive/connect-s3-archive/
      properties:
        editable:
          description: The editable.
          type: boolean
        id:
          description: Unique identifier.
          minLength: 0
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
        order:
          description: Sort order.
          format: int32
          type: integer
      title: Retention
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    Update_Retentions_Request:
      description: This data structure is used to update retentions
      properties:
        retentionUpdateElements:
          description: List of retention tag updates to apply.
          items:
            $ref: "#/components/schemas/RetentionUpdateElement"
          minItems: 0
          type: array
      required:
      - retentionUpdateElements
      title: Update Retentions Request
      type: object
