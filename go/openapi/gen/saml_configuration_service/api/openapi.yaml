  "paths": {
    "/aaa/team-saml/v1/active": {
      "post": {
        "tags": [
          "SAML Configuration Service"
        ],
        "summary": "Activate/Deactivate SAML",
        "description": "Activates or deactivates SAML for the team.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "SamlConfigurationService_SetActive",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Set Active Request",
                "description": "This data structure is used to activate or deactivate a SAML identity provider",
                "type": "object",
                "properties": {
                  "isActive": {
                    "description": "The is active.",
                    "type": "boolean"
                  },
                  "teamId": {
                    "description": "Team identifier.",
                    "type": "integer",
                    "format": "int64",
                    "minimum": 0
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/v2.SetActiveResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      }
    },
    "/aaa/team-saml/v1/configuration": {
      "get": {
        "tags": [
          "SAML Configuration Service"
        ],
        "summary": "Get SAML Configuration",
        "description": "Returns the current SAML configuration for the team.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "SamlConfigurationService_GetConfiguration",
        "parameters": [
          {
            "in": "query",
            "name": "team_id",
            "description": "The unique identifier of the team whose SAML configuration to retrieve.",
            "schema": {
              "description": "The unique identifier of the team whose SAML configuration to retrieve.",
              "type": "integer",
              "format": "int64",
              "minimum": 0
            },
            "style": "form"
          }
        ],
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/GetConfigurationResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      }
    },
    "/aaa/team-saml/v1/idp_parameters": {
      "post": {
        "tags": [
          "SAML Configuration Service"
        ],
        "summary": "Set IDP Parameters",
        "description": "Sets the identity provider parameters for SAML.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "SamlConfigurationService_SetIDPParameters",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Set IDP Parameters Request",
                "description": "This data structure is used to set the parameters of a SAML identity provider",
                "type": "object",
                "properties": {
                  "params": {
                    "$ref": "#/components/schemas/IDPParameters"
                  },
                  "teamId": {
                    "description": "Team identifier.",
                    "type": "integer",
                    "format": "int64",
                    "minimum": 0
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SetIDPParametersResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      }
    },
    "/aaa/team-saml/v1/sp_parameters": {
      "get": {
        "tags": [
          "SAML Configuration Service"
        ],
        "summary": "Get SP Parameters",
        "description": "Returns the service provider parameters for SAML.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "SamlConfigurationService_GetSPParameters",
        "parameters": [
          {
            "in": "query",
            "name": "team_id",
            "description": "Team identifier.",
            "schema": {
              "example": 1234567,
              "description": "Team identifier.",
              "type": "integer",
              "format": "int64",
              "minimum": 0
            },
            "style": "form"
          }
        ],
        "responses": {
          "200": {
            "description": "",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/GetSPParametersResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Error"
                }
              }
            }
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "Error": {
        "description": "Standard error response body returned for a failed request.",
        "type": "object",
        "properties": {
          "code": {
            "description": "HTTP status code of the error (for example 400, 404, 500).",
            "type": "integer",
            "format": "int32",
            "minimum": 100,
            "maximum": 599
          },
          "message": {
            "description": "Human-readable description of the error.",
            "type": "string",
            "pattern": "^[\\s\\S]*$",
            "minLength": 0,
            "maxLength": 4096
          }
        }
      },
      "FilterPathAndValues": {
        "externalDocs": {
          "url": ""
        },
        "title": "FilterPathAndValues",
        "description": "This data structure represents a filter path and values",
        "type": "object",
        "properties": {
          "filters": {
            "$ref": "#/components/schemas/Filters"
          },
          "multipleValues": {
            "$ref": "#/components/schemas/MultipleValues"
          },
          "path": {
            "example": "test",
            "type": "string",
            "minLength": 0
          }
        },
        "required": [
          "path"
        ],
        "oneOf": [
          {
            "type": "object",
            "required": [
              "multipleValues"
            ]
          },
          {
            "type": "object",
            "required": [
              "filters"
            ]
          }
        ]
      },
      "Filters": {
        "externalDocs": {
          "url": ""
        },
        "title": "Filters",
        "description": "This data structure represents a filter",
        "type": "object",
        "properties": {
          "operator": {
            "$ref": "#/components/schemas/v3.FilterOperator"
          },
          "pathAndValues": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/FilterPathAndValues"
            },
            "minItems": 0
          }
        },
        "required": [
          "pathAndValues"
        ]
      },
      "GetConfigurationResponse": {
        "externalDocs": {
          "description": "Find out more about enrichments",
          "url": "https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/"
        },
        "title": "Get Configuration Response",
        "description": "This data structure is obtained as a response to a request to retrieve the configuration of a SAML service provider and identity provider",
        "type": "object",
        "properties": {
          "idpDetails": {
            "$ref": "#/components/schemas/IDPDetails"
          },
          "idpParameters": {
            "$ref": "#/components/schemas/IDPParameters"
          },
          "spParameters": {
            "$ref": "#/components/schemas/SPParameters"
          },
          "teamId": {
            "description": "The team id.",
            "type": "integer",
            "format": "int64",
            "minimum": 0
          }
        }
      },
      "GetSPParametersResponse": {
        "externalDocs": {
          "description": "Find out more about enrichments",
          "url": "https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/"
        },
        "title": "Get SP Parameters Response",
        "description": "This data structure is obtained as a response to a request to retrieve the parameters of a SAML service provider",
        "type": "object",
        "properties": {
          "params": {
            "$ref": "#/components/schemas/SPParameters"
          }
        }
      },
      "IDPDetails": {
        "externalDocs": {
          "url": ""
        },
        "description": "Idp details.",
        "type": "object",
        "properties": {
          "icon": {
            "description": "Icon identifier.",
            "type": "string",
            "minLength": 0
          },
          "name": {
            "description": "Display name.",
            "type": "string",
            "minLength": 0
          }
        }
      },
      "IDPParameters": {
        "externalDocs": {
          "description": "Find out more about enrichments",
          "url": "https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/"
        },
        "title": "IDP Parameters",
        "description": "This data structure represents a set of SAML identity provider parameters",
        "type": "object",
        "properties": {
          "active": {
            "example": true,
            "description": "Whether SAML SSO is currently active for this team.",
            "type": "boolean"
          },
          "groupNames": {
            "description": "List of group names mapped from the identity provider for role-based access.",
            "type": "array",
            "items": {
              "example": "group1",
              "description": "List of group names mapped from the identity provider for role-based access.",
              "type": "string",
              "minLength": 0
            },
            "minItems": 0
          },
          "metadataContent": {
            "example": "<?xml version= ...",
            "description": "Raw XML content of the identity provider SAML metadata document.",
            "type": "string",
            "minLength": 0
          },
          "metadataUrl": {
            "example": "https://<...>.okta.com/app/<...>/sso/saml/metadata",
            "description": "URL to the identity provider SAML metadata XML document.",
            "type": "string",
            "minLength": 0
          },
          "teamEntityId": {
            "example": 1234567,
            "description": "Coralogix team entity identifier used as the SAML service provider entity ID.",
            "type": "integer",
            "format": "int64",
            "minimum": 0
          }
        },
        "oneOf": [
          {
            "type": "object",
            "required": [
              "metadataUrl"
            ]
          },
          {
            "type": "object",
            "required": [
              "metadataContent"
            ]
          },
          {
            "type": "object",
            "not": {
              "anyOf": [
                {
                  "type": "object",
                  "required": [
                    "metadataUrl"
                  ]
                },
                {
                  "type": "object",
                  "required": [
                    "metadataContent"
                  ]
                }
              ]
            }
          }
        ]
      },
      "MultipleValues": {
        "type": "object",
        "properties": {
          "matcher": {
            "$ref": "#/components/schemas/events.v3.FilterMatcher"
          },
          "values": {
            "type": "array",
            "items": {
              "type": "string",
              "minLength": 0
            },
            "minItems": 0
          }
        }
      },
      "SPParameters": {
        "externalDocs": {
          "description": "Find out more about enrichments",
          "url": "https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/"
        },
        "title": "Service Provider Parameters",
        "description": "This data structure represents the parameters of a SAML service provider",
        "type": "object",
        "properties": {
          "assertionConsumerServiceUrl": {
            "example": "assertion",
            "description": "The assertion consumer service url.",
            "type": "string",
            "minLength": 0
          },
          "binding": {
            "example": "binding",
            "description": "The binding.",
            "type": "string",
            "minLength": 0
          },
          "metadataUrl": {
            "example": "https://<...>.okta.com/app/<...>/sso/saml/metadata",
            "description": "The metadata url.",
            "type": "string",
            "minLength": 0
          },
          "nameIdFormat": {
            "example": "name_id",
            "description": "The name id format.",
            "type": "string",
            "minLength": 0
          },
          "signingCertPem": {
            "example": "certificate",
            "description": "The signing cert pem.",
            "type": "string",
            "minLength": 0
          }
        }
      },
      "SetIDPParametersResponse": {
        "externalDocs": {
          "url": ""
        },
        "description": "Response returned after successfully setting the identity provider parameters.",
        "type": "object",
        "additionalProperties": false
      },
      "events.v3.FilterMatcher": {
        "type": "string",
        "enum": [
          "FILTER_MATCHER_TEXT_OR_UNSPECIFIED",
          "FILTER_MATCHER_REGEXP"
        ]
      },
      "v2.SetActiveResponse": {
        "externalDocs": {
          "url": ""
        },
        "description": "Response returned after updating the SAML active state.",
        "type": "object",
        "additionalProperties": false
      },
      "v3.FilterOperator": {
        "description": "Filter operator.",
        "type": "string",
        "enum": [
          "FILTER_OPERATOR_AND_OR_UNSPECIFIED",
          "FILTER_OPERATOR_OR"
        ]
      }
    }
  }
}