openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /aaa/team-saml/v1/active:
    post:
      description: Activates or deactivates SAML for the team.
      externalDocs:
        url: ""
      operationId: SamlConfigurationService_SetActive
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Set_Active_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v2.SetActiveResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Activate/Deactivate SAML
      tags:
      - SAML Configuration Service
  /aaa/team-saml/v1/configuration:
    get:
      description: Returns the current SAML configuration for the team.
      externalDocs:
        url: ""
      operationId: SamlConfigurationService_GetConfiguration
      parameters:
      - description: The unique identifier of the team whose SAML configuration to
          retrieve.
        explode: true
        in: query
        name: team_id
        required: false
        schema:
          description: The unique identifier of the team whose SAML configuration
            to retrieve.
          format: int64
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get SAML Configuration
      tags:
      - SAML Configuration Service
  /aaa/team-saml/v1/idp_parameters:
    post:
      description: Sets the identity provider parameters for SAML.
      externalDocs:
        url: ""
      operationId: SamlConfigurationService_SetIDPParameters
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Set_IDP_Parameters_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetIDPParametersResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Set IDP Parameters
      tags:
      - SAML Configuration Service
  /aaa/team-saml/v1/sp_parameters:
    get:
      description: Returns the service provider parameters for SAML.
      externalDocs:
        url: ""
      operationId: SamlConfigurationService_GetSPParameters
      parameters:
      - description: Team identifier.
        explode: true
        in: query
        name: team_id
        required: false
        schema:
          description: Team identifier.
          example: 1234567
          format: int64
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSPParametersResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get SP Parameters
      tags:
      - SAML Configuration Service
components:
  schemas:
    Error:
      description: Standard error response body returned for a failed request.
      example:
        code: 139
        message: message
      properties:
        code:
          description: "HTTP status code of the error (for example 400, 404, 500)."
          format: int32
          maximum: 599
          minimum: 100
          type: integer
        message:
          description: Human-readable description of the error.
          maxLength: 4096
          minLength: 0
          pattern: "^[\\s\\S]*$"
          type: string
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetConfigurationResponse:
      description: This data structure is obtained as a response to a request to retrieve
        the configuration of a SAML service provider and identity provider
      example:
        idpDetails:
          icon: icon
          name: name
        spParameters:
          assertionConsumerServiceUrl: assertion
          metadataUrl: https://<...>.okta.com/app/<...>/sso/saml/metadata
          nameIdFormat: name_id
          binding: binding
          signingCertPem: certificate
        idpParameters:
          groupNames:
          - group1
          - group1
          metadataContent: <?xml version= ...
          teamEntityId: 1234567
          active: true
        teamId: 0
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        idpDetails:
          $ref: "#/components/schemas/IDPDetails"
        idpParameters:
          $ref: "#/components/schemas/IDPParameters"
        spParameters:
          $ref: "#/components/schemas/SPParameters"
        teamId:
          description: The team id.
          format: int64
          minimum: 0
          type: integer
      title: Get Configuration Response
      type: object
    GetSPParametersResponse:
      description: This data structure is obtained as a response to a request to retrieve
        the parameters of a SAML service provider
      example:
        params:
          assertionConsumerServiceUrl: assertion
          metadataUrl: https://<...>.okta.com/app/<...>/sso/saml/metadata
          nameIdFormat: name_id
          binding: binding
          signingCertPem: certificate
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        params:
          $ref: "#/components/schemas/SPParameters"
      title: Get SP Parameters Response
      type: object
    IDPDetails:
      description: Idp details.
      example:
        icon: icon
        name: name
      externalDocs:
        url: ""
      properties:
        icon:
          description: Icon identifier.
          minLength: 0
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
      type: object
    IDPParameters:
      oneOf:
      - $ref: "#/components/schemas/IDPParametersMetadataContent"
      - $ref: "#/components/schemas/IDPParametersMetadataUrl"
    IDPParametersMetadataContent:
      description: This data structure represents a set of SAML identity provider
        parameters
      example:
        groupNames:
        - group1
        - group1
        metadataContent: <?xml version= ...
        teamEntityId: 1234567
        active: true
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        active:
          description: Whether SAML SSO is currently active for this team.
          example: true
          type: boolean
        groupNames:
          description: List of group names mapped from the identity provider for role-based
            access.
          items:
            description: List of group names mapped from the identity provider for
              role-based access.
            example: group1
            minLength: 0
            type: string
          minItems: 0
          type: array
        metadataContent:
          description: Raw XML content of the identity provider SAML metadata document.
          example: <?xml version= ...
          minLength: 0
          type: string
        teamEntityId:
          description: Coralogix team entity identifier used as the SAML service provider
            entity ID.
          example: 1234567
          format: int64
          minimum: 0
          type: integer
      required:
      - metadataContent
      title: IDP Parameters
      type: object
    IDPParametersMetadataUrl:
      description: This data structure represents a set of SAML identity provider
        parameters
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        active:
          description: Whether SAML SSO is currently active for this team.
          example: true
          type: boolean
        groupNames:
          description: List of group names mapped from the identity provider for role-based
            access.
          items:
            description: List of group names mapped from the identity provider for
              role-based access.
            example: group1
            minLength: 0
            type: string
          minItems: 0
          type: array
        metadataUrl:
          description: URL to the identity provider SAML metadata XML document.
          example: https://<...>.okta.com/app/<...>/sso/saml/metadata
          minLength: 0
          type: string
        teamEntityId:
          description: Coralogix team entity identifier used as the SAML service provider
            entity ID.
          example: 1234567
          format: int64
          minimum: 0
          type: integer
      required:
      - metadataUrl
      title: IDP Parameters
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    SPParameters:
      description: This data structure represents the parameters of a SAML service
        provider
      example:
        assertionConsumerServiceUrl: assertion
        metadataUrl: https://<...>.okta.com/app/<...>/sso/saml/metadata
        nameIdFormat: name_id
        binding: binding
        signingCertPem: certificate
      externalDocs:
        description: Find out more about enrichments
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        assertionConsumerServiceUrl:
          description: The assertion consumer service url.
          example: assertion
          minLength: 0
          type: string
        binding:
          description: The binding.
          example: binding
          minLength: 0
          type: string
        metadataUrl:
          description: The metadata url.
          example: https://<...>.okta.com/app/<...>/sso/saml/metadata
          minLength: 0
          type: string
        nameIdFormat:
          description: The name id format.
          example: name_id
          minLength: 0
          type: string
        signingCertPem:
          description: The signing cert pem.
          example: certificate
          minLength: 0
          type: string
      title: Service Provider Parameters
      type: object
    SetIDPParametersResponse:
      additionalProperties: false
      description: Response returned after successfully setting the identity provider
        parameters.
      externalDocs:
        url: ""
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    v2.SetActiveResponse:
      additionalProperties: false
      description: Response returned after updating the SAML active state.
      externalDocs:
        url: ""
      type: object
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    Set_Active_Request:
      description: This data structure is used to activate or deactivate a SAML identity
        provider
      properties:
        isActive:
          description: The is active.
          type: boolean
        teamId:
          description: Team identifier.
          format: int64
          minimum: 0
          type: integer
      title: Set Active Request
      type: object
    Set_IDP_Parameters_Request:
      description: This data structure is used to set the parameters of a SAML identity
        provider
      properties:
        params:
          $ref: "#/components/schemas/IDPParameters"
        teamId:
          description: Team identifier.
          format: int64
          minimum: 0
          type: integer
      title: Set IDP Parameters Request
      type: object
