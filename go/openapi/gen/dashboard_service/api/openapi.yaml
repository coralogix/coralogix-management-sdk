          $ref: "#/components/schemas/widgets.common.DataModeType"
        decimal:
          description: "Number indicating the decimal precision of the numeric values,\
            \ within range 0-15"
          example: 3
          format: int32
          type: integer
        decimalPrecision:
          description: Whether to render numeric value without abbreviation
          example: false
          type: boolean
        displaySeriesName:
          description: (multigauge display only) Whether to show the series names
            above the value
          type: boolean
        legend:
          $ref: "#/components/schemas/Legend"
        legendBy:
          $ref: "#/components/schemas/LegendBy"
        max:
          description: A maximum gauge value used in percentage threshold calculation
            and for visual value representation
          example: 150000
          format: double
          type: number
        min:
          description: A minimum gauge value used in percentage threshold calculation
            and for visual value representation
          example: 0
          format: double
          type: number
        query:
          $ref: "#/components/schemas/Gauge.Query"
        showInnerArc:
          description: Whether to show the inner arc of gauge which graphically represents
            the value
          example: false
          type: boolean
        showOuterArc:
          description: Whether to show the outer arc of gauge which graphically represents
            the min/max range
          example: true
          type: boolean
        thresholdBy:
          $ref: "#/components/schemas/Gauge.ThresholdBy"
        thresholdType:
          $ref: "#/components/schemas/ThresholdType"
        thresholds:
          items:
            $ref: "#/components/schemas/Gauge.Threshold"
          type: array
        unit:
          $ref: "#/components/schemas/Gauge.Unit"
      type: object
