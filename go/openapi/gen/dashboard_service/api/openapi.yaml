    DashboardsService_CheckDashboard_request:
      oneOf:
      - $ref: "#/components/schemas/CheckDashboardRequestDashboard"
      - $ref: "#/components/schemas/CheckDashboardRequestDashboardId"
      type: object
    Replace_dashboard_request_data_structure:
      description: This is a request sent to update an existing dashboard with new
        information
      properties:
        accessPolicy:
          description: JSON string representing the access policy for this dashboard.
            Defines granular permissions for users and groups.
          example: "{\"version\":\"2025-01-01\",\"default\":{\"permissions\":{\"team-dashboards:Read\"\
            :\"grant\",\"team-dashboards:Update\":\"deny\",\"team-dashboards:ReadAccessPolicy\"\
            :\"grant\",\"team-dashboards:UpdateAccessPolicy\":\"deny\"}},\"rules\"\
            :[]}"
          maxLength: 65536
          minLength: 1
          pattern: "^[\\s\\S]*$"
          type: string
        dashboard:
          $ref: "#/components/schemas/Dashboard"
        isLocked:
          description: The is locked.
          type: boolean
        requestId:
          description: "Idempotency key for the replace request, used to prevent duplicate\
            \ updates."
          minLength: 0
          type: string
      required:
      - dashboard
      - requestId
      title: Replace dashboard request data structure
      type: object
    Create_dashboard_request_data_structure:
      description: This is a request used to create a new custom dashboard
      properties:
        accessPolicy:
          description: JSON string representing the access policy for this dashboard.
            Defines granular permissions for users and groups.
          example: "{\"version\":\"2025-01-01\",\"default\":{\"permissions\":{\"team-dashboards:Read\"\
            :\"grant\",\"team-dashboards:Update\":\"deny\",\"team-dashboards:ReadAccessPolicy\"\
            :\"grant\",\"team-dashboards:UpdateAccessPolicy\":\"deny\"}},\"rules\"\
            :[]}"
          maxLength: 65536
          minLength: 1
          pattern: "^[\\s\\S]*$"
          type: string
        dashboard:
          $ref: "#/components/schemas/Dashboard"
        isLocked:
          description: The is locked.
          type: boolean
        requestId:
          description: The request id.
          minLength: 0
          type: string
      required:
      - dashboard
      - requestId
      title: Create dashboard request data structure
      type: object
    Replace_default_dashboard_request_data_structure:
      description: This is a request to replace a default dashboard
      properties:
        requestId:
          description: "Idempotency key for the replace default dashboard request,\
            \ used to prevent duplicate operations."
          minLength: 0
          type: string
      required:
      - requestId
      title: Replace default dashboard request data structure
      type: object
    Assign_dashboard_to_folder_request_data_structure:
      description: This is a request for assigning a folder to a dashboard
      properties:
        folderId:
          description: The ID of the folder to assign the dashboard to. Set to null
            to assign to the root folder.
          minLength: 0
          type: string
        requestId:
          description: "Idempotency key for the assign folder request, used to prevent\
            \ duplicate operations."
          minLength: 0
          type: string
      required:
      - requestId
      title: Assign dashboard to folder request data structure
      type: object
