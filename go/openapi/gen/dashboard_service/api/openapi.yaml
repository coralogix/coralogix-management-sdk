        data on the dashboard.
      example:
        collapsed: true
        displayName: displayName
        scope:
          allWidgets: "{}"
          specificWidgets:
            widgetIds:
            - value: value
            - value: value
        id:
          value: value
        source:
          logs:
            observationField:
              keypath:
              - keypath
              - keypath
              scope: DATASET_SCOPE_UNSPECIFIED
            field: field
            operator:
              equals:
                selection:
                  all: "{}"
        enabled: true
      externalDocs:
        description: Discover how to filter and query data in Custom Dashboards by
          exploring our documentation.
        url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
      properties:
        collapsed:
          description: Indicates if the filter's UI representation should be collapsed
            or expanded.
          type: boolean
        displayName:
