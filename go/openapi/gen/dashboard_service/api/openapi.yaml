openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /dashboards/dashboards/v1:
    post:
      externalDocs:
        url: ""
      operationId: DashboardsService_CreateDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDashboardResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create a new dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
    put:
      externalDocs:
        url: ""
      operationId: DashboardsService_ReplaceDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceDashboardResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Replace a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /dashboards/dashboards/v1/catalog:
    get:
      description: Get a list of all dashboards accessible.
      externalDocs:
        url: ""
      operationId: DashboardCatalogService_GetDashboardCatalog
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardCatalogResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get dashboard catalog
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /dashboards/dashboards/v1/slugs/{slug}:
    get:
      externalDocs:
        url: ""
      operationId: DashboardsService_GetDashboardBySlug
      parameters:
      - explode: false
        in: path
        name: slug
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardBySlugResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get a dashboard by URL slug
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /dashboards/dashboards/v1/{dashboard_id}:
    delete:
      externalDocs:
        url: ""
      operationId: DashboardsService_DeleteDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: request_id
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDashboardResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
    get:
      externalDocs:
        url: ""
      operationId: DashboardsService_GetDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /dashboards/dashboards/v1/{dashboard_id}/default:
    put:
      externalDocs:
        url: ""
      operationId: DashboardsService_ReplaceDefaultDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_default_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceDefaultDashboardResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Replace the default dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /dashboards/dashboards/v1/{dashboard_id}/folder:
    post:
      externalDocs:
        url: ""
      operationId: DashboardsService_AssignDashboardFolder
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Assign_dashboard_to_folder_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignDashboardFolderResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Assign a dashboard to a folder
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /dashboards/pinned/v1/{dashboard_id}:
    delete:
      externalDocs:
        url: ""
      operationId: DashboardsService_UnpinDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: request_id
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnpinDashboardResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Remove dashboard from favorites
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
    put:
      externalDocs:
        url: ""
      operationId: DashboardsService_PinDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: request_id
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinDashboardResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Add dashboard to favorites
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
components:
  schemas:
    ActionDataSourceType:
      enum:
      - ACTION_DATA_SOURCE_TYPE_NONE_UNSPECIFIED
      - ACTION_DATA_SOURCE_TYPE_LOGS
      - ACTION_DATA_SOURCE_TYPE_SPANS
      - ACTION_DATA_SOURCE_TYPE_METRICS
      - ACTION_DATA_SOURCE_TYPE_DATAPRIME
      type: string
    ActionDefinition:
      oneOf:
      - $ref: "#/components/schemas/ActionDefinitionCustomAction"
      - $ref: "#/components/schemas/ActionDefinitionGoToDashboardAction"
    ActionDefinitionCustomAction:
      example:
        customAction:
          url: url
      properties:
        customAction:
          $ref: "#/components/schemas/CustomAction"
      required:
      - customAction
      type: object
    ActionDefinitionGoToDashboardAction:
      properties:
        goToDashboardAction:
          $ref: "#/components/schemas/GoToDashboardTemplateAction"
      required:
      - goToDashboardAction
      type: object
    AllOption:
      example:
        includeAll: true
        label: label
      properties:
        includeAll:
          type: boolean
        label:
          type: string
      type: object
    AllValue:
      type: object
    Annotation:
      example:
        color: ANNOTATION_COLOR_UNSPECIFIED
        scope:
          allWidgets: "{}"
        name: name
        description: description
        id: id
        source:
          metrics:
            intervalResolution:
              auto:
                maximumDataPoints: 500
                minimumInterval: minimumInterval
              useAdvancedLimit: true
            orientation: ANNOTATION_ORIENTATION_VERTICAL_UNSPECIFIED
            promqlQuery:
              value: value
            strategy:
              startTimeMetric: "{}"
            messageTemplate: messageTemplate
            labels:
            - labels
            - labels
        enabled: true
      properties:
        color:
          $ref: "#/components/schemas/AnnotationColor"
        description:
          type: string
        enabled:
          type: boolean
        id:
          type: string
        name:
          type: string
        scope:
          $ref: "#/components/schemas/Annotation.WidgetScope"
        source:
          $ref: "#/components/schemas/Annotation.Source"
      type: object
    Annotation.Source:
      oneOf:
      - $ref: "#/components/schemas/AnnotationSourceMetrics"
      - $ref: "#/components/schemas/AnnotationSourceLogs"
      - $ref: "#/components/schemas/AnnotationSourceSpans"
      - $ref: "#/components/schemas/AnnotationSourceDataprime"
      - $ref: "#/components/schemas/AnnotationSourceManual"
      - $ref: "#/components/schemas/AnnotationSourceEventRecurrence"
    Annotation.WidgetScope:
      oneOf:
      - $ref: "#/components/schemas/AnnotationWidgetScopeAllWidgetsVariant"
      - $ref: "#/components/schemas/AnnotationWidgetScopeSpecificWidgetsVariant"
    Annotation.WidgetScope.AllWidgets:
      type: object
    Annotation.WidgetScope.SpecificWidgets:
      properties:
        widgetIds:
          items:
            type: string
          type: array
      type: object
    AnnotationColor:
      enum:
      - ANNOTATION_COLOR_UNSPECIFIED
      - ANNOTATION_COLOR_DEFAULT
      - ANNOTATION_COLOR_GREEN
      - ANNOTATION_COLOR_CYAN
      - ANNOTATION_COLOR_BLUE
      - ANNOTATION_COLOR_PURPLE
      - ANNOTATION_COLOR_MAGENTA
      - ANNOTATION_COLOR_RED
      - ANNOTATION_COLOR_ORANGE
      - ANNOTATION_COLOR_YELLOW
      type: string
    AnnotationOrientation:
      enum:
      - ANNOTATION_ORIENTATION_VERTICAL_UNSPECIFIED
      - ANNOTATION_ORIENTATION_HORIZONTAL
      type: string
    AnnotationSourceDataprime:
      properties:
        dataprime:
          $ref: "#/components/schemas/DataprimeSource"
      required:
      - dataprime
      type: object
    AnnotationSourceEventRecurrence:
      properties:
        eventRecurrence:
          $ref: "#/components/schemas/EventRecurrenceSource"
      required:
      - eventRecurrence
      type: object
    AnnotationSourceLogs:
      properties:
        logs:
          $ref: "#/components/schemas/LogsSource"
      required:
      - logs
      type: object
    AnnotationSourceManual:
      properties:
        manual:
          $ref: "#/components/schemas/ManualSource"
      required:
      - manual
      type: object
    AnnotationSourceMetrics:
      example:
        metrics:
          intervalResolution:
            auto:
              maximumDataPoints: 500
              minimumInterval: minimumInterval
            useAdvancedLimit: true
          orientation: ANNOTATION_ORIENTATION_VERTICAL_UNSPECIFIED
          promqlQuery:
            value: value
          strategy:
            startTimeMetric: "{}"
          messageTemplate: messageTemplate
          labels:
          - labels
          - labels
      properties:
        metrics:
          $ref: "#/components/schemas/MetricsSource"
      required:
      - metrics
      type: object
    AnnotationSourceSpans:
      properties:
        spans:
          $ref: "#/components/schemas/SpansSource"
      required:
      - spans
      type: object
    AnnotationWidgetScopeAllWidgetsVariant:
      example:
        allWidgets: "{}"
      properties:
        allWidgets:
          type: object
      required:
      - allWidgets
      type: object
    AnnotationWidgetScopeSpecificWidgetsVariant:
      properties:
        specificWidgets:
          $ref: "#/components/schemas/Annotation.WidgetScope.SpecificWidgets"
      required:
      - specificWidgets
      type: object
    AssignDashboardFolderResponse:
      description: This is a response confirming that folder has been successfully
        assigned to a dashboard
      externalDocs:
        description: Find out more about Dashboards in our documentation.
        url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
      title: Assign dashboard to folder response data structure
      type: object
    AutoIntervalResolution:
      description: "Automatic interval resolution that calculates optimal time buckets\
        \ based on the widget width, time range, and specified constraints."
      example:
        maximumDataPoints: 500
        minimumInterval: minimumInterval
      externalDocs:
        url: ""
      properties:
        maximumDataPoints:
          description: Maximum number of data points to display. The calculated interval
            ensures this limit is not exceeded.
          example: 500
          format: int32
          type: integer
        minimumInterval:
          description: Minimum interval duration. The calculated interval will not
            be smaller than this value.
          type: string
      title: AutoIntervalResolution
      type: object
    AutoRefreshFifteenMinutes:
      type: object
    AutoRefreshFiveMinutes:
      type: object
    AutoRefreshOff:
      type: object
    AutoRefreshOneMinute:
      type: object
    AutoRefreshTwoMinutes:
      type: object
    Average:
      properties:
        field:
          type: string
        observationField:
          $ref: "#/components/schemas/ObservationField"
      type: object
    BarChart:
      description: BarChart represents the configuration of a vertical bar chart widget.
      externalDocs:
        url: ""
      properties:
        barValueDisplay:
          $ref: "#/components/schemas/widgets.BarValueDisplay"
        colorScheme:
          description: "Applied color scheme, one of the predefined values"
          example: classic
          type: string
        colorsBy:
          $ref: "#/components/schemas/ColorsBy"
        customUnit:
          description: Custom unit (requires to have unit field set to custom to take
            effect)
          example: mph
          type: string
        dataModeType:
          $ref: "#/components/schemas/widgets.common.DataModeType"
        decimal:
          description: "Number indicating the decimal precision of the numeric values,\
            \ within range 0-15"
          example: 4
          format: int32
          type: integer
        decimalPrecision:
          description: Whether to render numeric value without abbreviation
          example: false
          type: boolean
        groupNameTemplate:
          description: "Custom template name for a bar group, can contain variables"
          example: "Result - {{ variable }}"
          type: string
        hashColors:
          description: Whether to ignore color scheme and derive colors from algorithm
          example: false
          type: boolean
        legend:
          $ref: "#/components/schemas/Legend"
        maxBarsPerChart:
          description: Maximum number of bars on a chart
          example: 20
          format: int32
          type: integer
        query:
          $ref: "#/components/schemas/BarChart.Query"
        scaleType:
          $ref: "#/components/schemas/ScaleType"
        sortBy:
          $ref: "#/components/schemas/SortByType"
        stackDefinition:
          $ref: "#/components/schemas/BarChart.StackDefinition"
        unit:
          $ref: "#/components/schemas/common.Unit"
        xAxis:
          $ref: "#/components/schemas/XAxis"
        yAxisMax:
          description: Number indicating the upper band for y axis
          example: 1000
          format: float
          type: number
        yAxisMin:
          description: Number indicating the lower band for y axis
          example: -1000
          format: float
          type: number
      title: BarChart
      type: object
    BarChart.DataprimeQuery:
      description: A Dataprime variant of the query
      externalDocs:
        url: ""
      properties:
        dataprimeQuery:
          $ref: "#/components/schemas/common.DataprimeQuery"
        filters:
          items:
            $ref: "#/components/schemas/Filter.Source"
          type: array
        groupNames:
          items:
            description: List of field names by which results are grouped
            type: string
          type: array
        stackedGroupName:
          description: Field name by which results in groups are divided into subgroups
          type: string
        timeFrame:
          $ref: "#/components/schemas/TimeFrameSelect"
      title: DataprimeQuery
      type: object
    BarChart.LogsQuery:
      description: A logs variant of the query
      externalDocs:
        url: ""
      properties:
        aggregation:
          $ref: "#/components/schemas/LogsAggregation"
        filters:
          items:
            $ref: "#/components/schemas/Filter.LogsFilter"
          type: array
        groupNames:
          items:
            description: List of field names to group the query results
            type: string
          type: array
        groupNamesFields:
          items:
            $ref: "#/components/schemas/ObservationField"
          type: array
        luceneQuery:
          $ref: "#/components/schemas/LuceneQuery"
        stackedGroupName:
          description: Field name by which results are stacked in individual group
          type: string
        stackedGroupNameField:
          $ref: "#/components/schemas/ObservationField"
        timeFrame:
          $ref: "#/components/schemas/TimeFrameSelect"
      title: LogsQuery
      type: object
    BarChart.MetricsQuery:
      description: A metrics variant of the query
      externalDocs:
        url: ""
      properties:
        aggregation:
          $ref: "#/components/schemas/common.Aggregation"
        editorMode:
          $ref: "#/components/schemas/MetricsQueryEditorMode"
        filters:
          items:
            $ref: "#/components/schemas/MetricsFilter"
          type: array
        groupNames:
          items:
            description: List of field names by which metric results are grouped
            type: string
          type: array
        promqlQuery:
          $ref: "#/components/schemas/PromQlQuery"
        promqlQueryType:
          $ref: "#/components/schemas/PromQLQueryType"
        stackedGroupName:
          description: Field name by which results in groups are divided into subgroups
          type: string
        timeFrame:
          $ref: "#/components/schemas/TimeFrameSelect"
      title: MetricsQuery
      type: object
    BarChart.Query:
      oneOf:
      - $ref: "#/components/schemas/BarChartQueryMetrics"
      - $ref: "#/components/schemas/BarChartQueryDataprime"
      - $ref: "#/components/schemas/BarChartQueryLogs"
      - $ref: "#/components/schemas/BarChartQuerySpans"
    BarChart.SpansQuery:
      description: A spans variant of the query
      externalDocs:
        url: ""
      properties:
        aggregation:
          $ref: "#/components/schemas/SpansAggregation"
        filters:
          items:
            $ref: "#/components/schemas/SpansFilter"
          type: array
        groupNames:
          items:
            $ref: "#/components/schemas/SpanField"
          type: array
        groupNamesFields:
          items:
            $ref: "#/components/schemas/SpanObservationField"
          type: array
        luceneQuery:
          $ref: "#/components/schemas/LuceneQuery"
        stackedGroupName:
          $ref: "#/components/schemas/SpanField"
        stackedGroupNameField:
          $ref: "#/components/schemas/SpanObservationField"
        timeFrame:
          $ref: "#/components/schemas/TimeFrameSelect"
      title: SpansQuery
      type: object
    BarChart.StackDefinition:
      properties:
        maxSlicesPerBar:
          description: How many slices can fit in a single bar
          format: int32
          type: integer
        stackNameTemplate:
          description: Custom template name of an individual stack
          type: string
      type: object
    BarChartQueryDataprime:
      properties:
        dataprime:
          $ref: "#/components/schemas/BarChart.DataprimeQuery"
      required:
      - dataprime
      type: object
    BarChartQueryLogs:
      properties:
        logs:
          $ref: "#/components/schemas/BarChart.LogsQuery"
      required:
      - logs
      type: object
    BarChartQueryMetrics:
      properties:
        metrics:
          $ref: "#/components/schemas/BarChart.MetricsQuery"
      required:
      - metrics
      type: object
    BarChartQuerySpans:
      properties:
        spans:
          $ref: "#/components/schemas/BarChart.SpansQuery"
      required:
      - spans
      type: object
    ColorApplyTarget:
      enum:
      - COLOR_APPLY_TARGET_UNSPECIFIED
      - COLOR_APPLY_TARGET_VALUE
      - COLOR_APPLY_TARGET_BACKGROUND
      - COLOR_APPLY_TARGET_ROW
      type: string
    ColorGradientType:
      enum:
      - COLOR_GRADIENT_TYPE_UNSPECIFIED
      - COLOR_GRADIENT_TYPE_BLUE
      - COLOR_GRADIENT_TYPE_GREEN
      - COLOR_GRADIENT_TYPE_RED
      - COLOR_GRADIENT_TYPE_THRESHOLD
      - COLOR_GRADIENT_TYPE_BLUE_REVERSED
      - COLOR_GRADIENT_TYPE_GREEN_REVERSED
      - COLOR_GRADIENT_TYPE_RED_REVERSED
      - COLOR_GRADIENT_TYPE_THRESHOLD_REVERSED
      type: string
    ColorLabelMapping:
      oneOf:
      - $ref: "#/components/schemas/ColorLabelMappingValue"
      - $ref: "#/components/schemas/ColorLabelMappingRegex"
      - $ref: "#/components/schemas/ColorLabelMappingRange"
    ColorLabelMapping.ValueMapping:
      description: Exact value-based color and label mapping
      externalDocs:
        url: ""
      properties:
        sections:
          items:
            $ref: "#/components/schemas/MappingSection"
          type: array
      title: ValueMapping
      type: object
    ColorLabelMappingRange:
      description: "Reusable color and label mapping configuration supporting range,\
        \ value, and regex-based mappings"
      externalDocs:
        url: ""
      properties:
        colorBy:
          $ref: "#/components/schemas/ColorApplyTarget"
        range:
          $ref: "#/components/schemas/RangeMapping"
      required:
      - range
      title: ColorLabelMapping
      type: object
    ColorLabelMappingRegex:
      description: "Reusable color and label mapping configuration supporting range,\
        \ value, and regex-based mappings"
      externalDocs:
        url: ""
      properties:
        colorBy:
          $ref: "#/components/schemas/ColorApplyTarget"
        regex:
          $ref: "#/components/schemas/RegexMapping"
      required:
      - regex
      title: ColorLabelMapping
      type: object
    ColorLabelMappingValue:
      description: "Reusable color and label mapping configuration supporting range,\
        \ value, and regex-based mappings"
      externalDocs:
        url: ""
      properties:
        colorBy:
          $ref: "#/components/schemas/ColorApplyTarget"
        value:
          $ref: "#/components/schemas/ColorLabelMapping.ValueMapping"
      required:
      - value
      title: ColorLabelMapping
      type: object
    ColorSolidType:
      enum:
      - COLOR_SOLID_TYPE_UNSPECIFIED
      - COLOR_SOLID_TYPE_BLUE
      - COLOR_SOLID_TYPE_GREEN
      - COLOR_SOLID_TYPE_RED
      - COLOR_SOLID_TYPE_PURPLE
      - COLOR_SOLID_TYPE_CYAN
      - COLOR_SOLID_TYPE_MAGENTA
      - COLOR_SOLID_TYPE_ORANGE
      - COLOR_SOLID_TYPE_YELLOW
      type: string
    ColorsBy:
      oneOf:
      - $ref: "#/components/schemas/ColorsByStackVariant"
      - $ref: "#/components/schemas/ColorsByGroupByVariant"
      - $ref: "#/components/schemas/ColorsByAggregationVariant"
      - $ref: "#/components/schemas/ColorsByQueryVariant"
      - $ref: "#/components/schemas/ColorsByCategoryVariant"
    ColorsByAggregation:
      type: object
    ColorsByAggregationVariant:
      properties:
        aggregation:
          type: object
      required:
      - aggregation
      type: object
    ColorsByCategory:
      type: object
    ColorsByCategoryVariant:
      properties:
        category:
