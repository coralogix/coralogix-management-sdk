        luceneQuery:
          $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_metrics_promqlQuery"
        timeFrame:
          $ref: "#/components/schemas/LineChart_query_oneOf_logs_timeFrame"
      title: LogsQuery
      type: object
    Dashboard_annotations_inner_source_oneOf_3_dataprime_strategy:
      oneOf:
      - $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_3_dataprime_strategy_oneOf"
