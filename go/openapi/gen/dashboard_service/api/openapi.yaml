openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /dashboards/check/v1:
    post:
      description: |-
        Checks a dashboard definition or an existing dashboard by id and returns validation issues without persisting changes.

        Requires the following permissions:
        - `team-dashboards:Read`
      externalDocs:
        url: ""
      operationId: DashboardsService_CheckDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardsService_CheckDashboard_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                issues:
                - location: /sections/0/rows/1/widgets/2
                  message: Widget 'cpu-chart' references undefined variable 'env'
                  severity: SEVERITY_ERROR
                - location: /sections/1/rows/0/widgets/0/queries/0
                  message: Query uses deprecated function 'timeShift'
                  severity: SEVERITY_WARNING
              schema:
                $ref: "#/components/schemas/CheckDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Validate a dashboard and return issues
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /dashboards/dashboards/v1:
    post:
      description: |-
        Creates a new dashboard.

        Requires the following permissions:
        - `team-dashboards:Update`
      externalDocs:
        url: ""
      operationId: DashboardsService_CreateDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_dashboard_request_data_structure"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Create a new dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
    put:
      description: |-
        Replaces an existing dashboard.

        Requires the following permissions:
        - `team-dashboards:Update`
      externalDocs:
        url: ""
      operationId: DashboardsService_ReplaceDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_dashboard_request_data_structure"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Replace a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /dashboards/dashboards/v1/catalog/list:
    get:
      description: |-
        Get a list of all dashboards accessible.

        Requires the following permissions:
        - `team-dashboards:Read`
      externalDocs:
        url: ""
      operationId: DashboardCatalogService_GetDashboardCatalog
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardCatalogResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get dashboard catalog
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /dashboards/dashboards/v1/slugs/lookup/{slug}:
    get:
      description: |-
        Returns the dashboard associated with the specified slug.

        Requires the following permissions:
        - `team-dashboards:Read`
      externalDocs:
        url: ""
      operationId: DashboardsService_GetDashboardBySlug
      parameters:
      - description: The URL slug identifying the dashboard to retrieve.
        explode: false
        in: path
        name: slug
        required: true
        schema:
          description: The URL slug identifying the dashboard to retrieve.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardBySlugResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get a dashboard by URL slug
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /dashboards/dashboards/v1/{dashboard_id}:
    delete:
      description: |-
        Deletes the dashboard with the specified ID.

        Requires the following permissions:
        - `team-dashboards:Update`
      externalDocs:
        url: ""
      operationId: DashboardsService_DeleteDashboard
      parameters:
      - description: The dashboard id.
        explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          description: The dashboard id.
          minLength: 0
          type: string
        style: simple
      - description: Optional client-supplied request identifier used to correlate
          the deletion request.
        explode: true
        in: query
        name: request_id
        required: false
        schema:
          description: Optional client-supplied request identifier used to correlate
            the deletion request.
          minLength: 0
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Delete a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
    get:
      description: |-
        Returns the details of the specified dashboard.

        Requires the following permissions:
        - `team-dashboards:Read`
      externalDocs:
        url: ""
      operationId: DashboardsService_GetDashboard
      parameters:
      - description: The dashboard id.
        explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          description: The dashboard id.
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /dashboards/dashboards/v1/{dashboard_id}/default:
    put:
      description: |-
        Sets the specified dashboard as the default.

        Requires the following permissions:
        - `team-dashboards:Update`
      externalDocs:
        url: ""
      operationId: DashboardsService_ReplaceDefaultDashboard
      parameters:
      - description: The dashboard id.
        explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          description: The dashboard id.
          minLength: 0
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_default_dashboard_request_data_structure"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaceDefaultDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Replace the default dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /dashboards/dashboards/v1/{dashboard_id}/folder:
    post:
      description: |-
        Assigns the dashboard to a folder.

        Requires the following permissions:
        - `team-dashboards:Update`
      externalDocs:
        url: ""
      operationId: DashboardsService_AssignDashboardFolder
      parameters:
      - description: The dashboard id.
        explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          description: The dashboard id.
          minLength: 0
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Assign_dashboard_to_folder_request_data_structure"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignDashboardFolderResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Assign a dashboard to a folder
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /dashboards/pinned/v1/{dashboard_id}:
    delete:
      description: |-
        Unpins the specified dashboard.

        Requires the following permissions:
        - `team-dashboards:Read`
      externalDocs:
        url: ""
      operationId: DashboardsService_UnpinDashboard
      parameters:
      - description: The dashboard id.
        explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          description: The dashboard id.
          minLength: 0
          type: string
        style: simple
      - description: "Idempotency key for the unpin request, used to prevent duplicate\
          \ operations."
        explode: true
        in: query
        name: request_id
        required: false
        schema:
          description: "Idempotency key for the unpin request, used to prevent duplicate\
            \ operations."
          minLength: 0
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnpinDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Remove dashboard from favorites
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
    put:
      description: |-
        Pins the specified dashboard.

        Requires the following permissions:
        - `team-dashboards:Read`
      externalDocs:
        url: ""
      operationId: DashboardsService_PinDashboard
      parameters:
      - description: The dashboard id.
        explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          description: The dashboard id.
          minLength: 0
          type: string
        style: simple
      - description: "Idempotency key for the pin request, used to prevent duplicate\
          \ operations."
        explode: true
        in: query
        name: request_id
        required: false
        schema:
          description: "Idempotency key for the pin request, used to prevent duplicate\
            \ operations."
          minLength: 0
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinDashboardResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Add dashboard to favorites
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
components:
  schemas:
    ActionDataSourceType:
      description: Action data source type.
      enum:
      - ACTION_DATA_SOURCE_TYPE_NONE_UNSPECIFIED
      - ACTION_DATA_SOURCE_TYPE_LOGS
      - ACTION_DATA_SOURCE_TYPE_SPANS
      - ACTION_DATA_SOURCE_TYPE_METRICS
      - ACTION_DATA_SOURCE_TYPE_DATAPRIME
      type: string
    ActionDefinition:
      oneOf:
      - $ref: "#/components/schemas/ActionDefinitionCustomAction"
      - $ref: "#/components/schemas/ActionDefinitionGoToDashboardAction"
    ActionDefinitionCustomAction:
      description: "Defines the behavior of a dashboard action, either a custom URL\
        \ or a built-in template."
      example:
        customAction:
          url: url
      externalDocs:
        url: ""
      properties:
        customAction:
          $ref: "#/components/schemas/CustomAction"
      required:
      - customAction
      type: object
    ActionDefinitionGoToDashboardAction:
      description: "Defines the behavior of a dashboard action, either a custom URL\
        \ or a built-in template."
      externalDocs:
        url: ""
      properties:
        goToDashboardAction:
          $ref: "#/components/schemas/GoToDashboardTemplateAction"
      required:
      - goToDashboardAction
      type: object
    AllOption:
      description: All option.
      example:
        includeAll: true
        label: label
      externalDocs:
        url: ""
      properties:
        includeAll:
          description: The include all.
          type: boolean
        label:
          description: The label.
          minLength: 0
          type: string
      type: object
    AllValue:
      additionalProperties: false
      description: All value.
      externalDocs:
        url: ""
      type: object
    Annotation:
      example:
        color: ANNOTATION_COLOR_UNSPECIFIED
        scope:
          allWidgets: "{}"
        name: name
        description: description
        id: id
        source:
          dataprime:
            orientation: ANNOTATION_ORIENTATION_VERTICAL_UNSPECIFIED
            query:
              text: text
            dataModeType: DATA_MODE_TYPE_HIGH_UNSPECIFIED
            strategy:
              duration:
                durationField:
                  keypath:
                  - keypath
                  - keypath
                  scope: DATASET_SCOPE_UNSPECIFIED
                startTimestampField:
                  keypath:
                  - keypath
                  - keypath
                  scope: DATASET_SCOPE_UNSPECIFIED
            labelFields:
            - keypath:
              - keypath
              - keypath
              scope: DATASET_SCOPE_UNSPECIFIED
            - keypath:
              - keypath
              - keypath
              scope: DATASET_SCOPE_UNSPECIFIED
            messageTemplate: messageTemplate
        enabled: true
      properties:
        color:
          $ref: "#/components/schemas/AnnotationColor"
        description:
          description: Human-readable description.
          minLength: 0
          type: string
        enabled:
          description: Whether this resource is enabled.
          type: boolean
        id:
          description: Unique identifier.
          minLength: 0
          type: string
        name:
          description: Display name.
          minLength: 0
          type: string
        scope:
          $ref: "#/components/schemas/Annotation.WidgetScope"
        source:
          $ref: "#/components/schemas/Annotation.Source"
      type: object
    Annotation.Source:
      oneOf:
      - $ref: "#/components/schemas/AnnotationSourceDataprime"
      - $ref: "#/components/schemas/AnnotationSourceEventRecurrence"
      - $ref: "#/components/schemas/AnnotationSourceLogs"
      - $ref: "#/components/schemas/AnnotationSourceManual"
      - $ref: "#/components/schemas/AnnotationSourceMetrics"
      - $ref: "#/components/schemas/AnnotationSourceSpans"
    Annotation.WidgetScope:
      oneOf:
      - $ref: "#/components/schemas/AnnotationWidgetScopeAllWidgetsVariant"
      - $ref: "#/components/schemas/AnnotationWidgetScopeSpecificWidgetsVariant"
    Annotation.WidgetScope.AllWidgets:
      additionalProperties: false
      description: Indicates that the annotation applies to all widgets in the dashboard.
      externalDocs:
        url: ""
      type: object
    Annotation.WidgetScope.SpecificWidgets:
      description: Specific widgets.
      externalDocs:
        url: ""
      properties:
        widgetIds:
          description: The widget ids.
          items:
            description: The widget ids.
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    AnnotationColor:
      description: Annotation color.
      enum:
      - ANNOTATION_COLOR_UNSPECIFIED
      - ANNOTATION_COLOR_DEFAULT
      - ANNOTATION_COLOR_GREEN
      - ANNOTATION_COLOR_CYAN
      - ANNOTATION_COLOR_BLUE
      - ANNOTATION_COLOR_PURPLE
      - ANNOTATION_COLOR_MAGENTA
      - ANNOTATION_COLOR_RED
      - ANNOTATION_COLOR_ORANGE
      - ANNOTATION_COLOR_YELLOW
      type: string
    AnnotationOrientation:
      description: Annotation orientation.
      enum:
      - ANNOTATION_ORIENTATION_VERTICAL_UNSPECIFIED
      - ANNOTATION_ORIENTATION_HORIZONTAL
      type: string
    AnnotationSourceDataprime:
      description: Source.
      example:
        dataprime:
          orientation: ANNOTATION_ORIENTATION_VERTICAL_UNSPECIFIED
          query:
            text: text
          dataModeType: DATA_MODE_TYPE_HIGH_UNSPECIFIED
          strategy:
            duration:
              durationField:
                keypath:
                - keypath
                - keypath
                scope: DATASET_SCOPE_UNSPECIFIED
              startTimestampField:
                keypath:
                - keypath
                - keypath
                scope: DATASET_SCOPE_UNSPECIFIED
          labelFields:
          - keypath:
            - keypath
            - keypath
            scope: DATASET_SCOPE_UNSPECIFIED
          - keypath:
            - keypath
            - keypath
            scope: DATASET_SCOPE_UNSPECIFIED
          messageTemplate: messageTemplate
      externalDocs:
        url: ""
      properties:
        dataprime:
          $ref: "#/components/schemas/DataprimeSource"
      required:
      - dataprime
      type: object
    AnnotationSourceEventRecurrence:
      description: Source.
      externalDocs:
        url: ""
      properties:
        eventRecurrence:
          $ref: "#/components/schemas/EventRecurrenceSource"
      required:
      - eventRecurrence
      type: object
    AnnotationSourceLogs:
      description: Source.
      externalDocs:
        url: ""
      properties:
        logs:
          $ref: "#/components/schemas/LogsSource"
      required:
      - logs
      type: object
    AnnotationSourceManual:
      description: Source.
      externalDocs:
        url: ""
      properties:
        manual:
          $ref: "#/components/schemas/ManualSource"
      required:
      - manual
      type: object
    AnnotationSourceMetrics:
      description: Source.
      externalDocs:
        url: ""
      properties:
        metrics:
          $ref: "#/components/schemas/MetricsSource"
      required:
      - metrics
      type: object
    AnnotationSourceSpans:
      description: Source.
      externalDocs:
        url: ""
      properties:
        spans:
          $ref: "#/components/schemas/SpansSource"
      required:
      - spans
      type: object
    AnnotationWidgetScopeAllWidgetsVariant:
      description: Widget scope.
      example:
        allWidgets: "{}"
      externalDocs:
        url: ""
      properties:
        allWidgets:
          additionalProperties: false
          description: Indicates that the annotation applies to all widgets in the
            dashboard.
          externalDocs:
            url: ""
          type: object
      required:
      - allWidgets
      type: object
    AnnotationWidgetScopeSpecificWidgetsVariant:
      description: Widget scope.
      externalDocs:
        url: ""
      properties:
        specificWidgets:
          $ref: "#/components/schemas/Annotation.WidgetScope.SpecificWidgets"
      required:
      - specificWidgets
      type: object
    AssignDashboardFolderResponse:
      additionalProperties: false
      description: This is a response confirming that folder has been successfully
        assigned to a dashboard
      externalDocs:
        description: Find out more about Dashboards in our documentation.
        url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
      title: Assign dashboard to folder response data structure
      type: object
    AutoIntervalResolution:
      description: "Automatic interval resolution that calculates optimal time buckets\
        \ based on the widget width, time range, and specified constraints."
      externalDocs:
        url: ""
      properties:
        maximumDataPoints:
          description: Maximum number of data points to display. The calculated interval
            ensures this limit is not exceeded.
          example: 500
          format: int32
          type: integer
        minimumInterval:
          description: Minimum interval duration. The calculated interval will not
            be smaller than this value.
          minLength: 0
          type: string
      title: AutoIntervalResolution
      type: object
    AutoRefreshFifteenMinutes:
      additionalProperties: false
      description: Auto refresh fifteen minutes.
      externalDocs:
        url: ""
      type: object
    AutoRefreshFiveMinutes:
      additionalProperties: false
      description: Auto refresh five minutes.
      externalDocs:
        url: ""
      type: object
    AutoRefreshOff:
      additionalProperties: false
      description: Auto refresh off.
      externalDocs:
        url: ""
      type: object
    AutoRefreshOneMinute:
      additionalProperties: false
      description: Auto refresh one minute.
      externalDocs:
        url: ""
      type: object
    AutoRefreshTwoMinutes:
      additionalProperties: false
      description: Auto refresh two minutes.
      externalDocs:
        url: ""
      type: object
    Average:
      description: Average.
      externalDocs:
        url: ""
      properties:
        field:
          description: The field.
          minLength: 0
          type: string
        observationField:
          $ref: "#/components/schemas/ObservationField"
      type: object
    BarChart:
      description: BarChart represents the configuration of a vertical bar chart widget.
      example:
        maxBarsPerChart: 20
        stackDefinition:
          stackNameTemplate: stackNameTemplate
          maxSlicesPerBar: 1
        colorsBy:
          aggregation: "{}"
        xAxis:
          time:
            interval: interval
            bucketsPresented: 5
        groupNameTemplate: "Result - {{ variable }}"
        legend:
          columns:
          - LEGEND_COLUMN_MIN
          - LEGEND_COLUMN_MAX
          - LEGEND_COLUMN_NAME
          groupByQuery: true
          isVisible: true
          placement: LEGEND_PLACEMENT_UNSPECIFIED
        query:
          dataprime:
            groupNames:
            - groupNames
            - groupNames
            dataprimeQuery:
              text: text
            filters:
            - null
            - null
            stackedGroupName: stackedGroupName
            timeFrame:
              absoluteTimeFrame:
                from: 2000-01-23T04:56:07.000+00:00
                to: 2000-01-23T04:56:07.000+00:00
        hashColors: false
        barValueDisplay: BAR_VALUE_DISPLAY_UNSPECIFIED
        customUnit: mph
        dataModeType: DATA_MODE_TYPE_HIGH_UNSPECIFIED
        decimalPrecision: false
        xAxisTimeFormat: X_AXIS_TIME_FORMAT_UNSPECIFIED
