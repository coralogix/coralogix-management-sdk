          minLength: 0
          type: string
        enabled:
          description: Indicates if the filter is currently enabled or not.
          type: boolean
        id:
          $ref: "#/components/schemas/UUID"
        scope:
          $ref: "#/components/schemas/Filter.WidgetScope"
        source:
          $ref: "#/components/schemas/Filter.Source"
      title: Filter
