openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
tags:
- description: Manage your dashboards.
  externalDocs:
    url: ""
  name: Dashboard service
paths:
  /dashboards/dashboards/v1/catalog:
    get:
      description: Get a list of all dashboards accessible.
      externalDocs:
        url: ""
      operationId: DashboardCatalogService_GetDashboardCatalog
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_dashboard_catalog_response_data_structure_"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get dashboard catalog
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /v1/dashboards/by-slug/{slug}:
    get:
      externalDocs:
        url: ""
      operationId: DashboardsService_GetDashboardBySlug
      parameters:
      - explode: false
        in: path
        name: slug
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_dashboard_by_URL_slug_response_data_structure"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get a dashboard by URL slug
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /v1/dashboards/dashboards:
    post:
      externalDocs:
        url: ""
      operationId: DashboardsService_CreateDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Create_dashboard_response_data_structure"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Create a new dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
    put:
      externalDocs:
        url: ""
      operationId: DashboardsService_ReplaceDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: This is a response received when the dashboard is successfully
                  updated
                externalDocs:
                  description: Find out more Dashboards in our documentation.
                  url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
                title: Replace dashboard response data structure
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Replace a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /v1/dashboards/dashboards/{dashboard_id}:
    delete:
      externalDocs:
        url: ""
      operationId: DashboardsService_DeleteDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                description: This is a response received when the dashboard is successfully
                  deleted
                externalDocs:
                  description: Find out more Dashboards in our documentation.
                  url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
                title: Delete dashboard response data structure
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Delete a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
    get:
      externalDocs:
        url: ""
      operationId: DashboardsService_GetDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_dashboard_response_data_structure"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get a dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /v1/dashboards/dashboards/{dashboard_id}/default:
    put:
      externalDocs:
        url: ""
      operationId: DashboardsService_ReplaceDefaultDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Replace_default_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: This is a response received when default dashboard has
                  been replaced
                externalDocs:
                  description: Find out more about Dashboards in our documentation.
                  url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
                title: Replace default dashboard response data structure
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Replace the default dashboard
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /v1/dashboards/dashboards/{dashboard_id}/folder:
    post:
      externalDocs:
        url: ""
      operationId: DashboardsService_AssignDashboardFolder
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Assign_dashboard_to_folder_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: This is a response confirming that folder has been successfully
                  assigned to a dashboard
                externalDocs:
                  description: Find out more about Dashboards in our documentation.
                  url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
                title: Assign dashboard to folder response data structure
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Assign a dashboard to a folder
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Update
  /v1/dashboards/dashboards/{dashboard_id}:pin:
    patch:
      externalDocs:
        url: ""
      operationId: DashboardsService_PinDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pin_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: This is a response received on successful pinning of
                  the dashboard
                externalDocs:
                  description: Find out more about Dashboards in our documentation.
                  url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
                title: Pin dashboard response data structure
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Add dashboard to favorites
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
  /v1/dashboards/dashboards/{dashboard_id}:unpin:
    patch:
      externalDocs:
        url: ""
      operationId: DashboardsService_UnpinDashboard
      parameters:
      - explode: false
        in: path
        name: dashboard_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Unpin_dashboard_request_data_structure"
      responses:
        "200":
          content:
            application/json:
              schema:
                description: This is a response received when dashboard has been unpinned
                externalDocs:
                  description: Find out more about Dashboards in our documentation.
                  url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/
                title: Unpin dashboard response data structure
                type: object
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Remove dashboard from favorites
      tags:
      - Dashboard service
      x-coralogixPermissions:
      - team-dashboards:Read
components:
  schemas:
    Dashboard_layout_sections_inner_options_oneOf_1:
      properties:
        custom:
          $ref: "#/components/schemas/Dashboard_layout_sections_inner_options_oneOf_1_custom"
      type: object
    Dashboard_variables_inner_definition_oneOf_1_multiSelect_source_oneOf_4_query_query_oneOf_2_spansQuery_type_oneOf_fieldName:
      properties:
        spanRegex:
          type: string
      type: object
    Widget:
      description: This data structure represents a dashboard widget.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        appearance:
          width: 6
        description: "{\"value\":\"Average delay of application\"}"
        definition:
          lineChart:
            connectNulls: false
            stackedLine: STACKED_LINE_UNSPECIFIED
            legend:
              columns:
              - LEGEND_COLUMN_UNSPECIFIED
              - LEGEND_COLUMN_UNSPECIFIED
              groupByQuery: true
              isVisible: true
              placement: LEGEND_PLACEMENT_UNSPECIFIED
            tooltip:
              showLabels: true
              type: TOOLTIP_TYPE_UNSPECIFIED
            queryDefinitions:
            - null
            - null
        id:
          value: value
        title: "{\"value\":\"Gauge\"}"
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Find out more about creating dashboard widgets in our documentation.
        url: https://coralogix.com/docs/user-guides/custom-dashboards/getting-started/#add-new-widgets
      properties:
        appearance:
          $ref: "#/components/schemas/Widget_appearance"
        createdAt:
          format: date-time
          type: string
        definition:
          $ref: "#/components/schemas/Widget_definition"
        description:
          description: Short description of the widget
          example: "{\"value\":\"Average delay of application\"}"
          type: string
        id:
          $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_metrics_promqlQuery"
        title:
          description: Name of the widget
          example: "{\"value\":\"Gauge\"}"
          type: string
        updatedAt:
          format: date-time
          type: string
      title: Widget
      type: object
    Dashboard_variablesV2_inner_value_oneOf:
      example:
        multiString:
          all: "{}"
      properties:
        multiString:
          $ref: "#/components/schemas/Dashboard_variablesV2_inner_value_oneOf_multiString"
      type: object
    Dashboard_variablesV2_inner_source_oneOf_1_query_oneOf_3_dataprimeQuery_type_queryText:
      properties:
        dataModeType:
          enum:
          - DATA_MODE_TYPE_HIGH_UNSPECIFIED
          - DATA_MODE_TYPE_ARCHIVE
          type: string
        query:
          $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_3_dataprime_query"
      type: object
    Dashboard_variables_inner_definition_oneOf_1_multiSelect_source_oneOf_4_query_query_oneOf_2_spansQuery_type_oneOf_1_fieldValue:
      properties:
        observationField:
          $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_1_logs_labelFields_inner"
        value:
          $ref: "#/components/schemas/SpansFilter_field"
      type: object
    Dashboard_layout_sections_inner_options_oneOf_1_custom_color:
      properties:
        predefined:
          enum:
          - SECTION_PREDEFINED_COLOR_UNSPECIFIED
          - SECTION_PREDEFINED_COLOR_CYAN
          - SECTION_PREDEFINED_COLOR_GREEN
          - SECTION_PREDEFINED_COLOR_BLUE
          - SECTION_PREDEFINED_COLOR_PURPLE
          - SECTION_PREDEFINED_COLOR_MAGENTA
          - SECTION_PREDEFINED_COLOR_PINK
          - SECTION_PREDEFINED_COLOR_ORANGE
          type: string
      type: object
    ? Dashboard_variables_inner_definition_oneOf_1_multiSelect_source_oneOf_4_query_query_oneOf_1_metricsQuery_type_oneOf_2_labelValue
    : properties:
        labelFilters:
          items:
            $ref: "#/components/schemas/Dashboard_variables_inner_definition_oneOf_1_multiSelect_source_oneOf_4_query_query_oneOf_1_metricsQuery_type_oneOf_2_labelValue_labelFilters_inner"
          type: array
        labelName:
          $ref: "#/components/schemas/Dashboard_variables_inner_definition_oneOf_1_multiSelect_source_oneOf_4_query_query_oneOf_1_metricsQuery_type_oneOf_2_labelValue_labelFilters_inner_label"
        metricName:
          $ref: "#/components/schemas/Dashboard_variables_inner_definition_oneOf_1_multiSelect_source_oneOf_4_query_query_oneOf_1_metricsQuery_type_oneOf_2_labelValue_labelFilters_inner_label"
      type: object
    SpansQuery:
      description: A spans variant of the query
      externalDocs:
        url: ""
      properties:
        filters:
          items:
            $ref: "#/components/schemas/SpansFilter"
          type: array
        grouping:
          $ref: "#/components/schemas/SpansQuery_grouping"
        luceneQuery:
          $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_metrics_promqlQuery"
        timeFrame:
          $ref: "#/components/schemas/LineChart_query_oneOf_logs_timeFrame"
      title: SpansQuery
      type: object
    BarChart:
      description: BarChart represents the configuration of a vertical bar chart widget.
      externalDocs:
        url: ""
      properties:
        barValueDisplay:
          enum:
          - BAR_VALUE_DISPLAY_UNSPECIFIED
          - BAR_VALUE_DISPLAY_TOP
          - BAR_VALUE_DISPLAY_INSIDE
          - BAR_VALUE_DISPLAY_BOTH
          type: string
        colorScheme:
          description: "Applied color scheme, one of the predefined values"
          example: classic
          type: string
        colorsBy:
          $ref: "#/components/schemas/BarChart_colorsBy"
        customUnit:
          description: Custom unit (requires to have unit field set to custom to take
            effect)
          example: mph
          type: string
        dataModeType:
          enum:
          - DATA_MODE_TYPE_HIGH_UNSPECIFIED
          - DATA_MODE_TYPE_ARCHIVE
          type: string
        decimal:
          description: "Number indicating the decimal precision of the numeric values,\
            \ within range 0-15"
          example: 4
          format: int32
          type: integer
        decimalPrecision:
          description: Whether to render numeric value without abbreviation
          example: false
          type: boolean
        groupNameTemplate:
          description: "Custom template name for a bar group, can contain variables"
          example: "Result - {{ variable }}"
          type: string
        hashColors:
          description: Whether to ignore color scheme and derive colors from algorithm
          example: false
          type: boolean
        legend:
          $ref: "#/components/schemas/LineChart_legend"
        maxBarsPerChart:
          description: Maximum number of bars on a chart
          example: 20
          format: int32
          type: integer
        query:
          $ref: "#/components/schemas/Widget_definition_oneOf_3_pieChart_query"
        scaleType:
          enum:
          - SCALE_TYPE_UNSPECIFIED
          - SCALE_TYPE_LINEAR
          - SCALE_TYPE_LOGARITHMIC
          type: string
        sortBy:
          enum:
          - SORT_BY_TYPE_UNSPECIFIED
          - SORT_BY_TYPE_VALUE
          - SORT_BY_TYPE_NAME
          type: string
        stackDefinition:
          $ref: "#/components/schemas/BarChart_stackDefinition"
        unit:
          enum:
          - UNIT_UNSPECIFIED
          - UNIT_MICROSECONDS
          - UNIT_MILLISECONDS
          - UNIT_SECONDS
          - UNIT_BYTES
          - UNIT_KBYTES
          - UNIT_MBYTES
          - UNIT_GBYTES
          - UNIT_BYTES_IEC
          - UNIT_KIBYTES
          - UNIT_MIBYTES
          - UNIT_GIBYTES
          - UNIT_EUR_CENTS
          - UNIT_EUR
          - UNIT_USD_CENTS
          - UNIT_USD
          - UNIT_NANOSECONDS
          - UNIT_CUSTOM
          - UNIT_PERCENT_ZERO_ONE
          - UNIT_PERCENT_ZERO_HUNDRED
          - UNIT_PERCENT
          type: string
        xAxis:
          $ref: "#/components/schemas/BarChart_xAxis"
        yAxisMax:
          description: Number indicating the upper band for y axis
          example: 1000
          format: float
          type: number
        yAxisMin:
          description: Number indicating the lower band for y axis
          example: -1000
          format: float
          type: number
      title: BarChart
      type: object
    LogsQuery_1:
      description: A logs variant of the query
      externalDocs:
        url: ""
      properties:
        aggregation:
          enum:
          - AGGREGATION_UNSPECIFIED
          - AGGREGATION_LAST
          - AGGREGATION_MIN
          - AGGREGATION_MAX
          - AGGREGATION_AVG
          - AGGREGATION_SUM
          type: string
        filters:
          items:
            $ref: "#/components/schemas/LogsFilter"
          type: array
        groupBy:
          items:
            $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_1_logs_labelFields_inner"
          type: array
        logsAggregation:
          $ref: "#/components/schemas/LineChart_query_oneOf_logs_aggregations_inner"
        luceneQuery:
          $ref: "#/components/schemas/Dashboard_annotations_inner_source_oneOf_metrics_promqlQuery"
        timeFrame:
          $ref: "#/components/schemas/LineChart_query_oneOf_logs_timeFrame"
      title: LogsQuery
      type: object
    Filter_source:
      oneOf:
      - $ref: "#/components/schemas/Source"
      - $ref: "#/components/schemas/Source_1"
      - $ref: "#/components/schemas/Source_2"
    LogsQuery_3:
      description: A logs variant of the query
      externalDocs:
        url: ""
      properties:
        filters:
          items:
