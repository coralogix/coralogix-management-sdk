      description: Connector config schema.
      example:
        fields:
        - allowedValues:
          - allowedValues
          - allowedValues
          default: default
          allowOverrides: true
          fieldName: fieldName
          description: description
          fieldType: FIELD_TYPE_UNSPECIFIED
          required: true
        - allowedValues:
          - allowedValues
          - allowedValues
          default: default
          allowOverrides: true
          fieldName: fieldName
          description: description
          fieldType: FIELD_TYPE_UNSPECIFIED
          required: true
      externalDocs:
        url: ""
