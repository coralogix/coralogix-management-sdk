openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /notifications/notification-center/v1/connector-schemas:
    get:
      description: Returns the schema definition for notification connectors.
      externalDocs:
        url: ""
      operationId: ConnectorSchemaService_GetConnectorSchema
      parameters:
      - description: Connector type whose schema to retrieve.
        explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: "#/components/schemas/notification_center.ConnectorType"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectorSchemaResponse"
          description: ""
      summary: Get Connector Schema
      tags:
      - Connector Schema service
components:
