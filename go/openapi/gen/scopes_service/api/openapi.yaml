              schema:
                $ref: "#/components/schemas/Get_Scopes_Response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Team Scopes By Ids
      tags:
      - Scopes Service
    post:
      externalDocs:
        url: ""
      operationId: ScopesService_CreateScope
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_Scope_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Create_Scope_Response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
