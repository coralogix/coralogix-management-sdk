      externalDocs:
        url: ""
      operationId: ScopesService_DeleteScope
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          example: scope_id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
