      tags:
      - Scopes Service
    put:
      externalDocs:
        url: ""
      operationId: ScopesService_UpdateScope
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_Scope_Request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Update_Scope_Response"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
