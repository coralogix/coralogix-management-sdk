      tags:
      - Scopes Service
  /v1/scopes/list:
    get:
      externalDocs:
        url: ""
      operationId: ScopesService_GetTeamScopes
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Get_Scopes_Response"
          description: ""
        "400":
          content:
            application/json: {}
