openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /aaa/team-scopes/v1:
    get:
      description: Returns a data access scope by ID.
      externalDocs:
        url: ""
      operationId: ScopesService_GetTeamScopesByIds
      parameters:
      - description: List of team scope identifiers to retrieve.
        explode: true
        in: query
        name: ids
        required: false
        schema:
          description: List of team scope identifiers to retrieve.
          items:
            description: List of team scope identifiers to retrieve.
            example: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScopesResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get Team Scopes By Ids
      tags:
      - Scopes Service
    post:
      description: Creates a new data access scope.
      externalDocs:
        url: ""
      operationId: ScopesService_CreateScope
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create_Scope_Request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScopeResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Create Scope
      tags:
      - Scopes Service
    put:
      description: Updates an existing data access scope.
      externalDocs:
        url: ""
      operationId: ScopesService_UpdateScope
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update_Scope_Request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScopeResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Update Scope
      tags:
      - Scopes Service
  /aaa/team-scopes/v1/all/list:
    get:
      description: Returns all data access scopes for the team.
      externalDocs:
        url: ""
      operationId: ScopesService_GetTeamScopes
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScopesResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Get Team Scopes
      tags:
      - Scopes Service
  /aaa/team-scopes/v1/{id}:
    delete:
      description: Deletes the data access scope with the specified ID.
      externalDocs:
        url: ""
      operationId: ScopesService_DeleteScope
      parameters:
      - description: Unique identifier.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier.
          example: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
          minLength: 0
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScopeResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Unauthorized request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Internal server error
      summary: Delete Scope
      tags:
      - Scopes Service
components:
  schemas:
    CreateScopeResponse:
      description: This data structure represents a response to create a scope
      example:
        scope:
          defaultExpression: <v1>true
          displayName: my-scope
          teamId: 1234
          description: The best scope
          filters:
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          id: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
      externalDocs:
        description: Find out more about scopes
        url: https://coralogix.com/docs/user-guides/account-management/user-management/scopes/
      properties:
        scope:
          $ref: "#/components/schemas/v1.Scope"
      required:
      - scope
      title: Create Scope Response
      type: object
    DeleteScopeResponse:
      additionalProperties: false
      description: Response returned after successfully deleting a data access scope.
      externalDocs:
        url: ""
      type: object
    Error:
      description: Standard error response body returned for a failed request.
      example:
        code: 139
        message: message
      properties:
        code:
          description: "HTTP status code of the error (for example 400, 404, 500)."
          format: int32
          maximum: 599
          minimum: 100
          type: integer
        message:
          description: Human-readable description of the error.
          maxLength: 4096
          minLength: 0
          pattern: "^[\\s\\S]*$"
          type: string
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetScopesResponse:
      description: This data structure represents a response to get scopes
      example:
        scopes:
        - defaultExpression: <v1>true
          displayName: my-scope
          teamId: 1234
          description: The best scope
          filters:
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          id: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
        - defaultExpression: <v1>true
          displayName: my-scope
          teamId: 1234
          description: The best scope
          filters:
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          id: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
      externalDocs:
        description: Find out more about scopes
        url: https://coralogix.com/docs/user-guides/account-management/user-management/scopes/
      properties:
        scopes:
          description: List of scopes.
          items:
            $ref: "#/components/schemas/v1.Scope"
          minItems: 0
          type: array
      required:
      - scopes
      title: Get Scopes Response
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    UpdateScopeResponse:
      description: This data structure represents a response to update a scope
      example:
        scope:
          defaultExpression: <v1>true
          displayName: my-scope
          teamId: 1234
          description: The best scope
          filters:
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          - expression: <v1>true
            entityType: ENTITY_TYPE_UNSPECIFIED
          id: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
      externalDocs:
        description: Find out more about scopes
        url: https://coralogix.com/docs/user-guides/account-management/user-management/scopes/
      properties:
        scope:
          $ref: "#/components/schemas/v1.Scope"
      required:
      - scope
      title: Update Scope Response
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    scopes.v1.Filter:
      description: This data structure represents a filter
      example:
        expression: <v1>true
        entityType: ENTITY_TYPE_UNSPECIFIED
      externalDocs:
        description: Find out more about scopes
        url: https://coralogix.com/docs/user-guides/account-management/user-management/scopes/
      properties:
        entityType:
          $ref: "#/components/schemas/v1.EntityType"
        expression:
          description: The expression.
          example: <v1>true
          minLength: 0
          type: string
      title: Filter
      type: object
    v1.EntityType:
      description: Entity type.
      enum:
      - ENTITY_TYPE_UNSPECIFIED
      - ENTITY_TYPE_LOGS
      - ENTITY_TYPE_SPANS
      type: string
    v1.Scope:
      description: This data structure represents a scope
      example:
        defaultExpression: <v1>true
        displayName: my-scope
        teamId: 1234
        description: The best scope
        filters:
        - expression: <v1>true
          entityType: ENTITY_TYPE_UNSPECIFIED
        - expression: <v1>true
          entityType: ENTITY_TYPE_UNSPECIFIED
        id: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
      externalDocs:
        description: Find out more about scopes
        url: https://coralogix.com/docs/user-guides/account-management/user-management/scopes/
      properties:
        defaultExpression:
          description: The default expression.
          example: <v1>true
          minLength: 0
          type: string
        description:
          description: Human-readable description.
          example: The best scope
          minLength: 0
          type: string
        displayName:
          description: The display name.
          example: my-scope
          minLength: 0
          type: string
        filters:
          description: List of filters.
          items:
            $ref: "#/components/schemas/scopes.v1.Filter"
          minItems: 0
          type: array
        id:
          description: Unique identifier.
          example: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
          minLength: 0
          type: string
        teamId:
          description: Team identifier.
          example: 1234
          format: int32
          type: integer
      title: Scope
      type: object
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    Update_Scope_Request:
      description: This data structure represents a request to update a scope
      properties:
        defaultExpression:
          description: The default expression.
          example: <v1>true
          minLength: 0
          type: string
        description:
          description: Human-readable description.
          example: The best scope
          minLength: 0
          type: string
        displayName:
          description: The display name.
          example: my-scope
          minLength: 0
          type: string
        filters:
          description: List of filters.
          items:
            $ref: "#/components/schemas/scopes.v1.Filter"
          minItems: 0
          type: array
        id:
          description: Unique identifier.
          example: 60c82be2-413f-4b8e-8201-7f5c51e2ef2b
          minLength: 0
          type: string
      required:
      - defaultExpression
      - displayName
      - filters
      - id
      title: Update Scope Request
      type: object
    Create_Scope_Request:
      description: This data structure represents a request to create a scope
      properties:
        defaultExpression:
          description: The default expression.
          example: <v1>true
          minLength: 0
          type: string
        description:
          description: Human-readable description.
          example: The best scope
          minLength: 0
          type: string
        displayName:
          description: The display name.
          example: my-scope
          minLength: 0
          type: string
        filters:
          description: List of filters.
          items:
            $ref: "#/components/schemas/scopes.v1.Filter"
          minItems: 0
          type: array
      required:
      - displayName
      - filters
      title: Create Scope Request
      type: object
