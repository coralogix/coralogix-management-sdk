            "schema": {
              "example": "my_key_id",
              "description": "Key identifier.",
              "type": "string",
              "minLength": 0
            },
            "style": "simple"
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Update Api Key Request",
                "description": "This data structure is used to update an API key.",
                "type": "object",
                "properties": {
                  "accessPolicy": {
                    "example": "{\"version\":\"2025-01-01\",\"default\":{\"permissions\":{\"data-ingest-api-keys:ReadAccessPolicy\":\"grant\",\"data-ingest-api-keys:Manage\":\"deny\",\"data-ingest-api-keys:UpdateAccessPolicy\":\"deny\",\"data-ingest-api-keys:ReadConfig\":\"grant\"}},\"rules\":[]}",
                    "description": "JSON string representing the access policy for this API key. Defines granular permissions for users and groups. To delete an existing policy, pass an empty string.",
                    "type": "string",
                    "minLength": 0
                  },
                  "isActive": {
                    "example": true,
                    "description": "Whether the API key is active. Set to false to deactivate without deleting.",
                    "type": "boolean"
                  },
                  "newName": {
                    "example": "my_new_name",
                    "description": "New display name for the API key.",
                    "type": "string",
                    "minLength": 0
                  },
                  "permissions": {
