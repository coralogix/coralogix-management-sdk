      "post": {
        "tags": [
          "API Keys Service"
        ],
        "summary": "Create API Key",
        "description": "Creates a new API key for the authenticated team.",
        "externalDocs": {
          "url": ""
        },
        "operationId": "ApiKeysService_CreateApiKey",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "title": "Create Api Key Request",
                "description": "This data structure is used to create an API key.",
                "type": "object",
                "properties": {
                  "accessPolicy": {
                    "example": "{\"version\":\"2025-01-01\",\"default\":{\"permissions\":{\"data-ingest-api-keys:ReadAccessPolicy\":\"grant\",\"data-ingest-api-keys:Manage\":\"deny\",\"data-ingest-api-keys:UpdateAccessPolicy\":\"deny\",\"data-ingest-api-keys:ReadConfig\":\"grant\"}},\"rules\":[]}",
