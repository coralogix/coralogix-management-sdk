openapi: 3.0.0
info:
  title: ""
  version: 1.0.0
servers:
- url: /
paths:
  /alerts/alerts/v3/all/events:
    get:
      description: Returns all alert events.
      externalDocs:
        url: ""
      operationId: EventsService_ListAlertEvents
      parameters:
      - description: Alert version IDs to filter events by
        explode: true
        in: query
        name: alert_ids
        required: false
        schema:
          description: Alert version IDs to filter events by
          example:
          - 32144a8a-7ee0-4c16-a093-2bf1f9c12e1e
          items:
            description: Alert version IDs to filter events by
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      - description: Time range to search for events
        explode: true
        in: query
        name: timestamp_range
        required: false
        schema:
          $ref: "#/components/schemas/TimestampRange"
        style: form
      - description: "Optional event labels to filter by (e.g., app, subsystem, region)"
        explode: true
        in: query
        name: cx_event_labels
        required: false
        schema:
          additionalProperties:
            minLength: 0
            type: string
          description: "Optional event labels to filter by (e.g., app, subsystem,\
            \ region)"
          type: object
        style: form
      - description: Ordering criteria for the returned events.
        explode: true
        in: query
        name: order_bys
        required: false
        schema:
          description: Ordering criteria for the returned events.
          items:
            $ref: "#/components/schemas/EventsService_ListAlertEvents_order_bys_parameter_inner"
          minItems: 0
          type: array
        style: form
      - description: Pagination parameters for the response.
        explode: true
        in: query
        name: pagination
        required: false
        schema:
          $ref: "#/components/schemas/EventsService_ListAlertEvents_pagination_parameter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlertEventsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List Alert Events
      tags:
      - Events Service
  /alerts/events/v3:
    get:
      description: Returns a list of alert events matching the specified filters.
      externalDocs:
        url: ""
      operationId: EventsService_ListEvents
      parameters:
      - description: Filter criteria for events.
        explode: true
        in: query
        name: filter
        required: false
        schema:
          $ref: "#/components/schemas/EventsFilter"
        style: form
      - description: Ordering criteria for the returned events.
        explode: true
        in: query
        name: order_bys
        required: false
        schema:
          description: Ordering criteria for the returned events.
          items:
            $ref: "#/components/schemas/EventsService_ListAlertEvents_order_bys_parameter_inner"
          minItems: 0
          type: array
        style: form
      - description: Pagination parameters for the response.
        explode: true
        in: query
        name: pagination
        required: false
        schema:
          $ref: "#/components/schemas/EventsService_ListAlertEvents_pagination_parameter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v3.ListEventsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List Events
      tags:
      - Events Service
  /alerts/events/v3/all/count:
    get:
      description: Returns the count of alert events matching the given filters.
      externalDocs:
        url: ""
      operationId: EventsService_ListEventsCount
      parameters:
      - description: Filter criteria for events.
        explode: true
        in: query
        name: filter
        required: false
        schema:
          $ref: "#/components/schemas/EventsFilter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventsCountResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: List Events Count
      tags:
      - Events Service
  /alerts/events/v3/all/list:
    get:
      description: Returns a list of alert events matching the given filters.
      externalDocs:
        url: ""
      operationId: EventsService_BatchGetEvent
      parameters:
      - description: The ids.
        explode: true
        in: query
        name: ids
        required: false
        schema:
          description: The ids.
          items:
            description: The ids.
            minLength: 0
            type: string
          minItems: 0
          type: array
        style: form
      - description: Ordering criteria for the returned events.
        explode: true
        in: query
        name: order_bys
        required: false
        schema:
          description: Ordering criteria for the returned events.
          items:
            $ref: "#/components/schemas/EventsService_ListAlertEvents_order_bys_parameter_inner"
          minItems: 0
          type: array
        style: form
      - description: Pagination parameters for the response.
        explode: true
        in: query
        name: pagination
        required: false
        schema:
          $ref: "#/components/schemas/EventsService_ListAlertEvents_pagination_parameter"
        style: form
      - description: Optional filter to narrow the set of returned events.
        explode: true
        in: query
        name: filter
        required: false
        schema:
          $ref: "#/components/schemas/EventsService_BatchGetEvent_filter_parameter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetEventResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Batch Get Event
      tags:
      - Events Service
  /alerts/events/v3/all/statistics:
    get:
      description: Returns statistical aggregates for alert events.
      externalDocs:
        url: ""
      operationId: EventsService_GetEventsStatistics
      parameters:
      - description: Filter criteria for events.
        explode: true
        in: query
        name: filter
        required: false
        schema:
          $ref: "#/components/schemas/EventsFilter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventsStatisticsResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Events Statistics
      tags:
      - Events Service
  /alerts/events/v3/{id}:
    get:
      description: Returns the alert event with the specified ID.
      externalDocs:
        url: ""
      operationId: EventsService_GetEvent
      parameters:
      - description: Unique identifier of the alert event to retrieve.
        explode: false
        in: path
        name: id
        required: true
        schema:
          description: Unique identifier of the alert event to retrieve.
          example: test
          minLength: 0
          type: string
        style: simple
      - description: The order bys.
        explode: true
        in: query
        name: order_bys
        required: false
        schema:
          description: The order bys.
          items:
            $ref: "#/components/schemas/EventsService_ListAlertEvents_order_bys_parameter_inner"
          minItems: 0
          type: array
        style: form
      - description: Pagination parameters for the response.
        explode: true
        in: query
        name: pagination
        required: false
        schema:
          $ref: "#/components/schemas/EventsService_ListAlertEvents_pagination_parameter"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/v3.GetEventResponse"
          description: ""
        "400":
          content:
            application/json: {}
          description: Bad Request
        "401":
          content:
            application/json: {}
          description: Unauthorized request
        "500":
          content:
            application/json: {}
          description: Internal server error
      summary: Get Event
      tags:
      - Events Service
components:
  schemas:
    BatchGetEventResponse:
      description: Response containing the details of an alert event.
      example:
        notFoundIds:
        - notFoundIds
        - notFoundIds
        pagination:
          totalSize: 10
          nextPageToken: test
        events:
          key:
            multipleEvents:
              events:
              - cxEventType: test_type
                companyId: 1
                cxEventKey: test
                cxEventMetadata:
                  key: cxEventMetadata
                cxEventPayload: "{}"
                cxEventPayloadType: test_payload_type
                cxEventDedupKey: test_dedup_key
                cxEventLabels:
                  key: cxEventLabels
                cxEventTimestamp: 2024-05-05T00:00:00Z
              - cxEventType: test_type
                companyId: 1
                cxEventKey: test
                cxEventMetadata:
                  key: cxEventMetadata
                cxEventPayload: "{}"
                cxEventPayloadType: test_payload_type
                cxEventDedupKey: test_dedup_key
                cxEventLabels:
                  key: cxEventLabels
                cxEventTimestamp: 2024-05-05T00:00:00Z
      externalDocs:
        url: ""
      properties:
        events:
          additionalProperties:
            $ref: "#/components/schemas/CxEventSingleOrMultiple"
          description: List of events.
          type: object
        notFoundIds:
          description: The not found ids.
          items:
            description: The not found ids.
            minLength: 0
            type: string
          minItems: 0
          type: array
        pagination:
          $ref: "#/components/schemas/events.v3.PaginationResponse"
      type: object
    CxEvent:
      description: This data structure represents an event
      example:
        cxEventType: test_type
        companyId: 1
        cxEventKey: test
        cxEventMetadata:
          key: cxEventMetadata
        cxEventPayload: "{}"
        cxEventPayloadType: test_payload_type
        cxEventDedupKey: test_dedup_key
        cxEventLabels:
          key: cxEventLabels
        cxEventTimestamp: 2024-05-05T00:00:00Z
      externalDocs:
        description: Find out more about events
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        companyId:
          description: The company id.
          example: 1
          format: int32
          type: integer
        cxEventDedupKey:
          description: The cx event dedup key.
          example: test_dedup_key
          minLength: 0
          type: string
        cxEventKey:
          description: The cx event key.
          example: test
          minLength: 0
          type: string
        cxEventLabels:
          additionalProperties:
            minLength: 0
            type: string
          description: The cx event labels.
          type: object
        cxEventMetadata:
          additionalProperties:
            minLength: 0
            type: string
          description: The cx event metadata.
          type: object
        cxEventPayload:
          description: The cx event payload.
          type: object
        cxEventPayloadType:
          description: The cx event payload type.
          example: test_payload_type
          minLength: 0
          type: string
        cxEventTimestamp:
          description: The cx event timestamp.
          example: 2024-05-05T00:00:00Z
          format: date-time
          minLength: 0
          type: string
        cxEventType:
          description: The cx event type.
          example: test_type
          minLength: 0
          type: string
      required:
      - companyId
      - cxEventKey
      - cxEventLabels
      - cxEventPayload
      - cxEventPayloadType
      - cxEventTimestamp
      - cxEventType
      title: Event
      type: object
    CxEventArray:
      description: This data structure represents an array of events
      example:
        events:
        - cxEventType: test_type
          companyId: 1
          cxEventKey: test
          cxEventMetadata:
            key: cxEventMetadata
          cxEventPayload: "{}"
          cxEventPayloadType: test_payload_type
          cxEventDedupKey: test_dedup_key
          cxEventLabels:
            key: cxEventLabels
          cxEventTimestamp: 2024-05-05T00:00:00Z
        - cxEventType: test_type
          companyId: 1
          cxEventKey: test
          cxEventMetadata:
            key: cxEventMetadata
          cxEventPayload: "{}"
          cxEventPayloadType: test_payload_type
          cxEventDedupKey: test_dedup_key
          cxEventLabels:
            key: cxEventLabels
          cxEventTimestamp: 2024-05-05T00:00:00Z
      externalDocs:
        description: Find out more about events
        url: https://coralogix.com/docs/user-guides/data-transformation/enrichments/custom-enrichment/
      properties:
        events:
          description: List of events.
          items:
            $ref: "#/components/schemas/CxEvent"
          minItems: 0
          type: array
      required:
      - events
      title: CxEventArray
      type: object
    CxEventSingleOrMultiple:
      oneOf:
      - $ref: "#/components/schemas/CxEventSingleOrMultipleMultipleEvents"
      - $ref: "#/components/schemas/CxEventSingleOrMultipleSingleEvent"
    CxEventSingleOrMultipleMultipleEvents:
      description: This data structure represents a single or multiple events
      example:
        multipleEvents:
          events:
          - cxEventType: test_type
            companyId: 1
            cxEventKey: test
            cxEventMetadata:
              key: cxEventMetadata
            cxEventPayload: "{}"
            cxEventPayloadType: test_payload_type
            cxEventDedupKey: test_dedup_key
            cxEventLabels:
              key: cxEventLabels
            cxEventTimestamp: 2024-05-05T00:00:00Z
          - cxEventType: test_type
            companyId: 1
            cxEventKey: test
            cxEventMetadata:
              key: cxEventMetadata
            cxEventPayload: "{}"
            cxEventPayloadType: test_payload_type
            cxEventDedupKey: test_dedup_key
            cxEventLabels:
              key: cxEventLabels
            cxEventTimestamp: 2024-05-05T00:00:00Z
      externalDocs:
        url: ""
      properties:
        multipleEvents:
          $ref: "#/components/schemas/CxEventArray"
      required:
      - multipleEvents
      title: CxEventSingleOrMultiple
      type: object
    CxEventSingleOrMultipleSingleEvent:
      description: This data structure represents a single or multiple events
      externalDocs:
        url: ""
      properties:
        singleEvent:
          $ref: "#/components/schemas/CxEvent"
      required:
      - singleEvent
      title: CxEventSingleOrMultiple
      type: object
    FieldStatistics:
      example:
        fieldStatistics:
          key: fieldStatistics
      properties:
        fieldStatistics:
          additionalProperties:
            maxLength: 20
            minLength: 1
            pattern: "^-?[0-9]+$"
            type: string
          description: The field statistics.
          type: object
      type: object
    FilterPathAndValues:
      oneOf:
      - $ref: "#/components/schemas/FilterPathAndValuesFilters"
      - $ref: "#/components/schemas/FilterPathAndValuesMultipleValues"
    FilterPathAndValuesFilters:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        filters:
          $ref: "#/components/schemas/Filters"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - filters
      - path
      - values
      title: FilterPathAndValues
      type: object
    FilterPathAndValuesMultipleValues:
      description: This data structure represents a filter path and values
      externalDocs:
        url: ""
      properties:
        multipleValues:
          $ref: "#/components/schemas/MultipleValues"
        path:
          example: test
          minLength: 0
          type: string
      required:
      - multipleValues
      - path
      - values
      title: FilterPathAndValues
      type: object
    Filters:
      description: This data structure represents a filter
      externalDocs:
        url: ""
      properties:
        operator:
          $ref: "#/components/schemas/v3.FilterOperator"
        pathAndValues:
          items:
            $ref: "#/components/schemas/FilterPathAndValues"
          minItems: 0
          type: array
      required:
      - pathAndValues
      title: Filters
      type: object
    GetEventsStatisticsResponse:
      description: This data structure represents a response to get events statistics
      example:
        cxEventMetadataFieldStatistics:
          key:
            fieldStatistics:
              key: fieldStatistics
        cxEventLabelsFieldStatistics:
          key:
            fieldStatistics:
              key: fieldStatistics
      externalDocs:
        url: ""
      properties:
        cxEventLabelsFieldStatistics:
          additionalProperties:
            $ref: "#/components/schemas/FieldStatistics"
          description: The cx event labels field statistics.
          type: object
        cxEventMetadataFieldStatistics:
          additionalProperties:
            $ref: "#/components/schemas/FieldStatistics"
          description: The cx event metadata field statistics.
          type: object
      required:
      - cxEventMetadataFieldStatisticscxEventLabelsFieldStatistics
      title: GetEventsStatisticsResponse
      type: object
    ListAlertEventsResponse:
      description: Response containing events associated with the alert
      example:
        pagination:
          totalSize: 10
          nextPageToken: test
        events:
        - cxEventType: test_type
          companyId: 1
          cxEventKey: test
          cxEventMetadata:
            key: cxEventMetadata
          cxEventPayload: "{}"
          cxEventPayloadType: test_payload_type
          cxEventDedupKey: test_dedup_key
          cxEventLabels:
            key: cxEventLabels
          cxEventTimestamp: 2024-05-05T00:00:00Z
        - cxEventType: test_type
          companyId: 1
          cxEventKey: test
          cxEventMetadata:
            key: cxEventMetadata
          cxEventPayload: "{}"
          cxEventPayloadType: test_payload_type
          cxEventDedupKey: test_dedup_key
          cxEventLabels:
            key: cxEventLabels
          cxEventTimestamp: 2024-05-05T00:00:00Z
      externalDocs:
        url: ""
      properties:
        events:
          description: List of events.
          items:
            $ref: "#/components/schemas/CxEvent"
          minItems: 0
          type: array
        pagination:
          $ref: "#/components/schemas/events.v3.PaginationResponse"
      required:
      - events
      title: ListAlertEventsResponse
      type: object
    ListEventsCountResponse:
      description: This data structure represents a response to list events count
      example:
        count: "10"
        reachedLimit: false
      externalDocs:
        url: ""
      properties:
        count:
          description: Number of items.
          example: "10"
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]+$"
          type: string
        reachedLimit:
          description: The reached limit.
          example: false
          type: boolean
      required:
      - count
      - reachedLimit
      title: ListEventsCountResponse
      type: object
    MultipleValues:
      properties:
        matcher:
          $ref: "#/components/schemas/events.v3.FilterMatcher"
        values:
          items:
            minLength: 0
            type: string
          minItems: 0
          type: array
      type: object
    events.v3.FilterMatcher:
      enum:
      - FILTER_MATCHER_TEXT_OR_UNSPECIFIED
      - FILTER_MATCHER_REGEXP
      type: string
    events.v3.OrderByDirection:
      description: Order by direction.
      enum:
      - ORDER_BY_DIRECTION_UNSPECIFIED
      - ORDER_BY_DIRECTION_ASC
      - ORDER_BY_DIRECTION_DESC
      type: string
    events.v3.OrderByFields:
      description: Order by fields.
      enum:
      - ORDER_BY_FIELDS_UNSPECIFIED
      - ORDER_BY_FIELDS_TIMESTAMP
      type: string
    events.v3.PaginationResponse:
      description: Pagination metadata returned alongside paginated list responses.
      example:
        totalSize: 10
        nextPageToken: test
      externalDocs:
        url: ""
      properties:
        nextPageToken:
          description: Token for fetching the next page of results.
          example: test
          minLength: 0
          type: string
        totalSize:
          description: Total number of results.
          example: 10
          format: int64
          minimum: 0
          type: integer
      type: object
    v3.FilterOperator:
      description: Filter operator.
      enum:
      - FILTER_OPERATOR_AND_OR_UNSPECIFIED
      - FILTER_OPERATOR_OR
      type: string
    v3.GetEventResponse:
      description: Response containing the details of an alert event.
      example:
        pagination:
          totalSize: 10
          nextPageToken: test
        event:
          multipleEvents:
            events:
            - cxEventType: test_type
              companyId: 1
              cxEventKey: test
              cxEventMetadata:
                key: cxEventMetadata
              cxEventPayload: "{}"
              cxEventPayloadType: test_payload_type
              cxEventDedupKey: test_dedup_key
              cxEventLabels:
                key: cxEventLabels
              cxEventTimestamp: 2024-05-05T00:00:00Z
            - cxEventType: test_type
              companyId: 1
              cxEventKey: test
              cxEventMetadata:
                key: cxEventMetadata
              cxEventPayload: "{}"
              cxEventPayloadType: test_payload_type
              cxEventDedupKey: test_dedup_key
              cxEventLabels:
                key: cxEventLabels
              cxEventTimestamp: 2024-05-05T00:00:00Z
      externalDocs:
        url: ""
      properties:
        event:
          $ref: "#/components/schemas/CxEventSingleOrMultiple"
        pagination:
          $ref: "#/components/schemas/events.v3.PaginationResponse"
      type: object
    v3.ListEventsResponse:
      description: This data structure represents a response to list events
      example:
        pagination:
          totalSize: 10
          nextPageToken: test
        events:
        - cxEventType: test_type
          companyId: 1
          cxEventKey: test
          cxEventMetadata:
            key: cxEventMetadata
          cxEventPayload: "{}"
          cxEventPayloadType: test_payload_type
          cxEventDedupKey: test_dedup_key
          cxEventLabels:
            key: cxEventLabels
          cxEventTimestamp: 2024-05-05T00:00:00Z
        - cxEventType: test_type
          companyId: 1
          cxEventKey: test
          cxEventMetadata:
            key: cxEventMetadata
          cxEventPayload: "{}"
          cxEventPayloadType: test_payload_type
          cxEventDedupKey: test_dedup_key
          cxEventLabels:
            key: cxEventLabels
          cxEventTimestamp: 2024-05-05T00:00:00Z
      externalDocs:
        url: ""
      properties:
        events:
          description: List of events.
          items:
            $ref: "#/components/schemas/CxEvent"
          minItems: 0
          type: array
        pagination:
          $ref: "#/components/schemas/events.v3.PaginationResponse"
      required:
      - events
      title: ListEventsResponse
      type: object
    TimestampRange:
      description: This data structure represents a timestamp range
      externalDocs:
        url: ""
      properties:
        from:
          description: Inclusive start of the time range.
          format: date-time
          minLength: 0
          type: string
        to:
          description: Inclusive end of the time range.
          format: date-time
          minLength: 0
          type: string
      required:
      - from
      - to
      title: TimestampRange
      type: object
    EventsService_ListAlertEvents_order_bys_parameter_inner:
      properties:
        direction:
          $ref: "#/components/schemas/events.v3.OrderByDirection"
        fieldName:
          $ref: "#/components/schemas/events.v3.OrderByFields"
      type: object
    EventsService_ListAlertEvents_pagination_parameter:
      properties:
        pageSize:
          description: Maximum number of results to return per page.
          example: 10
          format: int64
          minimum: 0
          type: integer
        pageToken:
          description: Opaque token for fetching the next page of results.
          example: test
          minLength: 0
          type: string
      type: object
    EventsFilter:
      description: This data structure represents an events filter
      externalDocs:
        url: ""
      properties:
        cxEventKeys:
          description: List of event attribute keys to include when retrieving event
            data.
          example:
          - test_key
          items:
            description: List of event attribute keys to include when retrieving event
              data.
            minLength: 0
            type: string
          minItems: 0
          type: array
        cxEventLabelsFilters: {}
        cxEventMetadataFilters: {}
        cxEventTypes:
          description: List of event type identifiers to include in the results.
          example:
          - test_type
          items:
            description: List of event type identifiers to include in the results.
            minLength: 0
            type: string
          minItems: 0
          type: array
        timestamp: {}
      required:
      - cxEventKeys
      - cxEventTypes
      - timestamp
      title: EventsFilter
      type: object
    EventsService_BatchGetEvent_filter_parameter:
      properties:
        timestamp: {}
      type: object
